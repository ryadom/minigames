<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minigames — free browser minigames</title>
  <meta name="description" content="A collection of free browser minigames. No installs, no sign-ups — just play." />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Minigames" />
  <meta property="og:description" content="A collection of free browser minigames. No installs, no sign-ups — just play." />
  <meta property="og:url" content="https://minigames.ryadom.me" />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <h1 class="logo">🎮 Minigames</h1>
      <p class="tagline">A collection of free browser minigames. No installs, no sign-ups — just play.</p>
    </div>
  </header>

  <main class="wrap">
    <section aria-labelledby="games-heading">
      <h2 id="games-heading" class="section-title">Games</h2>
      <ul id="game-list" class="game-grid"></ul>
      <p id="empty-state" class="empty-state" hidden>
        No games yet — check back soon! 🚧
      </p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p>
        Made for fun ·
        <a href="https://github.com/ryadom/minigames">Source on GitHub</a>
      </p>
    </div>
  </footer>

  <script src="./games.js"></script>
  <script src="./app.js"></script>
</body>
</html>

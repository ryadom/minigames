<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Sudoku — Minigames</title>
  <meta name="description" content="Classic Sudoku with selectable difficulty — easy, medium, hard or expert. Play in your browser, no installs." />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔢</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Shared chrome: header bar + language control. -->
  <link rel="stylesheet" href="../../shared/mg.css" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body { height: 100%; }
    body {
      background: var(--mg-bg);
      color: var(--mg-txt);
      font-family: "IBM Plex Mono", ui-monospace, monospace;
      user-select: none;
      -webkit-user-select: none;
    }

    /* The game area scrolls if the viewport is short; the board is centered. */
    .mg-game-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 16px;
      overflow: auto;
    }

    /* ----------------------------------------------------------- Board -- */
    #board {
      --line: #2a3744;
      --line-bold: #4a6072;
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      grid-template-rows: repeat(9, 1fr);
      width: min(92vw, 70vh, 540px);
      aspect-ratio: 1 / 1;
      background: var(--line-bold);
      border: 3px solid var(--line-bold);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.5);
      touch-action: manipulation;
    }

    .cell {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #11161c;
      font-size: clamp(16px, 4.6vw, 30px);
      font-weight: 600;
      color: #6fb7ff;            /* player-entered numbers */
      cursor: pointer;
      transition: background 0.1s;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    /* Thicker borders between the 3×3 boxes. */
    .cell.bx-r { border-right: 2px solid var(--line-bold); }
    .cell.bx-b { border-bottom: 2px solid var(--line-bold); }
    .cell:nth-child(9n) { border-right: none; }
    .cell:nth-child(n+73) { border-bottom: none; }

    .cell.given { color: var(--mg-txt); cursor: default; }
    .cell.peer { background: #161d26; }
    .cell.same { background: #1d2a1f; }          /* same number as selected */
    .cell.sel { background: #243a52; }
    .cell.conflict { color: var(--mg-err); }
    .cell.sel.conflict { background: #3a1d22; }

    /* Pencil-mark notes: a 3×3 micro-grid inside the cell. */
    .notes {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      pointer-events: none;
    }
    .notes span {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(7px, 1.5vw, 11px);
      font-weight: 500;
      color: var(--mg-dim);
      line-height: 1;
    }

    /* ------------------------------------------------------------ Pad -- */
    #pad {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      width: min(92vw, 70vh, 540px);
    }
    .pad-btn {
      font-family: inherit;
      font-size: clamp(16px, 4vw, 24px);
      font-weight: 600;
      color: var(--mg-txt);
      background: var(--mg-panel);
      border: 1px solid var(--mg-line);
      border-radius: 10px;
      padding: 12px 0;
      cursor: pointer;
      position: relative;
      transition: 0.12s;
    }
    .pad-btn:hover { border-color: var(--mg-accent); color: #fff; }
    .pad-btn:active { transform: translateY(1px); }
    .pad-btn.done { opacity: 0.32; pointer-events: none; }  /* all 9 placed */
    .pad-btn .left {
      position: absolute;
      bottom: 3px;
      right: 6px;
      font-size: 9px;
      font-weight: 500;
      color: var(--mg-dim);
    }
    .pad-wide { grid-column: span 1; }

    #notesToggle.on {
      border-color: var(--mg-accent);
      color: var(--mg-accent);
      box-shadow: 0 0 0 1px var(--mg-accent) inset;
    }

    /* --------------------------------------------------------- Overlay -- */
    .overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(6, 9, 12, 0.82);
      backdrop-filter: blur(3px);
      z-index: 20;
      padding: 20px;
    }
    .overlay.show { display: flex; }

    .panel {
      background: linear-gradient(180deg, #141a21, #0d1217);
      border: 1px solid var(--mg-line);
      border-radius: 16px;
      padding: 26px 24px;
      width: min(92vw, 420px);
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
    }
    .panel h2 {
      font-size: 20px;
      letter-spacing: 1px;
      margin-bottom: 4px;
      color: #fff;
    }
    .panel p { color: var(--mg-dim); font-size: 12px; margin-bottom: 18px; }

    .diffs { display: flex; flex-direction: column; gap: 10px; }
    .diff {
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: var(--mg-txt);
      background: var(--mg-panel);
      border: 1px solid var(--mg-line);
      border-radius: 10px;
      padding: 13px 16px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: 0.12s;
    }
    .diff:hover { border-color: var(--mg-accent); color: #fff; transform: translateY(-1px); }
    .diff .tag { font-size: 10px; color: var(--mg-dim); font-weight: 500; }
    .diff:hover .tag { color: var(--mg-accent); }

    .win-emoji { font-size: 46px; }
  </style>
</head>
<body class="mg-app">
  <!-- Header is mounted by the shared runtime (see MG.mountHeader below). -->
  <div class="mg-game-area">
    <div id="board"></div>
    <div id="pad"></div>

    <!-- Difficulty chooser / win panel share the same overlay element. -->
    <div id="overlay" class="overlay">
      <div class="panel" id="panel"></div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>

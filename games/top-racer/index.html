<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>🏎️ Top Racer — Minigames</title>
  <meta name="description" content="Top-down racing — steer your car around the circuit, nail the racing line and chase your best lap. Play in your browser, no installs." />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏎️</text></svg>" />

  <!-- Shared chrome: header bar + language control. -->
  <link rel="stylesheet" href="../../shared/mg.css" />
  <script src="../../shared/mg.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #1d2230;
      color: #fff;
      font-family: "Trebuchet MS", system-ui, -apple-system, sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    .mg-game-area {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1d2230;
    }

    .stage {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    /* ---- On-screen controls (touch first, but work with mouse too) ---- */
    .controls {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
    }
    .pad {
      position: absolute;
      bottom: max(18px, env(safe-area-inset-bottom));
      display: flex;
      gap: 14px;
    }
    .pad.steer { left: 16px; }
    .pad.pedals { right: 16px; }

    .ctl {
      pointer-events: auto;
      width: 68px;
      height: 68px;
      border: none;
      border-radius: 50%;
      font-size: 1.7rem;
      font-weight: 800;
      color: #fff;
      background: rgba(255, 255, 255, 0.14);
      border: 2px solid rgba(255, 255, 255, 0.22);
      backdrop-filter: blur(2px);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.05s, background 0.05s;
      touch-action: none;
    }
    .ctl:active,
    .ctl.held {
      background: rgba(255, 255, 255, 0.34);
      transform: scale(0.93);
    }
    .ctl.gas {
      background: rgba(86, 200, 100, 0.28);
      border-color: rgba(120, 240, 140, 0.45);
    }
    .ctl.gas.held { background: rgba(86, 220, 110, 0.55); }
    .ctl.brake {
      background: rgba(230, 90, 90, 0.26);
      border-color: rgba(255, 130, 130, 0.45);
    }
    .ctl.brake.held { background: rgba(240, 90, 90, 0.55); }

    /* ---- Overlay screens ---- */
    .overlay {
      position: absolute;
      inset: 0;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      /* The overlay is only shown in ready/finished states (hidden during the
         race), so it can safely capture pointer events for the start tap. */
      pointer-events: auto;
      cursor: pointer;
    }
    .overlay.hidden { display: none; }

    .panel {
      pointer-events: none;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 18px;
      padding: 26px 30px;
      backdrop-filter: blur(4px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.45);
      max-width: 90%;
    }

    .title {
      font-size: clamp(1.7rem, 7vw, 2.6rem);
      font-weight: 800;
      letter-spacing: 0.02em;
      text-shadow: 0 3px 0 rgba(0, 0, 0, 0.35);
      margin-bottom: 6px;
    }
    .hint { font-size: 1rem; opacity: 0.9; margin-top: 8px; line-height: 1.5; }
    .score-line { font-size: 1.05rem; margin-top: 12px; }
    .score-line b { font-size: 1.5rem; }

    .play-pill {
      display: inline-block;
      margin-top: 18px;
      padding: 11px 26px;
      font-weight: 800;
      font-size: 1.05rem;
      color: #16361f;
      background: #ffe34d;
      border-radius: 999px;
      box-shadow: 0 4px 0 #c9a900;
      animation: bob 1.1s ease-in-out infinite;
    }
    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    /* Big centered countdown / flash number drawn over the canvas. */
    .flash {
      position: absolute;
      inset: 0;
      z-index: 4;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      font-size: clamp(4rem, 22vw, 9rem);
      font-weight: 900;
      color: #fff;
      text-shadow: 0 6px 0 rgba(0, 0, 0, 0.4);
    }
    .flash.hidden { display: none; }
  </style>
</head>
<body class="mg-app">
  <!-- Header is mounted by the shared runtime (see MG.mountHeader below). -->
  <div class="mg-game-area">
    <div class="stage">
      <canvas id="game"></canvas>

      <div class="flash hidden" id="flash"></div>

      <div class="controls" id="controls">
        <div class="pad steer">
          <button class="ctl" data-k="left" aria-label="Steer left">◀</button>
          <button class="ctl" data-k="right" aria-label="Steer right">▶</button>
        </div>
        <div class="pad pedals">
          <button class="ctl brake" data-k="brake" aria-label="Brake / reverse">▼</button>
          <button class="ctl gas" data-k="gas" aria-label="Accelerate">▲</button>
        </div>
      </div>

      <div class="overlay" id="overlay">
        <div class="panel">
          <div class="title" id="overlay-title">🏎️ Top Racer</div>
          <div class="hint" id="overlay-hint"></div>
          <div class="score-line" id="overlay-score" hidden></div>
          <div class="play-pill" id="overlay-action"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      "use strict";

      var $ = function (id) { return document.getElementById(id); };

      /* ============================ i18n ============================ */
      MG.i18n.register({
        en: {
          title: "Top Racer",
          lap: "Lap", time: "Time", best: "Best", pos: "Pos",
          hint: "Steer ◀ ▶ · ▲ gas · ▼ brake (hold while turning to drift)\nBeat the bots and chase your best lap!",
          tapStart: "▶ Start engine",
          go: "GO!",
          newBest: "New best lap! 🏁",
          bestLabel: "Best lap", lastLabel: "Last lap",
          restart: "Restart"
        },
        ru: {
          title: "Top Racer",
          lap: "Круг", time: "Время", best: "Рекорд", pos: "Место",
          hint: "Руль ◀ ▶ · ▲ газ · ▼ тормоз (держи в повороте — занос)\nОбгони ботов и побей свой лучший круг!",
          tapStart: "▶ Завести мотор",
          go: "СТАРТ!",
          newBest: "Новый рекорд круга! 🏁",
          bestLabel: "Лучший круг", lastLabel: "Последний круг",
          restart: "Заново"
        },
        es: {
          title: "Top Racer",
          lap: "Vuelta", time: "Tiempo", best: "Mejor", pos: "Pos",
          hint: "Gira ◀ ▶ · ▲ acelera · ▼ frena (mantén al girar para derrapar)\n¡Gana a los bots y bate tu mejor vuelta!",
          tapStart: "▶ Arrancar motor",
          go: "¡YA!",
          newBest: "¡Mejor vuelta! 🏁",
          bestLabel: "Mejor vuelta", lastLabel: "Última vuelta",
          restart: "Reiniciar"
        }
      });

      var canvas = $("game");
      var ctx = canvas.getContext("2d");
      var overlay = $("overlay");
      var overlayTitle = $("overlay-title");
      var overlayHint = $("overlay-hint");
      var overlayScore = $("overlay-score");
      var overlayAction = $("overlay-action");
      var flashEl = $("flash");

      var ui = MG.mountHeader({
        icon: "🏎️",
        titleKey: "title",
        stats: [
          { key: "pos", labelKey: "pos", value: "1/4" },
          { key: "lap", labelKey: "lap", value: "1" },
          { key: "time", labelKey: "time", variant: "sm", value: "0.00" },
          { key: "best", labelKey: "best", variant: "sm", value: "—" }
        ],
        actions: [
          { key: "restart", labelKey: "restart", onClick: function () { resetRace(); showReady(); } }
        ]
      });

      /* ===================== Canvas / camera sizing ===================== */
      var VW = 360, VH = 640, dpr = 1;
      function resize() {
        var rect = canvas.getBoundingClientRect();
        dpr = window.devicePixelRatio || 1;
        VW = Math.max(1, rect.width);
        VH = Math.max(1, rect.height);
        canvas.width = Math.round(VW * dpr);
        canvas.height = Math.round(VH * dpr);
      }

      /* ============================ Track ============================
         A closed circuit, defined by a handful of waypoints that we smooth
         into a centreline with a Catmull-Rom spline. From the centreline we
         derive the left/right edges (for the asphalt + curbs) and use it for
         off-track detection and lap/progress tracking. */
      var TRACK_HW = 78;          // half-width of the asphalt
      var CURB_W = 12;            // curb strip width (outside the asphalt)

      var WAYPOINTS = [
        [420, 200], [920, 170], [1280, 330], [1320, 660], [1060, 840],
        [1180, 1080], [820, 1190], [440, 1090], [540, 800], [250, 660],
        [220, 380]
      ];

      function cr(p0, p1, p2, p3, t) {
        var t2 = t * t, t3 = t2 * t;
        return [
          0.5 * ((2 * p1[0]) + (-p0[0] + p2[0]) * t +
            (2 * p0[0] - 5 * p1[0] + 4 * p2[0] - p3[0]) * t2 +
            (-p0[0] + 3 * p1[0] - 3 * p2[0] + p3[0]) * t3),
          0.5 * ((2 * p1[1]) + (-p0[1] + p2[1]) * t +
            (2 * p0[1] - 5 * p1[1] + 4 * p2[1] - p3[1]) * t2 +
            (-p0[1] + 3 * p1[1] - 3 * p2[1] + p3[1]) * t3)
        ];
      }

      var center = [];   // [{x,y}]
      var left = [];     // outer edge points
      var right = [];
      var curbOutL = [];
      var curbOutR = [];

      function buildTrack() {
        var pts = [];
        var n = WAYPOINTS.length;
        var perSeg = 20;
        for (var i = 0; i < n; i++) {
          var p0 = WAYPOINTS[(i - 1 + n) % n];
          var p1 = WAYPOINTS[i];
          var p2 = WAYPOINTS[(i + 1) % n];
          var p3 = WAYPOINTS[(i + 2) % n];
          for (var j = 0; j < perSeg; j++) {
            var c = cr(p0, p1, p2, p3, j / perSeg);
            pts.push({ x: c[0], y: c[1] });
          }
        }
        center = pts;
        var m = pts.length;
        for (var k = 0; k < m; k++) {
          var prev = pts[(k - 1 + m) % m];
          var next = pts[(k + 1) % m];
          var tx = next.x - prev.x, ty = next.y - prev.y;
          var len = Math.hypot(tx, ty) || 1;
          tx /= len; ty /= len;
          var nx = -ty, ny = tx;   // left normal
          left.push({ x: pts[k].x + nx * TRACK_HW, y: pts[k].y + ny * TRACK_HW });
          right.push({ x: pts[k].x - nx * TRACK_HW, y: pts[k].y - ny * TRACK_HW });
          curbOutL.push({ x: pts[k].x + nx * (TRACK_HW + CURB_W), y: pts[k].y + ny * (TRACK_HW + CURB_W) });
          curbOutR.push({ x: pts[k].x - nx * (TRACK_HW + CURB_W), y: pts[k].y - ny * (TRACK_HW + CURB_W) });
        }
      }

      // Decorative grass patches scattered across the world (fixed positions
      // so they read as motion as the camera moves).
      var patches = [];
      function buildPatches() {
        var rnd = mulberry(98765);
        var minX = 1e9, minY = 1e9, maxX = -1e9, maxY = -1e9;
        for (var i = 0; i < center.length; i++) {
          minX = Math.min(minX, center[i].x); maxX = Math.max(maxX, center[i].x);
          minY = Math.min(minY, center[i].y); maxY = Math.max(maxY, center[i].y);
        }
        var pad = 260;
        for (var c = 0; c < 220; c++) {
          var x = minX - pad + rnd() * (maxX - minX + pad * 2);
          var y = minY - pad + rnd() * (maxY - minY + pad * 2);
          // Skip patches that fall on the asphalt.
          if (distToTrack(x, y).dist < TRACK_HW + CURB_W + 10) continue;
          patches.push({ x: x, y: y, r: 7 + rnd() * 16, t: rnd() });
        }
      }
      function mulberry(a) {
        return function () {
          a |= 0; a = (a + 0x6D2B79F5) | 0;
          var t = Math.imul(a ^ (a >>> 15), 1 | a);
          t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }

      // Nearest distance from a point to the centreline polyline, plus the
      // index of the nearest segment (used for lap progress).
      function distToTrack(px, py) {
        var best = Infinity, bestI = 0;
        var m = center.length;
        for (var i = 0; i < m; i++) {
          var a = center[i], b = center[(i + 1) % m];
          var dx = b.x - a.x, dy = b.y - a.y;
          var l2 = dx * dx + dy * dy || 1;
          var t = ((px - a.x) * dx + (py - a.y) * dy) / l2;
          t = t < 0 ? 0 : t > 1 ? 1 : t;
          var cx = a.x + dx * t, cy = a.y + dy * t;
          var d = Math.hypot(px - cx, py - cy);
          if (d < best) { best = d; bestI = i; }
        }
        return { dist: best, idx: bestI };
      }

      /* ============================ Car ============================
         Heading convention: forward = (sin a, -cos a), so a = 0 points up.
         The camera is FIXED (world-up stays up); the car rotates on screen.

         The car carries a full velocity vector (vx, vy). Each step we split it
         into a forward and a lateral component relative to the heading: the
         engine pushes along forward, while lateral velocity is bled off by
         "grip". High grip snaps the car to where it points; low grip lets the
         tail slide — that is the drift. Holding the brake at speed acts as a
         handbrake that drops grip and lets you slide the car through corners. */
      var ACCEL = 0.15;
      var BRAKE = 0.22;
      var MAX_SPEED = 6.0;
      var OFF_MAX = 2.4;
      var REVERSE_MAX = -2.0;
      var DRAG = 0.992;
      var ROLL = 0.975;
      var OFF_DRAG = 0.90;
      var STEER = 0.050;
      var GRIP = 0.80;          // lateral velocity retained per frame (grippy)
      var DRIFT_GRIP = 0.95;    // handbrake: tail slides for longer (drift)
      var SLIP_MARK = 1.3;      // |lateral speed| above which we lay rubber

      var ZOOM = 0.82;          // camera zoom-out so opponents stay in view

      var car, bots, input, state, raceStartT, lapStartT, lap, lastLap, best;
      var STATE_READY = 0, STATE_COUNT = 1, STATE_PLAY = 2;
      var countUntil = 0;

      // Bot personalities: body colours + how hard they push.
      var BOT_DEFS = [
        { c1: "#1e6fd9", c2: "#4aa0ff", c3: "#114a91", maxMul: 0.97, look: 9 },
        { c1: "#149a47", c2: "#46d97e", c3: "#0c6630", maxMul: 0.93, look: 10 },
        { c1: "#d9a514", c2: "#ffd24a", c3: "#916c0c", maxMul: 0.90, look: 8 }
      ];
      var PLAYER_COL = { c1: "#c81f2d", c2: "#ff3b4a", c3: "#9a121d" };

      var store = MG.storage("top-racer", { version: 1 });
      best = (store.load() || { best: 0 }).best || 0;
      ui.setStat("best", best ? fmt(best) : "—");

      // Pose on the start/finish line (centre[0]) with a lateral offset across
      // the track, facing along the tangent (toward increasing index).
      function gridPose(latOffset) {
        var a = center[0], b = center[1];
        var tx = b.x - a.x, ty = b.y - a.y;
        var len = Math.hypot(tx, ty) || 1;
        tx /= len; ty /= len;
        var nx = -ty, ny = tx;      // left normal (across the track)
        return {
          x: a.x + nx * latOffset,
          y: a.y + ny * latOffset,
          angle: Math.atan2(tx, -ty)
        };
      }

      function newCarState(pose, extra) {
        var c = {
          x: pose.x, y: pose.y, angle: pose.angle,
          vx: 0, vy: 0, speed: 0, fwd: 0, lat: 0,
          onTrack: true, offIdx: 0,
          lap: 1, prevFrac: 0, passedHalf: false, prog: 1, skid: []
        };
        if (extra) for (var k in extra) c[k] = extra[k];
        return c;
      }

      function resetRace() {
        // Side-by-side starting grid across the asphalt. The player takes a
        // centre slot; the three bots line up alongside.
        car = newCarState(gridPose(-15), { col: PLAYER_COL });
        bots = [];
        var lanes = [-48, 18, 48];
        for (var i = 0; i < BOT_DEFS.length; i++) {
          var d = BOT_DEFS[i];
          bots.push(newCarState(gridPose(lanes[i]), {
            col: { c1: d.c1, c2: d.c2, c3: d.c3 },
            maxSpeed: MAX_SPEED * d.maxMul,
            look: d.look,
            isBot: true
          }));
        }
        input = { left: false, right: false, gas: false, brake: false };
        lap = 1;
        lastLap = 0;
        state = STATE_READY;
        raceStartT = 0;
        lapStartT = 0;
        ui.setStat("pos", "1/" + (bots.length + 1));
        ui.setStat("lap", "1");
        ui.setStat("time", "0.00");
        flashEl.classList.add("hidden");
      }

      function showReady() {
        state = STATE_READY;
        overlay.classList.remove("hidden");
        renderOverlay();
      }

      function beginCountdown() {
        overlay.classList.add("hidden");
        state = STATE_COUNT;
        countUntil = now() + 3000;
      }

      function go() {
        state = STATE_PLAY;
        var t = now();
        raceStartT = t;
        lapStartT = t;
        flashEl.textContent = MG.i18n.t("go");
        flashEl.classList.remove("hidden");
        setTimeout(function () { if (state === STATE_PLAY) flashEl.classList.add("hidden"); }, 650);
      }

      function now() { return performance.now(); }

      function fmt(ms) {
        if (!ms || ms < 0) return "0.00";
        var s = ms / 1000;
        if (s >= 60) {
          var mm = Math.floor(s / 60);
          var ss = s - mm * 60;
          return mm + ":" + (ss < 10 ? "0" : "") + ss.toFixed(2);
        }
        return s.toFixed(2);
      }

      function renderOverlay() {
        var t = MG.i18n.t;
        overlayTitle.textContent = "🏎️ " + t("title");
        if (lastLap > 0) {
          overlayHint.textContent = t("hint");
          overlayScore.hidden = false;
          var line = t("lastLabel") + " <b>" + fmt(lastLap) + "</b>";
          if (best > 0) line += "<br>" + t("bestLabel") + " <b>" + fmt(best) + "</b>";
          overlayScore.innerHTML = line;
        } else {
          overlayHint.textContent = t("hint");
          overlayScore.hidden = true;
        }
        overlayAction.textContent = t("tapStart");
      }
      MG.i18n.onChange(function () {
        if (!overlay.classList.contains("hidden")) renderOverlay();
      });

      /* ============================ Physics ============================
         One step of arcade car physics for any car (player or bot), driven by
         an input record { left, right, gas, brake }. */
      function stepCar(c, inp) {
        var off = distToTrack(c.x, c.y);
        var onTrack = off.dist <= TRACK_HW;

        var sa = Math.sin(c.angle), ca = Math.cos(c.angle);
        // Forward speed in the current heading (used to gate steering/handbrake).
        var fwd0 = c.vx * sa + c.vy * (-ca);
        var vmag = Math.hypot(c.vx, c.vy);
        var handbrake = inp.brake && fwd0 > 1.5;

        // Steering rotates the heading first; scales with speed, flips in reverse.
        var dir = (inp.left ? -1 : 0) + (inp.right ? 1 : 0);
        if (dir !== 0 && vmag > 0.04) {
          var auth = STEER * Math.min(1, vmag / 1.5) * (fwd0 < 0 ? -1 : 1);
          if (handbrake) auth *= 1.5;   // sharper rotation while drifting
          c.angle += dir * auth;
        }

        // Re-split velocity into the (possibly rotated) heading frame.
        sa = Math.sin(c.angle); ca = Math.cos(c.angle);
        var fwd = c.vx * sa + c.vy * (-ca);
        var lat = c.vx * ca + c.vy * sa;

        // Engine / brake along forward.
        if (inp.gas) fwd += ACCEL;
        if (inp.brake) {
          if (fwd > 0.15) fwd -= BRAKE;
          else fwd -= ACCEL * 0.6;       // creep into reverse
        }

        // Longitudinal resistance + caps.
        fwd *= DRAG;
        if (!inp.gas && !inp.brake) fwd *= ROLL;
        if (!onTrack) fwd *= OFF_DRAG;
        var cap = onTrack ? (c.maxSpeed || MAX_SPEED) : OFF_MAX;
        if (fwd > cap) fwd = cap;
        if (fwd < REVERSE_MAX) fwd = REVERSE_MAX;

        // Lateral grip — this is the drift dial. Handbrake (and being off the
        // tarmac) lets the tail keep its sideways speed instead of biting.
        var grip = handbrake ? DRIFT_GRIP : GRIP;
        if (!onTrack) grip = Math.min(0.96, grip + 0.10);
        lat *= grip;

        if (Math.abs(fwd) < 0.02 && Math.abs(lat) < 0.02) { fwd = 0; lat = 0; }

        // Recompose the world velocity and integrate.
        c.vx = sa * fwd + ca * lat;
        c.vy = -ca * fwd + sa * lat;
        c.x += c.vx;
        c.y += c.vy;

        c.fwd = fwd; c.lat = lat; c.speed = fwd;
        c.onTrack = onTrack; c.offIdx = off.idx;

        // Lay rubber when the tyres are sliding (drift / hard braking).
        if (Math.abs(lat) > SLIP_MARK && vmag > 1.2) {
          var rear = 13;
          c.skid.push({
            x: c.x - Math.sin(c.angle) * rear,
            y: c.y + Math.cos(c.angle) * rear,
            a: c.angle
          });
          if (c.skid.length > 140) c.skid.shift();
        }
      }

      // Wrap an angle into (-PI, PI].
      function angNorm(a) {
        while (a > Math.PI) a -= Math.PI * 2;
        while (a < -Math.PI) a += Math.PI * 2;
        return a;
      }

      // Bot AI: aim at a point further along the centreline, steer toward it,
      // and ease off / brake into the sharper corners (which makes bots drift
      // through them too, on the same physics as the player).
      function botInput(b) {
        var m = center.length;
        var target = center[(b.offIdx + (b.look || 9)) % m];
        var dx = target.x - b.x, dy = target.y - b.y;
        var desired = Math.atan2(dx, -dy);
        var diff = angNorm(desired - b.angle);
        var inp = { left: false, right: false, gas: false, brake: false };
        if (diff > 0.05) inp.right = true;
        else if (diff < -0.05) inp.left = true;
        var sharp = Math.abs(diff);
        if (sharp > 0.65 && b.fwd > 3.2) inp.brake = true;   // scrub speed (drift)
        else inp.gas = true;
        return inp;
      }

      // Lap / position progress for any car: prog = laps + fraction of a lap.
      function trackProgress(c) {
        var frac = c.offIdx / center.length;
        if (frac > 0.5) c.passedHalf = true;
        var crossed = c.passedHalf && c.prevFrac > 0.85 && frac < 0.15;
        c.prevFrac = frac;
        c.prog = c.lap + frac;
        return crossed;
      }

      // Keep cars from stacking: separate any overlapping pair.
      function resolveCollisions(cars) {
        var R = 19;
        for (var i = 0; i < cars.length; i++) {
          for (var j = i + 1; j < cars.length; j++) {
            var a = cars[i], b = cars[j];
            var dx = b.x - a.x, dy = b.y - a.y;
            var d = Math.hypot(dx, dy);
            if (d > 0 && d < R * 2) {
              var nx = dx / d, ny = dy / d;
              var push = (R * 2 - d) / 2;
              a.x -= nx * push; a.y -= ny * push;
              b.x += nx * push; b.y += ny * push;
              // Damp the closing velocity so hits feel like a nudge.
              a.vx -= nx * push * 0.4; a.vy -= ny * push * 0.4;
              b.vx += nx * push * 0.4; b.vy += ny * push * 0.4;
            }
          }
        }
      }

      /* ============================ Update ============================ */
      function update() {
        if (state === STATE_COUNT) {
          var remain = countUntil - now();
          if (remain <= 0) { go(); }
          else {
            flashEl.classList.remove("hidden");
            flashEl.textContent = String(Math.ceil(remain / 1000));
          }
          return;
        }
        if (state !== STATE_PLAY) return;

        // Step the player and every bot through the same physics.
        stepCar(car, input);
        for (var i = 0; i < bots.length; i++) stepCar(bots[i], botInput(bots[i]));

        resolveCollisions([car].concat(bots));

        // Lap / progress for everyone (player crossing the line is timed).
        if (trackProgress(car)) { completeLap(); }
        for (var k = 0; k < bots.length; k++) {
          if (trackProgress(bots[k])) bots[k].lap++;
        }
        car.prog = car.lap + car.offIdx / center.length;  // refresh after lap++

        // Standings — rank everyone by total progress around the track.
        var pos = 1;
        for (var p = 0; p < bots.length; p++) if (bots[p].prog > car.prog) pos++;
        ui.setStat("pos", pos + "/" + (bots.length + 1));

        // HUD time.
        ui.setStat("time", fmt(now() - lapStartT));
      }

      function completeLap() {
        var t = now();
        lastLap = t - lapStartT;
        lapStartT = t;
        lap++;
        car.lap = lap;          // keep the player's progress in sync with the HUD
        ui.setStat("lap", String(lap));
        if (best === 0 || lastLap < best) {
          best = lastLap;
          store.save({ best: best });
          ui.setStat("best", fmt(best));
          flashEl.textContent = MG.i18n.t("newBest");
          flashEl.style.fontSize = "clamp(1.4rem, 7vw, 2.6rem)";
          flashEl.classList.remove("hidden");
          setTimeout(function () {
            flashEl.classList.add("hidden");
            flashEl.style.fontSize = "";
          }, 1100);
        }
      }

      /* ============================ Render ============================ */
      function draw() {
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        // Grass background.
        ctx.fillStyle = "#3f8a3a";
        ctx.fillRect(0, 0, VW, VH);

        ctx.save();
        // Fixed camera: world-up stays up, we simply track the car (no rotation)
        // and zoom out a touch so the bots around you stay on screen.
        ctx.translate(VW / 2, VH / 2);
        ctx.scale(ZOOM, ZOOM);
        ctx.translate(-car.x, -car.y);

        drawPatches();
        drawTrack();
        drawSkid(car);
        for (var b = 0; b < bots.length; b++) drawSkid(bots[b]);
        drawStartLine();
        for (var i = 0; i < bots.length; i++) drawCar(bots[i]);
        drawCar(car);

        ctx.restore();

        drawSpeedo();
      }

      function drawPatches() {
        for (var i = 0; i < patches.length; i++) {
          var p = patches[i];
          ctx.fillStyle = p.t > 0.5 ? "rgba(40,110,40,0.55)" : "rgba(95,165,70,0.5)";
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function edgePath(outer, inner) {
        var m = center.length;
        ctx.beginPath();
        ctx.moveTo(outer[0].x, outer[0].y);
        for (var i = 1; i < m; i++) ctx.lineTo(outer[i].x, outer[i].y);
        ctx.lineTo(outer[0].x, outer[0].y);
        for (var j = 0; j < m; j++) ctx.lineTo(inner[m - 1 - j].x, inner[m - 1 - j].y);
        ctx.closePath();
      }

      function drawTrack() {
        var m = center.length;

        // Curb base (red/white) drawn as a fat band, then asphalt on top.
        // Outer curb band: from curbOut to track edge.
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        // Asphalt.
        ctx.fillStyle = "#43454c";
        ctx.beginPath();
        ctx.moveTo(left[0].x, left[0].y);
        for (var i = 1; i < m; i++) ctx.lineTo(left[i].x, left[i].y);
        ctx.lineTo(left[0].x, left[0].y);
        for (var j = 0; j < m; j++) ctx.lineTo(right[m - 1 - j].x, right[m - 1 - j].y);
        ctx.closePath();
        ctx.fill();

        // Curbs — alternating red/white quads along each edge.
        for (var k = 0; k < m; k++) {
          var k2 = (k + 1) % m;
          var col = (k % 2 === 0) ? "#e8443a" : "#f4f4f4";
          // Left curb.
          ctx.fillStyle = col;
          ctx.beginPath();
          ctx.moveTo(left[k].x, left[k].y);
          ctx.lineTo(left[k2].x, left[k2].y);
          ctx.lineTo(curbOutL[k2].x, curbOutL[k2].y);
          ctx.lineTo(curbOutL[k].x, curbOutL[k].y);
          ctx.closePath();
          ctx.fill();
          // Right curb.
          ctx.beginPath();
          ctx.moveTo(right[k].x, right[k].y);
          ctx.lineTo(right[k2].x, right[k2].y);
          ctx.lineTo(curbOutR[k2].x, curbOutR[k2].y);
          ctx.lineTo(curbOutR[k].x, curbOutR[k].y);
          ctx.closePath();
          ctx.fill();
        }

        // Dashed centre line.
        ctx.strokeStyle = "rgba(255,255,255,0.5)";
        ctx.lineWidth = 4;
        ctx.setLineDash([20, 24]);
        ctx.beginPath();
        ctx.moveTo(center[0].x, center[0].y);
        for (var c = 1; c < m; c++) ctx.lineTo(center[c].x, center[c].y);
        ctx.closePath();
        ctx.stroke();
        ctx.setLineDash([]);
      }

      function drawStartLine() {
        // Checkered band across the track at centre[0].
        var a = center[0], b = center[1];
        var tx = b.x - a.x, ty = b.y - a.y;
        var len = Math.hypot(tx, ty) || 1;
        tx /= len; ty /= len;
        var nx = -ty, ny = tx;       // across the track
        var cols = 10, depth = 26;
        var step = (TRACK_HW * 2) / cols;
        ctx.save();
        for (var row = 0; row < 2; row++) {
          for (var i = 0; i < cols; i++) {
            var on = ((i + row) % 2) === 0;
            ctx.fillStyle = on ? "#f4f4f4" : "#222";
            var ox = a.x + nx * (-TRACK_HW + i * step) + tx * (row * depth);
            var oy = a.y + ny * (-TRACK_HW + i * step) + ty * (row * depth);
            ctx.beginPath();
            ctx.moveTo(ox, oy);
            ctx.lineTo(ox + nx * step, oy + ny * step);
            ctx.lineTo(ox + nx * step + tx * depth, oy + ny * step + ty * depth);
            ctx.lineTo(ox + tx * depth, oy + ty * depth);
            ctx.closePath();
            ctx.fill();
          }
        }
        ctx.restore();
      }

      function drawSkid(c) {
        var marks = c.skid;
        ctx.fillStyle = "rgba(20,20,24,0.35)";
        for (var i = 0; i < marks.length; i++) {
          var s = marks[i];
          ctx.save();
          ctx.translate(s.x, s.y);
          ctx.rotate(s.a);
          ctx.fillRect(-5, -3, 3, 6);
          ctx.fillRect(2, -3, 3, 6);
          ctx.restore();
        }
      }

      function drawCar(c) {
        var col = c.col || PLAYER_COL;
        ctx.save();
        ctx.translate(c.x, c.y);
        ctx.rotate(c.angle);

        // Shadow.
        ctx.fillStyle = "rgba(0,0,0,0.28)";
        roundRect(-12, -16, 24, 36, 6);
        ctx.fill();

        // Body.
        var grad = ctx.createLinearGradient(-13, 0, 13, 0);
        grad.addColorStop(0, col.c1);
        grad.addColorStop(0.5, col.c2);
        grad.addColorStop(1, col.c1);
        ctx.fillStyle = grad;
        roundRect(-13, -19, 26, 38, 7);
        ctx.fill();

        // Wings.
        ctx.fillStyle = col.c3;
        ctx.fillRect(-16, -12, 4, 9);
        ctx.fillRect(12, -12, 4, 9);
        ctx.fillRect(-17, 9, 5, 8);
        ctx.fillRect(12, 9, 5, 8);

        // Cockpit / windshield.
        ctx.fillStyle = "#1a2330";
        roundRect(-8, -8, 16, 14, 4);
        ctx.fill();
        ctx.fillStyle = "rgba(140,200,255,0.5)";
        roundRect(-7, -7, 14, 6, 3);
        ctx.fill();

        // Nose stripe.
        ctx.fillStyle = "#fff";
        ctx.fillRect(-3, -19, 6, 7);

        ctx.restore();
      }

      function roundRect(x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + w, y, x + w, y + h, r);
        ctx.arcTo(x + w, y + h, x, y + h, r);
        ctx.arcTo(x, y + h, x, y, r);
        ctx.arcTo(x, y, x + w, y, r);
        ctx.closePath();
      }

      function drawSpeedo() {
        var kmh = Math.round(Math.abs(car.speed) * 38);
        ctx.fillStyle = "rgba(0,0,0,0.4)";
        var bw = 96, bh = 40;
        var bx = VW / 2 - bw / 2, by = 12;
        ctx.beginPath();
        ctx.moveTo(bx + 12, by);
        ctx.arcTo(bx + bw, by, bx + bw, by + bh, 12);
        ctx.arcTo(bx + bw, by + bh, bx, by + bh, 12);
        ctx.arcTo(bx, by + bh, bx, by, 12);
        ctx.arcTo(bx, by, bx + bw, by, 12);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = "#fff";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = "800 22px 'Trebuchet MS', sans-serif";
        ctx.fillText(kmh, VW / 2, by + 16);
        ctx.font = "600 10px 'Trebuchet MS', sans-serif";
        ctx.fillStyle = "rgba(255,255,255,0.7)";
        ctx.fillText("km/h", VW / 2, by + 31);
      }

      /* ============================ Loop ============================ */
      function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
      }

      /* ============================ Input ============================ */
      // Overlay tap → start the countdown.
      function onOverlayTap(e) {
        e.preventDefault();
        if (state === STATE_READY) beginCountdown();
      }
      overlay.addEventListener("mousedown", onOverlayTap);
      overlay.addEventListener("touchstart", onOverlayTap, { passive: false });

      // Keyboard.
      var keyMap = {
        ArrowLeft: "left", KeyA: "left",
        ArrowRight: "right", KeyD: "right",
        ArrowUp: "gas", KeyW: "gas",
        ArrowDown: "brake", KeyS: "brake"
      };
      window.addEventListener("keydown", function (e) {
        if (e.code === "Space" || e.code === "Enter") {
          if (state === STATE_READY) { e.preventDefault(); beginCountdown(); return; }
        }
        var k = keyMap[e.code];
        if (k) { input[k] = true; e.preventDefault(); }
      });
      window.addEventListener("keyup", function (e) {
        var k = keyMap[e.code];
        if (k) { input[k] = false; e.preventDefault(); }
      });

      // On-screen buttons — multi-touch friendly via pointer events.
      var buttons = document.querySelectorAll(".ctl");
      Array.prototype.forEach.call(buttons, function (btn) {
        var k = btn.getAttribute("data-k");
        function press(e) {
          e.preventDefault();
          input[k] = true;
          btn.classList.add("held");
          if (state === STATE_READY) beginCountdown();
        }
        function release(e) {
          if (e) e.preventDefault();
          input[k] = false;
          btn.classList.remove("held");
        }
        btn.addEventListener("pointerdown", press);
        btn.addEventListener("pointerup", release);
        btn.addEventListener("pointercancel", release);
        btn.addEventListener("pointerleave", release);
        // Avoid the synthetic mouse/scroll behaviours on touch.
        btn.addEventListener("contextmenu", function (e) { e.preventDefault(); });
      });

      // Releasing the pointer anywhere clears any stuck buttons.
      window.addEventListener("pointerup", function () {
        if (state !== STATE_PLAY && state !== STATE_COUNT) return;
      });

      window.addEventListener("resize", resize);
      window.addEventListener("blur", function () {
        input.left = input.right = input.gas = input.brake = false;
        Array.prototype.forEach.call(buttons, function (b) { b.classList.remove("held"); });
      });

      /* ============================ Boot ============================ */
      buildTrack();
      buildPatches();
      resize();
      resetRace();
      showReady();
      loop();
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>🏎️ Top Racer — Minigames</title>
  <meta name="description" content="Top-down racing — steer your car around the circuit, nail the racing line and chase your best lap. Play in your browser, no installs." />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏎️</text></svg>" />

  <!-- Shared chrome: header bar + language control. -->
  <link rel="stylesheet" href="../../shared/mg.css" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #1d2230;
      color: #fff;
      font-family: "Trebuchet MS", system-ui, -apple-system, sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    .mg-game-area {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1d2230;
    }

    .stage {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    /* ---- On-screen controls (touch first, but work with mouse too) ---- */
    .controls {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
    }
    .pad {
      position: absolute;
      bottom: max(18px, env(safe-area-inset-bottom));
      display: flex;
      gap: 14px;
    }
    .pad.steer { left: 16px; }
    .pad.pedals { right: 16px; }

    .ctl {
      pointer-events: auto;
      width: 68px;
      height: 68px;
      border: none;
      border-radius: 50%;
      font-size: 1.7rem;
      font-weight: 800;
      color: #fff;
      background: rgba(255, 255, 255, 0.14);
      border: 2px solid rgba(255, 255, 255, 0.22);
      backdrop-filter: blur(2px);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.05s, background 0.05s;
      touch-action: none;
    }
    .ctl:active,
    .ctl.held {
      background: rgba(255, 255, 255, 0.34);
      transform: scale(0.93);
    }
    .ctl.gas {
      background: rgba(86, 200, 100, 0.28);
      border-color: rgba(120, 240, 140, 0.45);
    }
    .ctl.gas.held { background: rgba(86, 220, 110, 0.55); }
    .ctl.brake {
      background: rgba(230, 90, 90, 0.26);
      border-color: rgba(255, 130, 130, 0.45);
    }
    .ctl.brake.held { background: rgba(240, 90, 90, 0.55); }

    /* ---- Overlay screens ---- */
    .overlay {
      position: absolute;
      inset: 0;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      /* The overlay is only shown in ready/finished states (hidden during the
         race), so it can safely capture pointer events for the start tap. */
      pointer-events: auto;
      cursor: pointer;
    }
    .overlay.hidden { display: none; }

    .panel {
      pointer-events: none;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 18px;
      padding: 26px 30px;
      backdrop-filter: blur(4px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.45);
      max-width: 90%;
    }

    .title {
      font-size: clamp(1.7rem, 7vw, 2.6rem);
      font-weight: 800;
      letter-spacing: 0.02em;
      text-shadow: 0 3px 0 rgba(0, 0, 0, 0.35);
      margin-bottom: 6px;
    }
    .hint { font-size: 1rem; opacity: 0.9; margin-top: 8px; line-height: 1.5; }
    .score-line { font-size: 1.05rem; margin-top: 12px; }
    .score-line b { font-size: 1.5rem; }

    .play-pill {
      display: inline-block;
      margin-top: 18px;
      padding: 11px 26px;
      font-weight: 800;
      font-size: 1.05rem;
      color: #16361f;
      background: #ffe34d;
      border-radius: 999px;
      box-shadow: 0 4px 0 #c9a900;
      animation: bob 1.1s ease-in-out infinite;
    }
    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    /* Big centered countdown / flash number drawn over the canvas. */
    .flash {
      position: absolute;
      inset: 0;
      z-index: 4;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      font-size: clamp(4rem, 22vw, 9rem);
      font-weight: 900;
      color: #fff;
      text-shadow: 0 6px 0 rgba(0, 0, 0, 0.4);
    }
    .flash.hidden { display: none; }
  </style>
</head>
<body class="mg-app">
  <!-- Header is mounted by the shared runtime (see MG.mountHeader below). -->
  <div class="mg-game-area">
    <div class="stage">
      <canvas id="game"></canvas>

      <div class="flash hidden" id="flash"></div>

      <div class="controls" id="controls">
        <div class="pad steer">
          <button class="ctl" data-k="left" aria-label="Steer left">◀</button>
          <button class="ctl" data-k="right" aria-label="Steer right">▶</button>
        </div>
        <div class="pad pedals">
          <button class="ctl brake" data-k="brake" aria-label="Brake / reverse">▼</button>
          <button class="ctl gas" data-k="gas" aria-label="Accelerate">▲</button>
        </div>
      </div>

      <div class="overlay" id="overlay">
        <div class="panel">
          <div class="title" id="overlay-title">🏎️ Top Racer</div>
          <div class="hint" id="overlay-hint"></div>
          <div class="score-line" id="overlay-score" hidden></div>
          <div class="play-pill" id="overlay-action"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>🧛 Night Survivors — Minigames</title>
  <meta name="description" content="Night Survivors — a Vampire-Survivors-like: move, auto-attack the endless horde, collect XP, level up and survive the night. Play in your browser, no installs." />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧛</text></svg>" />

  <!-- Shared chrome: header bar + language control. -->
  <link rel="stylesheet" href="../../shared/mg.css" />
  <script src="../../shared/mg.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #0a0a12;
      color: #fff;
      font-family: "Trebuchet MS", system-ui, -apple-system, sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    .mg-game-area {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a12;
    }

    .stage {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    canvas#game {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      background: #11121d;
    }

    /* XP bar pinned to the top of the playfield. */
    .xpbar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 8px;
      background: rgba(255, 255, 255, 0.08);
      z-index: 3;
      pointer-events: none;
    }
    .xpbar-fill {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, #00e6c8, #4cf0d8);
      box-shadow: 0 0 12px rgba(0, 230, 200, 0.7);
      transition: width 0.12s linear;
    }

    /* Top-center clock + level readout (on the field, below the XP bar). */
    .hud {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      text-align: center;
      pointer-events: none;
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.8);
    }
    .hud-time {
      font-size: clamp(1.6rem, 6vw, 2.2rem);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.04em;
    }
    .hud-sub {
      font-size: 0.85rem;
      opacity: 0.85;
      margin-top: 2px;
      letter-spacing: 0.04em;
    }

    /* Overlay screens (start / level-up / game over). */
    .overlay {
      position: absolute;
      inset: 0;
      z-index: 6;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      text-align: center;
      padding: 22px;
      background: rgba(6, 6, 14, 0.72);
      backdrop-filter: blur(3px);
    }
    .overlay.hidden { display: none; }

    .panel {
      background: rgba(18, 18, 32, 0.92);
      border: 1px solid #2a2b45;
      border-radius: 18px;
      padding: 26px 28px;
      box-shadow: 0 14px 50px rgba(0, 0, 0, 0.6);
      max-width: 460px;
      width: 100%;
    }

    .title {
      font-size: clamp(1.7rem, 7vw, 2.5rem);
      font-weight: 800;
      letter-spacing: 0.02em;
      margin-bottom: 8px;
    }
    .hint {
      font-size: 1rem;
      opacity: 0.88;
      margin-top: 4px;
      line-height: 1.45;
    }
    .score-line {
      font-size: 1.05rem;
      margin-top: 10px;
      opacity: 0.95;
    }
    .score-line b { font-size: 1.5rem; color: #4cf0d8; }

    .play-pill {
      display: inline-block;
      margin-top: 16px;
      padding: 11px 26px;
      font-weight: 800;
      font-size: 1.05rem;
      color: #0a0a12;
      background: #4cf0d8;
      border: none;
      border-radius: 999px;
      box-shadow: 0 4px 0 #1aa996;
      cursor: pointer;
      font-family: inherit;
      animation: bob 1.2s ease-in-out infinite;
    }
    .play-pill:active { transform: translateY(2px); box-shadow: 0 2px 0 #1aa996; }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    /* Level-up upgrade cards. */
    .levelup-title {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 4px;
      color: #4cf0d8;
    }
    .levelup-sub { font-size: 0.9rem; opacity: 0.8; margin-bottom: 14px; }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .card {
      display: flex;
      align-items: center;
      gap: 14px;
      text-align: left;
      background: #181a2c;
      border: 1px solid #2c2e4a;
      border-radius: 14px;
      padding: 12px 14px;
      cursor: pointer;
      transition: 0.12s;
    }
    .card:hover {
      border-color: #4cf0d8;
      background: #1d2038;
      transform: translateY(-1px);
    }
    .card:active { transform: translateY(1px); }
    .card-icon {
      font-size: 1.9rem;
      flex: 0 0 auto;
      width: 44px;
      text-align: center;
    }
    .card-body { flex: 1; }
    .card-name {
      font-weight: 800;
      font-size: 1.05rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-lvl {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 2px 7px;
      border-radius: 999px;
      background: #2c2e4a;
      color: #9fb0c0;
      text-transform: uppercase;
    }
    .card-lvl.is-new { background: #1aa996; color: #06120f; }
    .card-desc { font-size: 0.85rem; opacity: 0.82; margin-top: 3px; }

    /* On-screen joystick (touch only). */
    .stick {
      position: absolute;
      z-index: 5;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.05);
      display: none;
      pointer-events: none;
    }
    .stick.active { display: block; }
    .stick-nub {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 52px;
      height: 52px;
      margin: -26px 0 0 -26px;
      border-radius: 50%;
      background: rgba(76, 240, 216, 0.55);
      box-shadow: 0 0 16px rgba(76, 240, 216, 0.5);
    }
  </style>
</head>
<body class="mg-app">
  <!-- Header is mounted by the shared runtime (see MG.mountHeader below). -->
  <div class="mg-game-area">
    <div class="stage">
      <canvas id="game"></canvas>

      <div class="xpbar"><div class="xpbar-fill" id="xpfill"></div></div>
      <div class="hud" id="hud">
        <div class="hud-time" id="hud-time">0:00</div>
        <div class="hud-sub" id="hud-sub"></div>
      </div>

      <div class="stick" id="stick"><div class="stick-nub" id="stick-nub"></div></div>

      <div class="overlay" id="overlay">
        <div class="panel" id="panel"></div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      "use strict";

      var $ = function (id) { return document.getElementById(id); };

      /* ============================ i18n ============================ */
      MG.i18n.register({
        en: {
          title: "Night Survivors",
          time: "Time", level: "Lv", kills: "Kills",
          hint: "Move with WASD / arrows or drag. Your weapons fire on their own — survive the horde and level up.",
          start: "▶ Start",
          gameover: "You Died",
          survivedLabel: "Survived", levelLabel: "Level", killsLabel: "Kills",
          playAgain: "▶ Play again",
          levelup: "Level Up!", choose: "Choose an upgrade",
          paused: "Paused", resume: "▶ Resume",
          newBadge: "NEW", lvlBadge: "Lv {n}", maxBadge: "MAX",
          // weapons + upgrades
          w_knife: "Dagger", w_knife_d: "Throws a dagger toward the nearest foe.",
          w_aura: "Garlic Aura", w_aura_d: "A holy ring that burns nearby enemies.",
          w_bolt: "Magic Bolt", w_bolt_d: "Homing bolts seek out enemies.",
          w_whip: "Whip", w_whip_d: "Slashes a wide arc to your sides.",
          u_speed: "Swift Boots", u_speed_d: "+12% move speed.",
          u_health: "Vitality", u_health_d: "+20 max HP and heal up.",
          u_magnet: "Magnet", u_magnet_d: "+40% pickup range.",
          u_regen: "Regeneration", u_regen_d: "Slowly recover HP over time.",
          u_power: "Might", u_power_d: "+15% all weapon damage."
        },
        ru: {
          title: "Ночные выживальщики",
          time: "Время", level: "Ур", kills: "Убийства",
          hint: "Двигайся на WASD / стрелках или перетаскивай. Оружие стреляет само — переживи орду и качайся.",
          start: "▶ Начать",
          gameover: "Вы погибли",
          survivedLabel: "Продержался", levelLabel: "Уровень", killsLabel: "Убийства",
          playAgain: "▶ Ещё раз",
          levelup: "Новый уровень!", choose: "Выберите улучшение",
          paused: "Пауза", resume: "▶ Продолжить",
          newBadge: "НОВОЕ", lvlBadge: "Ур {n}", maxBadge: "МАКС",
          w_knife: "Кинжал", w_knife_d: "Бросает кинжал в ближайшего врага.",
          w_aura: "Аура чеснока", w_aura_d: "Святое кольцо жжёт врагов рядом.",
          w_bolt: "Магострела", w_bolt_d: "Самонаводящиеся снаряды ищут врагов.",
          w_whip: "Кнут", w_whip_d: "Рассекает широкой дугой по бокам.",
          u_speed: "Быстрые сапоги", u_speed_d: "+12% к скорости.",
          u_health: "Живучесть", u_health_d: "+20 к макс. HP и лечение.",
          u_magnet: "Магнит", u_magnet_d: "+40% к радиусу подбора.",
          u_regen: "Регенерация", u_regen_d: "Медленно восстанавливает HP.",
          u_power: "Мощь", u_power_d: "+15% к урону всего оружия."
        },
        es: {
          title: "Sobrevivientes Nocturnos",
          time: "Tiempo", level: "Nv", kills: "Bajas",
          hint: "Muévete con WASD / flechas o arrastra. Tus armas disparan solas — sobrevive a la horda y sube de nivel.",
          start: "▶ Empezar",
          gameover: "Has Muerto",
          survivedLabel: "Sobreviviste", levelLabel: "Nivel", killsLabel: "Bajas",
          playAgain: "▶ Jugar otra vez",
          levelup: "¡Subiste de nivel!", choose: "Elige una mejora",
          paused: "Pausa", resume: "▶ Continuar",
          newBadge: "NUEVO", lvlBadge: "Nv {n}", maxBadge: "MÁX",
          w_knife: "Daga", w_knife_d: "Lanza una daga al enemigo más cercano.",
          w_aura: "Aura de Ajo", w_aura_d: "Un anillo sagrado quema a los cercanos.",
          w_bolt: "Rayo Mágico", w_bolt_d: "Rayos teledirigidos buscan enemigos.",
          w_whip: "Látigo", w_whip_d: "Corta un arco amplio a tus lados.",
          u_speed: "Botas Veloces", u_speed_d: "+12% de velocidad.",
          u_health: "Vitalidad", u_health_d: "+20 HP máx. y curación.",
          u_magnet: "Imán", u_magnet_d: "+40% de rango de recogida.",
          u_regen: "Regeneración", u_regen_d: "Recupera HP lentamente.",
          u_power: "Poder", u_power_d: "+15% de daño de todas las armas."
        }
      });
      var T = MG.i18n.t;

      /* ======================== canvas / view ======================== */
      var canvas = $("game");
      var ctx = canvas.getContext("2d");
      var overlay = $("overlay");
      var panel = $("panel");
      var xpfill = $("xpfill");
      var hudTime = $("hud-time");
      var hudSub = $("hud-sub");

      var ui = MG.mountHeader({
        icon: "🧛",
        titleKey: "title",
        stats: [
          { key: "time", labelKey: "time", variant: "sm", value: "0:00" },
          { key: "lvl", labelKey: "level", value: "1" },
          { key: "hp", labelKey: "kills", variant: "alert", value: "0" }
        ]
      });
      // Repurpose the third chip as a kills counter with an alert look.
      // (labelKey above is "kills" — the alert variant just makes it pop.)

      var W = 0, H = 0, dpr = 1;
      function resize() {
        var rect = canvas.getBoundingClientRect();
        dpr = window.devicePixelRatio || 1;
        W = rect.width;
        H = rect.height;
        canvas.width = Math.round(W * dpr);
        canvas.height = Math.round(H * dpr);
      }

      /* ============================ state ============================ */
      var STATE_READY = 0, STATE_PLAY = 1, STATE_LEVELUP = 2, STATE_DEAD = 3, STATE_PAUSE = 4;
      var state = STATE_READY;

      var player, enemies, projectiles, gems, particles, hazards;
      var elapsed, kills, spawnTimer, lastTime, camX, camY, slowMo;
      // Shared versioned save store (see MG.storage in shared/mg.js).
      var store = MG.storage("vampire-survivors", { version: 1 });
      var best = (store.load() || { best: 0 }).best;

      // --- Player + weapon/upgrade model ---
      // Weapons & passive upgrades share a "level" so a single roster covers
      // the level-up screen. Weapons have a fire() driven by their own timer.
      function defaultPlayer() {
        return {
          x: 0, y: 0, r: 13,
          hp: 100, maxHp: 100,
          speed: 165,            // px / sec
          xp: 0, level: 1, xpNeed: 5,
          pickup: 70,            // gem attraction radius
          regen: 0,              // hp / sec
          power: 1,              // global damage multiplier
          dir: { x: 0, y: 1 },   // last move direction (for whip/aim)
          hurtFlash: 0,
          weapons: {},           // id -> level
          passives: {},          // id -> level
          fireTimers: {}         // id -> seconds until next shot
        };
      }

      // ------------- Weapon definitions -------------
      // Each: max level, cooldown(level), and a fire(p, dt) that spawns attacks.
      var WEAPONS = {
        knife: {
          icon: "🗡️", nameKey: "w_knife", descKey: "w_knife_d", max: 6,
          cooldown: function (l) { return Math.max(0.18, 0.62 - l * 0.06); },
          fire: function (p) {
            var n = 1 + Math.floor(l(p, "knife") / 2); // extra knives every 2 levels
            var targets = nearestEnemies(p.x, p.y, n);
            var dmg = (8 + l(p, "knife") * 3) * p.power;
            for (var i = 0; i < n; i++) {
              var t = targets[i];
              var ang = t ? Math.atan2(t.y - p.y, t.x - p.x)
                          : Math.atan2(p.dir.y, p.dir.x) + (i - n / 2) * 0.25;
              projectiles.push(mkProj(p.x, p.y, ang, 360, dmg, 6, "#ffe9a8", 1.4, false));
            }
          }
        },
        bolt: {
          icon: "✨", nameKey: "w_bolt", descKey: "w_bolt_d", max: 6,
          cooldown: function (l) { return Math.max(0.45, 1.4 - l * 0.14); },
          fire: function (p) {
            var n = 1 + Math.floor((l(p, "bolt") - 1) / 2);
            var targets = nearestEnemies(p.x, p.y, n + 2);
            var dmg = (14 + l(p, "bolt") * 5) * p.power;
            for (var i = 0; i < n; i++) {
              var t = targets[i] || targets[0];
              var ang = t ? Math.atan2(t.y - p.y, t.x - p.x) : Math.random() * 6.28;
              var pr = mkProj(p.x, p.y, ang, 240, dmg, 7, "#9be7ff", 2.4, false);
              pr.homing = true;
              projectiles.push(pr);
            }
          }
        },
        whip: {
          icon: "〰️", nameKey: "w_whip", descKey: "w_whip_d", max: 6,
          cooldown: function (l) { return Math.max(0.4, 1.0 - l * 0.08); },
          fire: function (p) {
            var dmg = (12 + l(p, "whip") * 4) * p.power;
            var reach = 120 + l(p, "whip") * 12;
            // Slash to the facing side and its opposite (level 3+).
            var base = p.dir.x >= 0 ? 0 : Math.PI;
            spawnSlash(p, base, reach, dmg);
            if (l(p, "whip") >= 3) spawnSlash(p, base + Math.PI, reach, dmg);
          }
        },
        aura: {
          icon: "🧄", nameKey: "w_aura", descKey: "w_aura_d", max: 6,
          cooldown: function () { return 0.5; }, // ticks twice a second
          fire: function (p) {
            var lvl = l(p, "aura");
            var radius = 60 + lvl * 12;
            var dmg = (5 + lvl * 2) * p.power;
            for (var i = 0; i < enemies.length; i++) {
              var e = enemies[i];
              var dx = e.x - p.x, dy = e.y - p.y;
              if (dx * dx + dy * dy < radius * radius) {
                hitEnemy(e, dmg, dx, dy, 40);
              }
            }
            spawnRing(p.x, p.y, radius, "#c8ff9b");
          }
        }
      };

      // ------------- Passive upgrade definitions -------------
      var PASSIVES = {
        speed: { icon: "👢", nameKey: "u_speed", descKey: "u_speed_d", max: 5,
          apply: function (p) { p.speed *= 1.12; } },
        health: { icon: "❤️", nameKey: "u_health", descKey: "u_health_d", max: 5,
          apply: function (p) { p.maxHp += 20; p.hp = Math.min(p.maxHp, p.hp + 20); } },
        magnet: { icon: "🧲", nameKey: "u_magnet", descKey: "u_magnet_d", max: 4,
          apply: function (p) { p.pickup *= 1.4; } },
        regen: { icon: "💚", nameKey: "u_regen", descKey: "u_regen_d", max: 4,
          apply: function (p) { p.regen += 1.2; } },
        power: { icon: "💪", nameKey: "u_power", descKey: "u_power_d", max: 5,
          apply: function (p) { p.power *= 1.15; } }
      };

      function l(p, id) { return p.weapons[id] || 0; }

      /* ====================== helpers / factories ==================== */
      function mkProj(x, y, ang, spd, dmg, r, color, life, pierceAll) {
        return {
          x: x, y: y, vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd,
          dmg: dmg, r: r, color: color, life: life,
          pierce: pierceAll ? 999 : 1, homing: false, hitSet: null
        };
      }

      function spawnSlash(p, base, reach, dmg) {
        // A short-lived arc hitbox represented as a fading particle + damage now.
        var arc = 1.1;
        for (var i = 0; i < enemies.length; i++) {
          var e = enemies[i];
          var dx = e.x - p.x, dy = e.y - p.y;
          var d2 = dx * dx + dy * dy;
          if (d2 > reach * reach) continue;
          var a = Math.atan2(dy, dx);
          var da = Math.atan2(Math.sin(a - base), Math.cos(a - base));
          if (Math.abs(da) < arc) hitEnemy(e, dmg, dx, dy, 80);
        }
        particles.push({ kind: "slash", x: p.x, y: p.y, base: base, reach: reach,
          arc: arc, life: 0.22, max: 0.22 });
      }

      function spawnRing(x, y, radius, color) {
        particles.push({ kind: "ring", x: x, y: y, radius: radius, color: color,
          life: 0.4, max: 0.4 });
      }

      function spawnGem(x, y, value) {
        gems.push({ x: x, y: y, value: value, r: 5, vx: 0, vy: 0, born: elapsed });
      }

      function spawnHit(x, y, color) {
        for (var i = 0; i < 5; i++) {
          var a = Math.random() * 6.28, s = 40 + Math.random() * 90;
          particles.push({ kind: "spark", x: x, y: y,
            vx: Math.cos(a) * s, vy: Math.sin(a) * s,
            color: color || "#ffd27a", life: 0.3, max: 0.3 });
        }
      }

      function nearestEnemies(x, y, n) {
        // Cheap partial selection — fine for the enemy counts we hit.
        var arr = enemies.slice();
        arr.sort(function (a, b) {
          return ((a.x - x) * (a.x - x) + (a.y - y) * (a.y - y)) -
                 ((b.x - x) * (b.x - x) + (b.y - y) * (b.y - y));
        });
        return arr.slice(0, n);
      }

      /* ============================ enemies ========================== */
      // Enemy archetypes unlock as the run progresses (difficulty curve).
      var ENEMY_TYPES = [
        { id: "bat",   emoji: "🦇", r: 11, hp: 10,  speed: 56, dmg: 6,  xp: 1, color: "#7b6cff", from: 0 },
        { id: "zombie",emoji: "🧟", r: 14, hp: 26,  speed: 42, dmg: 10, xp: 2, color: "#6fae5f", from: 45 },
        { id: "ghost", emoji: "👻", r: 12, hp: 18,  speed: 74, dmg: 8,  xp: 2, color: "#cfe6ff", from: 90 },
        { id: "skull", emoji: "💀", r: 13, hp: 44,  speed: 50, dmg: 14, xp: 4, color: "#e8e2c8", from: 150 },
        { id: "demon", emoji: "👹", r: 17, hp: 90,  speed: 46, dmg: 20, xp: 7, color: "#ff6b6b", from: 240 }
      ];

      function spawnEnemy() {
        // Pick an available type, weighted toward newer (tougher) ones a bit.
        var avail = [];
        for (var i = 0; i < ENEMY_TYPES.length; i++) {
          if (elapsed >= ENEMY_TYPES[i].from) avail.push(ENEMY_TYPES[i]);
        }
        var type = avail[Math.floor(Math.random() * avail.length)];
        // Spawn just off the visible edge around the player.
        var ang = Math.random() * 6.28;
        var dist = Math.max(W, H) * 0.62 + 40;
        var hpScale = 1 + elapsed / 110;       // enemies toughen over time
        var e = {
          type: type,
          x: player.x + Math.cos(ang) * dist,
          y: player.y + Math.sin(ang) * dist,
          r: type.r,
          hp: type.hp * hpScale,
          maxHp: type.hp * hpScale,
          speed: type.speed * (0.85 + Math.random() * 0.3),
          dmg: type.dmg,
          xp: type.xp,
          color: type.color,
          emoji: type.emoji,
          flash: 0,
          knock: { x: 0, y: 0 }
        };
        enemies.push(e);
      }

      function hitEnemy(e, dmg, dx, dy, knock) {
        e.hp -= dmg;
        e.flash = 0.12;
        if (knock) {
          var d = Math.sqrt(dx * dx + dy * dy) || 1;
          e.knock.x += (dx / d) * knock;
          e.knock.y += (dy / d) * knock;
        }
        if (e.hp <= 0) killEnemy(e);
      }

      function killEnemy(e) {
        var i = enemies.indexOf(e);
        if (i !== -1) enemies.splice(i, 1);
        kills++;
        spawnGem(e.x, e.y, e.xp);
        spawnHit(e.x, e.y, e.color);
        ui.setStat("hp", kills);
      }

      /* ======================= run lifecycle ========================= */
      function reset() {
        player = defaultPlayer();
        player.x = 0; player.y = 0;
        enemies = [];
        projectiles = [];
        gems = [];
        particles = [];
        hazards = [];
        elapsed = 0;
        kills = 0;
        spawnTimer = 0;
        slowMo = 0;
        camX = 0; camY = 0;
        // Start with one weapon.
        addWeapon("knife");
        ui.setStat("lvl", 1);
        ui.setStat("hp", 0);
        ui.setStat("time", "0:00");
      }

      function addWeapon(id) {
        player.weapons[id] = (player.weapons[id] || 0) + 1;
        if (player.fireTimers[id] == null) player.fireTimers[id] = 0;
      }
      function addPassive(id) {
        player.passives[id] = (player.passives[id] || 0) + 1;
        PASSIVES[id].apply(player);
      }

      function startGame() {
        reset();
        state = STATE_PLAY;
        overlay.classList.add("hidden");
        lastTime = performance.now();
      }

      function die() {
        state = STATE_DEAD;
        if (elapsed > best) {
          best = Math.floor(elapsed);
          store.save({ best: best });
        }
        showOverlay();
      }

      /* ========================= level-up =========================== */
      function gainXp(v) {
        player.xp += v;
        while (player.xp >= player.xpNeed) {
          player.xp -= player.xpNeed;
          player.level++;
          player.xpNeed = Math.round(5 + player.level * player.level * 0.9 + player.level * 2);
          ui.setStat("lvl", player.level);
          pendingLevelUps++;
        }
      }
      var pendingLevelUps = 0;

      function maybeOpenLevelUp() {
        if (pendingLevelUps > 0 && state === STATE_PLAY) {
          pendingLevelUps--;
          openLevelUp();
        }
      }

      // Build the pool of offerable choices given current ownership.
      function buildChoices() {
        var pool = [];
        var id;
        for (id in WEAPONS) {
          var wl = player.weapons[id] || 0;
          if (wl < WEAPONS[id].max) {
            pool.push({ kind: "weapon", id: id, lvl: wl,
              def: WEAPONS[id], isNew: wl === 0 });
          }
        }
        for (id in PASSIVES) {
          var pl = player.passives[id] || 0;
          if (pl < PASSIVES[id].max) {
            pool.push({ kind: "passive", id: id, lvl: pl,
              def: PASSIVES[id], isNew: pl === 0 });
          }
        }
        // Shuffle and take up to 3.
        for (var i = pool.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var tmp = pool[i]; pool[i] = pool[j]; pool[j] = tmp;
        }
        return pool.slice(0, 3);
      }

      function openLevelUp() {
        state = STATE_LEVELUP;
        var choices = buildChoices();
        if (!choices.length) { state = STATE_PLAY; return; }
        var html = '<div class="levelup-title">⬆️ ' + T("levelup") + '</div>' +
                   '<div class="levelup-sub">' + T("choose") + '</div>' +
                   '<div class="cards">';
        for (var i = 0; i < choices.length; i++) {
          var c = choices[i];
          var badge = c.isNew
            ? '<span class="card-lvl is-new">' + T("newBadge") + '</span>'
            : '<span class="card-lvl">' + T("lvlBadge").replace("{n}", c.lvl + 1) + '</span>';
          html += '<div class="card" data-i="' + i + '">' +
                    '<div class="card-icon">' + c.def.icon + '</div>' +
                    '<div class="card-body">' +
                      '<div class="card-name">' + T(c.def.nameKey) + badge + '</div>' +
                      '<div class="card-desc">' + T(c.def.descKey) + '</div>' +
                    '</div>' +
                  '</div>';
        }
        html += '</div>';
        panel.innerHTML = html;
        overlay.classList.remove("hidden");

        var cards = panel.querySelectorAll(".card");
        for (var k = 0; k < cards.length; k++) {
          (function (choice) {
            cards[k].addEventListener("click", function () { pickChoice(choice); });
          })(choices[k]);
        }
      }

      function pickChoice(c) {
        if (c.kind === "weapon") addWeapon(c.id);
        else addPassive(c.id);
        overlay.classList.add("hidden");
        state = STATE_PLAY;
        lastTime = performance.now();
        // Another level may be queued (multi-level on a big gem).
        maybeOpenLevelUp();
      }

      /* ===================== overlays (text screens) ================= */
      function fmtTime(s) {
        s = Math.floor(s);
        var m = Math.floor(s / 60);
        var ss = s % 60;
        return m + ":" + (ss < 10 ? "0" : "") + ss;
      }

      function showOverlay() {
        var html;
        if (state === STATE_READY) {
          html = '<div class="title">🧛 ' + T("title") + '</div>' +
                 '<div class="hint">' + T("hint") + '</div>' +
                 (best > 0 ? '<div class="score-line">' + T("survivedLabel") +
                    ' <b>' + fmtTime(best) + '</b></div>' : '') +
                 '<button class="play-pill" id="ov-act">' + T("start") + '</button>';
        } else if (state === STATE_DEAD) {
          html = '<div class="title">☠️ ' + T("gameover") + '</div>' +
                 '<div class="score-line">' + T("survivedLabel") + ' <b>' + fmtTime(elapsed) + '</b></div>' +
                 '<div class="score-line">' + T("levelLabel") + ' <b>' + player.level + '</b> · ' +
                    T("killsLabel") + ' <b>' + kills + '</b></div>' +
                 (best > 0 ? '<div class="hint" style="margin-top:10px;opacity:.7">★ ' +
                    T("survivedLabel") + ': ' + fmtTime(best) + '</div>' : '') +
                 '<button class="play-pill" id="ov-act">' + T("playAgain") + '</button>';
        } else if (state === STATE_PAUSE) {
          html = '<div class="title">⏸ ' + T("paused") + '</div>' +
                 '<button class="play-pill" id="ov-act">' + T("resume") + '</button>';
        }
        panel.innerHTML = html;
        overlay.classList.remove("hidden");
        var btn = $("ov-act");
        if (btn) btn.addEventListener("click", onAction);
      }

      function onAction() {
        if (state === STATE_READY || state === STATE_DEAD) startGame();
        else if (state === STATE_PAUSE) { state = STATE_PLAY; overlay.classList.add("hidden"); lastTime = performance.now(); }
      }

      // Re-render any open text overlay live on language change.
      MG.i18n.onChange(function () {
        if (state === STATE_READY || state === STATE_DEAD || state === STATE_PAUSE) showOverlay();
        else if (state === STATE_LEVELUP) openLevelUp();
      });

      /* ============================ input ============================ */
      var keys = {};
      window.addEventListener("keydown", function (e) {
        if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " "].indexOf(e.key) !== -1) e.preventDefault();
        keys[e.key.toLowerCase()] = true;
        if (e.key === "Escape" || e.key === "p") togglePause();
      });
      window.addEventListener("keyup", function (e) { keys[e.key.toLowerCase()] = false; });

      function togglePause() {
        if (state === STATE_PLAY) { state = STATE_PAUSE; showOverlay(); }
        else if (state === STATE_PAUSE) { state = STATE_PLAY; overlay.classList.add("hidden"); lastTime = performance.now(); }
      }

      // Touch joystick: first touch anchors the stick, drag sets direction.
      var stick = $("stick"), stickNub = $("stick-nub");
      var touchId = null, touchOrigin = null, touchVec = { x: 0, y: 0 };

      function stagePoint(t) {
        var rect = canvas.getBoundingClientRect();
        return { x: t.clientX - rect.left, y: t.clientY - rect.top };
      }

      canvas.addEventListener("touchstart", function (e) {
        if (state !== STATE_PLAY) return;
        if (touchId !== null) return;
        var t = e.changedTouches[0];
        touchId = t.identifier;
        touchOrigin = stagePoint(t);
        stick.style.left = (touchOrigin.x - 60) + "px";
        stick.style.top = (touchOrigin.y - 60) + "px";
        stick.classList.add("active");
        setNub(0, 0);
        e.preventDefault();
      }, { passive: false });

      canvas.addEventListener("touchmove", function (e) {
        if (touchId === null) return;
        for (var i = 0; i < e.changedTouches.length; i++) {
          var t = e.changedTouches[i];
          if (t.identifier !== touchId) continue;
          var p = stagePoint(t);
          var dx = p.x - touchOrigin.x, dy = p.y - touchOrigin.y;
          var d = Math.sqrt(dx * dx + dy * dy) || 1;
          var max = 48;
          var cl = Math.min(d, max);
          touchVec.x = dx / d;
          touchVec.y = dy / d;
          setNub(touchVec.x * cl, touchVec.y * cl);
          if (d < 8) { touchVec.x = 0; touchVec.y = 0; }
          e.preventDefault();
        }
      }, { passive: false });

      function endTouch(e) {
        for (var i = 0; i < e.changedTouches.length; i++) {
          if (e.changedTouches[i].identifier === touchId) {
            touchId = null;
            touchVec.x = 0; touchVec.y = 0;
            stick.classList.remove("active");
          }
        }
      }
      canvas.addEventListener("touchend", endTouch);
      canvas.addEventListener("touchcancel", endTouch);

      function setNub(x, y) {
        stickNub.style.transform = "translate(" + x + "px," + y + "px)";
      }

      /* ============================ update ========================== */
      function moveInput() {
        var ix = 0, iy = 0;
        if (keys["a"] || keys["arrowleft"]) ix -= 1;
        if (keys["d"] || keys["arrowright"]) ix += 1;
        if (keys["w"] || keys["arrowup"]) iy -= 1;
        if (keys["s"] || keys["arrowdown"]) iy += 1;
        if (touchId !== null) { ix = touchVec.x; iy = touchVec.y; }
        var d = Math.sqrt(ix * ix + iy * iy);
        if (d > 1) { ix /= d; iy /= d; }
        return { x: ix, y: iy };
      }

      function update(dt) {
        elapsed += dt;
        var p = player;

        // --- player movement ---
        var mv = moveInput();
        p.x += mv.x * p.speed * dt;
        p.y += mv.y * p.speed * dt;
        if (mv.x || mv.y) { p.dir.x = mv.x; p.dir.y = mv.y; }
        if (p.regen) p.hp = Math.min(p.maxHp, p.hp + p.regen * dt);
        if (p.hurtFlash > 0) p.hurtFlash -= dt;

        // Smooth camera follow.
        camX += (p.x - camX) * Math.min(1, dt * 8);
        camY += (p.y - camY) * Math.min(1, dt * 8);

        // --- spawning (ramps up over time) ---
        spawnTimer -= dt;
        var rate = Math.max(0.16, 0.95 - elapsed / 240);   // seconds between spawns
        var batch = 1 + Math.floor(elapsed / 75);
        if (spawnTimer <= 0) {
          for (var s = 0; s < batch; s++) spawnEnemy();
          spawnTimer = rate;
        }
        if (enemies.length > 320) enemies.length = 320; // safety cap

        // --- weapons fire on their own timers ---
        for (var wid in p.weapons) {
          p.fireTimers[wid] -= dt;
          if (p.fireTimers[wid] <= 0) {
            WEAPONS[wid].fire(p);
            p.fireTimers[wid] = WEAPONS[wid].cooldown(p.weapons[wid]);
          }
        }

        // --- enemies ---
        for (var i = enemies.length - 1; i >= 0; i--) {
          var e = enemies[i];
          if (e.flash > 0) e.flash -= dt;
          // knockback decays
          e.x += e.knock.x * dt;
          e.y += e.knock.y * dt;
          e.knock.x *= Math.pow(0.001, dt);
          e.knock.y *= Math.pow(0.001, dt);
          // chase player
          var dx = p.x - e.x, dy = p.y - e.y;
          var d = Math.sqrt(dx * dx + dy * dy) || 1;
          e.x += (dx / d) * e.speed * dt;
          e.y += (dy / d) * e.speed * dt;
          // separation so they don't perfectly stack (cheap, neighbor sample)
          // touch player?
          if (d < e.r + p.r) {
            if (p.hurtFlash <= 0) {
              p.hp -= e.dmg;
              p.hurtFlash = 0.5;
              // small knock to enemy on contact
              e.knock.x -= (dx / d) * 120;
              e.knock.y -= (dy / d) * 120;
              if (p.hp <= 0) { p.hp = 0; die(); return; }
            }
          }
        }
        // Light mutual separation pass (sampled to stay cheap).
        for (var a = 0; a < enemies.length; a++) {
          var ea = enemies[a];
          var eb = enemies[(a + 1) % enemies.length];
          if (ea === eb) continue;
          var sx = ea.x - eb.x, sy = ea.y - eb.y;
          var sd = sx * sx + sy * sy;
          var min = (ea.r + eb.r);
          if (sd < min * min && sd > 0.01) {
            var sdist = Math.sqrt(sd);
            var push = (min - sdist) * 0.5;
            var ux = sx / sdist, uy = sy / sdist;
            ea.x += ux * push; ea.y += uy * push;
            eb.x -= ux * push; eb.y -= uy * push;
          }
        }

        // --- projectiles ---
        for (var j = projectiles.length - 1; j >= 0; j--) {
          var pr = projectiles[j];
          pr.life -= dt;
          if (pr.life <= 0) { projectiles.splice(j, 1); continue; }
          if (pr.homing) {
            var tgt = nearestEnemies(pr.x, pr.y, 1)[0];
            if (tgt) {
              var ta = Math.atan2(tgt.y - pr.y, tgt.x - pr.x);
              var spd = Math.sqrt(pr.vx * pr.vx + pr.vy * pr.vy);
              var ca = Math.atan2(pr.vy, pr.vx);
              var na = ca + Math.atan2(Math.sin(ta - ca), Math.cos(ta - ca)) * Math.min(1, dt * 6);
              pr.vx = Math.cos(na) * spd; pr.vy = Math.sin(na) * spd;
            }
          }
          pr.x += pr.vx * dt; pr.y += pr.vy * dt;
          // collide with enemies
          for (var k = enemies.length - 1; k >= 0; k--) {
            var en = enemies[k];
            var ddx = en.x - pr.x, ddy = en.y - pr.y;
            var rr = en.r + pr.r;
            if (ddx * ddx + ddy * ddy < rr * rr) {
              if (!pr.hitSet) pr.hitSet = [];
              if (pr.hitSet.indexOf(en) !== -1) continue;
              pr.hitSet.push(en);
              hitEnemy(en, pr.dmg, en.x - pr.x, en.y - pr.y, 60);
              pr.pierce--;
              if (pr.pierce <= 0) { projectiles.splice(j, 1); break; }
            }
          }
        }

        // --- gems / pickups ---
        for (var g = gems.length - 1; g >= 0; g--) {
          var gm = gems[g];
          var gdx = p.x - gm.x, gdy = p.y - gm.y;
          var gd = Math.sqrt(gdx * gdx + gdy * gdy) || 1;
          if (gd < p.pickup) {
            // accelerate toward player
            var pull = 1 - gd / p.pickup;
            gm.x += (gdx / gd) * (140 + pull * 360) * dt;
            gm.y += (gdy / gd) * (140 + pull * 360) * dt;
          }
          if (gd < p.r + gm.r + 4) {
            gainXp(gm.value);
            gems.splice(g, 1);
          }
        }

        // --- particles ---
        for (var q = particles.length - 1; q >= 0; q--) {
          var pt = particles[q];
          pt.life -= dt;
          if (pt.life <= 0) { particles.splice(q, 1); continue; }
          if (pt.kind === "spark") { pt.x += pt.vx * dt; pt.y += pt.vy * dt; pt.vx *= 0.9; pt.vy *= 0.9; }
        }

        // Open a queued level-up screen (pauses the sim).
        maybeOpenLevelUp();

        // --- HUD ---
        ui.setStat("time", fmtTime(elapsed));
        hudTime.textContent = fmtTime(elapsed);
        hudSub.textContent = T("level") + " " + player.level + " · " + kills;
        xpfill.style.width = (100 * player.xp / player.xpNeed) + "%";
      }

      /* ============================ render ========================== */
      function draw() {
        ctx.save();
        ctx.scale(dpr, dpr);
        ctx.clearRect(0, 0, W, H);

        var ox = W / 2 - camX;
        var oy = H / 2 - camY;

        drawGround(ox, oy);

        // gems
        for (var g = 0; g < gems.length; g++) {
          var gm = gems[g];
          var gx = gm.x + ox, gy = gm.y + oy;
          var pulse = 1 + Math.sin((elapsed - gm.born) * 6) * 0.12;
          ctx.fillStyle = gm.value >= 4 ? "#ffd34c" : "#4cf0d8";
          ctx.shadowColor = ctx.fillStyle;
          ctx.shadowBlur = 8;
          ctx.beginPath();
          var rr = gm.r * pulse;
          ctx.moveTo(gx, gy - rr); ctx.lineTo(gx + rr, gy);
          ctx.lineTo(gx, gy + rr); ctx.lineTo(gx - rr, gy);
          ctx.closePath();
          ctx.fill();
        }
        ctx.shadowBlur = 0;

        // particles (rings / slashes behind actors)
        for (var q = 0; q < particles.length; q++) {
          var pt = particles[q];
          var a = pt.life / pt.max;
          if (pt.kind === "ring") {
            ctx.globalAlpha = a * 0.5;
            ctx.strokeStyle = pt.color;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(pt.x + ox, pt.y + oy, pt.radius, 0, 6.2832);
            ctx.stroke();
          } else if (pt.kind === "slash") {
            ctx.globalAlpha = a * 0.7;
            ctx.strokeStyle = "#fff";
            ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.arc(pt.x + ox, pt.y + oy, pt.reach * 0.7, pt.base - pt.arc, pt.base + pt.arc);
            ctx.stroke();
          }
        }
        ctx.globalAlpha = 1;

        // enemies
        for (var i = 0; i < enemies.length; i++) {
          var e = enemies[i];
          var ex = e.x + ox, ey = e.y + oy;
          if (ex < -30 || ex > W + 30 || ey < -30 || ey > H + 30) continue;
          // body
          ctx.beginPath();
          ctx.arc(ex, ey, e.r, 0, 6.2832);
          ctx.fillStyle = e.flash > 0 ? "#ffffff" : e.color;
          ctx.fill();
          // emoji face
          ctx.font = (e.r * 1.7) + "px serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(e.emoji, ex, ey + 1);
          // hp pip when hurt
          if (e.hp < e.maxHp) {
            ctx.fillStyle = "rgba(0,0,0,0.5)";
            ctx.fillRect(ex - e.r, ey - e.r - 6, e.r * 2, 3);
            ctx.fillStyle = "#ff5b6e";
            ctx.fillRect(ex - e.r, ey - e.r - 6, e.r * 2 * (e.hp / e.maxHp), 3);
          }
        }

        // projectiles
        for (var j = 0; j < projectiles.length; j++) {
          var pr = projectiles[j];
          ctx.fillStyle = pr.color;
          ctx.shadowColor = pr.color;
          ctx.shadowBlur = 10;
          ctx.beginPath();
          ctx.arc(pr.x + ox, pr.y + oy, pr.r, 0, 6.2832);
          ctx.fill();
        }
        ctx.shadowBlur = 0;

        // particles (sparks above)
        for (var s = 0; s < particles.length; s++) {
          var sp = particles[s];
          if (sp.kind !== "spark") continue;
          ctx.globalAlpha = sp.life / sp.max;
          ctx.fillStyle = sp.color;
          ctx.beginPath();
          ctx.arc(sp.x + ox, sp.y + oy, 2.5, 0, 6.2832);
          ctx.fill();
        }
        ctx.globalAlpha = 1;

        // player
        drawPlayer(W / 2, H / 2);

        // hurt vignette
        if (player && player.hp > 0 && player.hurtFlash > 0.25) {
          ctx.fillStyle = "rgba(255,40,60," + (player.hurtFlash - 0.25) * 0.6 + ")";
          ctx.fillRect(0, 0, W, H);
        }
        // low-hp pulse
        if (player && player.hp / player.maxHp < 0.3) {
          var pv = (Math.sin(elapsed * 6) * 0.5 + 0.5) * 0.25;
          ctx.fillStyle = "rgba(255,0,0," + pv + ")";
          ctx.fillRect(0, 0, W, H);
        }

        ctx.restore();
      }

      function drawGround(ox, oy) {
        ctx.fillStyle = "#11121d";
        ctx.fillRect(0, 0, W, H);
        // grid that scrolls with the camera for a sense of motion
        var grid = 64;
        ctx.strokeStyle = "rgba(255,255,255,0.04)";
        ctx.lineWidth = 1;
        var startX = ((ox % grid) + grid) % grid;
        var startY = ((oy % grid) + grid) % grid;
        ctx.beginPath();
        for (var x = startX; x < W; x += grid) { ctx.moveTo(x, 0); ctx.lineTo(x, H); }
        for (var y = startY; y < H; y += grid) { ctx.moveTo(0, y); ctx.lineTo(W, y); }
        ctx.stroke();
      }

      function drawPlayer(cx, cy) {
        if (!player) return;
        // garlic aura visual if owned
        if (player.weapons.aura) {
          var radius = 60 + player.weapons.aura * 12;
          ctx.fillStyle = "rgba(200,255,155,0.06)";
          ctx.beginPath();
          ctx.arc(cx, cy, radius, 0, 6.2832);
          ctx.fill();
        }
        // pickup range hint (faint)
        ctx.strokeStyle = "rgba(76,240,216,0.08)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(cx, cy, player.pickup, 0, 6.2832);
        ctx.stroke();

        // body
        ctx.beginPath();
        ctx.arc(cx, cy, player.r, 0, 6.2832);
        ctx.fillStyle = player.hurtFlash > 0.25 ? "#fff" : "#1a1c2e";
        ctx.fill();
        ctx.lineWidth = 3;
        ctx.strokeStyle = "#4cf0d8";
        ctx.stroke();
        // hero face
        ctx.font = (player.r * 1.7) + "px serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("🧛", cx, cy + 1);

        // HP ring
        var frac = player.hp / player.maxHp;
        ctx.strokeStyle = frac < 0.3 ? "#ff5b6e" : "#4cf0d8";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(cx, cy, player.r + 6, -Math.PI / 2, -Math.PI / 2 + 6.2832 * frac);
        ctx.stroke();
      }

      /* ============================ loop ============================ */
      function loop(now) {
        var dt = (now - lastTime) / 1000;
        lastTime = now;
        if (dt > 0.05) dt = 0.05; // clamp big frame gaps (tab switches)
        if (state === STATE_PLAY) update(dt);
        draw();
        requestAnimationFrame(loop);
      }

      /* ============================ boot ============================ */
      window.addEventListener("resize", resize);
      resize();
      reset();
      state = STATE_READY;
      showOverlay();
      lastTime = performance.now();
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>

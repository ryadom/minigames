<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>🧛 Night Survivors — Minigames</title>
  <meta name="description" content="Night Survivors — a Vampire-Survivors-like: move, auto-attack the endless horde, collect XP, level up and survive the night. Play in your browser, no installs." />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧛</text></svg>" />

  <!-- Shared chrome: header bar + language control. -->
  <link rel="stylesheet" href="../../shared/mg.css" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #0a0a12;
      color: #fff;
      font-family: "Trebuchet MS", system-ui, -apple-system, sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    .mg-game-area {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a12;
    }

    .stage {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    canvas#game {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      background: #11121d;
    }

    /* XP bar pinned to the top of the playfield. */
    .xpbar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 8px;
      background: rgba(255, 255, 255, 0.08);
      z-index: 3;
      pointer-events: none;
    }
    .xpbar-fill {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, #00e6c8, #4cf0d8);
      box-shadow: 0 0 12px rgba(0, 230, 200, 0.7);
      transition: width 0.12s linear;
    }

    /* Top-center clock + level readout (on the field, below the XP bar). */
    .hud {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      text-align: center;
      pointer-events: none;
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.8);
    }
    .hud-time {
      font-size: clamp(1.6rem, 6vw, 2.2rem);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.04em;
    }
    .hud-sub {
      font-size: 0.85rem;
      opacity: 0.85;
      margin-top: 2px;
      letter-spacing: 0.04em;
    }

    /* Overlay screens (start / level-up / game over). */
    .overlay {
      position: absolute;
      inset: 0;
      z-index: 6;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      text-align: center;
      padding: 22px;
      background: rgba(6, 6, 14, 0.72);
      backdrop-filter: blur(3px);
    }
    .overlay.hidden { display: none; }

    .panel {
      background: rgba(18, 18, 32, 0.92);
      border: 1px solid #2a2b45;
      border-radius: 18px;
      padding: 26px 28px;
      box-shadow: 0 14px 50px rgba(0, 0, 0, 0.6);
      max-width: 460px;
      width: 100%;
    }

    .title {
      font-size: clamp(1.7rem, 7vw, 2.5rem);
      font-weight: 800;
      letter-spacing: 0.02em;
      margin-bottom: 8px;
    }
    .hint {
      font-size: 1rem;
      opacity: 0.88;
      margin-top: 4px;
      line-height: 1.45;
    }
    .score-line {
      font-size: 1.05rem;
      margin-top: 10px;
      opacity: 0.95;
    }
    .score-line b { font-size: 1.5rem; color: #4cf0d8; }

    .play-pill {
      display: inline-block;
      margin-top: 16px;
      padding: 11px 26px;
      font-weight: 800;
      font-size: 1.05rem;
      color: #0a0a12;
      background: #4cf0d8;
      border: none;
      border-radius: 999px;
      box-shadow: 0 4px 0 #1aa996;
      cursor: pointer;
      font-family: inherit;
      animation: bob 1.2s ease-in-out infinite;
    }
    .play-pill:active { transform: translateY(2px); box-shadow: 0 2px 0 #1aa996; }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    /* Level-up upgrade cards. */
    .levelup-title {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 4px;
      color: #4cf0d8;
    }
    .levelup-sub { font-size: 0.9rem; opacity: 0.8; margin-bottom: 14px; }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .card {
      display: flex;
      align-items: center;
      gap: 14px;
      text-align: left;
      background: #181a2c;
      border: 1px solid #2c2e4a;
      border-radius: 14px;
      padding: 12px 14px;
      cursor: pointer;
      transition: 0.12s;
    }
    .card:hover {
      border-color: #4cf0d8;
      background: #1d2038;
      transform: translateY(-1px);
    }
    .card:active { transform: translateY(1px); }
    .card-icon {
      font-size: 1.9rem;
      flex: 0 0 auto;
      width: 44px;
      text-align: center;
    }
    .card-body { flex: 1; }
    .card-name {
      font-weight: 800;
      font-size: 1.05rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-lvl {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 2px 7px;
      border-radius: 999px;
      background: #2c2e4a;
      color: #9fb0c0;
      text-transform: uppercase;
    }
    .card-lvl.is-new { background: #1aa996; color: #06120f; }
    .card-desc { font-size: 0.85rem; opacity: 0.82; margin-top: 3px; }

    /* Wiki / survival guide. */
    .panel.panel-wiki {
      max-width: 540px;
      text-align: left;
    }
    .wiki-scroll {
      max-height: 62vh;
      overflow-y: auto;
      margin: 6px -6px 4px;
      padding: 0 6px;
    }
    .wiki-sec {
      font-weight: 800;
      font-size: 0.8rem;
      color: #9fb0c0;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin: 16px 2px 8px;
    }
    .wiki-sec:first-child { margin-top: 4px; }
    .wiki-card { cursor: default; }
    .wiki-card:hover {
      border-color: #2c2e4a;
      background: #181a2c;
      transform: none;
    }

    /* Loadout: stat tiles. */
    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .stat-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #181a2c;
      border: 1px solid #2c2e4a;
      border-radius: 12px;
      padding: 8px 12px;
    }
    .stat-item .si-icon { font-size: 1.4rem; flex: 0 0 auto; }
    .stat-item .si-body { min-width: 0; }
    .stat-item .si-label {
      font-size: 0.68rem;
      opacity: 0.65;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .stat-item .si-value {
      font-weight: 800;
      font-size: 1.05rem;
      color: #4cf0d8;
      font-variant-numeric: tabular-nums;
    }
    .loadout-empty { opacity: 0.7; font-size: 0.95rem; padding: 8px 2px; }

    /* On-screen joystick (touch only). */
    .stick {
      position: absolute;
      z-index: 5;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.05);
      display: none;
      pointer-events: none;
    }
    .stick.active { display: block; }
    .stick-nub {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 52px;
      height: 52px;
      margin: -26px 0 0 -26px;
      border-radius: 50%;
      background: rgba(76, 240, 216, 0.55);
      box-shadow: 0 0 16px rgba(76, 240, 216, 0.5);
    }
  </style>
</head>
<body class="mg-app">
  <!-- Header is mounted by the shared runtime (see MG.mountHeader below). -->
  <div class="mg-game-area">
    <div class="stage">
      <canvas id="game"></canvas>

      <div class="xpbar"><div class="xpbar-fill" id="xpfill"></div></div>
      <div class="hud" id="hud">
        <div class="hud-time" id="hud-time">0:00</div>
        <div class="hud-sub" id="hud-sub"></div>
      </div>

      <div class="stick" id="stick"><div class="stick-nub" id="stick-nub"></div></div>

      <div class="overlay" id="overlay">
        <div class="panel" id="panel"></div>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>

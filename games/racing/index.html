<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>🏎️ Racing — Minigames</title>
  <meta name="description" content="3D racing — steer through curves and hills, dodge traffic and beat your distance. Play in your browser, no installs." />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏎️</text></svg>" />

  <!-- Shared chrome: header bar + language control. -->
  <link rel="stylesheet" href="../../shared/mg.css" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #11131c;
      color: #fff;
      font-family: "Trebuchet MS", system-ui, -apple-system, sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    .mg-game-area {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #11131c;
    }

    .stage {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 720px;
      box-shadow: 0 0 60px rgba(0, 0, 0, 0.6);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    /* Overlay screens */
    .overlay {
      position: absolute;
      inset: 0;
      z-index: 4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      text-align: center;
      padding: 24px;
      pointer-events: none;
    }
    .overlay.hidden { display: none; }

    .panel {
      background: rgba(0, 0, 0, 0.5);
      border-radius: 18px;
      padding: 26px 30px;
      backdrop-filter: blur(3px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.45);
    }

    .title {
      font-size: clamp(1.8rem, 7vw, 2.6rem);
      font-weight: 800;
      letter-spacing: 0.02em;
      text-shadow: 0 3px 0 rgba(0, 0, 0, 0.35);
      margin-bottom: 6px;
    }

    .hint {
      font-size: 1rem;
      opacity: 0.9;
      margin-top: 4px;
      line-height: 1.5;
    }

    .score-line {
      font-size: 1.1rem;
      margin-top: 8px;
    }
    .score-line b { font-size: 1.6rem; }

    .play-pill {
      display: inline-block;
      margin-top: 14px;
      padding: 10px 22px;
      font-weight: 800;
      font-size: 1.05rem;
      color: #062b3a;
      background: #ffe34d;
      border-radius: 999px;
      box-shadow: 0 4px 0 #c9a900;
      animation: bob 1.1s ease-in-out infinite;
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    /* On-screen touch controls (hidden on devices with a fine pointer). */
    .touch-controls {
      position: absolute;
      inset: auto 0 0 0;
      z-index: 3;
      display: flex;
      justify-content: space-between;
      padding: 0 16px 22px;
      pointer-events: none;
    }
    .pad-side { display: flex; gap: 14px; }
    .pad {
      pointer-events: auto;
      width: 78px;
      height: 78px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      border: 2px solid rgba(255, 255, 255, 0.28);
      color: #fff;
      font-size: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(2px);
      transition: background 0.08s, transform 0.08s;
    }
    .pad:active, .pad.down {
      background: rgba(255, 227, 77, 0.4);
      transform: scale(0.94);
    }
    .pad.gas { background: rgba(80, 220, 120, 0.18); border-color: rgba(80, 220, 120, 0.4); }
    .pad.brake { background: rgba(240, 90, 90, 0.16); border-color: rgba(240, 90, 90, 0.4); }

    /* Hide the on-screen pad when a precise pointer (mouse) is present. */
    @media (pointer: fine) {
      .touch-controls { display: none; }
    }
  </style>
</head>
<body class="mg-app">
  <!-- Header is mounted by the shared runtime (see MG.mountHeader below). -->
  <div class="mg-game-area">
    <div class="stage">
      <canvas id="game"></canvas>

      <div class="touch-controls" id="touch">
        <div class="pad-side">
          <div class="pad" id="pad-left" aria-label="left">◀</div>
          <div class="pad" id="pad-right" aria-label="right">▶</div>
        </div>
        <div class="pad-side">
          <div class="pad brake" id="pad-brake" aria-label="brake">⏷</div>
          <div class="pad gas" id="pad-gas" aria-label="gas">⏶</div>
        </div>
      </div>

      <div class="overlay" id="overlay">
        <div class="panel">
          <div class="title" id="overlay-title">🏎️ Racing</div>
          <div class="hint" id="overlay-hint"></div>
          <div class="score-line" id="overlay-score" hidden></div>
          <div class="play-pill" id="overlay-action"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>

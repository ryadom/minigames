<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>🏎️ Racing — Minigames</title>
  <meta name="description" content="3D racing — steer through curves and hills, dodge traffic and beat your distance. Play in your browser, no installs." />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏎️</text></svg>" />

  <!-- Shared chrome: header bar + language control. -->
  <link rel="stylesheet" href="../../shared/mg.css" />
  <script src="../../shared/mg.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #11131c;
      color: #fff;
      font-family: "Trebuchet MS", system-ui, -apple-system, sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    .mg-game-area {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #11131c;
    }

    .stage {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 720px;
      box-shadow: 0 0 60px rgba(0, 0, 0, 0.6);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    /* Overlay screens */
    .overlay {
      position: absolute;
      inset: 0;
      z-index: 4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      text-align: center;
      padding: 24px;
      pointer-events: none;
    }
    .overlay.hidden { display: none; }

    .panel {
      background: rgba(0, 0, 0, 0.5);
      border-radius: 18px;
      padding: 26px 30px;
      backdrop-filter: blur(3px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.45);
    }

    .title {
      font-size: clamp(1.8rem, 7vw, 2.6rem);
      font-weight: 800;
      letter-spacing: 0.02em;
      text-shadow: 0 3px 0 rgba(0, 0, 0, 0.35);
      margin-bottom: 6px;
    }

    .hint {
      font-size: 1rem;
      opacity: 0.9;
      margin-top: 4px;
      line-height: 1.5;
    }

    .score-line {
      font-size: 1.1rem;
      margin-top: 8px;
    }
    .score-line b { font-size: 1.6rem; }

    .play-pill {
      display: inline-block;
      margin-top: 14px;
      padding: 10px 22px;
      font-weight: 800;
      font-size: 1.05rem;
      color: #062b3a;
      background: #ffe34d;
      border-radius: 999px;
      box-shadow: 0 4px 0 #c9a900;
      animation: bob 1.1s ease-in-out infinite;
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    /* On-screen touch controls (hidden on devices with a fine pointer). */
    .touch-controls {
      position: absolute;
      inset: auto 0 0 0;
      z-index: 3;
      display: flex;
      justify-content: space-between;
      padding: 0 16px 22px;
      pointer-events: none;
    }
    .pad-side { display: flex; gap: 14px; }
    .pad {
      pointer-events: auto;
      width: 78px;
      height: 78px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      border: 2px solid rgba(255, 255, 255, 0.28);
      color: #fff;
      font-size: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(2px);
      transition: background 0.08s, transform 0.08s;
    }
    .pad:active, .pad.down {
      background: rgba(255, 227, 77, 0.4);
      transform: scale(0.94);
    }
    .pad.gas { background: rgba(80, 220, 120, 0.18); border-color: rgba(80, 220, 120, 0.4); }
    .pad.brake { background: rgba(240, 90, 90, 0.16); border-color: rgba(240, 90, 90, 0.4); }

    /* Hide the on-screen pad when a precise pointer (mouse) is present. */
    @media (pointer: fine) {
      .touch-controls { display: none; }
    }
  </style>
</head>
<body class="mg-app">
  <!-- Header is mounted by the shared runtime (see MG.mountHeader below). -->
  <div class="mg-game-area">
    <div class="stage">
      <canvas id="game"></canvas>

      <div class="touch-controls" id="touch">
        <div class="pad-side">
          <div class="pad" id="pad-left" aria-label="left">◀</div>
          <div class="pad" id="pad-right" aria-label="right">▶</div>
        </div>
        <div class="pad-side">
          <div class="pad brake" id="pad-brake" aria-label="brake">⏷</div>
          <div class="pad gas" id="pad-gas" aria-label="gas">⏶</div>
        </div>
      </div>

      <div class="overlay" id="overlay">
        <div class="panel">
          <div class="title" id="overlay-title">🏎️ Racing</div>
          <div class="hint" id="overlay-hint"></div>
          <div class="score-line" id="overlay-score" hidden></div>
          <div class="play-pill" id="overlay-action"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      "use strict";

      var $ = function (id) { return document.getElementById(id); };

      /* ============================ i18n ============================ */
      MG.i18n.register({
        en: {
          title: "Racing", best: "Best", speed: "km/h",
          hint: "Arrows / WASD to steer · ▲ gas · ▼ brake<br>On phone, use the on-screen pads",
          gameover: "Crashed!", scoreLabel: "Distance", bestLabel: "Best",
          play: "▶ Drive", playAgain: "▶ Drive again", unit: "m"
        },
        ru: {
          title: "Гонки", best: "Рекорд", speed: "км/ч",
          hint: "Стрелки / WASD — руль · ▲ газ · ▼ тормоз<br>На телефоне — экранные кнопки",
          gameover: "Авария!", scoreLabel: "Дистанция", bestLabel: "Рекорд",
          play: "▶ Поехали", playAgain: "▶ Ещё раз", unit: "м"
        },
        es: {
          title: "Carreras", best: "Mejor", speed: "km/h",
          hint: "Flechas / WASD para girar · ▲ acelerar · ▼ frenar<br>En móvil, usa los botones",
          gameover: "¡Choque!", scoreLabel: "Distancia", bestLabel: "Mejor",
          play: "▶ Conducir", playAgain: "▶ Otra vez", unit: "m"
        }
      });

      var canvas = $("game");
      var ctx = canvas.getContext("2d");
      var overlay = $("overlay");
      var overlayTitle = $("overlay-title");
      var overlayHint = $("overlay-hint");
      var overlayScore = $("overlay-score");
      var overlayAction = $("overlay-action");

      // Shared header: brand + language selector + Best & Speed stat chips.
      var ui = MG.mountHeader({
        icon: "🏎️",
        titleKey: "title",
        stats: [
          { key: "spd", labelKey: "speed", variant: "sm", value: "0" },
          { key: "best", labelKey: "best" }
        ]
      });

      /* ===================== Pseudo-3D road engine =====================
       * Classic projection: the road is a list of fixed-length segments.
       * Each segment has a world position (x curve offset, y hill height,
       * z depth). We project each segment from camera space to screen space
       * and draw it back-to-front as a trapezoid, giving real perspective,
       * curves and hills on a plain 2D canvas.
       */

      // Logical resolution — drawn at this size, scaled to fit the stage.
      var W = 480;
      var H = 720;
      var viewScale = 1;

      function resize() {
        var rect = canvas.getBoundingClientRect();
        var dpr = window.devicePixelRatio || 1;
        var scale = Math.min(rect.width / W, rect.height / H);
        canvas.width = Math.round(W * scale * dpr);
        canvas.height = Math.round(H * scale * dpr);
        viewScale = scale * dpr;
      }

      // --- Engine constants ---
      var SEG_LEN = 200;            // length of a single segment (world units)
      var RUMBLE_LEN = 3;           // segments per rumble-strip stripe
      var ROAD_WIDTH = 2000;        // half-width of the road at z = 0
      var LANES = 3;
      var CAM_HEIGHT = 1000;        // camera height above the road
      var CAM_DEPTH = 1 / Math.tan((100 / 2) * Math.PI / 180); // ~fov 100
      var DRAW_DIST = 220;          // segments rendered ahead
      var FOG_DENSITY = 5;

      var CENTRIFUGAL = 0.32;       // how hard curves push the car sideways
      var MAX_SPEED = SEG_LEN * 60; // top speed (world units / sec)
      var ACCEL = MAX_SPEED / 5;
      var BRAKE = -MAX_SPEED;
      var DECEL = -MAX_SPEED / 5;   // natural deceleration (off-throttle)
      var OFFROAD_DECEL = -MAX_SPEED / 2;
      var OFFROAD_LIMIT = MAX_SPEED / 4;

      // Colors for the two alternating segment shades.
      var COL = {
        light: { road: "#6b6b76", grass: "#27a84a", rumble: "#ffffff", lane: "#ffffff" },
        dark:  { road: "#62626d", grass: "#229642", rumble: "#bd2a2a", lane: null },
        start: { road: "#fff", grass: "#27a84a", rumble: "#fff", lane: null },
        finish:{ road: "#111", grass: "#27a84a", rumble: "#111", lane: null }
      };

      // --- State ---
      var STATE_READY = 0, STATE_PLAY = 1, STATE_DEAD = 2;
      var state = STATE_READY;

      var segments = [];
      var trackLength = 0;
      var position;     // camera Z position along the track
      var playerX;      // -1..1 horizontal offset (1 = right edge of road)
      var speed;        // current speed
      var distance;     // metres travelled (score)
      var best;
      var cars;         // traffic
      var deadTimer;
      var bgOffset;     // parallax background scroll
      var shake;

      var store = MG.storage("racing", { version: 1 });
      best = (store.load() || { best: 0 }).best;
      ui.setStat("best", best);

      /* ---------------- Track building ---------------- */
      function lastY() {
        return segments.length === 0 ? 0 : segments[segments.length - 1].p2.world.y;
      }

      function addSegment(curve, y) {
        var n = segments.length;
        var prevY = lastY();
        segments.push({
          index: n,
          curve: curve,
          p1: { world: { y: prevY, z: n * SEG_LEN }, camera: {}, screen: {} },
          p2: { world: { y: y, z: (n + 1) * SEG_LEN }, camera: {}, screen: {} },
          color: Math.floor(n / RUMBLE_LEN) % 2 ? COL.dark : COL.light,
          cars: [],
          sprites: []
        });
      }

      function easeIn(a, b, p) { return a + (b - a) * Math.pow(p, 2); }
      function easeInOut(a, b, p) { return a + (b - a) * (-Math.cos(p * Math.PI) / 2 + 0.5); }

      function addRoad(enter, hold, leave, curve, y) {
        var startY = lastY();
        var endY = startY + y * SEG_LEN;
        var total = enter + hold + leave;
        var i;
        for (i = 0; i < enter; i++) addSegment(easeIn(0, curve, i / enter), easeInOut(startY, endY, i / total));
        for (i = 0; i < hold; i++) addSegment(curve, easeInOut(startY, endY, (enter + i) / total));
        for (i = 0; i < leave; i++) addSegment(easeInOut(curve, 0, i / leave), easeInOut(startY, endY, (enter + hold + i) / total));
      }

      // Random track of straights, curves and hills.
      function buildTrack() {
        segments = [];
        var ROADS = { length: { none: 0, short: 25, medium: 50, long: 100 },
                      curve: { none: 0, easy: 2, medium: 4, hard: 6 },
                      hill:  { none: 0, low: 20, medium: 40, high: 60 } };

        addRoad(20, 20, 20, 0, 0); // gentle start straight

        var pieces = 60;
        for (var p = 0; p < pieces; p++) {
          var enter = pick([25, 50, 50, 100]);
          var hold = pick([25, 50, 75]);
          var leave = pick([25, 50, 50]);
          var dir = Math.random() < 0.5 ? -1 : 1;
          var curveMag = pick([0, 0, 2, 3, 4, 5, 6]);
          var hillMag = pick([-4, -2, 0, 0, 2, 4, 5]);
          addRoad(enter, hold, leave, dir * curveMag, hillMag);
        }

        // Mark a few start segments for the start line look.
        for (var s = 0; s < segments.length; s++) {
          if (s < 4) segments[s].color = COL.start;
        }
        trackLength = segments.length * SEG_LEN;
      }

      function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

      function findSegment(z) {
        return segments[Math.floor(z / SEG_LEN) % segments.length];
      }

      /* ---------------- Traffic ---------------- */
      var CAR_COLORS = ["#e74c3c", "#3498db", "#f1c40f", "#9b59b6", "#e67e22", "#1abc9c", "#ecf0f1"];

      function resetTraffic() {
        cars = [];
        var n = 28;
        for (var i = 0; i < n; i++) {
          var lane = (Math.floor(Math.random() * LANES) - (LANES - 1) / 2);
          var offset = lane * (1.6 / LANES);
          var z = Math.floor(Math.random() * segments.length) * SEG_LEN;
          // Skip the very start so the player has room.
          if (z < 40 * SEG_LEN) z += 40 * SEG_LEN;
          var carSpeed = MAX_SPEED / 4 + Math.random() * (MAX_SPEED / 3);
          cars.push({ offset: offset, z: z % trackLength, speed: carSpeed,
                      color: CAR_COLORS[i % CAR_COLORS.length], w: 0 });
        }
      }

      function updateCars(dt) {
        for (var i = 0; i < cars.length; i++) {
          var c = cars[i];
          // Simple avoidance: steer away from the player when close ahead.
          var oldZ = c.z;
          c.z = increase(c.z, dt * c.speed, trackLength);
          c.percent = (c.z % SEG_LEN) / SEG_LEN;
        }
      }

      function increase(start, inc, max) {
        var r = start + inc;
        while (r >= max) r -= max;
        while (r < 0) r += max;
        return r;
      }

      /* ---------------- Game flow ---------------- */
      function reset() {
        buildTrack();
        resetTraffic();
        position = 0;
        playerX = 0;
        speed = 0;
        distance = 0;
        deadTimer = 0;
        bgOffset = 0;
        shake = 0;
        ui.setStat("spd", 0);
      }

      function startGame() {
        reset();
        state = STATE_PLAY;
        overlay.classList.add("hidden");
      }

      function showReady() {
        reset();
        state = STATE_READY;
        overlay.classList.remove("hidden");
        renderOverlay();
      }

      function die() {
        if (state !== STATE_PLAY) return;
        state = STATE_DEAD;
        deadTimer = 0;
        shake = 22;
        var d = Math.floor(distance);
        if (d > best) {
          best = d;
          store.save({ best: best });
          ui.setStat("best", best);
        }
      }

      function showGameOver() {
        overlay.classList.remove("hidden");
        renderOverlay();
      }

      function action() {
        if (state === STATE_READY) startGame();
        else if (state === STATE_DEAD && deadTimer > 24) showReady();
      }

      function renderOverlay() {
        var t = MG.i18n.t;
        if (state === STATE_DEAD) {
          overlayTitle.textContent = "🏁 " + t("title");
          overlayHint.textContent = t("gameover");
          overlayScore.hidden = false;
          overlayScore.innerHTML =
            t("scoreLabel") + " <b>" + Math.floor(distance) + " " + t("unit") + "</b><br>" +
            t("bestLabel") + " <b>" + best + " " + t("unit") + "</b>";
          overlayAction.textContent = t("playAgain");
        } else {
          overlayTitle.textContent = "🏎️ " + t("title");
          overlayHint.innerHTML = t("hint");
          overlayScore.hidden = true;
          overlayAction.textContent = t("play");
        }
      }
      MG.i18n.onChange(function () {
        if (!overlay.classList.contains("hidden")) renderOverlay();
      });

      /* ---------------- Input ---------------- */
      var keys = { left: false, right: false, gas: false, brake: false };

      function setKey(code, down) {
        switch (code) {
          case "ArrowLeft": case "KeyA": keys.left = down; return true;
          case "ArrowRight": case "KeyD": keys.right = down; return true;
          case "ArrowUp": case "KeyW": keys.gas = down; return true;
          case "ArrowDown": case "KeyS": keys.brake = down; return true;
          case "Space": return true;
        }
        return false;
      }

      window.addEventListener("keydown", function (e) {
        if (e.code === "Space" || e.code === "Enter") { action(); }
        if (setKey(e.code, true)) e.preventDefault();
      });
      window.addEventListener("keyup", function (e) {
        if (setKey(e.code, false)) e.preventDefault();
      });

      // On-screen pads.
      function bindPad(el, prop) {
        function on(e) { e.preventDefault(); keys[prop] = true; el.classList.add("down"); }
        function off(e) { e.preventDefault(); keys[prop] = false; el.classList.remove("down"); }
        el.addEventListener("touchstart", on, { passive: false });
        el.addEventListener("touchend", off, { passive: false });
        el.addEventListener("touchcancel", off, { passive: false });
        el.addEventListener("mousedown", on);
        el.addEventListener("mouseup", off);
        el.addEventListener("mouseleave", off);
      }
      bindPad($("pad-left"), "left");
      bindPad($("pad-right"), "right");
      bindPad($("pad-gas"), "gas");
      bindPad($("pad-brake"), "brake");

      // Tapping the canvas / overlay also accelerates / advances screens.
      function onTap(e) {
        e.preventDefault();
        if (state !== STATE_PLAY) action();
      }
      canvas.addEventListener("mousedown", onTap);
      canvas.addEventListener("touchstart", onTap, { passive: false });
      overlay.addEventListener("mousedown", onTap);
      overlay.addEventListener("touchstart", onTap, { passive: false });

      window.addEventListener("resize", resize);

      /* ---------------- Update ---------------- */
      function update(dt) {
        if (state === STATE_PLAY) {
          updateCars(dt);

          var playerSeg = findSegment(position + 1);
          var speedPercent = speed / MAX_SPEED;
          var dx = dt * 2 * speedPercent; // steering responsiveness scales with speed

          position = increase(position, dt * speed, trackLength);

          // Steering.
          if (keys.left) playerX -= dx;
          else if (keys.right) playerX += dx;

          // Centrifugal force pushes outward on curves.
          playerX -= dx * speedPercent * playerSeg.curve * CENTRIFUGAL;

          // Throttle / brake.
          if (keys.gas) speed += ACCEL * dt;
          else if (keys.brake) speed += BRAKE * dt;
          else speed += DECEL * dt;

          // Off-road: slow down and rumble.
          if ((playerX < -1 || playerX > 1) && speed > OFFROAD_LIMIT) {
            speed += OFFROAD_DECEL * dt;
            shake = Math.max(shake, 3);
          }

          playerX = Math.max(-2, Math.min(2, playerX));
          speed = Math.max(0, Math.min(speed, MAX_SPEED));

          // Distance / score.
          distance += speed * dt / 100;

          // Collision with traffic.
          checkCollisions(playerSeg);

          shake *= 0.9;
          ui.setStat("spd", Math.round(speed / MAX_SPEED * 320));
        } else if (state === STATE_DEAD) {
          deadTimer++;
          speed *= 0.9;
          position = increase(position, dt * speed, trackLength);
          shake *= 0.88;
          if (deadTimer === 22) showGameOver();
        } else if (state === STATE_READY) {
          // Idle camera drift forward for a lively title screen.
          position = increase(position, dt * MAX_SPEED / 8, trackLength);
        }

        bgOffset += 0; // background follows curve in render
      }

      var PLAYER_W = 0.7; // player half-width in road-width units (approx)

      function checkCollisions(playerSeg) {
        var pW = 80 / ROAD_WIDTH; // approximate collision half-width
        for (var i = 0; i < cars.length; i++) {
          var c = cars[i];
          // Only cars within a couple segments ahead matter.
          var cz = c.z;
          var pz = position;
          var rel = cz - pz;
          if (rel < 0) rel += trackLength;
          if (rel < SEG_LEN * 1.6 && rel > -SEG_LEN * 0.4) {
            if (overlapX(playerX, 0.5, c.offset, 0.4)) {
              die();
              // Knock the player back a touch.
              speed = speed / 4;
              return;
            }
          }
        }
      }

      function overlapX(x1, w1, x2, w2) {
        return Math.abs(x1 - x2) < (w1 + w2) / 2;
      }

      /* ---------------- Projection + render ---------------- */
      function project(p, camX, camY, camZ, camDepth, width, height, roadWidth) {
        p.camera.x = (p.world.x || 0) - camX;
        p.camera.y = (p.world.y || 0) - camY;
        p.camera.z = (p.world.z || 0) - camZ;
        p.screen.scale = camDepth / p.camera.z;
        p.screen.x = Math.round((width / 2) + (p.screen.scale * p.camera.x * width / 2));
        p.screen.y = Math.round((height / 2) - (p.screen.scale * p.camera.y * height / 2));
        p.screen.w = Math.round(p.screen.scale * roadWidth * width / 2);
      }

      function draw() {
        var sx = shake ? (Math.random() - 0.5) * shake : 0;
        var sy = shake ? (Math.random() - 0.5) * shake : 0;

        ctx.save();
        ctx.scale(viewScale, viewScale);
        ctx.save();
        ctx.translate(sx, sy);

        var baseSeg = findSegment(position);
        var basePercent = (position % SEG_LEN) / SEG_LEN;
        var playerSeg = findSegment(position + 1);
        var playerPercent = ((position) % SEG_LEN) / SEG_LEN;
        var playerY = interpolate(playerSeg.p1.world.y, playerSeg.p2.world.y, playerPercent);

        // Sky + background.
        drawBackground(baseSeg.curve, playerY);

        var maxY = H;
        var x = 0;
        var dx = -(baseSeg.curve * basePercent);

        var camX = playerX * ROAD_WIDTH;
        var n, seg;
        for (n = 0; n < DRAW_DIST; n++) {
          seg = segments[(baseSeg.index + n) % segments.length];
          seg.looped = (baseSeg.index + n) >= segments.length;
          seg.fog = fog(n / DRAW_DIST, FOG_DENSITY);

          var camZ = position - (seg.looped ? trackLength : 0);

          project(seg.p1, camX - x, playerY + CAM_HEIGHT, camZ, CAM_DEPTH, W, H, ROAD_WIDTH);
          project(seg.p2, camX - x - dx, playerY + CAM_HEIGHT, camZ, CAM_DEPTH, W, H, ROAD_WIDTH);

          x += dx;
          dx += seg.curve;

          if (seg.p1.camera.z <= CAM_DEPTH || seg.p2.screen.y >= seg.p1.screen.y || seg.p2.screen.y >= maxY) {
            continue;
          }

          drawSegment(seg);
          maxY = seg.p1.screen.y;
        }

        // Traffic — draw the cars that fall in the drawn range, far to near.
        drawTraffic(baseSeg, playerY);

        // Player car.
        drawPlayer();

        ctx.restore();
        ctx.restore();
      }

      function interpolate(a, b, p) { return a + (b - a) * p; }

      function fog(d, density) {
        return 1 / Math.pow(Math.E, (d * d * density));
      }

      function drawSegment(seg) {
        var c = seg.color;
        var p1 = seg.p1.screen, p2 = seg.p2.screen;
        var r1 = rumbleWidth(p1.w), r2 = rumbleWidth(p2.w);
        var l1 = laneWidth(p1.w), l2 = laneWidth(p2.w);

        // Grass.
        ctx.fillStyle = c.grass;
        ctx.fillRect(0, p2.y, W, p1.y - p2.y);

        // Rumble strips.
        polygon(p1.x - p1.w - r1, p1.y, p1.x - p1.w, p1.y, p2.x - p2.w, p2.y, p2.x - p2.w - r2, p2.y, c.rumble);
        polygon(p1.x + p1.w + r1, p1.y, p1.x + p1.w, p1.y, p2.x + p2.w, p2.y, p2.x + p2.w + r2, p2.y, c.rumble);

        // Road.
        polygon(p1.x - p1.w, p1.y, p1.x + p1.w, p1.y, p2.x + p2.w, p2.y, p2.x - p2.w, p2.y, c.road);

        // Lane markers.
        if (c.lane) {
          var lanew1 = p1.w * 2 / LANES;
          var lanew2 = p2.w * 2 / LANES;
          var lx1 = p1.x - p1.w + lanew1;
          var lx2 = p2.x - p2.w + lanew2;
          for (var lane = 1; lane < LANES; lx1 += lanew1, lx2 += lanew2, lane++) {
            polygon(lx1 - l1 / 2, p1.y, lx1 + l1 / 2, p1.y, lx2 + l2 / 2, p2.y, lx2 - l2 / 2, p2.y, c.lane);
          }
        }

        // Fog overlay.
        if (seg.fog < 1) {
          ctx.globalAlpha = 1 - seg.fog;
          ctx.fillStyle = FOG_COLOR;
          ctx.fillRect(0, p2.y, W, p1.y - p2.y);
          ctx.globalAlpha = 1;
        }
      }

      var FOG_COLOR = "#74b9ff";

      function rumbleWidth(projectedW) { return projectedW / 6; }
      function laneWidth(projectedW) { return projectedW / 32; }

      function polygon(x1, y1, x2, y2, x3, y3, x4, y4, color) {
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.lineTo(x3, y3);
        ctx.lineTo(x4, y4);
        ctx.closePath();
        ctx.fill();
      }

      function drawBackground(curve, playerY) {
        // Sky gradient.
        var sky = ctx.createLinearGradient(0, 0, 0, H * 0.6);
        sky.addColorStop(0, "#3a7bd5");
        sky.addColorStop(1, "#74b9ff");
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, W, H);

        // Distant hills, shifted by the upcoming curve for a parallax feel.
        var horizon = H * 0.42 + (playerY * 0.0008);
        var shift = curve * 6;
        ctx.fillStyle = "#5fa86a";
        for (var i = -1; i < 5; i++) {
          var hx = i * 160 - shift;
          hill(hx, horizon, 160, 70);
        }
        ctx.fillStyle = "#4f9a5c";
        for (var j = -1; j < 6; j++) {
          var hx2 = j * 120 - shift * 1.6 + 40;
          hill(hx2, horizon + 14, 120, 44);
        }

        // Sun glow.
        var sun = ctx.createRadialGradient(W * 0.7, horizon - 60, 6, W * 0.7, horizon - 60, 90);
        sun.addColorStop(0, "rgba(255,250,210,0.95)");
        sun.addColorStop(1, "rgba(255,250,210,0)");
        ctx.fillStyle = sun;
        ctx.fillRect(W * 0.7 - 90, horizon - 150, 180, 180);
      }

      function hill(cx, baseY, w, h) {
        ctx.beginPath();
        ctx.moveTo(cx - w / 2, baseY);
        ctx.quadraticCurveTo(cx, baseY - h, cx + w / 2, baseY);
        ctx.closePath();
        ctx.fill();
      }

      function drawTraffic(baseSeg, playerY) {
        // Place each car on its segment, reusing the segment's freshly
        // projected p1/p2 screen points (which already include the road
        // curve), so traffic follows bends correctly. Draw far→near.
        var visible = [];
        for (var i = 0; i < cars.length; i++) {
          var c = cars[i];
          var rel = c.z - position;
          if (rel < 0) rel += trackLength;
          if (rel <= SEG_LEN || rel > (DRAW_DIST - 2) * SEG_LEN) continue;

          var seg = segments[Math.floor(c.z / SEG_LEN) % segments.length];
          // Segment must have been projected this frame (has a valid scale).
          if (!seg.p1.screen || !seg.p1.screen.scale || seg.p1.screen.scale <= 0) continue;

          var pct = (c.z % SEG_LEN) / SEG_LEN;
          var scale = interpolate(seg.p1.screen.scale, seg.p2.screen.scale, pct);
          var roadX = interpolate(seg.p1.screen.x, seg.p2.screen.x, pct);
          var roadW = interpolate(seg.p1.screen.w, seg.p2.screen.w, pct);
          var sy = interpolate(seg.p1.screen.y, seg.p2.screen.y, pct);
          // Offset across the road: c.offset is in road-half-width units.
          var sx = roadX + c.offset * roadW;
          visible.push({ c: c, rel: rel, sx: sx, sy: sy, scale: scale, fog: seg.fog });
        }
        visible.sort(function (a, b) { return b.rel - a.rel; });
        for (var k = 0; k < visible.length; k++) {
          var v = visible[k];
          var w = v.scale * ROAD_WIDTH * W / 2 * 0.42;
          if (w < 2) continue;
          carSprite(v.sx, v.sy, w, w * 0.78, v.c.color);
          if (v.fog < 1) {
            ctx.globalAlpha = 1 - v.fog;
            ctx.fillStyle = FOG_COLOR;
            ctx.fillRect(v.sx - w / 2, v.sy - w * 0.78, w, w * 0.78);
            ctx.globalAlpha = 1;
          }
        }
      }

      // A simple top-rear car sprite (works for both traffic and player).
      function carSprite(cx, cy, w, h, color) {
        var x = cx - w / 2;
        var y = cy - h;

        // Shadow.
        ctx.fillStyle = "rgba(0,0,0,0.3)";
        ctx.beginPath();
        ctx.ellipse(cx, cy, w * 0.55, h * 0.16, 0, 0, Math.PI * 2);
        ctx.fill();

        // Body.
        roundRect(x, y, w, h * 0.9, Math.min(8, w * 0.16));
        ctx.fillStyle = color;
        ctx.fill();

        // Roof / window.
        ctx.fillStyle = "rgba(0,0,0,0.35)";
        roundRect(x + w * 0.18, y + h * 0.12, w * 0.64, h * 0.34, Math.min(5, w * 0.1));
        ctx.fill();

        // Lower bumper shade.
        ctx.fillStyle = "rgba(0,0,0,0.22)";
        ctx.fillRect(x, y + h * 0.66, w, h * 0.16);

        // Tail lights.
        ctx.fillStyle = "#ffce54";
        ctx.fillRect(x + w * 0.08, y + h * 0.5, w * 0.16, h * 0.16);
        ctx.fillRect(x + w * 0.76, y + h * 0.5, w * 0.16, h * 0.16);

        // Wheels peeking out.
        ctx.fillStyle = "#111";
        ctx.fillRect(x - w * 0.04, y + h * 0.5, w * 0.1, h * 0.3);
        ctx.fillRect(x + w * 0.94, y + h * 0.5, w * 0.1, h * 0.3);
      }

      function drawPlayer() {
        var bounce = state === STATE_PLAY ? Math.sin(Date.now() / 50) * (speed / MAX_SPEED) * 1.5 : 0;
        var cx = W / 2;
        var cy = H - 70 + bounce;
        // Steer lean.
        var lean = 0;
        if (state === STATE_PLAY) {
          if (keys.left) lean = -6;
          else if (keys.right) lean = 6;
        }
        var w = 120, h = 86;
        ctx.save();
        ctx.translate(cx + lean, cy);
        playerSprite(0, 0, w, h);
        ctx.restore();
      }

      function playerSprite(cx, cy, w, h) {
        var x = cx - w / 2;
        var y = cy - h;

        // Shadow.
        ctx.fillStyle = "rgba(0,0,0,0.35)";
        ctx.beginPath();
        ctx.ellipse(cx, cy + 2, w * 0.5, h * 0.12, 0, 0, Math.PI * 2);
        ctx.fill();

        // Rear wing.
        ctx.fillStyle = "#b8000f";
        roundRect(x + w * 0.05, y - h * 0.04, w * 0.9, h * 0.12, 4);
        ctx.fill();

        // Body.
        var grd = ctx.createLinearGradient(0, y, 0, y + h);
        grd.addColorStop(0, "#ff4757");
        grd.addColorStop(1, "#c0392b");
        ctx.fillStyle = grd;
        roundRect(x + w * 0.08, y + h * 0.08, w * 0.84, h * 0.74, 10);
        ctx.fill();

        // Cockpit.
        ctx.fillStyle = "#1b1f2a";
        roundRect(x + w * 0.28, y + h * 0.18, w * 0.44, h * 0.3, 8);
        ctx.fill();

        // White racing stripe.
        ctx.fillStyle = "rgba(255,255,255,0.85)";
        ctx.fillRect(cx - w * 0.04, y + h * 0.1, w * 0.08, h * 0.7);

        // Wheels.
        ctx.fillStyle = "#111";
        roundRect(x - w * 0.02, y + h * 0.5, w * 0.16, h * 0.38, 5); ctx.fill();
        roundRect(x + w * 0.86, y + h * 0.5, w * 0.16, h * 0.38, 5); ctx.fill();

        // Tail lights.
        ctx.fillStyle = "#ffce54";
        ctx.fillRect(x + w * 0.16, y + h * 0.58, w * 0.12, h * 0.14);
        ctx.fillRect(x + w * 0.72, y + h * 0.58, w * 0.12, h * 0.14);
      }

      function roundRect(x, y, w, h, r) {
        r = Math.min(r, w / 2, h / 2);
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + w, y, x + w, y + h, r);
        ctx.arcTo(x + w, y + h, x, y + h, r);
        ctx.arcTo(x, y + h, x, y, r);
        ctx.arcTo(x, y, x + w, y, r);
        ctx.closePath();
      }

      /* ---------------- Loop ---------------- */
      var last = 0;
      function loop(now) {
        if (!last) last = now;
        var dt = Math.min(0.05, (now - last) / 1000);
        last = now;
        update(dt);
        draw();
        requestAnimationFrame(loop);
      }

      // --- Boot ---
      resize();
      reset();
      showReady();
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>

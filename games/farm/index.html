<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>🚜 Farm — Minigames</title>
  <meta name="description" content="Run a little farm — grow crops, raise animals, cook dishes, fill orders and trade at the market. Pan around a top-down village. Play in your browser, no installs." />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚜</text></svg>" />

  <!-- Shared chrome: header bar + language control. -->
  <link rel="stylesheet" href="../../shared/mg.css" />
  <script src="../../shared/mg.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body { height: 100%; }

    body {
      background: #8ec96b;
      color: #2e3b22;
      font-family: "Trebuchet MS", system-ui, -apple-system, sans-serif;
      user-select: none;
      -webkit-user-select: none;
      overflow: hidden;
    }

    /* The game area is a vertical stack: status strip + full-window map. */
    .mg-game-area { display: flex; flex-direction: column; background: #79b557; }

    /* ---- Status strip (level / xp / storage) ---- */
    .status {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 12px;
      background: rgba(46, 59, 34, 0.16);
      z-index: 6;
    }
    .status .lvl {
      font-weight: 800;
      font-size: 0.9rem;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .status .xpwrap {
      flex: 1 1 auto;
      height: 12px;
      border-radius: 7px;
      background: rgba(0, 0, 0, 0.22);
      overflow: hidden;
      box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.3);
    }
    .status .xpwrap > i {
      display: block;
      height: 100%;
      width: 0%;
      border-radius: 7px;
      background: linear-gradient(90deg, #ffe066, #ffb43d);
      transition: width 0.3s ease;
    }
    .status .store {
      font-weight: 700;
      font-size: 0.82rem;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .status .store.full { color: #b22; }

    /* ====================================================================
     *  THE WORLD — a single, full-window, pannable top-down village. The
     *  scene (grass, paths, pond, fences, trees and gabled cottages) is one
     *  big inline SVG; interactive bits (crop plots, animals, building
     *  signs) are HTML laid precisely over it in world-percent coordinates.
     *  The whole .world is moved with a CSS transform to pan; it is always
     *  scaled to *cover* the viewport so the map fills the entire window.
     * ================================================================== */
    .world-view {
      flex: 1 1 auto;
      position: relative;
      min-height: 0;
      overflow: hidden;
      touch-action: none;        /* we handle panning ourselves */
      cursor: grab;
      background: linear-gradient(180deg, #bfe6ff 0%, #d8f1ff 14%, #8ec96b 30%);
    }
    .world-view.drag { cursor: grabbing; }

    .world {
      position: absolute;
      top: 0;
      left: 0;
      transform-origin: 0 0;
      will-change: transform;
      container-type: size;       /* enables cqw/cqh sizing for overlays */
    }
    .world > svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: none;       /* taps fall through to the overlays */
    }

    /* ---- A crop plot tile, laid over the tilled field in the scene. ---- */
    .plot {
      position: absolute;
      border: none;
      border-radius: 12%;
      background:
        repeating-linear-gradient(45deg, rgba(0,0,0,0.05) 0 6px, transparent 6px 12px),
        linear-gradient(180deg, #9c6a3e 0%, #8a5a30 100%);
      box-shadow: inset 0 3px 6px rgba(255,255,255,0.18), inset 0 -4px 8px rgba(0,0,0,0.25);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(1.1rem, 4cqw, 3rem);
      line-height: 1;
      transition: transform 0.08s ease, box-shadow 0.15s ease;
      color: transparent;
    }
    .plot:active { transform: scale(0.94); }
    .plot.watered {
      background:
        repeating-linear-gradient(45deg, rgba(0,0,0,0.08) 0 6px, transparent 6px 12px),
        linear-gradient(180deg, #6f4427 0%, #5d3a20 100%);
      box-shadow: inset 0 3px 8px rgba(80,140,255,0.25), inset 0 -4px 8px rgba(0,0,0,0.35);
    }
    .plot.locked {
      background: linear-gradient(180deg, #5d4530 0%, #4a361f 100%);
      box-shadow: inset 0 0 0 2px rgba(0,0,0,0.25);
    }
    .plot.locked .sprite { color: rgba(255,255,255,0.7); font-size: 0.85em; }
    .plot .sprite {
      display: block;
      color: #2e3b22;
      transform-origin: 50% 90%;
      filter: drop-shadow(0 2px 1px rgba(0,0,0,0.3));
    }
    .plot.ready .sprite { animation: ripe 1.3s ease-in-out infinite; }
    .plot.ready { box-shadow: inset 0 0 0 3px #ffd23f, inset 0 -4px 8px rgba(0,0,0,0.25); }
    .plot.fert::before {
      content: "✨";
      position: absolute;
      top: 4%;
      right: 6%;
      font-size: clamp(0.5rem, 2cqw, 0.95rem);
      line-height: 1;
      pointer-events: none;
      filter: drop-shadow(0 1px 1px rgba(0,0,0,0.4));
    }
    @keyframes ripe {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-10%) scale(1.06); }
    }
    .plot .bar {
      position: absolute;
      left: 10%; right: 10%; bottom: 8%;
      height: 7%;
      min-height: 3px;
      border-radius: 3px;
      background: rgba(0,0,0,0.3);
      overflow: hidden;
    }
    .plot .bar > i {
      display: block;
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #b6f36a, #6fc92b);
      transition: width 0.25s linear;
    }
    .plot.ready .bar, .plot.empty .bar, .plot.locked .bar { display: none; }
    .plot .pcost {
      position: absolute;
      bottom: 6%;
      font-size: clamp(0.5rem, 2cqw, 0.9rem);
      font-weight: 800;
      color: #ffe9b0;
      text-shadow: 0 1px 2px rgba(0,0,0,0.6);
    }

    /* ---- Building sign: a placard over each drawn cottage. ---- */
    .hotspot {
      position: absolute;
      border: none;
      background: transparent;
      padding: 0;
      margin: 0;
      cursor: pointer;
      font-family: inherit;
      color: #3a2b1a;
    }
    .hotspot::after {
      content: "";
      position: absolute;
      inset: 8% 8% 16%;
      border-radius: 16%;
      background: rgba(255, 255, 255, 0);
      transition: background 0.12s ease;
      pointer-events: none;
    }
    .hotspot:active::after { background: rgba(255, 255, 255, 0.22); }

    .sign {
      position: absolute;
      left: 50%;
      bottom: 1%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      background: linear-gradient(180deg, #fffdf5, #f1e3c4);
      border-radius: 0.7cqw;
      padding: 0.2cqw 0.8cqw 0.35cqw;
      box-shadow: 0 0.45cqw 0 rgba(120, 85, 40, 0.4), 0 0.15cqw 0.4cqw rgba(0, 0, 0, 0.22);
      white-space: nowrap;
      transition: transform 0.08s ease, box-shadow 0.08s ease;
    }
    .hotspot:active .sign {
      transform: translateX(-50%) translateY(0.3cqw);
      box-shadow: 0 0.15cqw 0 rgba(120, 85, 40, 0.4);
    }
    .sign .si { font-size: clamp(0.9rem, 2.1cqw, 2rem); line-height: 1; filter: drop-shadow(0 1px 1px rgba(0,0,0,0.2)); }
    .sign .st { font-size: clamp(0.6rem, 1.15cqw, 1.05rem); font-weight: 800; line-height: 1.15; color: #3a2b1a; }
    .sign .ss { font-size: clamp(0.55rem, 1cqw, 0.95rem); font-weight: 700; line-height: 1.15; color: #7a5a30; margin-top: 0.1cqw; }

    .b-badge {
      position: absolute;
      top: 0;
      right: 6%;
      z-index: 3;
      background: #7fd06a;
      color: #14310c;
      font-weight: 800;
      font-size: clamp(0.6rem, 1.25cqw, 1.05rem);
      line-height: 1;
      border-radius: 999px;
      padding: 0.4cqw 0.8cqw;
      box-shadow: 0 0.25cqw 0 #4f9b3e;
      animation: pulse 1.2s ease-in-out infinite;
    }

    /* ---- Animal pens: one fenced enclosure per animal type, drawn into the
     *  scene. The whole pen is a hold-and-sweep target — drag across the
     *  animals to collect what's ready (and feed the hungry ones). ---- */
    .pen-hot {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 0.5cqw 0.3cqw;
    }
    .pen-hot::after { inset: 7% 4% 4%; border-radius: 10%; }
    .pen-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.3cqw;
      font-size: clamp(0.5rem, 1cqw, 0.95rem);
      font-weight: 700;
      line-height: 1.2;
      color: #3a2b1a;
      background: rgba(255, 255, 255, 0.85);
      border-radius: 1cqw;
      padding: 0.1cqw 0.7cqw;
      white-space: nowrap;
      box-shadow: 0 0.2cqw 0 rgba(120, 85, 40, 0.35);
      pointer-events: none;
    }
    .pen-animals {
      flex: 1 1 auto;
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      align-content: center;
      justify-content: center;
      gap: 0.2cqw 0.4cqw;
      padding-top: 0.5cqw;
    }
    .pen-hot .an {
      position: relative;
      font-size: clamp(0.9rem, 2.6cqw, 2.2rem);
      line-height: 1;
      filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.25));
      transition: transform 0.08s ease;
    }
    .pen-hot .an.rdy { animation: ripe 1.3s ease-in-out infinite; }
    .pen-hot .an.hungry { opacity: 0.6; filter: grayscale(0.45) drop-shadow(0 1px 1px rgba(0, 0, 0, 0.25)); }
    .pen-hot .an .prod {
      position: absolute;
      top: -0.35em;
      right: -0.55em;
      font-size: 0.62em;
      filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.35));
    }
    .pen-buy {
      font-size: clamp(0.7rem, 1.7cqw, 1.4rem);
      font-weight: 700;
      line-height: 1.05;
      text-align: center;
      color: #3f5226;
      opacity: 0.8;
      margin-top: 0.4cqw;
    }
    .pen-buy .pi { font-size: 1.5em; display: block; filter: grayscale(0.3); opacity: 0.7; }
    .pen-lock {
      font-size: clamp(0.55rem, 1.2cqw, 1rem);
      font-weight: 700;
      color: #3f5226;
      background: rgba(255, 255, 255, 0.72);
      padding: 0.3cqw 0.8cqw;
      border-radius: 1cqw;
      margin-top: 0.6cqw;
    }

    /* ---- A floating hint badge over the map. ---- */
    .pan-hint {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(20, 30, 14, 0.7);
      color: #fff;
      font-size: 0.78rem;
      font-weight: 700;
      padding: 6px 14px;
      border-radius: 999px;
      pointer-events: none;
      z-index: 5;
      opacity: 0;
      transition: opacity 0.4s ease;
      max-width: 90%;
      text-align: center;
    }
    .pan-hint.show { opacity: 1; }

    /* ---- Bottom toolbar (seed / tool selector), floating over the map. ---- */
    .toolbar {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 10px 10px calc(10px + env(safe-area-inset-bottom, 0));
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      touch-action: pan-x;
      z-index: 5;
      background: linear-gradient(0deg, rgba(46, 59, 34, 0.42) 0%, rgba(46, 59, 34, 0.16) 70%, transparent 100%);
    }
    .toolbar::-webkit-scrollbar { display: none; }
    .tool {
      flex: 0 0 auto;
      min-width: 70px;
      border: 2px solid transparent;
      border-radius: 14px;
      background: rgba(255,255,255,0.95);
      color: #2e3b22;
      padding: 6px 9px 7px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      box-shadow: 0 4px 0 rgba(0,0,0,0.22);
      transition: transform 0.08s ease, border-color 0.12s ease;
    }
    .tool:active { transform: translateY(2px); }
    .tool.selected {
      border-color: #ffd23f;
      box-shadow: 0 4px 0 #c79a00, 0 0 0 3px rgba(255,210,63,0.4);
    }
    .tool.locked { opacity: 0.55; }
    .tool .ico { font-size: 1.5rem; line-height: 1; }
    .tool .name { font-size: 0.68rem; font-weight: 700; }
    .tool .cost { font-size: 0.68rem; font-weight: 800; color: #7a5a00; }
    .tool .cost.lock { color: #8a3030; }
    .tool .stk { margin-top: 1px; }

    /* ---- Stock chip — shows how much of an item you currently hold. ---- */
    .stk {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      font-size: 0.72rem;
      font-weight: 800;
      color: #4a3f1a;
      background: rgba(0, 0, 0, 0.07);
      border-radius: 7px;
      padding: 1px 6px;
      white-space: nowrap;
    }
    .stk.zero { color: #9a2020; background: rgba(200, 40, 40, 0.12); }

    /* ---- Generic cards (used inside the building panels) ---- */
    .card {
      background: rgba(255,255,255,0.94);
      border-radius: 16px;
      padding: 12px 14px;
      margin-bottom: 10px;
      box-shadow: 0 5px 0 rgba(0,0,0,0.12);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .card.locked { opacity: 0.55; }
    .card .big { font-size: 2.1rem; line-height: 1; flex: 0 0 auto; }
    .card .body { flex: 1 1 auto; min-width: 0; }
    .card .ttl { font-weight: 800; font-size: 0.98rem; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .card .sub {
      font-size: 0.78rem;
      color: #5a6648;
      margin-top: 3px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .card .right { flex: 0 0 auto; display: flex; flex-direction: column; gap: 6px; align-items: stretch; }

    .ingredients { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
    .ing {
      font-size: 0.78rem;
      font-weight: 700;
      background: rgba(0,0,0,0.05);
      border-radius: 8px;
      padding: 2px 7px;
    }
    .ing.miss { background: rgba(200,40,40,0.14); color: #9a2020; }

    .pbar {
      height: 8px;
      border-radius: 5px;
      background: rgba(0,0,0,0.16);
      overflow: hidden;
      margin-top: 8px;
    }
    .pbar > i {
      display: block; height: 100%; width: 0%;
      background: linear-gradient(90deg, #6fc92b, #b6f36a);
      transition: width 0.25s linear;
    }
    .pbar.warm > i { background: linear-gradient(90deg, #ff9d3d, #ffd23f); }

    .btn {
      font-family: inherit;
      font-weight: 800;
      font-size: 0.82rem;
      border: none;
      border-radius: 11px;
      padding: 9px 14px;
      cursor: pointer;
      color: #2e3b22;
      background: #ffd23f;
      box-shadow: 0 3px 0 #c79a00;
      transition: transform 0.07s ease, opacity 0.12s;
      white-space: nowrap;
    }
    .btn:active { transform: translateY(2px); }
    .btn.alt { background: #cfe8b0; box-shadow: 0 3px 0 #93b56e; }
    .btn.go { background: #7fd06a; box-shadow: 0 3px 0 #4f9b3e; color: #14310c; }
    .btn[disabled] { opacity: 0.4; cursor: not-allowed; box-shadow: 0 3px 0 rgba(0,0,0,0.2); }
    .btn.sm { padding: 7px 10px; font-size: 0.78rem; }

    .badge {
      font-size: 0.72rem;
      font-weight: 800;
      border-radius: 999px;
      padding: 2px 9px;
      background: #ffd23f;
      color: #4a3800;
    }
    .badge.ready { background: #7fd06a; color: #14310c; animation: pulse 1.2s ease-in-out infinite; }
    .badge.lock { background: rgba(0,0,0,0.1); color: #5a6648; }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }

    .price { display: inline-flex; align-items: center; gap: 2px; font-weight: 800; }
    .price .up { color: #2f9e2f; }
    .price .down { color: #c23b3b; }

    .empty-note {
      text-align: center;
      color: #44502f;
      font-size: 0.85rem;
      opacity: 0.8;
      padding: 16px 8px;
    }

    /* ---- "Collect all" bar + slim summary cards for empty slots ---- */
    .collect-all { margin: 0 0 10px; }
    .collect-all .btn { width: 100%; }
    .card.slim { padding: 7px 12px; opacity: 0.7; }
    .card.slim .big { font-size: 1.4rem; }
    .card.slim .sub { margin-top: 0; }

    .section-h {
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #44502f;
      margin: 14px 2px 8px;
      opacity: 0.9;
    }
    .section-h:first-child { margin-top: 0; }

    /* ---- Sliding panel (market / kitchen / pen / orders) ---- */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      background: rgba(20, 30, 14, 0);
      pointer-events: none;
      transition: background 0.2s ease;
    }
    .overlay.show { pointer-events: auto; background: rgba(20, 30, 14, 0.5); }
    .sheet {
      background: linear-gradient(180deg, #bfe79a 0%, #a7d579 100%);
      border-radius: 20px 20px 0 0;
      max-height: 88%;
      display: flex;
      flex-direction: column;
      box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.35);
      transform: translateY(100%);
      transition: transform 0.24s cubic-bezier(0.2, 0.8, 0.3, 1);
    }
    .overlay.show .sheet { transform: translateY(0); }
    .sheet-head {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: linear-gradient(180deg, #3c5a28, #2f4a1f);
      color: #fff;
      border-radius: 20px 20px 0 0;
    }
    .sheet-head .sh-ico { font-size: 1.4rem; line-height: 1; }
    .sheet-head .sh-ttl { font-weight: 800; font-size: 1.02rem; flex: 1 1 auto; }
    .sheet-head .sh-close {
      flex: 0 0 auto;
      width: 34px; height: 34px;
      border: none;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.16);
      color: #fff;
      font-size: 1.05rem;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .sheet-head .sh-close:active { transform: scale(0.92); }
    .sheet-body {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 12px 14px calc(18px + env(safe-area-inset-bottom, 0));
    }
    .sheet-body .wrap { width: 100%; max-width: 520px; margin: 0 auto; }

    .tip {
      text-align: center;
      font-size: 0.82rem;
      font-weight: 600;
      color: #2e3b22;
      opacity: 0.82;
      margin: 0 auto 12px;
      max-width: 520px;
      min-height: 1.05em;
    }

    /* ---- Toast ---- */
    .toast {
      position: fixed;
      left: 50%;
      bottom: 76px;
      transform: translateX(-50%) translateY(12px);
      background: rgba(20, 30, 14, 0.94);
      color: #fff;
      font-weight: 700;
      font-size: 0.86rem;
      padding: 9px 16px;
      border-radius: 999px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.35);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 70;
      max-width: 90vw;
      text-align: center;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 380px) {
      .card { padding: 10px 11px; gap: 9px; }
      .card .big { font-size: 1.8rem; }
    }
  </style>
</head>
<body class="mg-app">
  <!-- Header is mounted by the shared runtime (see MG.mountHeader below). -->
  <div class="mg-game-area">
    <div class="status">
      <span class="lvl" id="lvl">⭐ 1</span>
      <span class="xpwrap"><i id="xpfill"></i></span>
      <span class="store" id="store">📦 0/40</span>
    </div>
    <div class="world-view" id="worldView">
      <div class="world" id="world"></div>
      <div class="pan-hint" id="panHint"></div>
      <div class="toolbar" id="toolbar"></div>
    </div>
  </div>
  <div class="overlay" id="overlay" aria-hidden="true"></div>
  <div class="toast" id="toast"></div>

  <script>
    (function () {
      "use strict";

      var $ = function (id) { return document.getElementById(id); };
      function esc(s) { return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

      /* ======================================================================
       *  CONTENT TABLES
       *  Growth / production / cooking are all time-based (timestamps or
       *  accumulated game-ms) so progress advances across sessions.
       * ==================================================================== */

      // Crops: seed cost (coins), grow time (ms), base sell price, xp on harvest.
      var CROPS = [
        { id: "wheat",      ico: "🌾", seed: 3,  grow: 16000,  sell: 5,  xp: 1, lvl: 1 },

          levelUp: "¡Nivel {n}! Aquí tienes {c} 🪙",
          unlocked: "Desbloqueado:",
          harvested: "+{n} {item}",
          collected: "+{n} {item}",
          cookStarted: "Cocinando {item}…",
          gotCoins: "+{n} 🪙",
          questDone: "¡Pedido completado! +{c} 🪙 +{x} XP",
          names: {
            wheat: "Trigo", carrot: "Zanahoria", potato: "Patata", tomato: "Tomate",
            corn: "Maíz", strawberry: "Fresa", blueberry: "Arándano",
            pumpkin: "Calabaza", eggplant: "Berenjena", grape: "Uvas",
            chili: "Chile", watermelon: "Sandía", pineapple: "Piña",
            tulip: "Tulipán", rose: "Rosa", sunflower: "Girasol",
            daisy: "Margarita", lotus: "Loto",
            egg: "Huevo", milk: "Leche", wool: "Lana", truffle: "Trufa", honey: "Miel",
            bread: "Pan", salad: "Ensalada", omelette: "Tortilla", soup: "Sopa",
            pizza: "Pizza", cake: "Pastel", burger: "Hamburguesa", pie: "Tarta",
            icecream: "Helado", juice: "Zumo",
            honeytea: "Té con miel", pancake: "Tortitas", taco: "Taco",
            chicken: "Gallina", cow: "Vaca", sheep: "Oveja", pig: "Cerdo"
          }
        }
      });

      function name(id) { var n = MG.i18n.t("names"); return (n && n[id]) || id; }
      function tf(key, vars) {
        var s = MG.i18n.t(key);
        if (typeof s !== "string") return s;
        for (var k in vars) if (vars.hasOwnProperty(k)) s = s.replace("{" + k + "}", vars[k]);
        return s;
      }

      /* ======================================================================
       *  SAVE / STATE
       * ==================================================================== */
      var store = MG.storage("farm", {
        version: 5,
        migrations: {
          2: function (d) { return { coins: (d && d.coins) || 25 }; },
          // 2 → 3: greenhouse, fertiliser and the soil/sprinkler upgrades arrive.
          // Defaults are filled in by load(), so the old save passes through.
          3: function (d) { return d || {}; },
          // 3 → 4: apiary (honey), workshop upgrades and the new crops/dishes
          // arrive. load() fills the new defaults, so the old save passes through.
          4: function (d) { return d || {}; },
          // 4 → 5: the barn is gone — animals live in per-type pens (up to 9 each)
          // with optional feeders/collectors. The old global barnCap is dropped;
          // load() fills the new per-pen defaults, so the old save passes through.
          5: function (d) { return d || {}; }
        }
      });

      var state;

      function need(level) { return 60 + (level - 1) * 50; } // XP to reach next level

      // Per-pen state: an optional feeder (auto-feeds from a loaded food stock)
      // and an optional collector (auto-gathers produce into storage).
      function freshPens() {
        var o = {};
        ANIMALS.forEach(function (a) { o[a.type] = { feeder: false, collector: false, feed: 0 }; });
        return o;
      }
      function ensurePen(type) {
        if (!state.pens[type]) state.pens[type] = { feeder: false, collector: false, feed: 0 };
        return state.pens[type];
      }
      function countAnimals(type) {
        var n = 0;
        for (var i = 0; i < state.animals.length; i++) if (state.animals[i].type === type) n++;
        return n;
      }

      function freshState() {
        var plots = [];
        for (var i = 0; i < GRID; i++) plots.push({ crop: null, grown: 0, water: 0, fert: false });
        var pots = [];
        for (var j = 0; j < START_POTS; j++) pots.push(null);
        var s = {
          coins: 25, xp: 0, level: 1, sel: "wheat",
          unlocked: START_PLOTS,
          plots: plots,
          inv: {},
          cap: 40,
          animals: [],
          pens: freshPens(),
          stoves: 1,
          cooks: [null],
          potCap: START_POTS,
          pots: pots,
          hives: [],
          soil: 0,
          sprinkler: 0,
          oven: 0,
          heater: 0,
          trade: 0,
          quests: [],
          prices: {}, marketUntil: 0,
          tab: "village",
          lastSeen: Date.now()
        };
        rollMarket(s, true);
        for (var q = 0; q < 3; q++) s.quests.push(makeQuest(s));
        return s;
      }

      function load() {
        state = freshState();
        var d = store.load();
        if (d && typeof d === "object") {
          if (typeof d.coins === "number" && d.coins >= 0) state.coins = d.coins;
          if (typeof d.xp === "number" && d.xp >= 0) state.xp = d.xp;
          if (typeof d.level === "number" && d.level >= 1) state.level = d.level;
          if (typeof d.unlocked === "number") state.unlocked = Math.max(START_PLOTS, Math.min(GRID, d.unlocked));
          if (typeof d.cap === "number" && d.cap > 0) state.cap = d.cap;
          if (typeof d.stoves === "number" && d.stoves >= 1) state.stoves = d.stoves;
          if (typeof d.potCap === "number" && d.potCap >= START_POTS) state.potCap = Math.min(MAX_POTS, d.potCap);
          if (typeof d.soil === "number" && d.soil >= 0) state.soil = Math.min(MAX_SOIL, Math.floor(d.soil));
          if (typeof d.sprinkler === "number" && d.sprinkler >= 0) state.sprinkler = Math.min(MAX_SPRINKLER, Math.floor(d.sprinkler));
          if (typeof d.oven === "number" && d.oven >= 0) state.oven = Math.min(MAX_OVEN, Math.floor(d.oven));
          if (typeof d.heater === "number" && d.heater >= 0) state.heater = Math.min(MAX_HEATER, Math.floor(d.heater));
          if (typeof d.trade === "number" && d.trade >= 0) state.trade = Math.min(MAX_TRADE, Math.floor(d.trade));
          if (CROP_BY_ID[d.sel] || d.sel === "water" || d.sel === "clear" || d.sel === "fert") state.sel = d.sel;

          if (d.inv && typeof d.inv === "object") {
            state.inv = {};
            for (var k in d.inv) if (ITEM[k] && d.inv[k] > 0) state.inv[k] = Math.floor(d.inv[k]);
          }
          if (Array.isArray(d.plots)) {
            for (var i = 0; i < GRID; i++) {
              var p = d.plots[i] || {};
              var crop = CROP_BY_ID[p.crop] ? p.crop : null;
              state.plots[i] = {
                crop: crop,
                grown: crop ? Math.max(0, +p.grown || 0) : 0,
                water: crop ? Math.max(0, +p.water || 0) : 0,
                fert: crop ? !!p.fert : false
              };
            }
          }
          if (Array.isArray(d.animals)) {
            state.animals = [];
            var animCounts = {};
            d.animals.forEach(function (a) {
              if (a && ANIMAL_BY_ID[a.type]) {
                animCounts[a.type] = animCounts[a.type] || 0;
                if (animCounts[a.type] >= MAX_PER_ANIMAL) return;
                animCounts[a.type]++;
                state.animals.push({
                  type: a.type,
                  grown: Math.max(0, +a.grown || 0),
                  feedUntil: Math.max(0, +a.feedUntil || 0)
                });
              }
            });
          }
          if (d.pens && typeof d.pens === "object") {
            ANIMALS.forEach(function (a) {
              var pd = d.pens[a.type];
              if (pd && typeof pd === "object") {
                state.pens[a.type] = {
                  feeder: !!pd.feeder,
                  collector: !!pd.collector,
                  feed: Math.max(0, Math.min(FEEDER_CAP, Math.floor(+pd.feed || 0)))
                };
              }
            });
          }
          if (Array.isArray(d.cooks)) {
            state.cooks = [];
            for (var c = 0; c < state.stoves; c++) {
              var ck = d.cooks[c];
              if (ck && DISH_BY_ID[ck.dish]) state.cooks.push({ dish: ck.dish, endsAt: +ck.endsAt || 0, total: +ck.total || DISH_BY_ID[ck.dish].cook });
              else state.cooks.push(null);
            }
          } else {
            state.cooks = []; for (var c2 = 0; c2 < state.stoves; c2++) state.cooks.push(null);
          }
          state.pots = [];
          for (var pp = 0; pp < state.potCap; pp++) {
            var pt = Array.isArray(d.pots) ? d.pots[pp] : null;
            if (pt && FLOWER_BY_ID[pt.flower]) state.pots.push({ flower: pt.flower, endsAt: +pt.endsAt || 0, total: +pt.total || FLOWER_BY_ID[pt.flower].grow });
            else state.pots.push(null);
          }
          if (Array.isArray(d.hives)) {
            state.hives = [];
            d.hives.forEach(function (hv) {
              if (state.hives.length < MAX_HIVES) state.hives.push({ grown: Math.max(0, +(hv && hv.grown) || 0) });
            });
          }
          if (Array.isArray(d.quests) && d.quests.length) {
            state.quests = [];
            d.quests.forEach(function (q) {
              if (q && ITEM[q.item] && q.need > 0) state.quests.push(q);
            });
            while (state.quests.length < 3) state.quests.push(makeQuest(state));
          }
          // The village is the home screen; building panels are transient.
          state.tab = "village";
        }

        // Offline progress.
        var now = Date.now();
        var away = now - (+ (d && d.lastSeen) || now);
        if (away > 0) {
          var offMul = soilMul();
          state.plots.forEach(function (pl) {
            if (pl.crop) {
              var g = CROP_BY_ID[pl.crop].grow;
              pl.grown = Math.min(g, pl.grown + away * offMul); // no water bonus offline
              pl.water = 0;
            }
          });
          var seen = +(d && d.lastSeen) || now;
          state.animals.forEach(function (a) {
            var iv = ANIMAL_BY_ID[a.type].interval;
            var fedTime = Math.max(0, Math.min(now, a.feedUntil) - seen);
            // A stocked feeder keeps animals fed while you're away, spending one
            // feed per FEED_MS until the stock (shared across the pen) runs out.
            var pen = state.pens[a.type];
            if (pen && pen.feeder && pen.feed > 0) {
              var gap = away - fedTime;
              if (gap > 0) {
                var used = Math.min(pen.feed, Math.ceil(gap / FEED_MS));
                pen.feed -= used;
                fedTime = Math.min(away, fedTime + used * FEED_MS);
              }
            }
            a.grown = Math.min(iv, a.grown + fedTime);
          });
          // Hives keep filling with honey while you're away (no feeding needed).
          state.hives.forEach(function (hv) { hv.grown = Math.min(HIVE_MS, hv.grown + away); });
        }
        rollMarket(state, false);
      }

      function save() {
        store.save({
          coins: state.coins, xp: state.xp, level: state.level, sel: state.sel,
          unlocked: state.unlocked, cap: state.cap, stoves: state.stoves,
          potCap: state.potCap, soil: state.soil, sprinkler: state.sprinkler,
          oven: state.oven, heater: state.heater, trade: state.trade,
          hives: state.hives.map(function (hv) { return { grown: Math.round(hv.grown) }; }),
          inv: state.inv,
          plots: state.plots.map(function (p) {
            return { crop: p.crop, grown: Math.round(p.grown), water: Math.round(p.water), fert: !!p.fert };
          }),
          animals: state.animals.map(function (a) {
            return { type: a.type, grown: Math.round(a.grown), feedUntil: a.feedUntil };
          }),
          pens: (function () {
            var o = {};
            ANIMALS.forEach(function (a) {
              var p = state.pens[a.type] || {};
              o[a.type] = { feeder: !!p.feeder, collector: !!p.collector, feed: Math.round(p.feed || 0) };
            });
            return o;
          })(),
          cooks: state.cooks.map(function (c) { return c ? { dish: c.dish, endsAt: c.endsAt, total: c.total } : null; }),
          pots: state.pots.map(function (p) { return p ? { flower: p.flower, endsAt: p.endsAt, total: p.total } : null; }),
          quests: state.quests,
          prices: state.prices, marketUntil: state.marketUntil,
          tab: state.tab,
          lastSeen: Date.now()
        });
      }
      var dirty = false;
      function markDirty() { dirty = true; }

      /* ======================================================================
       *  ECONOMY HELPERS
       * ==================================================================== */
      function invCount() { var n = 0; for (var k in state.inv) n += state.inv[k]; return n; }
      function spaceLeft() { return state.cap - invCount(); }
      function addItem(id, n) { state.inv[id] = (state.inv[id] || 0) + n; }
      function takeItem(id, n) {
        var have = state.inv[id] || 0;
        if (have <= n) delete state.inv[id]; else state.inv[id] = have - n;
      }
      function hasRecipe(rec) { for (var k in rec) if ((state.inv[k] || 0) < rec[k]) return false; return true; }
      function held(id) { return state.inv[id] || 0; }

      // A small chip showing how much of an item is currently in storage.
      function stk(id) {
        var n = held(id);
        return '<span class="stk' + (n ? "" : " zero") + '">📦 ' + n + "</span>";
      }

      function isUnlocked(lvl, st) { return (st || state).level >= lvl; }
      function itemUnlocked(id, st) {
        if (CROP_BY_ID[id]) return isUnlocked(CROP_BY_ID[id].lvl, st);
        if (FLOWER_BY_ID[id]) return isUnlocked(FLOWER_BY_ID[id].lvl, st);
        if (DISH_BY_ID[id]) return isUnlocked(DISH_BY_ID[id].lvl, st);
        if (ANIMAL_FOR_PROD[id]) return isUnlocked(ANIMAL_FOR_PROD[id].lvl, st);
        if (id === "honey") return isUnlocked(APIARY_LVL, st);
        return true;
      }

      function price(id) {
        var base = ITEM[id] ? ITEM[id].sell : 0;
        var m = state.prices[id] || 1;
        return Math.max(1, Math.round(base * m * tradeMul()));
      }

      function rollMarket(s, force) {
        if (!force && s.marketUntil && Date.now() < s.marketUntil) return;
        s.prices = {};
        for (var id in ITEM) s.prices[id] = 0.75 + Math.random() * 0.6; // 0.75 – 1.35
        s.marketUntil = Date.now() + MARKET_MS;
      }

      function addXp(n) {
        state.xp += n;
        var leveled = false, last;
        while (state.xp >= need(state.level)) {
          state.xp -= need(state.level);
          state.level++;
          leveled = true;
          last = state.level;
          var bonus = state.level * 12;
          state.coins += bonus;
          toast(tf("levelUp", { n: state.level, c: bonus }));
        }
        if (leveled) {
          var un = unlocksAt(last);
          if (un) setTimeout(function () { toast(MG.i18n.t("unlocked") + " " + un); }, 900);
          ui.setStat("level", state.level);
          ui.stat("level").classList.add("mg-flash");
          setTimeout(function () { ui.stat("level").classList.remove("mg-flash"); }, 400);
        }
      }

      function unlocksAt(level) {
        var out = [];
        CROPS.forEach(function (c) { if (c.lvl === level) out.push(c.ico); });
        FLOWERS.forEach(function (f) { if (f.lvl === level) out.push(f.ico); });
        ANIMALS.forEach(function (a) { if (a.lvl === level) out.push(a.ico); });
        DISHES.forEach(function (d) { if (d.lvl === level) out.push(d.ico); });
        if (level === APIARY_LVL) out.push("🐝");
        return out.join(" ");
      }

      /* ======================================================================
       *  QUESTS
       * ==================================================================== */
      function deliverablePool(st) {
        var ids = [];
        for (var id in ITEM) if (itemUnlocked(id, st)) ids.push(id);
        return ids;
      }
      function makeQuest(s) {
        var pool = deliverablePool(s);
        var taken = {};
        (s.quests || []).forEach(function (q) { if (q) taken[q.item] = true; });
        var fresh = pool.filter(function (id) { return !taken[id]; });
        if (fresh.length) pool = fresh;
        var item = pool[Math.floor(Math.random() * pool.length)] || "wheat";
        var base = ITEM[item].sell;
        var maxN = base > 60 ? 2 : 3;
        var n = 1 + Math.floor(Math.random() * maxN);
        var coins = Math.round(base * n * 1.7) + s.level * 4;
        var xp = Math.max(3, Math.round(base / 4)) * n;
        return { item: item, need: n, coins: coins, xp: xp };
      }

      /* ======================================================================
       *  HEADER + DOM REFS
       * ==================================================================== */
      var ui = MG.mountHeader({
        icon: "🚜",
        titleKey: "title",
        stats: [
          { key: "coins", labelKey: "coins", value: 0 },
          { key: "level", labelKey: "level", value: 1 }
        ],
        actions: [
          {
            key: "new", labelKey: "newFarm", onClick: function () {
              if (window.confirm(MG.i18n.t("confirmReset"))) {
                state = freshState(); save(); render(); syncStats();
              }
            }
          }
        ]
      });

      var worldView = $("worldView");
      var world = $("world");
      var toolbarEl = $("toolbar");
      var overlay = $("overlay");
      var toastEl = $("toast");
      var panHint = $("panHint");

      // Buildings you can step into; each opens as a sliding panel.
      var PANELS = {
        market: { ico: "🏪", title: "tabMarket" },
        pen:    { ico: "🐄", title: "" },
        cook:   { ico: "🍳", title: "tabCook" },
        greenhouse: { ico: "🌻", title: "tabGreenhouse" },
        apiary: { ico: "🐝", title: "tabApiary" },
        quests: { ico: "📋", title: "tabQuests" }
      };
      var overlayTab = null;
      var overlayPenType = null;
      var closeTimer = null;

      var toastTimer = null;
      function toast(msg) {
        toastEl.textContent = msg;
        toastEl.classList.add("show");
        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(function () { toastEl.classList.remove("show"); }, 1500);
      }

      function syncStats() {
        ui.setStat("coins", state.coins);
        ui.setStat("level", state.level);
        $("lvl").textContent = "⭐ " + state.level;
        $("xpfill").style.width = Math.min(100, (state.xp / need(state.level)) * 100) + "%";
        var n = invCount();
        var st = $("store");
        st.textContent = "📦 " + n + "/" + state.cap;
        st.classList.toggle("full", n >= state.cap);
      }

      /* ======================================================================
       *  THE WORLD — geometry & SVG drawing
       *  The scene is drawn in a viewBox of WORLD_W × WORLD_H units; the
       *  .world element is rendered at those units × the cover scale, and
       *  panned with a transform. Overlays are positioned as a percentage
       *  of WORLD_W / WORLD_H so they always sit over their drawing.
       * ==================================================================== */
      var WORLD_W = 1200, WORLD_H = 1080;

      // Interactive buildings. (cx, by) = front-bottom-center; w = footprint.
      var BLD = {
        market: { act: "market", ico: "🏪", cx: 250, by: 380, w: 150, roof: "#d8503f", roof2: "#b53c2d", wall: "#fbe6c9", wall2: "#e3cd9f" },
        cook:   { act: "cook",   ico: "🍞", cx: 950, by: 380, w: 140, roof: "#e0962f", roof2: "#bf7c20", wall: "#fdeccb", wall2: "#ecd6a4" },
        greenhouse: { act: "greenhouse", ico: "🌻", cx: 958, by: 588, w: 116, roof: "#7fc3a0", roof2: "#5fa483", wall: "#e7f6ee", wall2: "#c8e6d6" },
        apiary: { act: "apiary", ico: "🐝", cx: 600, by: 1034, w: 120, roof: "#e0a82f", roof2: "#bf8a20", wall: "#fff0c4", wall2: "#ecd59a" },
        quests: { act: "quests", ico: "🪧", cx: 955, by: 790, w: 130, roof: "#5f8a37", roof2: "#4c7029", wall: "#f3e7c6", wall2: "#dccaa0" }
      };
      // Decorative cottages dotted around the back — just village flavour.
      var DECO = [
        { cx: 560, by: 250, w: 96,  roof: "#c77b3a", roof2: "#a8632b", wall: "#f3e3c0", wall2: "#ddc89c" },
        { cx: 770, by: 228, w: 72,  roof: "#7d96c0", roof2: "#6076a0", wall: "#eef0f4", wall2: "#d3d8e2" },
        { cx: 420, by: 236, w: 80,  roof: "#6f9b46", roof2: "#577a35", wall: "#f3e3c0", wall2: "#ddc89c" }
      ];
      // One fenced pen per animal type, lined up across the front of the scene.
      // Each pen holds only its own kind of animal: tap it to manage the pen,
      // or hold-and-sweep across the animals to collect / feed out on the map.
      var PEN_DEFS = [
        { type: "chicken", L: 400, R: 508, T: 745, B: 880 },
        { type: "cow",     L: 520, R: 628, T: 745, B: 880 },
        { type: "sheep",   L: 640, R: 748, T: 745, B: 880 },
        { type: "pig",     L: 760, R: 868, T: 745, B: 880 }
      ];

      // The crop field: a 5×5 grid of tilled tiles centred on the map.
      var FIELD = { cols: 5, rows: 5, tile: 72, gap: 14, cx: 600, cy: 500 };
      FIELD.fullW = FIELD.cols * FIELD.tile + (FIELD.cols - 1) * FIELD.gap;
      FIELD.fullH = FIELD.rows * FIELD.tile + (FIELD.rows - 1) * FIELD.gap;
      FIELD.startX = FIELD.cx - FIELD.fullW / 2;
      FIELD.startY = FIELD.cy - FIELD.fullH / 2;
      function plotPos(i) {
        var col = i % FIELD.cols, row = Math.floor(i / FIELD.cols);
        return { x: FIELD.startX + col * (FIELD.tile + FIELD.gap), y: FIELD.startY + row * (FIELD.tile + FIELD.gap) };
      }

      function nf(n) { return Math.round(n * 10) / 10; }
      function pf(n) { return Math.round(n * 100) / 100; }

      function geom(b) {
        var w = b.w, cx = b.cx, by = b.by;
        var wh = w * 0.5, rh = w * 0.42, d = w * 0.3, e = w * 0.1, dx = d, dy = -d * 0.5;
        var L = cx - w / 2, R = cx + w / 2, top = by - wh, ridge = top - rh;
        return {
          w: w, cx: cx, by: by, wh: wh, rh: rh, d: d, e: e, dx: dx, dy: dy,
          L: L, R: R, top: top, ridge: ridge,
          minX: L - e, maxX: R + e + dx, minY: ridge + dy, maxY: by
        };
      }

      function svgWindow(x, y, s) {
        return '<rect x="' + nf(x) + '" y="' + nf(y) + '" width="' + nf(s) + '" height="' + nf(s * 0.9) +
          '" rx="' + nf(s * 0.12) + '" fill="rgba(150,210,255,0.85)" stroke="rgba(255,255,255,0.6)" stroke-width="' + nf(s * 0.1) + '"/>';
      }

      // A fake-3D gabled cottage: ground shadow, shaded right face, a front
      // wall (door + windows) and a pitched roof with a lit ridge.
      function svgHouse(b) {
        var g = geom(b), s = "";
        s += '<ellipse cx="' + nf(b.cx + g.dx * 0.4) + '" cy="' + nf(b.by + g.w * 0.02) +
          '" rx="' + nf(g.w * 0.66) + '" ry="' + nf(g.w * 0.15) + '" fill="rgba(0,0,0,0.16)"/>';
        s += '<path d="M' + nf(g.R) + ' ' + nf(g.top) + ' L' + nf(g.R + g.dx) + ' ' + nf(g.top + g.dy) +
          ' L' + nf(g.R + g.dx) + ' ' + nf(g.by + g.dy) + ' L' + nf(g.R) + ' ' + nf(g.by) + 'Z" fill="' + b.wall2 + '"/>';
        s += '<rect x="' + nf(g.L) + '" y="' + nf(g.top) + '" width="' + nf(g.w) + '" height="' + nf(g.wh) + '" fill="' + b.wall + '"/>';
        s += '<rect x="' + nf(g.L) + '" y="' + nf(g.by - g.wh * 0.13) + '" width="' + nf(g.w) + '" height="' + nf(g.wh * 0.13) + '" fill="rgba(0,0,0,0.1)"/>';
        var ww = g.w * 0.16, wy = g.top + g.wh * 0.22;
        s += svgWindow(g.L + g.w * 0.13, wy, ww) + svgWindow(g.R - g.w * 0.13 - ww, wy, ww);
        var dw = g.w * 0.2, dh = g.wh * 0.5;
        s += '<rect x="' + nf(b.cx - dw / 2) + '" y="' + nf(g.by - dh) + '" width="' + nf(dw) + '" height="' + nf(dh) +
          '" rx="' + nf(dw * 0.28) + '" fill="rgba(86,52,24,0.6)"/>';
        s += '<path d="M' + nf(b.cx) + ' ' + nf(g.ridge) + ' L' + nf(b.cx + g.dx) + ' ' + nf(g.ridge + g.dy) +
          ' L' + nf(g.R + g.e + g.dx) + ' ' + nf(g.top + g.dy) + ' L' + nf(g.R + g.e) + ' ' + nf(g.top) + 'Z" fill="' + b.roof2 + '"/>';
        s += '<path d="M' + nf(g.L - g.e) + ' ' + nf(g.top) + ' L' + nf(b.cx) + ' ' + nf(g.ridge) +
          ' L' + nf(g.R + g.e) + ' ' + nf(g.top) + 'Z" fill="' + b.roof + '"/>';
        s += '<path d="M' + nf(b.cx) + ' ' + nf(g.ridge) + ' L' + nf(b.cx + g.dx) + ' ' + nf(g.ridge + g.dy) +
          '" stroke="rgba(255,255,255,0.4)" stroke-width="' + nf(g.w * 0.03) + '" stroke-linecap="round"/>';
        return s;
      }

      function svgTree(x, y, r) {
        return '<ellipse cx="' + nf(x) + '" cy="' + nf(y + r * 0.1) + '" rx="' + nf(r * 1.05) + '" ry="' + nf(r * 0.32) + '" fill="rgba(0,0,0,0.15)"/>' +
          '<rect x="' + nf(x - r * 0.16) + '" y="' + nf(y - r * 0.7) + '" width="' + nf(r * 0.32) + '" height="' + nf(r * 0.9) + '" rx="' + nf(r * 0.12) + '" fill="#8a5a32"/>' +
          '<circle cx="' + nf(x) + '" cy="' + nf(y - r * 1.05) + '" r="' + nf(r * 0.95) + '" fill="#4e9b3f"/>' +
          '<circle cx="' + nf(x - r * 0.45) + '" cy="' + nf(y - r * 0.75) + '" r="' + nf(r * 0.62) + '" fill="#57a948"/>' +
          '<circle cx="' + nf(x + r * 0.45) + '" cy="' + nf(y - r * 0.8) + '" r="' + nf(r * 0.6) + '" fill="#458a39"/>' +
          '<circle cx="' + nf(x - r * 0.3) + '" cy="' + nf(y - r * 1.35) + '" r="' + nf(r * 0.4) + '" fill="#67bd55"/>';
      }

      function svgCloud(x, y, sc) {
        var r = 8 * sc;
        return '<g fill="rgba(255,255,255,0.92)">' +
          '<ellipse cx="' + nf(x) + '" cy="' + nf(y) + '" rx="' + nf(r * 1.6) + '" ry="' + nf(r * 0.7) + '"/>' +
          '<circle cx="' + nf(x - r) + '" cy="' + nf(y) + '" r="' + nf(r * 0.8) + '"/>' +
          '<circle cx="' + nf(x + r) + '" cy="' + nf(y - r * 0.2) + '" r="' + nf(r * 0.9) + '"/>' +
          '<circle cx="' + nf(x) + '" cy="' + nf(y - r * 0.5) + '" r="' + nf(r) + '"/></g>';
      }

      function svgPond(cx, cy, rx, ry) {
        return '<ellipse cx="' + nf(cx) + '" cy="' + nf(cy + ry * 0.18) + '" rx="' + nf(rx * 1.05) + '" ry="' + nf(ry * 1.05) + '" fill="rgba(0,0,0,0.12)"/>' +
          '<ellipse cx="' + nf(cx) + '" cy="' + nf(cy) + '" rx="' + nf(rx) + '" ry="' + nf(ry) + '" fill="url(#pond)"/>' +
          '<ellipse cx="' + nf(cx - rx * 0.25) + '" cy="' + nf(cy - ry * 0.3) + '" rx="' + nf(rx * 0.4) + '" ry="' + nf(ry * 0.3) + '" fill="rgba(255,255,255,0.4)"/>';
      }

      function svgField(cx, cy, w, h, rot) {
        var x = cx - w / 2, y = cy - h / 2;
        return '<g transform="rotate(' + rot + ' ' + nf(cx) + ' ' + nf(cy) + ')">' +
          '<rect x="' + nf(x - 6) + '" y="' + nf(y - 6) + '" width="' + nf(w + 12) + '" height="' + nf(h + 12) + '" rx="10" fill="#6f9c45"/>' +
          '<rect x="' + nf(x) + '" y="' + nf(y) + '" width="' + nf(w) + '" height="' + nf(h) + '" rx="6" fill="url(#furrow)"/>' +
          '</g>';
      }

      function svgFence(x1, x2, y) {
        var s = '<line x1="' + nf(x1) + '" y1="' + nf(y) + '" x2="' + nf(x2) + '" y2="' + nf(y) + '" stroke="#c9a26a" stroke-width="5"/>' +
          '<line x1="' + nf(x1) + '" y1="' + nf(y - 9) + '" x2="' + nf(x2) + '" y2="' + nf(y - 9) + '" stroke="#dab57e" stroke-width="4"/>';
        for (var x = x1; x <= x2 + 0.1; x += 30) s += '<rect x="' + nf(x - 2.5) + '" y="' + nf(y - 16) + '" width="5" height="23" rx="2" fill="#b98e58"/>';
        return s;
      }

      function svgPenRect(L, R, T, B) {
        var s = '<rect x="' + nf(L) + '" y="' + nf(T) + '" width="' + nf(R - L) + '" height="' + nf(B - T) + '" rx="14" fill="#a9d57e"/>' +
          '<rect x="' + nf(L) + '" y="' + nf(T) + '" width="' + nf(R - L) + '" height="' + nf(B - T) + '" rx="14" fill="url(#pengrass)"/>';
        s += svgFence(L, R, T + 6) + svgFence(L, R, B - 2);
        s += '<rect x="' + nf(L - 2.5) + '" y="' + nf(T - 10) + '" width="5" height="' + nf(B - T + 14) + '" rx="2" fill="#b98e58"/>';
        s += '<rect x="' + nf(R - 2.5) + '" y="' + nf(T - 10) + '" width="5" height="' + nf(B - T + 14) + '" rx="2" fill="#b98e58"/>';
        return s;
      }
      function svgPens() {
        var s = "";
        PEN_DEFS.forEach(function (pn) { s += svgPenRect(pn.L, pn.R, pn.T, pn.B); });
        return s;
      }

      // The tilled backing + fence behind the playable crop grid.
      function svgFieldBacking() {
        var x = FIELD.startX - 24, y = FIELD.startY - 24;
        var w = FIELD.fullW + 48, h = FIELD.fullH + 48;
        var s = '<rect x="' + nf(x - 4) + '" y="' + nf(y - 4) + '" width="' + nf(w + 8) + '" height="' + nf(h + 8) + '" rx="20" fill="#6f9c45"/>';
        s += '<rect x="' + nf(x) + '" y="' + nf(y) + '" width="' + nf(w) + '" height="' + nf(h) + '" rx="14" fill="url(#furrow)"/>';
        s += svgFence(x, x + w, y + 4) + svgFence(x, x + w, y + h - 2);
        return s;
      }

      var DEFS = '<defs>' +
        '<linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#9fd9ff"/><stop offset="1" stop-color="#d8f1ff"/></linearGradient>' +
        '<linearGradient id="grass" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#a7d977"/><stop offset="1" stop-color="#79b557"/></linearGradient>' +
        '<radialGradient id="pond" cx="0.5" cy="0.35" r="0.75"><stop offset="0" stop-color="#bdeaf6"/><stop offset="1" stop-color="#5fb6d6"/></radialGradient>' +
        '<pattern id="furrow" width="60" height="22" patternUnits="userSpaceOnUse"><rect width="60" height="22" fill="#8a5630"/><rect width="60" height="9" fill="#6a3f1d"/></pattern>' +
        '<pattern id="pengrass" width="26" height="26" patternUnits="userSpaceOnUse"><rect width="9" height="26" fill="rgba(255,255,255,0.14)"/></pattern>' +
        '</defs>';

      var PATH_D = "M600 1082 C 560 940 700 800 600 640 S 500 460 600 320";

      // Compose the whole scene back-to-front (painter's order = depth).
      function buildScene() {
        var s = DEFS;
        // Sky band, sun, clouds along the horizon at the top of the map.
        s += '<rect x="0" y="0" width="' + WORLD_W + '" height="150" fill="url(#sky)"/>';
        s += '<circle cx="120" cy="92" r="44" fill="#ffe27a"/><circle cx="120" cy="92" r="30" fill="#ffd23f"/>';
        s += svgCloud(560, 70, 3.4) + svgCloud(880, 100, 2.6) + svgCloud(330, 110, 2.2) + svgCloud(1080, 60, 2.8);
        // Rolling hills, then the grass that fills the rest of the world.
        s += '<ellipse cx="240" cy="150" rx="420" ry="80" fill="#8fc265"/><ellipse cx="980" cy="156" rx="380" ry="70" fill="#84b95b"/>';
        s += '<rect x="0" y="138" width="' + WORLD_W + '" height="' + (WORLD_H - 138) + '" fill="url(#grass)"/>';
        // A decorative field behind the village, plus back cottages.
        s += svgField(1010, 235, 200, 96, -8) + svgField(180, 470, 150, 80, 6);
        s += svgHouse(DECO[2]) + svgHouse(DECO[0]) + svgHouse(DECO[1]);
        // Winding dirt path threading through the village.
        s += '<path d="' + PATH_D + '" fill="none" stroke="#d8bd86" stroke-width="64" stroke-linecap="round"/>';
        s += '<path d="' + PATH_D + '" fill="none" stroke="#e7d2a4" stroke-width="36" stroke-linecap="round"/>';
        // Pond and some back trees.
        s += svgPond(300, 205, 84, 40);
        s += svgTree(70, 320, 40) + svgTree(1130, 300, 36) + svgTree(720, 300, 30);
        // The playable field backing (tiles are HTML overlays on top).
        s += svgFieldBacking();
        // Interactive buildings — back row, the mid greenhouse, then front row.
        s += svgHouse(BLD.market) + svgHouse(BLD.cook);
        s += svgHouse(BLD.greenhouse);
        s += svgHouse(BLD.quests);
        // The animal pens and a couple of front trees.
        s += svgPens();
        // The apiary sits front-and-centre below the pens.
        s += svgHouse(BLD.apiary);
        s += svgTree(90, 760, 46) + svgTree(1130, 700, 42) + svgTree(1130, 1010, 38) + svgTree(150, 1010, 40);
        return s;
      }

      /* ----------------------------- OVERLAYS ------------------------------ */
      // A transparent tap target over a drawn building, carrying its shop sign
      // (icon + name + a live status line) and an optional ready badge.
      function hotspot(b, title, sub, badge) {
        var g = geom(b);
        var left = g.minX / WORLD_W * 100, top = g.minY / WORLD_H * 100;
        var w = (g.maxX - g.minX) / WORLD_W * 100, h = (g.maxY - g.minY) / WORLD_H * 100;
        return '<button class="hotspot" data-act="open" data-arg="' + b.act + '" ' +
          'style="left:' + pf(left) + '%;top:' + pf(top) + '%;width:' + pf(w) + '%;height:' + pf(h) + '%">' +
          (badge ? '<span class="b-badge">' + badge + "</span>" : "") +
          '<span class="sign"><span class="si">' + b.ico + "</span>" +
            '<span class="st">' + esc(title) + "</span>" +
            (sub ? '<span class="ss">' + esc(sub) + "</span>" : "") +
          "</span></button>";
      }

      // One overlay per animal pen: a label tag plus the animals living there
      // as individual hold-and-sweep cells (data-animcell = index into
      // state.animals). Tapping a pen opens its panel; sweeping the animals
      // collects / feeds by hand. Locked pens show the level gate.
      function penHotspots() {
        var html = "";
        PEN_DEFS.forEach(function (pn) {
          var def = ANIMAL_BY_ID[pn.type];
          var pen = state.pens[pn.type] || {};
          var left = pn.L / WORLD_W * 100, top = pn.T / WORLD_H * 100;
          var w = (pn.R - pn.L) / WORLD_W * 100, h = (pn.B - pn.T) / WORLD_H * 100;
          var locked = !isUnlocked(def.lvl);
          var mine = [];
          state.animals.forEach(function (a, i) { if (a.type === pn.type) mine.push({ a: a, i: i }); });

          var act = "openpen", arg = pn.type, inner = "", ready = 0;
          if (locked) {
            act = "penlocked";
            inner = '<span class="pen-lock">🔒 ' + esc(tf("lvl", { n: def.lvl })) + "</span>";
          } else if (!mine.length) {
            inner = '<span class="pen-buy"><span class="pi">' + def.ico + "</span>🛒</span>";
          } else {
            inner = '<span class="pen-animals">';
            mine.forEach(function (m) {
              var rdy = m.a.grown >= def.interval;
              var fed = Date.now() < m.a.feedUntil;
              if (rdy) ready++;
              inner += '<span class="an' + (rdy ? " rdy" : (fed ? " fed" : " hungry")) +
                '" data-animcell="' + m.i + '">' + def.ico +
                (rdy ? '<span class="prod">' + ITEM[def.prod].ico + "</span>" : "") + "</span>";
            });
            inner += "</span>";
          }

          var auto = (pen.feeder ? "🍽️" : "") + (pen.collector ? "🧺" : "");
          var tag = '<span class="pen-tag">' + def.ico + " " + esc(name(pn.type)) +
            (mine.length ? " ×" + mine.length : "") + (auto ? " " + auto : "") + "</span>";
          html += '<button class="hotspot pen-hot' + (locked ? " locked" : "") + '" data-act="' + act + '"' +
            ' data-arg="' + arg + '"' +
            ' style="left:' + pf(left) + '%;top:' + pf(top) + '%;width:' + pf(w) + '%;height:' + pf(h) + '%">' +
            (ready ? '<span class="b-badge">' + ready + "</span>" : "") +
            tag + inner + "</button>";
        });
        return html;
      }

      function plotSprite(p) {
        var c = CROP_BY_ID[p.crop];
        var f = p.grown / c.grow;
        if (f >= 1) return c.ico;
        if (f < 0.33) return SEED_SPRITE;
        if (f < 0.66) return SPROUT_SPRITE;
        return LEAF_SPRITE;
      }

      // The 25 crop tiles, laid over the tilled field backing.
      function renderPlots() {
        var h = "";
        var lw = FIELD.tile / WORLD_W * 100, lh = FIELD.tile / WORLD_H * 100;
        for (var i = 0; i < GRID; i++) {
          var pos = plotPos(i);
          var left = pos.x / WORLD_W * 100, top = pos.y / WORLD_H * 100;
          var style = 'style="left:' + pf(left) + '%;top:' + pf(top) + '%;width:' + pf(lw) + '%;height:' + pf(lh) + '%"';
          if (i >= state.unlocked) {
            var canBuy = i === state.unlocked;
            h += '<button class="plot locked" data-plotcell="' + i + '" data-act="' + (canBuy ? "buyplot" : "noop") + '" ' + style + ' aria-label="locked">' +
              '<span class="sprite">' + (canBuy ? "🔓" : "🔒") + "</span>" +
              (canBuy ? '<span class="pcost">🪙 ' + plotCost() + "</span>" : "") + "</button>";
            continue;
          }
          var p = state.plots[i];
          var cls = "plot", spr = "", w = "0";
          if (p.crop) {
            var c = CROP_BY_ID[p.crop];
            var rdy = p.grown >= c.grow;
            cls += rdy ? " ready" : (p.water > 0 ? " watered" : "");
            if (p.fert) cls += " fert";
            spr = plotSprite(p);
            w = Math.min(100, (p.grown / c.grow) * 100).toFixed(1);
          } else { cls += " empty"; }
          h += '<button class="' + cls + '" data-plotcell="' + i + '" data-act="plot" data-arg="' + i + '" ' + style + '>' +
            '<span class="sprite">' + spr + "</span>" +
            '<span class="bar"><i style="width:' + w + '%"></i></span></button>';
        }
        return h;
      }
      function plotCost() { return 40 + (state.unlocked - START_PLOTS) * 40; }

      // The seed / tool selector that floats along the bottom of the map.
      function renderToolbar() {
        var h = "";
        CROPS.forEach(function (c) {
          var lock = !isUnlocked(c.lvl);
          var sel = state.sel === c.id ? " selected" : "";
          h += '<button class="tool' + sel + (lock ? " locked" : "") + '" data-act="seed" data-arg="' + c.id + '">' +
            '<span class="ico">' + c.ico + "</span>" +
            '<span class="name">' + esc(name(c.id)) + "</span>" +
            (lock ? '<span class="cost lock">🔒 ' + tf("lvl", { n: c.lvl }) + "</span>"
                  : '<span class="cost">🪙 ' + c.seed + "</span>") +
            stk(c.id) +
            "</button>";
        });
        h += '<button class="tool' + (state.sel === "water" ? " selected" : "") + '" data-act="seed" data-arg="water">' +
          '<span class="ico">💧</span><span class="name">' + esc(MG.i18n.t("water")) + '</span><span class="cost">·</span></button>';
        h += '<button class="tool' + (state.sel === "fert" ? " selected" : "") + '" data-act="seed" data-arg="fert">' +
          '<span class="ico">💩</span><span class="name">' + esc(MG.i18n.t("fert")) + '</span><span class="cost">🪙 ' + FERT_COST + "</span></button>";
        h += '<button class="tool' + (state.sel === "clear" ? " selected" : "") + '" data-act="seed" data-arg="clear">' +
          '<span class="ico">🧺</span><span class="name">' + esc(MG.i18n.t("clear")) + '</span><span class="cost">·</span></button>';
        return h;
      }

      /* ======================================================================
       *  PAN / SCALE — keep the world covering the viewport, allow dragging.
       * ==================================================================== */
      var tx = 0, ty = 0, scale = 1, scaledW = 0, scaledH = 0, centered = false;

      function ensureScale() {
        var vw = worldView.clientWidth, vh = worldView.clientHeight;
        if (!vw || !vh) return;
        scale = Math.max(vw / WORLD_W, vh / WORLD_H);
        scaledW = WORLD_W * scale;
        scaledH = WORLD_H * scale;
        if (!centered) { tx = (vw - scaledW) / 2; ty = (vh - scaledH) / 2; centered = true; }
        clampPan();
      }
      function clampPan() {
        var vw = worldView.clientWidth, vh = worldView.clientHeight;
        // Reserve room at the bottom for the floating toolbar so the lowest
        // crop tiles and pens can always be panned out from under it.
        var inset = toolbarEl ? toolbarEl.offsetHeight : 0;
        var minX = vw - scaledW, minY = vh - scaledH - inset;
        if (tx > 0) tx = 0; if (tx < minX) tx = minX;
        if (ty > 0) ty = 0; if (ty < minY) ty = minY;
      }
      function applyWorld() {
        world.style.width = scaledW + "px";
        world.style.height = scaledH + "px";
        world.style.transform = "translate(" + Math.round(tx) + "px," + Math.round(ty) + "px)";
      }

      /* ======================================================================
       *  RENDER — the world is always the base; a building panel may slide up.
       * ==================================================================== */
      function render() {
        ensureScale();
        var tbScroll = toolbarEl.scrollLeft;
        world.innerHTML =
          '<svg viewBox="0 0 ' + WORLD_W + " " + WORLD_H + '" preserveAspectRatio="none" aria-hidden="true">' + buildScene() + "</svg>" +
          hotspot(BLD.market, MG.i18n.t("tabMarket"), "🪙 " + state.coins, "") +
          hotspot(BLD.cook, MG.i18n.t("tabCook"), cookStatus(), readyCounts().cook || "") +
          hotspot(BLD.greenhouse, MG.i18n.t("tabGreenhouse"), greenhouseStatus(), readyCounts().pot || "") +
          hotspot(BLD.apiary, MG.i18n.t("tabApiary"), apiaryStatus(), readyCounts().hive || "") +
          hotspot(BLD.quests, MG.i18n.t("tabQuests"), "🎁 " + readyCounts().fillable + "/" + state.quests.length, readyCounts().fillable || "") +
          penHotspots() +
          renderPlots();
        applyWorld();
        toolbarEl.innerHTML = renderToolbar();
        toolbarEl.scrollLeft = tbScroll;
        renderOverlay();
        syncStats();
      }

      function cookStatus() {
        var cooking = 0;
        state.cooks.forEach(function (c) { if (c && Date.now() < c.endsAt) cooking++; });
        return "🍳 " + state.stoves + (cooking ? " · ⏲️ " + cooking : "");
      }
      function greenhouseStatus() {
        var growing = 0;
        state.pots.forEach(function (p) { if (p && Date.now() < p.endsAt) growing++; });
        return "🌷 " + state.potCap + (growing ? " · ⏲️ " + growing : "");
      }
      function apiaryStatus() {
        if (!isUnlocked(APIARY_LVL)) return "🔒 " + tf("lvl", { n: APIARY_LVL });
        return "🍯 " + state.hives.length + "/" + MAX_HIVES;
      }
      function readyCounts() {
        var cook = 0;
        state.cooks.forEach(function (c) { if (c && Date.now() >= c.endsAt) cook++; });
        var pot = 0;
        state.pots.forEach(function (p) { if (p && Date.now() >= p.endsAt) pot++; });
        var pen = 0;
        state.animals.forEach(function (a) { if (a.grown >= ANIMAL_BY_ID[a.type].interval) pen++; });
        var hive = 0;
        state.hives.forEach(function (hv) { if (hv.grown >= HIVE_MS) hive++; });
        var fillable = 0;
        state.quests.forEach(function (q) { if (q && (state.inv[q.item] || 0) >= q.need) fillable++; });
        return { cook: cook, pot: pot, pen: pen, hive: hive, fillable: fillable };
      }

      // Mount / refresh the sliding building panel (same behaviour as before).
      function renderOverlay() {
        var tab = state.tab;
        if (!PANELS[tab]) {
          if (overlayTab !== null) {
            overlay.className = "overlay";
            overlay.setAttribute("aria-hidden", "true");
            overlayTab = null;
            if (closeTimer) clearTimeout(closeTimer);
            closeTimer = setTimeout(function () {
              closeTimer = null;
              if (!PANELS[state.tab]) overlay.innerHTML = "";
            }, 260);
          }
          return;
        }
        if (closeTimer) { clearTimeout(closeTimer); closeTimer = null; }
        var body = tab === "market" ? renderMarket()
                 : tab === "pen"    ? renderPen(state.penType)
                 : tab === "cook"   ? renderCook()
                 : tab === "greenhouse" ? renderGreenhouse()
                 : tab === "apiary" ? renderApiary()
                 : renderQuests();
        // The pen panel's icon / title depend on which animal you tapped, so a
        // change of pen type counts as a fresh panel even when the tab is "pen".
        var fresh = overlayTab !== tab || (tab === "pen" && overlayPenType !== state.penType);
        if (fresh) {
          var p = PANELS[tab];
          var ico = tab === "pen" ? ANIMAL_BY_ID[state.penType].ico : p.ico;
          var ttl = tab === "pen" ? name(state.penType) : MG.i18n.t(p.title);
          overlay.innerHTML =
            '<div class="sheet">' +
              '<div class="sheet-head">' +
                '<span class="sh-ico">' + ico + "</span>" +
                '<span class="sh-ttl">' + esc(ttl) + "</span>" +
                '<button class="sh-close" data-act="close" aria-label="close">✕</button>' +
              "</div>" +
              '<div class="sheet-body"><div class="wrap" id="sheetwrap">' + body + "</div></div>" +
            "</div>";
          overlay.removeAttribute("aria-hidden");
          void overlay.offsetWidth;
          overlay.className = "overlay show";
          overlayTab = tab;
          overlayPenType = state.penType;
        } else {
          var w = $("sheetwrap");
          if (w) w.innerHTML = body;
        }
      }

      function tipLine(key) { return '<div class="tip">' + esc(MG.i18n.t(key)) + "</div>"; }

      // A full-width "Collect all" button shown above a building's slots when
      // anything is ready to gather; `kind` routes the action (cook/pot/hive/pen).
      function collectAllBar(kind, count) {
        if (!count) return "";
        return '<div class="collect-all"><button class="btn go" data-act="collectall" data-arg="' + kind + '">' +
          esc(MG.i18n.t("collectAll")) + " (" + count + ")</button></div>";
      }
      // A slim summary card standing in for N empty slots, so panels don't grow
      // a long tail of blank stoves / pots to scroll past.
      function freeSlotsCard(ico, n) {
        if (!n) return "";
        return '<div class="card slim"><span class="big">' + ico + '</span>' +
          '<div class="body"><div class="sub">' + esc(tf("freeSlots", { n: n })) + "</div></div></div>";
      }

      /* -------------------------------- PEN -------------------------------- */
      // Per-animal management: buy more (up to MAX_PER_ANIMAL), run the pen with
      // a feeder (auto-feeds from a loaded food stock) and a collector
      // (auto-gathers produce), or collect ripe produce by hand in one tap.
      function renderPen(type) {
        var def = ANIMAL_BY_ID[type];
        if (!def) return tipLine("tipPen");
        var pen = ensurePen(type);
        var mine = [];
        state.animals.forEach(function (a) { if (a.type === type) mine.push(a); });
        var count = mine.length, ready = 0, fedN = 0, prog = 0;
        mine.forEach(function (a) {
          if (a.grown >= def.interval) ready++;
          if (Date.now() < a.feedUntil) fedN++;
          prog += Math.min(1, a.grown / def.interval);
        });

        var h = tipLine("tipPen");

        // ---- Summary + collect-all -------------------------------------------
        if (!count) {
          h += '<div class="empty-note">' + def.ico + "<br>" + esc(MG.i18n.t("penEmpty")) + "</div>";
        } else {
          var statusBadge = ready
            ? '<span class="badge ready">' + ITEM[def.prod].ico + " ×" + ready + "</span>"
            : '<span class="badge ' + (fedN === count ? "" : "lock") + '">' + fedN + "/" + count + " " + esc(MG.i18n.t("fed")) + "</span>";
          var pct = (prog / count * 100).toFixed(1);
          h += '<div class="card"><span class="big">' + def.ico + '</span><div class="body">' +
            '<div class="ttl">' + esc(name(type)) + ' <span class="badge lock">' + esc(tf("owned", { n: count, max: MAX_PER_ANIMAL })) + "</span> " + statusBadge + "</div>" +
            '<div class="sub">' + ITEM[def.prod].ico + " " + esc(name(def.prod)) + " " + stk(def.prod) + "</div>" +
            '<div class="pbar"><i style="width:' + pct + '%"></i></div></div>' +
            '<div class="right"><button class="btn go sm" data-act="collectall" data-arg="pen"' + (ready ? "" : " disabled") + ">" +
              esc(MG.i18n.t("collectAll")) + "</button></div></div>";
        }

        // ---- Buy more --------------------------------------------------------
        if (count < MAX_PER_ANIMAL) {
          h += '<div class="card"><span class="big">🛒</span><div class="body">' +
            '<div class="ttl">' + esc(MG.i18n.t("buyAnimal")) + " " + def.ico + " " + esc(name(type)) + "</div>" +
            '<div class="sub">' + ITEM[def.prod].ico + " " + esc(name(def.prod)) + " · 🍽️ " + ITEM[def.feed].ico + " " + esc(name(def.feed)) + "</div></div>" +
            '<div class="right"><button class="btn sm" data-act="buyanimal" data-arg="' + type + '"' + (state.coins >= def.cost ? "" : " disabled") + ">🪙 " + def.cost + "</button></div></div>";
        } else {
          h += '<div class="card"><span class="big">🛒</span><div class="body">' +
            '<div class="ttl">' + esc(name(type)) + "</div></div>" +
            '<div class="right"><span class="badge lock">' + esc(tf("penFull", { n: MAX_PER_ANIMAL })) + "</span></div></div>";
        }

        // ---- Feeder (load food → animals auto-feed) --------------------------
        if (!pen.feeder) {
          var fc = feederCost(type);
          h += '<div class="card"><span class="big">🍽️</span><div class="body">' +
            '<div class="ttl">' + esc(MG.i18n.t("feeder")) + "</div>" +
            '<div class="sub">' + esc(tf("feederSub", { item: ITEM[def.feed].ico, name: name(def.feed) })) + "</div></div>" +
            '<div class="right"><button class="btn sm" data-act="buyfeeder" data-arg="' + type + '"' + (state.coins >= fc ? "" : " disabled") + ">🪙 " + fc + "</button></div></div>";
        } else {
          var feedHave = state.inv[def.feed] || 0;
          var fpct = (pen.feed / FEEDER_CAP * 100).toFixed(1);
          h += '<div class="card"><span class="big">🍽️</span><div class="body">' +
            '<div class="ttl">' + esc(MG.i18n.t("feeder")) + ' <span class="badge ready">' + esc(MG.i18n.t("autoFeed")) + "</span></div>" +
            '<div class="sub">' + ITEM[def.feed].ico + " " + pen.feed + "/" + FEEDER_CAP + " · 📦 " + feedHave + "</div>" +
            '<div class="pbar"><i style="width:' + fpct + '%"></i></div></div>' +
            '<div class="right"><button class="btn alt sm" data-act="loadfeed" data-arg="' + type + '"' + (feedHave > 0 && pen.feed < FEEDER_CAP ? "" : " disabled") + ">" +
              esc(MG.i18n.t("loadFeed")) + " " + ITEM[def.feed].ico + "</button></div></div>";
        }

        // ---- Collector (auto-gathers produce) --------------------------------
        if (!pen.collector) {
          var cc = collectorCost(type);
          h += '<div class="card"><span class="big">🧺</span><div class="body">' +
            '<div class="ttl">' + esc(MG.i18n.t("collector")) + "</div>" +
            '<div class="sub">' + esc(MG.i18n.t("collectorSub")) + "</div></div>" +
            '<div class="right"><button class="btn sm" data-act="buycollector" data-arg="' + type + '"' + (state.coins >= cc ? "" : " disabled") + ">🪙 " + cc + "</button></div></div>";
        } else {
          h += '<div class="card"><span class="big">🧺</span><div class="body">' +
            '<div class="ttl">' + esc(MG.i18n.t("collector")) + ' <span class="badge ready">' + esc(MG.i18n.t("autoCollect")) + "</span></div>" +
            '<div class="sub">' + esc(MG.i18n.t("collectorSub")) + "</div></div></div>";
        }
        return h;
      }
      function feederCost(type) { return Math.round(ANIMAL_BY_ID[type].cost * 1.4); }
      function collectorCost(type) { return Math.round(ANIMAL_BY_ID[type].cost * 1.8); }

      /* ------------------------------- KITCHEN ----------------------------- */
      function renderCook() {
        var h = tipLine("tipCook");

        h += '<div class="section-h">' + esc(MG.i18n.t("stoves")) + " (" + state.stoves + ")</div>";
        h += collectAllBar("cook", readyCounts().cook);
        var freeStoves = 0;
        state.cooks.forEach(function (c, i) {
          if (!c) { freeStoves++; return; }
          var def = DISH_BY_ID[c.dish];
          var total = c.total || def.cook;
          var left = Math.max(0, c.endsAt - Date.now());
          var ready = left <= 0;
          var pct = Math.min(100, ((total - left) / total) * 100).toFixed(1);
          h += '<div class="card" data-cook="' + i + '"><span class="big">' + def.ico + '</span><div class="body">' +
            '<div class="ttl">' + esc(name(c.dish)) + " " + stk(c.dish) +
              (ready ? ' <span class="badge ready">✓</span>' : ' <span class="badge">' + fmtTime(left) + "</span>") + "</div>" +
            '<div class="pbar' + (ready ? "" : " warm") + '" data-cbar="' + i + '"><i style="width:' + pct + '%"></i></div></div>' +
            '<div class="right"><button class="btn go sm" data-act="collectcook" data-arg="' + i + '"' + (ready ? "" : " disabled") + ">" +
              esc(MG.i18n.t("collect")) + "</button></div></div>";
        });
        h += freeSlotsCard("🍳", freeStoves);

        h += '<div class="section-h">' + esc(MG.i18n.t("recipes")) + "</div>";
        var freeStove = state.cooks.some(function (c) { return !c; });
        DISHES.forEach(function (d) {
          var lock = !isUnlocked(d.lvl);
          var can = hasRecipe(d.recipe);
          var ings = "";
          for (var k in d.recipe) {
            var miss = (state.inv[k] || 0) < d.recipe[k];
            ings += '<span class="ing' + (miss ? " miss" : "") + '">' + ITEM[k].ico + " " +
              (state.inv[k] || 0) + "/" + d.recipe[k] + "</span>";
          }
          h += '<div class="card' + (lock ? " locked" : "") + '"><span class="big">' + d.ico + '</span><div class="body">' +
            '<div class="ttl">' + esc(name(d.id)) + " " + stk(d.id) + ' <span class="badge lock">+' + d.xp + " XP</span></div>" +
            (lock ? '<div class="sub">🔒 ' + esc(tf("needLevel", { n: d.lvl })) + "</div>"
                  : '<div class="ingredients">' + ings + "</div>") +
            "</div><div class='right'>" +
            (lock ? "" : '<button class="btn sm" data-act="cook" data-arg="' + d.id + '"' +
              (can && freeStove ? "" : " disabled") + ">" + esc(MG.i18n.t("cook")) + "</button>") +
            "</div></div>";
        });
        return h;
      }
      function fmtTime(ms) {
        var s = Math.ceil(ms / 1000);
        if (s < 60) return s + "s";
        return Math.floor(s / 60) + ":" + ("0" + (s % 60)).slice(-2);
      }

      /* ----------------------------- GREENHOUSE ---------------------------- */
      // Flower pots mirror the kitchen's stoves: plant a flower into a free pot,
      // it grows on a timer, then you collect the bloom into storage.
      function renderGreenhouse() {
        var h = tipLine("tipGreenhouse");

        h += '<div class="section-h">' + esc(MG.i18n.t("pots")) + " (" + state.potCap + ")</div>";
        h += collectAllBar("pot", readyCounts().pot);
        var freePots = 0;
        state.pots.forEach(function (p, i) {
          if (!p) { freePots++; return; }
          var def = FLOWER_BY_ID[p.flower];
          var total = p.total || def.grow;
          var left = Math.max(0, p.endsAt - Date.now());
          var ready = left <= 0;
          var pct = Math.min(100, ((total - left) / total) * 100).toFixed(1);
          h += '<div class="card" data-pot="' + i + '"><span class="big">' + def.ico + '</span><div class="body">' +
            '<div class="ttl">' + esc(name(p.flower)) + " " + stk(p.flower) +
              (ready ? ' <span class="badge ready">✓</span>' : ' <span class="badge">' + fmtTime(left) + "</span>") + "</div>" +
            '<div class="pbar' + (ready ? "" : " warm") + '" data-potbar="' + i + '"><i style="width:' + pct + '%"></i></div></div>' +
            '<div class="right"><button class="btn go sm" data-act="collectpot" data-arg="' + i + '"' + (ready ? "" : " disabled") + ">" +
              esc(MG.i18n.t("collect")) + "</button></div></div>";
        });
        h += freeSlotsCard("🪴", freePots);
        if (state.potCap < MAX_POTS) {
          h += upgradeCard("pot", "🪴", MG.i18n.t("buyPot"), state.potCap + " → " + (state.potCap + 1), potCost());
        }

        h += '<div class="section-h">' + esc(MG.i18n.t("flowers")) + "</div>";
        var freePot = state.pots.some(function (p) { return !p; });
        FLOWERS.forEach(function (f) {
          var lock = !isUnlocked(f.lvl);
          var canPay = state.coins >= f.seed;
          h += '<div class="card' + (lock ? " locked" : "") + '"><span class="big">' + f.ico + '</span><div class="body">' +
            '<div class="ttl">' + esc(name(f.id)) + " " + stk(f.id) + ' <span class="badge lock">+' + f.xp + " XP</span></div>" +
            (lock ? '<div class="sub">🔒 ' + esc(tf("needLevel", { n: f.lvl })) + "</div>"
                  : '<div class="sub">🪙 ' + f.seed + " · ⏲️ " + fmtTime(f.grow) + " · " + priceHtml(f.id) + "</div>") +
            "</div><div class='right'>" +
            (lock ? "" : '<button class="btn sm" data-act="plant" data-arg="' + f.id + '"' +
              (canPay && freePot ? "" : " disabled") + ">" + esc(MG.i18n.t("plant")) + "</button>") +
            "</div></div>";
        });
        return h;
      }
      function potCost() { return 70 + (state.potCap - START_POTS) * 90; }

      /* ------------------------------- APIARY ------------------------------ */
      // Beehives mirror animals but need no feeding: each fills with honey on a
      // timer, then you collect a jar. Buy more hives up to MAX_HIVES.
      function renderApiary() {
        var h = tipLine("tipApiary");
        h += '<div class="section-h">' + esc(MG.i18n.t("hives")) + " (" + state.hives.length + "/" + MAX_HIVES + ")</div>";
        if (!state.hives.length) {
          h += '<div class="empty-note">🐝🍯<br>' + esc(MG.i18n.t("apiaryEmpty")) + "</div>";
        }
        h += collectAllBar("hive", readyCounts().hive);
        var honey = ITEM.honey;
        state.hives.forEach(function (hv, i) {
          var ready = hv.grown >= HIVE_MS;
          var left = Math.max(0, HIVE_MS - hv.grown);
          var pct = Math.min(100, (hv.grown / HIVE_MS) * 100).toFixed(1);
          h += '<div class="card" data-hive="' + i + '"><span class="big">🐝</span><div class="body">' +
            '<div class="ttl">' + honey.ico + " " + esc(name("honey")) + " " + stk("honey") +
              (ready ? ' <span class="badge ready">' + honey.ico + "</span>" : ' <span class="badge">' + fmtTime(left) + "</span>") + "</div>" +
            '<div class="pbar' + (ready ? "" : " warm") + '" data-hivebar="' + i + '"><i style="width:' + pct + '%"></i></div></div>' +
            '<div class="right"><button class="btn go sm" data-act="collecthive" data-arg="' + i + '"' + (ready ? "" : " disabled") + ">" +
              esc(MG.i18n.t("collect")) + "</button></div></div>";
        });
        if (state.hives.length < MAX_HIVES) {
          h += upgradeCard("hive", "🐝", MG.i18n.t("buyHive"), state.hives.length + " → " + (state.hives.length + 1), hiveCost());
        }
        return h;
      }
      function hiveCost() { return 90 + state.hives.length * 120; }

      /* ------------------------------- MARKET ------------------------------ */
      function priceHtml(id) {
        var m = state.prices[id] || 1;
        var arrow = m > 1.08 ? '<span class="up">▲</span>' : m < 0.92 ? '<span class="down">▼</span>' : "";
        return '<span class="price">🪙 ' + price(id) + " " + arrow + "</span>";
      }
      function renderMarket() {
        var h = tipLine("tipMarket");

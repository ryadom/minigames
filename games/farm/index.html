<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>🚜 Farm — Minigames</title>
  <meta name="description" content="Run a little farm — grow crops, raise animals, cook dishes, fill orders and trade at the market. Pan around a top-down village. Play in your browser, no installs." />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚜</text></svg>" />

  <!-- Shared chrome: header bar + language control. -->
  <link rel="stylesheet" href="../../shared/mg.css" />
  <script src="../../shared/mg.js"></script>

  <!-- Game-specific styles. -->
  <link rel="stylesheet" href="farm.css" />
</head>
<body class="mg-app">
  <!-- Header is mounted by the shared runtime (see MG.mountHeader in js/main.js). -->
  <div class="mg-game-area">
    <div class="status">
      <span class="lvl" id="lvl">⭐ 1</span>
      <span class="xpwrap"><i id="xpfill"></i></span>
      <span class="store" id="store">📦 0/40</span>
    </div>
    <div class="world-view" id="worldView">
      <div class="world" id="world"></div>
      <div class="pan-hint" id="panHint"></div>
      <div class="toolbar" id="toolbar"></div>
    </div>
  </div>
  <div class="overlay" id="overlay" aria-hidden="true"></div>
  <div class="toast" id="toast"></div>

  <!--
    The game is split into focused modules sharing one window.Farm namespace.
    Load order matters only for the static content each file aliases up front;
    all cross-module wiring is deferred to boot (see js/config.js → Farm.ready).
      config   — namespace bootstrap, tuning constants, content tables
      i18n     — translations + name/tf helpers
      economy  — inventory, pricing, market, XP, quests, cost curves
      scene    — the SVG world (pure drawing)
      state    — canonical game state + versioned save/load
      view     — all rendering (world overlays, building panels, live patch)
      actions  — the command layer (player actions + dispatcher)
      input    — world-view controller (scale, pan, sweep gestures, taps)
      main     — header, DOM wiring, the real-time tick loop & boot
  -->
  <script src="js/config.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/economy.js"></script>
  <script src="js/scene.js"></script>
  <script src="js/state.js"></script>
  <script src="js/view.js"></script>
  <script src="js/actions.js"></script>
  <script src="js/input.js"></script>
  <script src="js/main.js"></script>
</body>
</html>

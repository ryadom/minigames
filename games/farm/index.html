        h += '<div class="section-h">' + esc(MG.i18n.t("mSell")) + "</div>";
        var ids = [];
        for (var id in ITEM) if (state.inv[id]) ids.push(id);
        ids.sort(function (a, b) { return price(b) - price(a); });
        if (!ids.length) {
          h += '<div class="empty-note">' + esc(MG.i18n.t("emptyStore")) + "</div>";
        } else {
          ids.forEach(function (id) {
            h += '<div class="card"><span class="big">' + ITEM[id].ico + '</span><div class="body">' +
              '<div class="ttl">' + esc(name(id)) + " " + stk(id) + "</div>" +
              '<div class="sub">' + priceHtml(id) + "</div></div>" +
              '<div class="right" style="flex-direction:row">' +
              '<button class="btn alt sm" data-act="sell" data-arg="' + id + '">' + esc(MG.i18n.t("sell")) + "</button>" +
              '<button class="btn sm" data-act="sellall" data-arg="' + id + '">' + esc(MG.i18n.t("sellAll")) + "</button>" +
              "</div></div>";
          });
        }

        h += '<div class="section-h">' + esc(MG.i18n.t("mAnimals")) + "</div>";
        ANIMALS.forEach(function (a) {
          var lock = !isUnlocked(a.lvl);
          var owned = countAnimals(a.type);
          var full = owned >= MAX_PER_ANIMAL;
          var can = !lock && !full && state.coins >= a.cost;
          h += '<div class="card' + (lock ? " locked" : "") + '"><span class="big">' + a.ico + '</span><div class="body">' +
            '<div class="ttl">' + esc(name(a.id)) + ' <span class="badge lock">' + esc(tf("owned", { n: owned, max: MAX_PER_ANIMAL })) + "</span></div>" +
            (lock ? '<div class="sub">🔒 ' + esc(tf("needLevel", { n: a.lvl })) + "</div>"
                  : '<div class="sub">' + ITEM[a.prod].ico + " " + esc(name(a.prod)) + " " + stk(a.prod) +
                    " · 🍽️ " + ITEM[a.feed].ico + " " + esc(name(a.feed)) + " " + stk(a.feed) + "</div>") +
            "</div><div class='right'>" +
            (lock ? ""
                  : full ? '<span class="badge lock">' + esc(tf("penFull", { n: MAX_PER_ANIMAL })) + "</span>"
                         : '<button class="btn sm" data-act="buyanimal" data-arg="' + a.id + '"' +
                           (can ? "" : " disabled") + ">🪙 " + a.cost + "</button>") +
            "</div></div>";
        });

        h += '<div class="section-h">' + esc(MG.i18n.t("mUpgrades")) + "</div>";
        h += upgradeCard("cap", "📦", MG.i18n.t("upCap"), state.cap + " → " + (state.cap + 20), capCost());
        h += upgradeCard("stove", "🍳", MG.i18n.t("upStove"), state.stoves + " → " + (state.stoves + 1), stoveCost());
        var soilSub = tf("upSoilSub", { n: Math.round((state.soil + 1) * SOIL_STEP * 100) });
        h += upgradeCard("soil", "🌱", MG.i18n.t("upSoil"), soilSub, soilCost(), state.soil >= MAX_SOIL);
        var sprSub = MG.i18n.t("upSprinklerSub") + (state.sprinkler ? " · ⚡" + state.sprinkler : "");
        h += upgradeCard("sprinkler", "💧", MG.i18n.t("upSprinkler"), sprSub, sprinklerCost(), state.sprinkler >= MAX_SPRINKLER);
        var ovenSub = tf("upOvenSub", { n: Math.round((state.oven + 1) * OVEN_STEP * 100) });
        h += upgradeCard("oven", "🔥", MG.i18n.t("upOven"), ovenSub, ovenCost(), state.oven >= MAX_OVEN);
        var heaterSub = tf("upHeaterSub", { n: Math.round((state.heater + 1) * HEATER_STEP * 100) });
        h += upgradeCard("heater", "🌡️", MG.i18n.t("upHeater"), heaterSub, heaterCost(), state.heater >= MAX_HEATER);
        var tradeSub = tf("upTradeSub", { n: Math.round((state.trade + 1) * TRADE_STEP * 100) });
        h += upgradeCard("trade", "🤝", MG.i18n.t("upTrade"), tradeSub, tradeCost(), state.trade >= MAX_TRADE);
        return h;
      }
      function upgradeCard(id, ico, ttl, sub, cost, maxed) {
        var right = maxed
          ? '<span class="badge lock">' + esc(MG.i18n.t("maxed")) + "</span>"
          : '<button class="btn sm" data-act="upgrade" data-arg="' + id + '"' +
            (state.coins < cost ? " disabled" : "") + ">🪙 " + cost + "</button>";
        return '<div class="card"><span class="big">' + ico + '</span><div class="body">' +
          '<div class="ttl">' + esc(ttl) + '</div><div class="sub">' + esc(sub) + "</div></div>" +
          '<div class="right">' + right + "</div></div>";
      }
      function capCost() { return Math.round(state.cap * 0.9); }
      function stoveCost() { return 90 + (state.stoves - 1) * 110; }
      function soilCost() { return 80 + state.soil * 130; }
      function sprinklerCost() { return 120 + state.sprinkler * 170; }
      function ovenCost() { return 130 + state.oven * 150; }
      function heaterCost() { return 130 + state.heater * 150; }
      function tradeCost() { return 160 + state.trade * 180; }

      /* ------------------------------- QUESTS ------------------------------ */
      function renderQuests() {
        var h = tipLine("tipQuests");
        state.quests.forEach(function (q, i) {
          if (!q) { h += '<div class="card"><div class="body"><div class="sub">' + esc(MG.i18n.t("newOrder")) + "</div></div></div>"; return; }
          var have = state.inv[q.item] || 0;
          var can = have >= q.need;
          h += '<div class="card"><span class="big">' + ITEM[q.item].ico + '</span><div class="body">' +
            '<div class="ttl">' + esc(MG.i18n.t("wants")) + " " + q.need + "× " + esc(name(q.item)) +
              ' <span class="badge ' + (can ? "ready" : "lock") + '">' + have + "/" + q.need + "</span></div>" +
            '<div class="sub">' + stk(q.item) + ' · 🎁 🪙 ' + q.coins + " · +" + q.xp + " XP</div></div>" +
            '<div class="right"><button class="btn go sm" data-act="quest" data-arg="' + i + '"' +
            (can ? "" : " disabled") + ">" + esc(MG.i18n.t("deliver")) + "</button></div></div>";
        });
        return h;
      }

      /* ======================================================================
       *  LIVE PATCH — cheap per-frame update of volatile bits.
       * ==================================================================== */
      function patch() {
        var cells = world.querySelectorAll("[data-plotcell]");
        for (var ci = 0; ci < cells.length; ci++) {
          var cell = cells[ci];
          var i = +cell.getAttribute("data-plotcell");
          if (i >= state.unlocked) continue;
          var p = state.plots[i];
          if (cell.classList.contains("locked")) continue;
          var spr = cell.querySelector(".sprite");
          var bar = cell.querySelector(".bar > i");
          if (!p.crop) { if (spr && spr.textContent) spr.textContent = ""; cell.className = "plot empty"; if (bar) bar.style.width = "0%"; continue; }
          var c = CROP_BY_ID[p.crop];
          var rdy = p.grown >= c.grow;
          var cls = "plot" + (rdy ? " ready" : (p.water > 0 ? " watered" : "")) + (p.fert ? " fert" : "");
          if (cell.className !== cls) cell.className = cls;
          var s = plotSprite(p); if (spr && spr.textContent !== s) spr.textContent = s;
          if (bar) bar.style.width = Math.min(100, (p.grown / c.grow) * 100).toFixed(1) + "%";
        }
        if (state.tab === "cook") {
          state.cooks.forEach(function (c, i) {
            if (!c) return;
            var def = DISH_BY_ID[c.dish];
            var total = c.total || def.cook;
            var left = Math.max(0, c.endsAt - Date.now());
            var bar = overlay.querySelector('[data-cbar="' + i + '"] > i');
            if (bar) bar.style.width = Math.min(100, ((total - left) / total) * 100).toFixed(1) + "%";
          });
        } else if (state.tab === "greenhouse") {
          state.pots.forEach(function (p, i) {
            if (!p) return;
            var def = FLOWER_BY_ID[p.flower];
            var total = p.total || def.grow;
            var left = Math.max(0, p.endsAt - Date.now());
            var bar = overlay.querySelector('[data-potbar="' + i + '"] > i');
            if (bar) bar.style.width = Math.min(100, ((total - left) / total) * 100).toFixed(1) + "%";
          });
        } else if (state.tab === "apiary") {
          state.hives.forEach(function (hv, i) {
            var bar = overlay.querySelector('[data-hivebar="' + i + '"] > i');
            if (bar) bar.style.width = Math.min(100, (hv.grown / HIVE_MS) * 100).toFixed(1) + "%";
          });
        }
      }

      /* ======================================================================
       *  PANNING (pointer) + CLICK DELEGATION
       * ==================================================================== */
      var panId = null, panStartX = 0, panStartY = 0, panTx0 = 0, panTy0 = 0, dragging = false, suppressClick = false;

      // A "paint" gesture: holding on a field tile or an animal and sweeping
      // across more of them performs the action on each one entered — no
      // per-tile clicking. Pressing on open land pans the map as before.
      var paintMode = null, paintId = null, paintVisited = null, paintAgg = null;
      // A pen press waits to see what it is: a tap opens that pen's panel, a
      // sweep tends the animals by hand. We don't act until movement crosses a
      // small threshold, so a clean tap never collects/feeds by accident.
      var penGesture = null;

      function startPaint(mode, e) {
        paintMode = mode;
        paintId = e.pointerId;
        paintVisited = {};
        paintAgg = freshAgg();
        try { worldView.setPointerCapture(paintId); } catch (err) {}
        hidePanHint();
      }
      // Act on whatever interactive cell sits under the pointer, once per cell.
      function paintAt(cx, cy) {
        var el = document.elementFromPoint(cx, cy);
        if (!el || !el.closest) return;
        if (paintMode === "field") {
          var cell = el.closest("[data-plotcell]");
          if (!cell || cell.getAttribute("data-act") !== "plot") return;
          var i = +cell.getAttribute("data-plotcell");
          if (paintVisited["f" + i]) return;
          paintVisited["f" + i] = true;
          if (actPlot(i, paintAgg)) { patch(); syncStats(); }
        } else if (paintMode === "pen") {
          var ac = el.closest("[data-animcell]");
          if (!ac) return;
          var j = +ac.getAttribute("data-animcell");
          if (paintVisited["a" + j]) return;
          paintVisited["a" + j] = true;
          if (actAnimal(j, paintAgg)) { updateAnimCell(ac, j); syncStats(); }
        }
      }
      function endPaint() {
        if (paintMode === null) return;
        var agg = paintAgg, mode = paintMode, pg = penGesture;
        paintMode = null; paintId = null; paintVisited = null; paintAgg = null; penGesture = null;
        suppressClick = true; setTimeout(function () { suppressClick = false; }, 0);
        // A pen press that never moved is a tap → open that pen's panel.
        if (mode === "pen" && pg && !pg.moved) {
          if (pg.type) { state.tab = "pen"; state.penType = pg.type; markDirty(); render(); }
          return;
        }
        flushAgg(agg);
        save(); render();
      }

      worldView.addEventListener("pointerdown", function (e) {
        if (e.target.closest && e.target.closest("#toolbar")) return; // let the toolbar scroll/tap
        var plotCell = e.target.closest && e.target.closest("[data-plotcell]");
        var animCell = e.target.closest && e.target.closest("[data-animcell]");
        if (plotCell && plotCell.getAttribute("data-act") === "plot") {
          startPaint("field", e); paintAt(e.clientX, e.clientY); return;
        }
        if (animCell) {
          var aIdx = +animCell.getAttribute("data-animcell");
          var animal = state.animals[aIdx];
          penGesture = { type: animal ? animal.type : null, x: e.clientX, y: e.clientY, moved: false };
          startPaint("pen", e); // defer: act only once a sweep is detected
          return;
        }
        panId = e.pointerId;
        panStartX = e.clientX; panStartY = e.clientY;
        panTx0 = tx; panTy0 = ty; dragging = false;
      });
      worldView.addEventListener("pointermove", function (e) {
        if (paintMode !== null && e.pointerId === paintId) {
          if (paintMode === "pen" && penGesture && !penGesture.moved) {
            if (Math.abs(e.clientX - penGesture.x) + Math.abs(e.clientY - penGesture.y) <= 6) return;
            penGesture.moved = true;
            paintAt(penGesture.x, penGesture.y); // tend the cell the press started on
          }
          paintAt(e.clientX, e.clientY);
          return;
        }
        if (panId === null || e.pointerId !== panId) return;
        var dx = e.clientX - panStartX, dy = e.clientY - panStartY;
        if (!dragging && Math.abs(dx) + Math.abs(dy) > 6) {
          dragging = true;
          worldView.classList.add("drag");
          try { worldView.setPointerCapture(panId); } catch (err) {}
          hidePanHint();
        }
        if (dragging) {
          tx = panTx0 + dx; ty = panTy0 + dy;
          clampPan();
          world.style.transform = "translate(" + Math.round(tx) + "px," + Math.round(ty) + "px)";
        }
      });
      function endPan() {
        if (panId === null) return;
        if (dragging) { suppressClick = true; setTimeout(function () { suppressClick = false; }, 0); }
        worldView.classList.remove("drag");
        panId = null; dragging = false;
      }
      worldView.addEventListener("pointerup", function () { endPaint(); endPan(); });
      worldView.addEventListener("pointercancel", function () { endPaint(); endPan(); });

      worldView.addEventListener("click", function (e) {
        if (suppressClick) return;
        var t = e.target;
        while (t && t !== worldView && !t.dataset.act) t = t.parentNode;
        if (!t || t === worldView) return;
        handle(t.dataset.act, t.dataset.arg);
      });
      overlay.addEventListener("click", function (e) {
        if (e.target === overlay) { handle("close"); return; }
        var t = e.target;
        while (t && t !== overlay && !t.dataset.act) t = t.parentNode;
        if (!t || t === overlay) return;
        handle(t.dataset.act, t.dataset.arg);
      });

      /* ======================================================================
       *  ACTIONS
       * ==================================================================== */
      function handle(act, arg) {
        if (act === "open") {
          if (arg === "apiary" && !isUnlocked(APIARY_LVL)) { toast(tf("needLevel", { n: APIARY_LVL })); return; }
          state.tab = arg; markDirty(); render(); return;
        }
        if (act === "close") { state.tab = "village"; markDirty(); render(); return; }
        if (act === "noop") return;

        if (act === "seed") {
          if (CROP_BY_ID[arg] && !isUnlocked(CROP_BY_ID[arg].lvl)) { toast(tf("needLevel", { n: CROP_BY_ID[arg].lvl })); return; }
          state.sel = arg; markDirty(); render(); return;
        }

        if (act === "plot") {
          var ag = freshAgg();
          if (actPlot(+arg, ag)) { flushAgg(ag); save(); render(); }
          else flushAgg(ag);
          return;
        }

        if (act === "penlocked") {
          var ad = ANIMAL_BY_ID[arg];
          if (ad) toast(tf("needLevel", { n: ad.lvl }));
          return;
        }
        if (act === "openpen") {
          var pd = ANIMAL_BY_ID[arg];
          if (!pd) return;
          if (!isUnlocked(pd.lvl)) { toast(tf("needLevel", { n: pd.lvl })); return; }
          state.tab = "pen"; state.penType = arg; markDirty(); render(); return;
        }

        if (act === "buyplot") {
          if (state.unlocked >= GRID) return;
          var pc = plotCost();
          if (state.coins < pc) { toast(MG.i18n.t("needCoins")); return; }
          state.coins -= pc; state.unlocked++; save(); render(); return;
        }

        if (act === "buyanimal") { buyAnimal(arg); return; }
        if (act === "buyfeeder") { buyFeeder(arg); return; }
        if (act === "buycollector") { buyCollector(arg); return; }
        if (act === "loadfeed") { loadFeed(arg); return; }
        if (act === "collectall") { collectAll(arg); return; }

        if (act === "cook") { startCook(arg); return; }
        if (act === "collectcook") { collectCook(+arg); return; }

        if (act === "plant") { startPlant(arg); return; }
        if (act === "collectpot") { collectPot(+arg); return; }

        if (act === "collecthive") { collectHive(+arg); return; }

        if (act === "sell") { sell(arg, 1); return; }
        if (act === "sellall") { sell(arg, state.inv[arg] || 0); return; }
        if (act === "upgrade") { upgrade(arg); return; }

        if (act === "quest") { deliver(+arg); return; }
      }

      // ---- Hold-and-sweep actions -------------------------------------------
      // Each act* mutates state for a single tile/animal and records what it did
      // into `agg`, without touching the DOM. A whole sweep aggregates into one
      // `agg`, then flushAgg() shows a single summary toast and we render once.
      function freshAgg() {
        return { harvest: {}, collect: {}, plant: 0, water: 0, clear: 0, fed: 0, fert: 0,
                 full: false, needCoins: false, needLevel: 0 };
      }

      // Apply the selected tool to one field tile. Harvests ripe crops first
      // (whatever the tool), otherwise plants / waters / clears. Returns true
      // when something actually changed.
      function actPlot(i, agg) {
        var p = state.plots[i];
        if (!p) return false;
        if (p.crop && p.grown >= CROP_BY_ID[p.crop].grow) {
          if (spaceLeft() < 1) { agg.full = true; return false; }
          var amt = Math.min(p.fert ? 2 : 1, spaceLeft());
          var c = CROP_BY_ID[p.crop];
          addItem(c.id, amt);
          addXp(c.xp);
          p.crop = null; p.grown = 0; p.water = 0; p.fert = false;
          agg.harvest[c.id] = (agg.harvest[c.id] || 0) + amt;
          markDirty(); return true;
        }
        if (state.sel === "clear") {
          if (p.crop) { p.crop = null; p.grown = 0; p.water = 0; p.fert = false; agg.clear++; markDirty(); return true; }
          return false;
        }
        if (state.sel === "water") {
          if (p.crop && p.water <= 0) { p.water = WATER_MS; agg.water++; markDirty(); return true; }
          return false;
        }
        if (state.sel === "fert") {
          if (p.crop && !p.fert) {
            if (state.coins < FERT_COST) { agg.needCoins = true; return false; }
            state.coins -= FERT_COST; p.fert = true; agg.fert++; markDirty(); return true;
          }
          return false;
        }
        if (!p.crop) {
          var crop = CROP_BY_ID[state.sel];
          if (!crop) return false;
          if (!isUnlocked(crop.lvl)) { agg.needLevel = crop.lvl; return false; }
          if (state.coins < crop.seed) { agg.needCoins = true; return false; }
          state.coins -= crop.seed;
          p.crop = crop.id; p.grown = 0; p.water = 0;
          agg.plant++; markDirty(); return true;
        }
        return false;
      }

      // Tend one animal: collect its product if ready, else feed it if it's
      // hungry and we have the feed crop. Returns true when something changed.
      function actAnimal(i, agg) {
        var a = state.animals[i]; if (!a) return false;
        var def = ANIMAL_BY_ID[a.type];
        if (a.grown >= def.interval) {
          if (spaceLeft() < 1) { agg.full = true; return false; }
          addItem(def.prod, 1);
          addXp((PROD_BY_ID[def.prod] || {}).xp || 0);
          a.grown = 0;
          agg.collect[def.prod] = (agg.collect[def.prod] || 0) + 1;
          markDirty(); return true;
        }
        if (Date.now() >= a.feedUntil && (state.inv[def.feed] || 0) >= 1) {
          takeItem(def.feed, 1);
          a.feedUntil = Date.now() + FEED_MS;
          agg.fed++;
          markDirty(); return true;
        }
        return false;
      }

      // Boil a finished sweep down to a single, language-light summary toast.
      function flushAgg(agg) {
        if (!agg) return;
        var parts = [], id;
        for (id in agg.harvest) parts.push("+" + agg.harvest[id] + " " + ITEM[id].ico);
        for (id in agg.collect) parts.push("+" + agg.collect[id] + " " + ITEM[id].ico);
        if (agg.plant) parts.push("🌱×" + agg.plant);
        if (agg.water) parts.push("💧×" + agg.water);
        if (agg.fert) parts.push("💩×" + agg.fert);
        if (agg.clear) parts.push("🧺×" + agg.clear);
        if (agg.fed) parts.push("🍽️×" + agg.fed);
        if (parts.length) { toast(parts.join("  ")); return; }
        if (agg.full) { toast(MG.i18n.t("full")); return; }
        if (agg.needCoins) { toast(MG.i18n.t("needCoins")); return; }
        if (agg.needLevel) { toast(tf("needLevel", { n: agg.needLevel })); return; }
      }

      // Refresh one animal cell's look in place during a pen sweep.
      function updateAnimCell(el, i) {
        var a = state.animals[i]; if (!a) return;
        var def = ANIMAL_BY_ID[a.type];
        var rdy = a.grown >= def.interval;
        var fed = Date.now() < a.feedUntil;
        el.className = "an" + (rdy ? " rdy" : (fed ? " fed" : " hungry"));
        if (!rdy) { var prod = el.querySelector(".prod"); if (prod) prod.parentNode.removeChild(prod); }
      }

      function buyAnimal(id) {
        var def = ANIMAL_BY_ID[id]; if (!def) return;
        if (!isUnlocked(def.lvl)) { toast(tf("needLevel", { n: def.lvl })); return; }
        if (countAnimals(id) >= MAX_PER_ANIMAL) { toast(tf("penFull", { n: MAX_PER_ANIMAL })); return; }
        if (state.coins < def.cost) { toast(MG.i18n.t("needCoins")); return; }
        state.coins -= def.cost;
        ensurePen(id);
        state.animals.push({ type: id, grown: 0, feedUntil: Date.now() + FEED_MS });
        toast(MG.i18n.t("bought"));
        save(); render();
      }
      function buyFeeder(type) {
        var def = ANIMAL_BY_ID[type]; if (!def) return;
        var pen = ensurePen(type);
        if (pen.feeder) return;
        var cost = feederCost(type);
        if (state.coins < cost) { toast(MG.i18n.t("needCoins")); return; }
        state.coins -= cost; pen.feeder = true;
        toast(MG.i18n.t("bought")); save(); render();
      }
      function buyCollector(type) {
        var def = ANIMAL_BY_ID[type]; if (!def) return;
        var pen = ensurePen(type);
        if (pen.collector) return;
        var cost = collectorCost(type);
        if (state.coins < cost) { toast(MG.i18n.t("needCoins")); return; }
        state.coins -= cost; pen.collector = true;
        toast(MG.i18n.t("bought")); save(); render();
      }
      // Move feed crops from storage into a pen's feeder, up to its capacity.
      function loadFeed(type) {
        var def = ANIMAL_BY_ID[type]; if (!def) return;
        var pen = ensurePen(type);
        if (!pen.feeder) return;
        var room = FEEDER_CAP - pen.feed;
        if (room <= 0) { toast(MG.i18n.t("feederFull")); return; }
        var have = state.inv[def.feed] || 0;
        var n = Math.min(room, have);
        if (n <= 0) { toast(MG.i18n.t("needIngredients")); return; }
        takeItem(def.feed, n); pen.feed += n;
        toast("🍽️ " + ITEM[def.feed].ico + " +" + n);
        save(); render();
      }
      // Gather everything ready in a building / pen in one tap.
      function collectAll(kind) {
        var n = 0, hitFull = false;
        function take(itemId, xp) {
          if (spaceLeft() < 1) { hitFull = true; return false; }
          addItem(itemId, 1); addXp(xp || 0); n++; return true;
        }
        if (kind === "cook") {
          state.cooks.forEach(function (c, i) {
            if (c && Date.now() >= c.endsAt && take(c.dish, DISH_BY_ID[c.dish].xp)) state.cooks[i] = null;
          });
        } else if (kind === "pot") {
          state.pots.forEach(function (p, i) {
            if (p && Date.now() >= p.endsAt && take(p.flower, FLOWER_BY_ID[p.flower].xp)) state.pots[i] = null;
          });
        } else if (kind === "hive") {
          state.hives.forEach(function (hv) {
            if (hv.grown >= HIVE_MS && take("honey", (PROD_BY_ID.honey || {}).xp)) hv.grown = 0;
          });
        } else if (kind === "pen") {
          var t = state.penType, def = ANIMAL_BY_ID[t];
          if (def) state.animals.forEach(function (a) {
            if (a.type === t && a.grown >= def.interval && take(def.prod, (PROD_BY_ID[def.prod] || {}).xp)) a.grown = 0;
          });
        }
        if (n) toast("🧺 +" + n);
        else if (hitFull) toast(MG.i18n.t("full"));
        save(); render();
      }

      function startCook(id) {
        var def = DISH_BY_ID[id]; if (!def) return;
        if (!isUnlocked(def.lvl)) { toast(tf("needLevel", { n: def.lvl })); return; }
        var slot = -1;
        for (var i = 0; i < state.cooks.length; i++) if (!state.cooks[i]) { slot = i; break; }
        if (slot < 0) { toast(MG.i18n.t("freeStove")); return; }
        if (!hasRecipe(def.recipe)) { toast(MG.i18n.t("needIngredients")); return; }
        for (var k in def.recipe) takeItem(k, def.recipe[k]);
        var cdur = def.cook / cookMul();
        state.cooks[slot] = { dish: id, endsAt: Date.now() + cdur, total: cdur };
        toast(tf("cookStarted", { item: def.ico + " " + name(id) }));
        save(); render();
      }
      function collectCook(i) {
        var c = state.cooks[i]; if (!c) return;
        if (Date.now() < c.endsAt) return;
        if (spaceLeft() < 1) { toast(MG.i18n.t("full")); return; }
        var def = DISH_BY_ID[c.dish];
        addItem(c.dish, 1);
        addXp(def.xp);
        state.cooks[i] = null;
        toast(tf("collected", { n: 1, item: def.ico + " " + name(c.dish) }));
        save(); render();
      }

      function startPlant(id) {
        var def = FLOWER_BY_ID[id]; if (!def) return;
        if (!isUnlocked(def.lvl)) { toast(tf("needLevel", { n: def.lvl })); return; }
        var slot = -1;
        for (var i = 0; i < state.pots.length; i++) if (!state.pots[i]) { slot = i; break; }
        if (slot < 0) { toast(MG.i18n.t("noFreePot")); return; }
        if (state.coins < def.seed) { toast(MG.i18n.t("needCoins")); return; }
        state.coins -= def.seed;
        var fdur = def.grow / flowerMul();
        state.pots[slot] = { flower: id, endsAt: Date.now() + fdur, total: fdur };
        toast("🌱 " + def.ico + " " + name(id));
        save(); render();
      }
      function collectPot(i) {
        var p = state.pots[i]; if (!p) return;
        if (Date.now() < p.endsAt) return;
        if (spaceLeft() < 1) { toast(MG.i18n.t("full")); return; }
        var def = FLOWER_BY_ID[p.flower];
        addItem(p.flower, 1);
        addXp(def.xp);
        state.pots[i] = null;
        toast(tf("collected", { n: 1, item: def.ico + " " + name(p.flower) }));
        save(); render();
      }

      function collectHive(i) {
        var hv = state.hives[i]; if (!hv) return;
        if (hv.grown < HIVE_MS) return;
        if (spaceLeft() < 1) { toast(MG.i18n.t("full")); return; }
        addItem("honey", 1);
        addXp((PROD_BY_ID.honey || {}).xp || 0);
        hv.grown = 0;
        toast(tf("collected", { n: 1, item: ITEM.honey.ico + " " + name("honey") }));
        save(); render();
      }

      function sell(id, n) {
        n = Math.min(n, state.inv[id] || 0);
        if (n <= 0) return;
        var gain = price(id) * n;
        takeItem(id, n);
        state.coins += gain;
        toast(tf("gotCoins", { n: gain }));
        save(); render();
      }
      function upgrade(id) {
        if (id === "cap") {
          var cc = capCost(); if (state.coins < cc) { toast(MG.i18n.t("needCoins")); return; }
          state.coins -= cc; state.cap += 20;
        } else if (id === "stove") {
          var sc = stoveCost(); if (state.coins < sc) { toast(MG.i18n.t("needCoins")); return; }
          state.coins -= sc; state.stoves += 1; state.cooks.push(null);
        } else if (id === "pot") {
          if (state.potCap >= MAX_POTS) return;
          var pc = potCost(); if (state.coins < pc) { toast(MG.i18n.t("needCoins")); return; }
          state.coins -= pc; state.potCap += 1; state.pots.push(null);
        } else if (id === "soil") {
          if (state.soil >= MAX_SOIL) return;
          var soc = soilCost(); if (state.coins < soc) { toast(MG.i18n.t("needCoins")); return; }
          state.coins -= soc; state.soil += 1;
        } else if (id === "sprinkler") {
          if (state.sprinkler >= MAX_SPRINKLER) return;
          var spc = sprinklerCost(); if (state.coins < spc) { toast(MG.i18n.t("needCoins")); return; }
          state.coins -= spc; state.sprinkler += 1;
        } else if (id === "hive") {
          if (state.hives.length >= MAX_HIVES) return;
          var hc = hiveCost(); if (state.coins < hc) { toast(MG.i18n.t("needCoins")); return; }
          state.coins -= hc; state.hives.push({ grown: 0 });
        } else if (id === "oven") {
          if (state.oven >= MAX_OVEN) return;
          var oc = ovenCost(); if (state.coins < oc) { toast(MG.i18n.t("needCoins")); return; }
          state.coins -= oc; state.oven += 1;
        } else if (id === "heater") {
          if (state.heater >= MAX_HEATER) return;
          var htc = heaterCost(); if (state.coins < htc) { toast(MG.i18n.t("needCoins")); return; }
          state.coins -= htc; state.heater += 1;
        } else if (id === "trade") {
          if (state.trade >= MAX_TRADE) return;
          var trc = tradeCost(); if (state.coins < trc) { toast(MG.i18n.t("needCoins")); return; }
          state.coins -= trc; state.trade += 1;
        }
        save(); render();
      }

      function deliver(i) {
        var q = state.quests[i]; if (!q) return;
        if ((state.inv[q.item] || 0) < q.need) return;
        takeItem(q.item, q.need);
        state.coins += q.coins;
        addXp(q.xp);
        toast(tf("questDone", { c: q.coins, x: q.xp }));
        state.quests[i] = makeQuest(state);
        save(); render();
      }

      /* ======================================================================
       *  TICK — advance growth / production / cooking in real time
       * ==================================================================== */
      var last = performance.now();
      var patchAccum = 0, saveAccum = 0, viewAccum = 0, sprinkleAccum = 0;

      function tick(now) {
        var dt = now - last; last = now;
        if (dt > 2000) dt = 2000;

        // The sprinkler periodically re-waters every dry, still-growing plot.
        if (state.sprinkler > 0) {
          sprinkleAccum += dt;
          if (sprinkleAccum >= sprinkleEvery()) {
            sprinkleAccum = 0;
            for (var si = 0; si < state.unlocked; si++) {
              var sp = state.plots[si];
              if (sp.crop && sp.water <= 0 && sp.grown < CROP_BY_ID[sp.crop].grow) {
                sp.water = WATER_MS; markDirty();
              }
            }
          }
        }

        var gmul = soilMul();
        for (var i = 0; i < state.unlocked; i++) {
          var p = state.plots[i];
          if (!p.crop) continue;
          var c = CROP_BY_ID[p.crop];
          if (p.grown >= c.grow) continue;
          var speed = gmul;
          if (p.water > 0) { speed = WATER_BOOST * gmul; p.water = Math.max(0, p.water - dt); if (p.water === 0) markDirty(); }
          var before = p.grown;
          p.grown = Math.min(c.grow, p.grown + dt * speed);
          if (before < c.grow && p.grown >= c.grow) markDirty();
        }
        var nowMs = Date.now();
        state.animals.forEach(function (a) {
          var def = ANIMAL_BY_ID[a.type];
          var pen = state.pens[a.type];
          // A feeder keeps the animal fed on its own, spending one feed each cycle.
          if (pen && pen.feeder && nowMs >= a.feedUntil && pen.feed > 0) {
            pen.feed -= 1; a.feedUntil = nowMs + FEED_MS; markDirty();
          }
          if (a.grown < def.interval) {
            if (nowMs < a.feedUntil) {
              var before = a.grown;
              a.grown = Math.min(def.interval, a.grown + dt);
              if (before < def.interval && a.grown >= def.interval) markDirty();
            }
          } else if (pen && pen.collector && spaceLeft() >= 1) {
            // A collector gathers ripe produce into storage automatically.
            addItem(def.prod, 1);
            addXp((PROD_BY_ID[def.prod] || {}).xp || 0);
            a.grown = 0; markDirty();
          }
        });
        // Hives quietly fill with honey — no feeding required.
        state.hives.forEach(function (hv) {
          if (hv.grown >= HIVE_MS) return;
          var before = hv.grown;
          hv.grown = Math.min(HIVE_MS, hv.grown + dt);
          if (before < HIVE_MS && hv.grown >= HIVE_MS) markDirty();
        });
        if (nowMs >= state.marketUntil) rollMarket(state, false);

        patchAccum += dt;
        if (patchAccum > 200) { patch(); patchAccum = 0; }

        // A full (pan-preserving) re-render once a second keeps building status
        // lines, badges, countdowns and re-rolled prices honest. Skip it while
        // the player is actively dragging so the pan stays buttery.
        viewAccum += dt;
        if (viewAccum > 1000) { viewAccum = 0; if (!dragging && paintMode === null) render(); }

        saveAccum += dt;
        if (dirty && saveAccum > 1500) { save(); dirty = false; saveAccum = 0; }

        requestAnimationFrame(tick);
      }

      /* ---- One-time "drag to look around" hint. ---- */
      var hintTimer = null;
      function hidePanHint() { panHint.classList.remove("show"); if (hintTimer) { clearTimeout(hintTimer); hintTimer = null; } }
      function showPanHint() {
        panHint.textContent = MG.i18n.t("dragHint");
        panHint.classList.add("show");
        hintTimer = setTimeout(hidePanHint, 4000);
      }

      // Persist on leave.
      window.addEventListener("pagehide", save);
      document.addEventListener("visibilitychange", function () {
        if (document.visibilityState === "hidden") save();
      });

      // Keep the world covering the viewport as it resizes / rotates.
      window.addEventListener("resize", function () { ensureScale(); applyWorld(); });

      // Re-localize live.
      MG.i18n.onChange(function () { render(); });

      /* ============================ Boot ============================ */
      load();
      render();
      syncStats();
      showPanHint();
      requestAnimationFrame(tick);
    })();
  </script>
</body>
</html>

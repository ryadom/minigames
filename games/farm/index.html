      function name(id) { var n = MG.i18n.t("names"); return (n && n[id]) || id; }
      function tf(key, vars) {
        var s = MG.i18n.t(key);
        if (typeof s !== "string") return s;
        for (var k in vars) if (vars.hasOwnProperty(k)) s = s.replace("{" + k + "}", vars[k]);
        return s;
      }

      /* ======================================================================
       *  SAVE / STATE
       * ==================================================================== */
      var store = MG.storage("farm", {
        version: 2,
        migrations: { 2: function (d) { return { coins: (d && d.coins) || 25 }; } }
      });

      var state;

      function need(level) { return 60 + (level - 1) * 50; } // XP to reach next level

      function freshState() {
        var plots = [];
        for (var i = 0; i < GRID; i++) plots.push({ crop: null, grown: 0, water: 0 });
        var s = {
          coins: 25, xp: 0, level: 1, sel: "wheat",
          unlocked: START_PLOTS,
          plots: plots,
          inv: {},
          cap: 40,
          animals: [],
          barnCap: 2,
          stoves: 1,
          cooks: [null],
          quests: [],
          prices: {}, marketUntil: 0,
          tab: "village",
          lastSeen: Date.now()
        };
        rollMarket(s, true);
        for (var q = 0; q < 3; q++) s.quests.push(makeQuest(s));
        return s;
      }

      function load() {
        state = freshState();
        var d = store.load();
        if (d && typeof d === "object") {
          if (typeof d.coins === "number" && d.coins >= 0) state.coins = d.coins;
          if (typeof d.xp === "number" && d.xp >= 0) state.xp = d.xp;
          if (typeof d.level === "number" && d.level >= 1) state.level = d.level;
          if (typeof d.unlocked === "number") state.unlocked = Math.max(START_PLOTS, Math.min(GRID, d.unlocked));
          if (typeof d.cap === "number" && d.cap > 0) state.cap = d.cap;
          if (typeof d.barnCap === "number" && d.barnCap > 0) state.barnCap = d.barnCap;
          if (typeof d.stoves === "number" && d.stoves >= 1) state.stoves = d.stoves;
          if (CROP_BY_ID[d.sel] || d.sel === "water" || d.sel === "clear") state.sel = d.sel;

          if (d.inv && typeof d.inv === "object") {
            state.inv = {};
            for (var k in d.inv) if (ITEM[k] && d.inv[k] > 0) state.inv[k] = Math.floor(d.inv[k]);
          }
          if (Array.isArray(d.plots)) {
            for (var i = 0; i < GRID; i++) {
              var p = d.plots[i] || {};
              var crop = CROP_BY_ID[p.crop] ? p.crop : null;
              state.plots[i] = {
                crop: crop,
                grown: crop ? Math.max(0, +p.grown || 0) : 0,
                water: crop ? Math.max(0, +p.water || 0) : 0
              };
            }
          }
          if (Array.isArray(d.animals)) {
            state.animals = [];
            d.animals.forEach(function (a) {
              if (a && ANIMAL_BY_ID[a.type] && state.animals.length < state.barnCap) {
                state.animals.push({
                  type: a.type,
                  grown: Math.max(0, +a.grown || 0),
                  feedUntil: Math.max(0, +a.feedUntil || 0)
                });
              }
            });
          }
          if (Array.isArray(d.cooks)) {
            state.cooks = [];
            for (var c = 0; c < state.stoves; c++) {
              var ck = d.cooks[c];
              if (ck && DISH_BY_ID[ck.dish]) state.cooks.push({ dish: ck.dish, endsAt: +ck.endsAt || 0 });
              else state.cooks.push(null);
            }
          } else {
            state.cooks = []; for (var c2 = 0; c2 < state.stoves; c2++) state.cooks.push(null);
          }
          if (Array.isArray(d.quests) && d.quests.length) {
            state.quests = [];
            d.quests.forEach(function (q) {
              if (q && ITEM[q.item] && q.need > 0) state.quests.push(q);
            });
            while (state.quests.length < 3) state.quests.push(makeQuest(state));
          }
          // The village is the home screen; building panels are transient.
          state.tab = "village";
        }

        // Offline progress.
        var now = Date.now();
        var away = now - (+ (d && d.lastSeen) || now);
        if (away > 0) {
          state.plots.forEach(function (pl) {
            if (pl.crop) {
              var g = CROP_BY_ID[pl.crop].grow;
              pl.grown = Math.min(g, pl.grown + away); // no water bonus offline
              pl.water = 0;
            }
          });
          var seen = +(d && d.lastSeen) || now;
          state.animals.forEach(function (a) {
            var iv = ANIMAL_BY_ID[a.type].interval;
            var fedTime = Math.max(0, Math.min(now, a.feedUntil) - seen);
            a.grown = Math.min(iv, a.grown + fedTime);
          });
        }
        rollMarket(state, false);
      }

      function save() {
        store.save({
          coins: state.coins, xp: state.xp, level: state.level, sel: state.sel,
          unlocked: state.unlocked, cap: state.cap, barnCap: state.barnCap, stoves: state.stoves,
          inv: state.inv,
          plots: state.plots.map(function (p) {
            return { crop: p.crop, grown: Math.round(p.grown), water: Math.round(p.water) };
          }),
          animals: state.animals.map(function (a) {
            return { type: a.type, grown: Math.round(a.grown), feedUntil: a.feedUntil };
          }),
          cooks: state.cooks.map(function (c) { return c ? { dish: c.dish, endsAt: c.endsAt } : null; }),
          quests: state.quests,
          prices: state.prices, marketUntil: state.marketUntil,
          tab: state.tab,
          lastSeen: Date.now()
        });
      }
      var dirty = false;
      function markDirty() { dirty = true; }

      /* ======================================================================
       *  ECONOMY HELPERS
       * ==================================================================== */
      function invCount() { var n = 0; for (var k in state.inv) n += state.inv[k]; return n; }
      function spaceLeft() { return state.cap - invCount(); }
      function addItem(id, n) { state.inv[id] = (state.inv[id] || 0) + n; }
      function takeItem(id, n) {
        var have = state.inv[id] || 0;
        if (have <= n) delete state.inv[id]; else state.inv[id] = have - n;
      }
      function hasRecipe(rec) { for (var k in rec) if ((state.inv[k] || 0) < rec[k]) return false; return true; }
      function held(id) { return state.inv[id] || 0; }

      // A small chip showing how much of an item is currently in storage.
      function stk(id) {
        var n = held(id);
        return '<span class="stk' + (n ? "" : " zero") + '">📦 ' + n + "</span>";
      }

      function isUnlocked(lvl, st) { return (st || state).level >= lvl; }
      function itemUnlocked(id, st) {
        if (CROP_BY_ID[id]) return isUnlocked(CROP_BY_ID[id].lvl, st);
        if (DISH_BY_ID[id]) return isUnlocked(DISH_BY_ID[id].lvl, st);
        if (ANIMAL_FOR_PROD[id]) return isUnlocked(ANIMAL_FOR_PROD[id].lvl, st);
        return true;
      }

      function price(id) {
        var base = ITEM[id] ? ITEM[id].sell : 0;
        var m = state.prices[id] || 1;
        return Math.max(1, Math.round(base * m));
      }

      function rollMarket(s, force) {
        if (!force && s.marketUntil && Date.now() < s.marketUntil) return;
        s.prices = {};
        for (var id in ITEM) s.prices[id] = 0.75 + Math.random() * 0.6; // 0.75 – 1.35
        s.marketUntil = Date.now() + MARKET_MS;
      }

      function addXp(n) {
        state.xp += n;
        var leveled = false, last;
        while (state.xp >= need(state.level)) {
          state.xp -= need(state.level);
          state.level++;
          leveled = true;
          last = state.level;
          var bonus = state.level * 12;
          state.coins += bonus;
          toast(tf("levelUp", { n: state.level, c: bonus }));
        }
        if (leveled) {
          var un = unlocksAt(last);
          if (un) setTimeout(function () { toast(MG.i18n.t("unlocked") + " " + un); }, 900);
          ui.setStat("level", state.level);
          ui.stat("level").classList.add("mg-flash");
          setTimeout(function () { ui.stat("level").classList.remove("mg-flash"); }, 400);
        }
      }

      function unlocksAt(level) {
        var out = [];
        CROPS.forEach(function (c) { if (c.lvl === level) out.push(c.ico); });
        ANIMALS.forEach(function (a) { if (a.lvl === level) out.push(a.ico); });
        DISHES.forEach(function (d) { if (d.lvl === level) out.push(d.ico); });
        return out.join(" ");
      }

      /* ======================================================================
       *  QUESTS
       * ==================================================================== */
      function deliverablePool(st) {
        var ids = [];
        for (var id in ITEM) if (itemUnlocked(id, st)) ids.push(id);
        return ids;
      }
      function makeQuest(s) {
        var pool = deliverablePool(s);
        var taken = {};
        (s.quests || []).forEach(function (q) { if (q) taken[q.item] = true; });
        var fresh = pool.filter(function (id) { return !taken[id]; });
        if (fresh.length) pool = fresh;
        var item = pool[Math.floor(Math.random() * pool.length)] || "wheat";
        var base = ITEM[item].sell;
        var maxN = base > 60 ? 2 : 3;
        var n = 1 + Math.floor(Math.random() * maxN);
        var coins = Math.round(base * n * 1.7) + s.level * 4;
        var xp = Math.max(3, Math.round(base / 4)) * n;
        return { item: item, need: n, coins: coins, xp: xp };
      }

      /* ======================================================================
       *  HEADER + DOM REFS
       * ==================================================================== */
      var ui = MG.mountHeader({
        icon: "🚜",
        titleKey: "title",
        stats: [
          { key: "coins", labelKey: "coins", value: 0 },
          { key: "level", labelKey: "level", value: 1 }
        ],
        actions: [
          {
            key: "new", labelKey: "newFarm", onClick: function () {
              if (window.confirm(MG.i18n.t("confirmReset"))) {
                state = freshState(); save(); render(); syncStats();
              }
            }
          }
        ]
      });

      var worldView = $("worldView");
      var world = $("world");
      var toolbarEl = $("toolbar");
      var overlay = $("overlay");
      var toastEl = $("toast");
      var panHint = $("panHint");

      // Buildings you can step into; each opens as a sliding panel.
      var PANELS = {
        market: { ico: "🏪", title: "tabMarket" },
        barn:   { ico: "🐄", title: "tabBarn" },
        cook:   { ico: "🍳", title: "tabCook" },
        quests: { ico: "📋", title: "tabQuests" }
      };
      var overlayTab = null;
      var closeTimer = null;

      var toastTimer = null;
      function toast(msg) {
        toastEl.textContent = msg;
        toastEl.classList.add("show");
        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(function () { toastEl.classList.remove("show"); }, 1500);
      }

      function syncStats() {
        ui.setStat("coins", state.coins);
        ui.setStat("level", state.level);
        $("lvl").textContent = "⭐ " + state.level;
        $("xpfill").style.width = Math.min(100, (state.xp / need(state.level)) * 100) + "%";
        var n = invCount();
        var st = $("store");
        st.textContent = "📦 " + n + "/" + state.cap;
        st.classList.toggle("full", n >= state.cap);
      }

      /* ======================================================================
       *  THE WORLD — geometry & SVG drawing
       *  The scene is drawn in a viewBox of WORLD_W × WORLD_H units; the
       *  .world element is rendered at those units × the cover scale, and
       *  panned with a transform. Overlays are positioned as a percentage
       *  of WORLD_W / WORLD_H so they always sit over their drawing.
       * ==================================================================== */
      var WORLD_W = 1200, WORLD_H = 900;

      // Interactive buildings. (cx, by) = front-bottom-center; w = footprint.
      var BLD = {
        market: { act: "market", ico: "🏪", cx: 250, by: 380, w: 150, roof: "#d8503f", roof2: "#b53c2d", wall: "#fbe6c9", wall2: "#e3cd9f" },
        cook:   { act: "cook",   ico: "🍞", cx: 950, by: 380, w: 140, roof: "#e0962f", roof2: "#bf7c20", wall: "#fdeccb", wall2: "#ecd6a4" },
        barn:   { act: "barn",   ico: "🐄", cx: 240, by: 770, w: 170, roof: "#9a3b2a", roof2: "#7e2e20", wall: "#c4543a", wall2: "#a3422d" },
        quests: { act: "quests", ico: "🪧", cx: 955, by: 790, w: 130, roof: "#5f8a37", roof2: "#4c7029", wall: "#f3e7c6", wall2: "#dccaa0" }
      };
      // Decorative cottages dotted around the back — just village flavour.
      var DECO = [
        { cx: 560, by: 250, w: 96,  roof: "#c77b3a", roof2: "#a8632b", wall: "#f3e3c0", wall2: "#ddc89c" },
        { cx: 770, by: 228, w: 72,  roof: "#7d96c0", roof2: "#6076a0", wall: "#eef0f4", wall2: "#d3d8e2" },
        { cx: 420, by: 236, w: 80,  roof: "#6f9b46", roof2: "#577a35", wall: "#f3e3c0", wall2: "#ddc89c" }
      ];
      // One fenced pen per animal type, lined up across the front of the
      // scene (between the barn on the left and the orders post on the right).
      // Each pen holds only its own kind of animal and is a hold-and-sweep
      // target for collecting / feeding right out on the map.
      var PEN_DEFS = [
        { type: "chicken", L: 400, R: 508, T: 745, B: 880 },
        { type: "cow",     L: 520, R: 628, T: 745, B: 880 },
        { type: "sheep",   L: 640, R: 748, T: 745, B: 880 },
        { type: "pig",     L: 760, R: 868, T: 745, B: 880 }
      ];

      // The crop field: a 4×4 grid of tilled tiles centred on the map.
      var FIELD = { cols: 4, rows: 4, tile: 80, gap: 18, cx: 600, cy: 520 };
      FIELD.fullW = FIELD.cols * FIELD.tile + (FIELD.cols - 1) * FIELD.gap;
      FIELD.fullH = FIELD.rows * FIELD.tile + (FIELD.rows - 1) * FIELD.gap;
      FIELD.startX = FIELD.cx - FIELD.fullW / 2;
      FIELD.startY = FIELD.cy - FIELD.fullH / 2;
      function plotPos(i) {
        var col = i % FIELD.cols, row = Math.floor(i / FIELD.cols);
        return { x: FIELD.startX + col * (FIELD.tile + FIELD.gap), y: FIELD.startY + row * (FIELD.tile + FIELD.gap) };
      }

      function nf(n) { return Math.round(n * 10) / 10; }
      function pf(n) { return Math.round(n * 100) / 100; }

      function geom(b) {
        var w = b.w, cx = b.cx, by = b.by;
        var wh = w * 0.5, rh = w * 0.42, d = w * 0.3, e = w * 0.1, dx = d, dy = -d * 0.5;
        var L = cx - w / 2, R = cx + w / 2, top = by - wh, ridge = top - rh;
        return {
          w: w, cx: cx, by: by, wh: wh, rh: rh, d: d, e: e, dx: dx, dy: dy,
          L: L, R: R, top: top, ridge: ridge,
          minX: L - e, maxX: R + e + dx, minY: ridge + dy, maxY: by
        };
      }

      function svgWindow(x, y, s) {
        return '<rect x="' + nf(x) + '" y="' + nf(y) + '" width="' + nf(s) + '" height="' + nf(s * 0.9) +
          '" rx="' + nf(s * 0.12) + '" fill="rgba(150,210,255,0.85)" stroke="rgba(255,255,255,0.6)" stroke-width="' + nf(s * 0.1) + '"/>';
      }

      // A fake-3D gabled cottage: ground shadow, shaded right face, a front
      // wall (door + windows) and a pitched roof with a lit ridge.
      function svgHouse(b) {
        var g = geom(b), s = "";
        s += '<ellipse cx="' + nf(b.cx + g.dx * 0.4) + '" cy="' + nf(b.by + g.w * 0.02) +
          '" rx="' + nf(g.w * 0.66) + '" ry="' + nf(g.w * 0.15) + '" fill="rgba(0,0,0,0.16)"/>';
        s += '<path d="M' + nf(g.R) + ' ' + nf(g.top) + ' L' + nf(g.R + g.dx) + ' ' + nf(g.top + g.dy) +
          ' L' + nf(g.R + g.dx) + ' ' + nf(g.by + g.dy) + ' L' + nf(g.R) + ' ' + nf(g.by) + 'Z" fill="' + b.wall2 + '"/>';
        s += '<rect x="' + nf(g.L) + '" y="' + nf(g.top) + '" width="' + nf(g.w) + '" height="' + nf(g.wh) + '" fill="' + b.wall + '"/>';
        s += '<rect x="' + nf(g.L) + '" y="' + nf(g.by - g.wh * 0.13) + '" width="' + nf(g.w) + '" height="' + nf(g.wh * 0.13) + '" fill="rgba(0,0,0,0.1)"/>';
        var ww = g.w * 0.16, wy = g.top + g.wh * 0.22;
        s += svgWindow(g.L + g.w * 0.13, wy, ww) + svgWindow(g.R - g.w * 0.13 - ww, wy, ww);
        var dw = g.w * 0.2, dh = g.wh * 0.5;
        s += '<rect x="' + nf(b.cx - dw / 2) + '" y="' + nf(g.by - dh) + '" width="' + nf(dw) + '" height="' + nf(dh) +
          '" rx="' + nf(dw * 0.28) + '" fill="rgba(86,52,24,0.6)"/>';
        s += '<path d="M' + nf(b.cx) + ' ' + nf(g.ridge) + ' L' + nf(b.cx + g.dx) + ' ' + nf(g.ridge + g.dy) +
          ' L' + nf(g.R + g.e + g.dx) + ' ' + nf(g.top + g.dy) + ' L' + nf(g.R + g.e) + ' ' + nf(g.top) + 'Z" fill="' + b.roof2 + '"/>';
        s += '<path d="M' + nf(g.L - g.e) + ' ' + nf(g.top) + ' L' + nf(b.cx) + ' ' + nf(g.ridge) +
          ' L' + nf(g.R + g.e) + ' ' + nf(g.top) + 'Z" fill="' + b.roof + '"/>';
        s += '<path d="M' + nf(b.cx) + ' ' + nf(g.ridge) + ' L' + nf(b.cx + g.dx) + ' ' + nf(g.ridge + g.dy) +
          '" stroke="rgba(255,255,255,0.4)" stroke-width="' + nf(g.w * 0.03) + '" stroke-linecap="round"/>';
        return s;
      }

      function svgTree(x, y, r) {
        return '<ellipse cx="' + nf(x) + '" cy="' + nf(y + r * 0.1) + '" rx="' + nf(r * 1.05) + '" ry="' + nf(r * 0.32) + '" fill="rgba(0,0,0,0.15)"/>' +
          '<rect x="' + nf(x - r * 0.16) + '" y="' + nf(y - r * 0.7) + '" width="' + nf(r * 0.32) + '" height="' + nf(r * 0.9) + '" rx="' + nf(r * 0.12) + '" fill="#8a5a32"/>' +
          '<circle cx="' + nf(x) + '" cy="' + nf(y - r * 1.05) + '" r="' + nf(r * 0.95) + '" fill="#4e9b3f"/>' +
          '<circle cx="' + nf(x - r * 0.45) + '" cy="' + nf(y - r * 0.75) + '" r="' + nf(r * 0.62) + '" fill="#57a948"/>' +
          '<circle cx="' + nf(x + r * 0.45) + '" cy="' + nf(y - r * 0.8) + '" r="' + nf(r * 0.6) + '" fill="#458a39"/>' +
          '<circle cx="' + nf(x - r * 0.3) + '" cy="' + nf(y - r * 1.35) + '" r="' + nf(r * 0.4) + '" fill="#67bd55"/>';
      }

      function svgCloud(x, y, sc) {
        var r = 8 * sc;
        return '<g fill="rgba(255,255,255,0.92)">' +
          '<ellipse cx="' + nf(x) + '" cy="' + nf(y) + '" rx="' + nf(r * 1.6) + '" ry="' + nf(r * 0.7) + '"/>' +
          '<circle cx="' + nf(x - r) + '" cy="' + nf(y) + '" r="' + nf(r * 0.8) + '"/>' +
          '<circle cx="' + nf(x + r) + '" cy="' + nf(y - r * 0.2) + '" r="' + nf(r * 0.9) + '"/>' +
          '<circle cx="' + nf(x) + '" cy="' + nf(y - r * 0.5) + '" r="' + nf(r) + '"/></g>';
      }

      function svgPond(cx, cy, rx, ry) {
        return '<ellipse cx="' + nf(cx) + '" cy="' + nf(cy + ry * 0.18) + '" rx="' + nf(rx * 1.05) + '" ry="' + nf(ry * 1.05) + '" fill="rgba(0,0,0,0.12)"/>' +
          '<ellipse cx="' + nf(cx) + '" cy="' + nf(cy) + '" rx="' + nf(rx) + '" ry="' + nf(ry) + '" fill="url(#pond)"/>' +
          '<ellipse cx="' + nf(cx - rx * 0.25) + '" cy="' + nf(cy - ry * 0.3) + '" rx="' + nf(rx * 0.4) + '" ry="' + nf(ry * 0.3) + '" fill="rgba(255,255,255,0.4)"/>';
      }

      function svgField(cx, cy, w, h, rot) {
        var x = cx - w / 2, y = cy - h / 2;
        return '<g transform="rotate(' + rot + ' ' + nf(cx) + ' ' + nf(cy) + ')">' +
          '<rect x="' + nf(x - 6) + '" y="' + nf(y - 6) + '" width="' + nf(w + 12) + '" height="' + nf(h + 12) + '" rx="10" fill="#6f9c45"/>' +
          '<rect x="' + nf(x) + '" y="' + nf(y) + '" width="' + nf(w) + '" height="' + nf(h) + '" rx="6" fill="url(#furrow)"/>' +
          '</g>';
      }

      function svgFence(x1, x2, y) {
        var s = '<line x1="' + nf(x1) + '" y1="' + nf(y) + '" x2="' + nf(x2) + '" y2="' + nf(y) + '" stroke="#c9a26a" stroke-width="5"/>' +
          '<line x1="' + nf(x1) + '" y1="' + nf(y - 9) + '" x2="' + nf(x2) + '" y2="' + nf(y - 9) + '" stroke="#dab57e" stroke-width="4"/>';
        for (var x = x1; x <= x2 + 0.1; x += 30) s += '<rect x="' + nf(x - 2.5) + '" y="' + nf(y - 16) + '" width="5" height="23" rx="2" fill="#b98e58"/>';
        return s;
      }

      function svgPenRect(L, R, T, B) {
        var s = '<rect x="' + nf(L) + '" y="' + nf(T) + '" width="' + nf(R - L) + '" height="' + nf(B - T) + '" rx="14" fill="#a9d57e"/>' +
          '<rect x="' + nf(L) + '" y="' + nf(T) + '" width="' + nf(R - L) + '" height="' + nf(B - T) + '" rx="14" fill="url(#pengrass)"/>';
        s += svgFence(L, R, T + 6) + svgFence(L, R, B - 2);
        s += '<rect x="' + nf(L - 2.5) + '" y="' + nf(T - 10) + '" width="5" height="' + nf(B - T + 14) + '" rx="2" fill="#b98e58"/>';
        s += '<rect x="' + nf(R - 2.5) + '" y="' + nf(T - 10) + '" width="5" height="' + nf(B - T + 14) + '" rx="2" fill="#b98e58"/>';
        return s;
      }
      function svgPens() {
        var s = "";
        PEN_DEFS.forEach(function (pn) { s += svgPenRect(pn.L, pn.R, pn.T, pn.B); });
        return s;
      }

      // The tilled backing + fence behind the playable crop grid.
      function svgFieldBacking() {
        var x = FIELD.startX - 24, y = FIELD.startY - 24;
        var w = FIELD.fullW + 48, h = FIELD.fullH + 48;
        var s = '<rect x="' + nf(x - 4) + '" y="' + nf(y - 4) + '" width="' + nf(w + 8) + '" height="' + nf(h + 8) + '" rx="20" fill="#6f9c45"/>';
        s += '<rect x="' + nf(x) + '" y="' + nf(y) + '" width="' + nf(w) + '" height="' + nf(h) + '" rx="14" fill="url(#furrow)"/>';
        s += svgFence(x, x + w, y + 4) + svgFence(x, x + w, y + h - 2);
        return s;
      }

      var DEFS = '<defs>' +
        '<linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#9fd9ff"/><stop offset="1" stop-color="#d8f1ff"/></linearGradient>' +
        '<linearGradient id="grass" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#a7d977"/><stop offset="1" stop-color="#79b557"/></linearGradient>' +
        '<radialGradient id="pond" cx="0.5" cy="0.35" r="0.75"><stop offset="0" stop-color="#bdeaf6"/><stop offset="1" stop-color="#5fb6d6"/></radialGradient>' +
        '<pattern id="furrow" width="60" height="22" patternUnits="userSpaceOnUse"><rect width="60" height="22" fill="#8a5630"/><rect width="60" height="9" fill="#6a3f1d"/></pattern>' +
        '<pattern id="pengrass" width="26" height="26" patternUnits="userSpaceOnUse"><rect width="9" height="26" fill="rgba(255,255,255,0.14)"/></pattern>' +
        '</defs>';

      var PATH_D = "M600 902 C 560 800 700 740 600 640 S 500 460 600 320";

      // Compose the whole scene back-to-front (painter's order = depth).
      function buildScene() {
        var s = DEFS;
        // Sky band, sun, clouds along the horizon at the top of the map.
        s += '<rect x="0" y="0" width="' + WORLD_W + '" height="150" fill="url(#sky)"/>';
        s += '<circle cx="120" cy="92" r="44" fill="#ffe27a"/><circle cx="120" cy="92" r="30" fill="#ffd23f"/>';
        s += svgCloud(560, 70, 3.4) + svgCloud(880, 100, 2.6) + svgCloud(330, 110, 2.2) + svgCloud(1080, 60, 2.8);
        // Rolling hills, then the grass that fills the rest of the world.
        s += '<ellipse cx="240" cy="150" rx="420" ry="80" fill="#8fc265"/><ellipse cx="980" cy="156" rx="380" ry="70" fill="#84b95b"/>';
        s += '<rect x="0" y="138" width="' + WORLD_W + '" height="' + (WORLD_H - 138) + '" fill="url(#grass)"/>';
        // A decorative field behind the village, plus back cottages.
        s += svgField(1010, 235, 200, 96, -8) + svgField(180, 470, 150, 80, 6);
        s += svgHouse(DECO[2]) + svgHouse(DECO[0]) + svgHouse(DECO[1]);
        // Winding dirt path threading through the village.
        s += '<path d="' + PATH_D + '" fill="none" stroke="#d8bd86" stroke-width="64" stroke-linecap="round"/>';
        s += '<path d="' + PATH_D + '" fill="none" stroke="#e7d2a4" stroke-width="36" stroke-linecap="round"/>';
        // Pond and some back trees.
        s += svgPond(300, 205, 84, 40);
        s += svgTree(70, 320, 40) + svgTree(1130, 300, 36) + svgTree(720, 300, 30);
        // The playable field backing (tiles are HTML overlays on top).
        s += svgFieldBacking();
        // Interactive buildings — back row, then front row.
        s += svgHouse(BLD.market) + svgHouse(BLD.cook);
        s += svgHouse(BLD.barn) + svgHouse(BLD.quests);
        // The animal pens and a couple of front trees.
        s += svgPens();
        s += svgTree(90, 700, 46) + svgTree(1130, 660, 42) + svgTree(1130, 860, 38);
        return s;
      }

      /* ----------------------------- OVERLAYS ------------------------------ */
      // A transparent tap target over a drawn building, carrying its shop sign
      // (icon + name + a live status line) and an optional ready badge.
      function hotspot(b, title, sub, badge) {
        var g = geom(b);
        var left = g.minX / WORLD_W * 100, top = g.minY / WORLD_H * 100;
        var w = (g.maxX - g.minX) / WORLD_W * 100, h = (g.maxY - g.minY) / WORLD_H * 100;
        return '<button class="hotspot" data-act="open" data-arg="' + b.act + '" ' +
          'style="left:' + pf(left) + '%;top:' + pf(top) + '%;width:' + pf(w) + '%;height:' + pf(h) + '%">' +
          (badge ? '<span class="b-badge">' + badge + "</span>" : "") +
          '<span class="sign"><span class="si">' + b.ico + "</span>" +
            '<span class="st">' + esc(title) + "</span>" +
            (sub ? '<span class="ss">' + esc(sub) + "</span>" : "") +
          "</span></button>";
      }

      // One overlay per animal pen: a label tag plus the animals living there
      // as individual hold-and-sweep cells (data-animcell = index into
      // state.animals). Locked pens show the level gate; empty unlocked pens
      // invite a trip to the Market.
      function penHotspots() {
        var html = "";
        PEN_DEFS.forEach(function (pn) {
          var def = ANIMAL_BY_ID[pn.type];
          var left = pn.L / WORLD_W * 100, top = pn.T / WORLD_H * 100;
          var w = (pn.R - pn.L) / WORLD_W * 100, h = (pn.B - pn.T) / WORLD_H * 100;
          var locked = !isUnlocked(def.lvl);
          var mine = [];
          state.animals.forEach(function (a, i) { if (a.type === pn.type) mine.push({ a: a, i: i }); });

          var act = "noop", arg = "", inner = "", ready = 0;
          if (locked) {
            act = "penlocked"; arg = pn.type;
            inner = '<span class="pen-lock">🔒 ' + esc(tf("lvl", { n: def.lvl })) + "</span>";
          } else if (!mine.length) {
            act = "open"; arg = "market";
            inner = '<span class="pen-buy"><span class="pi">' + def.ico + "</span>🛒</span>";
          } else {
            inner = '<span class="pen-animals">';
            mine.forEach(function (m) {
              var rdy = m.a.grown >= def.interval;
              var fed = Date.now() < m.a.feedUntil;
              if (rdy) ready++;
              inner += '<span class="an' + (rdy ? " rdy" : (fed ? " fed" : " hungry")) +
                '" data-animcell="' + m.i + '">' + def.ico +
                (rdy ? '<span class="prod">' + ITEM[def.prod].ico + "</span>" : "") + "</span>";
            });
            inner += "</span>";
          }

          var tag = '<span class="pen-tag">' + def.ico + " " + esc(name(pn.type)) +
            (mine.length ? " ×" + mine.length : "") + "</span>";
          html += '<button class="hotspot pen-hot' + (locked ? " locked" : "") + '" data-act="' + act + '"' +
            (arg ? ' data-arg="' + arg + '"' : "") +
            ' style="left:' + pf(left) + '%;top:' + pf(top) + '%;width:' + pf(w) + '%;height:' + pf(h) + '%">' +
            (ready ? '<span class="b-badge">' + ready + "</span>" : "") +
            tag + inner + "</button>";
        });
        return html;
      }

      function plotSprite(p) {
        var c = CROP_BY_ID[p.crop];
        var f = p.grown / c.grow;
        if (f >= 1) return c.ico;
        if (f < 0.33) return SEED_SPRITE;
        if (f < 0.66) return SPROUT_SPRITE;
        return LEAF_SPRITE;
      }

      // The 16 crop tiles, laid over the tilled field backing.
      function renderPlots() {
        var h = "";
        var lw = FIELD.tile / WORLD_W * 100, lh = FIELD.tile / WORLD_H * 100;
        for (var i = 0; i < GRID; i++) {
          var pos = plotPos(i);
          var left = pos.x / WORLD_W * 100, top = pos.y / WORLD_H * 100;
          var style = 'style="left:' + pf(left) + '%;top:' + pf(top) + '%;width:' + pf(lw) + '%;height:' + pf(lh) + '%"';
          if (i >= state.unlocked) {
            var canBuy = i === state.unlocked;
            h += '<button class="plot locked" data-plotcell="' + i + '" data-act="' + (canBuy ? "buyplot" : "noop") + '" ' + style + ' aria-label="locked">' +
              '<span class="sprite">' + (canBuy ? "🔓" : "🔒") + "</span>" +
              (canBuy ? '<span class="pcost">🪙 ' + plotCost() + "</span>" : "") + "</button>";
            continue;
          }
          var p = state.plots[i];
          var cls = "plot", spr = "", w = "0";
          if (p.crop) {
            var c = CROP_BY_ID[p.crop];
            var rdy = p.grown >= c.grow;
            cls += rdy ? " ready" : (p.water > 0 ? " watered" : "");
            spr = plotSprite(p);
            w = Math.min(100, (p.grown / c.grow) * 100).toFixed(1);
          } else { cls += " empty"; }
          h += '<button class="' + cls + '" data-plotcell="' + i + '" data-act="plot" data-arg="' + i + '" ' + style + '>' +
            '<span class="sprite">' + spr + "</span>" +
            '<span class="bar"><i style="width:' + w + '%"></i></span></button>';
        }
        return h;
      }
      function plotCost() { return 40 + (state.unlocked - START_PLOTS) * 40; }

      // The seed / tool selector that floats along the bottom of the map.
      function renderToolbar() {
        var h = "";
        CROPS.forEach(function (c) {
          var lock = !isUnlocked(c.lvl);
          var sel = state.sel === c.id ? " selected" : "";
          h += '<button class="tool' + sel + (lock ? " locked" : "") + '" data-act="seed" data-arg="' + c.id + '">' +
            '<span class="ico">' + c.ico + "</span>" +
            '<span class="name">' + esc(name(c.id)) + "</span>" +
            (lock ? '<span class="cost lock">🔒 ' + tf("lvl", { n: c.lvl }) + "</span>"
                  : '<span class="cost">🪙 ' + c.seed + "</span>") +
            stk(c.id) +
            "</button>";
        });
        h += '<button class="tool' + (state.sel === "water" ? " selected" : "") + '" data-act="seed" data-arg="water">' +
          '<span class="ico">💧</span><span class="name">' + esc(MG.i18n.t("water")) + '</span><span class="cost">·</span></button>';
        h += '<button class="tool' + (state.sel === "clear" ? " selected" : "") + '" data-act="seed" data-arg="clear">' +
          '<span class="ico">🧺</span><span class="name">' + esc(MG.i18n.t("clear")) + '</span><span class="cost">·</span></button>';
        return h;
      }

      /* ======================================================================
       *  PAN / SCALE — keep the world covering the viewport, allow dragging.
       * ==================================================================== */
      var tx = 0, ty = 0, scale = 1, scaledW = 0, scaledH = 0, centered = false;

      function ensureScale() {
        var vw = worldView.clientWidth, vh = worldView.clientHeight;
        if (!vw || !vh) return;
        scale = Math.max(vw / WORLD_W, vh / WORLD_H);
        scaledW = WORLD_W * scale;
        scaledH = WORLD_H * scale;
        if (!centered) { tx = (vw - scaledW) / 2; ty = (vh - scaledH) / 2; centered = true; }
        clampPan();
      }
      function clampPan() {
        var vw = worldView.clientWidth, vh = worldView.clientHeight;
        var minX = vw - scaledW, minY = vh - scaledH;
        if (tx > 0) tx = 0; if (tx < minX) tx = minX;
        if (ty > 0) ty = 0; if (ty < minY) ty = minY;
      }
      function applyWorld() {
        world.style.width = scaledW + "px";
        world.style.height = scaledH + "px";
        world.style.transform = "translate(" + Math.round(tx) + "px," + Math.round(ty) + "px)";
      }

      /* ======================================================================
       *  RENDER — the world is always the base; a building panel may slide up.
       * ==================================================================== */
      function render() {
        ensureScale();
        var tbScroll = toolbarEl.scrollLeft;
        world.innerHTML =
          '<svg viewBox="0 0 ' + WORLD_W + " " + WORLD_H + '" preserveAspectRatio="none" aria-hidden="true">' + buildScene() + "</svg>" +
          hotspot(BLD.market, MG.i18n.t("tabMarket"), "🪙 " + state.coins, "") +
          hotspot(BLD.cook, MG.i18n.t("tabCook"), cookStatus(), readyCounts().cook || "") +
          hotspot(BLD.barn, MG.i18n.t("tabBarn"), "🐄 " + state.animals.length + "/" + state.barnCap, readyCounts().pen || "") +
          hotspot(BLD.quests, MG.i18n.t("tabQuests"), "🎁 " + readyCounts().fillable + "/" + state.quests.length, readyCounts().fillable || "") +
          penHotspots() +
          renderPlots();
        applyWorld();
        toolbarEl.innerHTML = renderToolbar();
        toolbarEl.scrollLeft = tbScroll;
        renderOverlay();
        syncStats();
      }

      function cookStatus() {
        var cooking = 0;
        state.cooks.forEach(function (c) { if (c && Date.now() < c.endsAt) cooking++; });
        return "🍳 " + state.stoves + (cooking ? " · ⏲️ " + cooking : "");
      }
      function readyCounts() {
        var cook = 0;
        state.cooks.forEach(function (c) { if (c && Date.now() >= c.endsAt) cook++; });
        var pen = 0;
        state.animals.forEach(function (a) { if (a.grown >= ANIMAL_BY_ID[a.type].interval) pen++; });
        var fillable = 0;
        state.quests.forEach(function (q) { if (q && (state.inv[q.item] || 0) >= q.need) fillable++; });
        return { cook: cook, pen: pen, fillable: fillable };
      }

      // Mount / refresh the sliding building panel (same behaviour as before).
      function renderOverlay() {
        var tab = state.tab;
        if (!PANELS[tab]) {
          if (overlayTab !== null) {
            overlay.className = "overlay";
            overlay.setAttribute("aria-hidden", "true");
            overlayTab = null;
            if (closeTimer) clearTimeout(closeTimer);
            closeTimer = setTimeout(function () {
              closeTimer = null;
              if (!PANELS[state.tab]) overlay.innerHTML = "";
            }, 260);
          }
          return;
        }
        if (closeTimer) { clearTimeout(closeTimer); closeTimer = null; }
        var body = tab === "market" ? renderMarket()
                 : tab === "barn"   ? renderBarn()
                 : tab === "cook"   ? renderCook()
                 : renderQuests();
        if (overlayTab !== tab) {
          var p = PANELS[tab];
          overlay.innerHTML =
            '<div class="sheet">' +
              '<div class="sheet-head">' +
                '<span class="sh-ico">' + p.ico + "</span>" +
                '<span class="sh-ttl">' + esc(MG.i18n.t(p.title)) + "</span>" +
                '<button class="sh-close" data-act="close" aria-label="close">✕</button>' +
              "</div>" +
              '<div class="sheet-body"><div class="wrap" id="sheetwrap">' + body + "</div></div>" +
            "</div>";
          overlay.removeAttribute("aria-hidden");
          void overlay.offsetWidth;
          overlay.className = "overlay show";
          overlayTab = tab;
        } else {
          var w = $("sheetwrap");
          if (w) w.innerHTML = body;
        }
      }

      function tipLine(key) { return '<div class="tip">' + esc(MG.i18n.t(key)) + "</div>"; }

      /* -------------------------------- BARN ------------------------------- */
      function renderBarn() {
        var h = tipLine("tipBarn");
        if (!state.animals.length) {
          h += '<div class="empty-note">🐔🐄🐑<br>' + esc(MG.i18n.t("barnEmpty")) + "</div>";
          return h;
        }
        state.animals.forEach(function (a, i) {
          var def = ANIMAL_BY_ID[a.type];
          var ready = a.grown >= def.interval;
          var fed = Date.now() < a.feedUntil;
          var pct = Math.min(100, (a.grown / def.interval) * 100).toFixed(1);
          var feedHave = state.inv[def.feed] || 0;
          h += '<div class="card" data-anim="' + i + '">' +
            '<span class="big">' + def.ico + "</span>" +
            '<div class="body">' +
              '<div class="ttl">' + esc(name(a.type)) +
                (ready ? ' <span class="badge ready">' + ITEM[def.prod].ico + "</span>"
                       : ' <span class="badge ' + (fed ? "" : "lock") + '">' + esc(MG.i18n.t(fed ? "fed" : "hungry")) + "</span>") +
              "</div>" +
              '<div class="sub">' + ITEM[def.prod].ico + " " + esc(name(def.prod)) + " " + stk(def.prod) +
                " · 🍽️ " + ITEM[def.feed].ico + " " + esc(name(def.feed)) + " " + stk(def.feed) + "</div>" +
              '<div class="pbar' + (fed ? "" : " warm") + '" data-pbar="' + i + '"><i style="width:' + pct + '%"></i></div>' +
            "</div>" +
            '<div class="right">' +
              '<button class="btn go sm" data-act="collect" data-arg="' + i + '"' + (ready ? "" : " disabled") + ">" + esc(MG.i18n.t("collect")) + "</button>" +
              '<button class="btn alt sm" data-act="feed" data-arg="' + i + '"' + (feedHave <= 0 ? " disabled" : "") + ">" +
                esc(MG.i18n.t("feed")) + " " + ITEM[def.feed].ico + " " + feedHave + "</button>" +
            "</div></div>";
        });
        return h;
      }

      /* ------------------------------- KITCHEN ----------------------------- */
      function renderCook() {
        var h = tipLine("tipCook");

        h += '<div class="section-h">' + esc(MG.i18n.t("stoves")) + " (" + state.stoves + ")</div>";
        state.cooks.forEach(function (c, i) {
          if (!c) {
            h += '<div class="card" style="opacity:.7"><span class="big">🍳</span>' +
              '<div class="body"><div class="sub">·····</div></div></div>';
            return;
          }
          var def = DISH_BY_ID[c.dish];
          var total = def.cook;
          var left = Math.max(0, c.endsAt - Date.now());
          var ready = left <= 0;
          var pct = Math.min(100, ((total - left) / total) * 100).toFixed(1);
          h += '<div class="card" data-cook="' + i + '"><span class="big">' + def.ico + '</span><div class="body">' +
            '<div class="ttl">' + esc(name(c.dish)) + " " + stk(c.dish) +
              (ready ? ' <span class="badge ready">✓</span>' : ' <span class="badge">' + fmtTime(left) + "</span>") + "</div>" +
            '<div class="pbar' + (ready ? "" : " warm") + '" data-cbar="' + i + '"><i style="width:' + pct + '%"></i></div></div>' +
            '<div class="right"><button class="btn go sm" data-act="collectcook" data-arg="' + i + '"' + (ready ? "" : " disabled") + ">" +
              esc(MG.i18n.t("collect")) + "</button></div></div>";
        });

        h += '<div class="section-h">' + esc(MG.i18n.t("recipes")) + "</div>";
        var freeStove = state.cooks.some(function (c) { return !c; });
        DISHES.forEach(function (d) {
          var lock = !isUnlocked(d.lvl);
          var can = hasRecipe(d.recipe);
          var ings = "";
          for (var k in d.recipe) {
            var miss = (state.inv[k] || 0) < d.recipe[k];
            ings += '<span class="ing' + (miss ? " miss" : "") + '">' + ITEM[k].ico + " " +
              (state.inv[k] || 0) + "/" + d.recipe[k] + "</span>";
          }
          h += '<div class="card' + (lock ? " locked" : "") + '"><span class="big">' + d.ico + '</span><div class="body">' +
            '<div class="ttl">' + esc(name(d.id)) + " " + stk(d.id) + ' <span class="badge lock">+' + d.xp + " XP</span></div>" +
            (lock ? '<div class="sub">🔒 ' + esc(tf("needLevel", { n: d.lvl })) + "</div>"
                  : '<div class="ingredients">' + ings + "</div>") +
            "</div><div class='right'>" +
            (lock ? "" : '<button class="btn sm" data-act="cook" data-arg="' + d.id + '"' +
              (can && freeStove ? "" : " disabled") + ">" + esc(MG.i18n.t("cook")) + "</button>") +
            "</div></div>";
        });
        return h;
      }
      function fmtTime(ms) {
        var s = Math.ceil(ms / 1000);
        if (s < 60) return s + "s";
        return Math.floor(s / 60) + ":" + ("0" + (s % 60)).slice(-2);
      }

      /* ------------------------------- MARKET ------------------------------ */
      function priceHtml(id) {
        var m = state.prices[id] || 1;
        var arrow = m > 1.08 ? '<span class="up">▲</span>' : m < 0.92 ? '<span class="down">▼</span>' : "";
        return '<span class="price">🪙 ' + price(id) + " " + arrow + "</span>";
      }
      function renderMarket() {
        var h = tipLine("tipMarket");

        h += '<div class="section-h">' + esc(MG.i18n.t("mSell")) + "</div>";
        var ids = [];
        for (var id in ITEM) if (state.inv[id]) ids.push(id);
        ids.sort(function (a, b) { return price(b) - price(a); });
        if (!ids.length) {
          h += '<div class="empty-note">' + esc(MG.i18n.t("emptyStore")) + "</div>";
        } else {
          ids.forEach(function (id) {
            h += '<div class="card"><span class="big">' + ITEM[id].ico + '</span><div class="body">' +
              '<div class="ttl">' + esc(name(id)) + " " + stk(id) + "</div>" +
              '<div class="sub">' + priceHtml(id) + "</div></div>" +
              '<div class="right" style="flex-direction:row">' +
              '<button class="btn alt sm" data-act="sell" data-arg="' + id + '">' + esc(MG.i18n.t("sell")) + "</button>" +
              '<button class="btn sm" data-act="sellall" data-arg="' + id + '">' + esc(MG.i18n.t("sellAll")) + "</button>" +
              "</div></div>";
          });
        }

        h += '<div class="section-h">' + esc(MG.i18n.t("mAnimals")) + "</div>";
        ANIMALS.forEach(function (a) {
          var lock = !isUnlocked(a.lvl);
          var owned = state.animals.filter(function (x) { return x.type === a.type; }).length;
          var roomy = state.animals.length < state.barnCap;
          var can = !lock && roomy && state.coins >= a.cost;
          h += '<div class="card' + (lock ? " locked" : "") + '"><span class="big">' + a.ico + '</span><div class="body">' +
            '<div class="ttl">' + esc(name(a.id)) + (owned ? ' <span class="badge lock">×' + owned + "</span>" : "") + "</div>" +
            (lock ? '<div class="sub">🔒 ' + esc(tf("needLevel", { n: a.lvl })) + "</div>"
                  : '<div class="sub">' + ITEM[a.prod].ico + " " + esc(name(a.prod)) + " " + stk(a.prod) +
                    " · 🍽️ " + ITEM[a.feed].ico + " " + esc(name(a.feed)) + " " + stk(a.feed) + "</div>") +
            "</div><div class='right'>" +
            (lock ? "" : '<button class="btn sm" data-act="buyanimal" data-arg="' + a.id + '"' +
              (can ? "" : " disabled") + '>🪙 ' + a.cost + (roomy ? "" : " 🏚️") + "</button>") +
            "</div></div>";
        });

        h += '<div class="section-h">' + esc(MG.i18n.t("mUpgrades")) + "</div>";
        h += upgradeCard("cap", "📦", MG.i18n.t("upCap"), state.cap + " → " + (state.cap + 20), capCost());
        h += upgradeCard("barn", "🏚️", MG.i18n.t("upBarn"), state.animals.length + "/" + state.barnCap + " → " + (state.barnCap + 1), barnCost());
        h += upgradeCard("stove", "🍳", MG.i18n.t("upStove"), state.stoves + " → " + (state.stoves + 1), stoveCost());
        return h;
      }
      function upgradeCard(id, ico, ttl, sub, cost) {
        return '<div class="card"><span class="big">' + ico + '</span><div class="body">' +
          '<div class="ttl">' + esc(ttl) + '</div><div class="sub">' + esc(sub) + "</div></div>" +
          '<div class="right"><button class="btn sm" data-act="upgrade" data-arg="' + id + '"' +
          (state.coins < cost ? " disabled" : "") + ">🪙 " + cost + "</button></div></div>";
      }
      function capCost() { return Math.round(state.cap * 0.9); }
      function barnCost() { return 60 + state.barnCap * 70; }
      function stoveCost() { return 90 + (state.stoves - 1) * 110; }

      /* ------------------------------- QUESTS ------------------------------ */
      function renderQuests() {
        var h = tipLine("tipQuests");
        state.quests.forEach(function (q, i) {
          if (!q) { h += '<div class="card"><div class="body"><div class="sub">' + esc(MG.i18n.t("newOrder")) + "</div></div></div>"; return; }
          var have = state.inv[q.item] || 0;
          var can = have >= q.need;
          h += '<div class="card"><span class="big">' + ITEM[q.item].ico + '</span><div class="body">' +
            '<div class="ttl">' + esc(MG.i18n.t("wants")) + " " + q.need + "× " + esc(name(q.item)) +
              ' <span class="badge ' + (can ? "ready" : "lock") + '">' + have + "/" + q.need + "</span></div>" +
            '<div class="sub">' + stk(q.item) + ' · 🎁 🪙 ' + q.coins + " · +" + q.xp + " XP</div></div>" +
            '<div class="right"><button class="btn go sm" data-act="quest" data-arg="' + i + '"' +
            (can ? "" : " disabled") + ">" + esc(MG.i18n.t("deliver")) + "</button></div></div>";
        });
        return h;
      }

      /* ======================================================================
       *  LIVE PATCH — cheap per-frame update of volatile bits.
       * ==================================================================== */
      function patch() {
        var cells = world.querySelectorAll("[data-plotcell]");
        for (var ci = 0; ci < cells.length; ci++) {
          var cell = cells[ci];
          var i = +cell.getAttribute("data-plotcell");
          if (i >= state.unlocked) continue;
          var p = state.plots[i];
          if (cell.classList.contains("locked")) continue;
          var spr = cell.querySelector(".sprite");
          var bar = cell.querySelector(".bar > i");
          if (!p.crop) { if (spr && spr.textContent) spr.textContent = ""; cell.className = "plot empty"; if (bar) bar.style.width = "0%"; continue; }
          var c = CROP_BY_ID[p.crop];
          var rdy = p.grown >= c.grow;
          var cls = "plot" + (rdy ? " ready" : (p.water > 0 ? " watered" : ""));
          if (cell.className !== cls) cell.className = cls;
          var s = plotSprite(p); if (spr && spr.textContent !== s) spr.textContent = s;
          if (bar) bar.style.width = Math.min(100, (p.grown / c.grow) * 100).toFixed(1) + "%";
        }
        if (state.tab === "barn") {
          state.animals.forEach(function (a, i) {
            var def = ANIMAL_BY_ID[a.type];
            var bar = overlay.querySelector('[data-pbar="' + i + '"] > i');
            if (bar) bar.style.width = Math.min(100, (a.grown / def.interval) * 100).toFixed(1) + "%";
          });
        } else if (state.tab === "cook") {
          state.cooks.forEach(function (c, i) {
            if (!c) return;
            var def = DISH_BY_ID[c.dish];
            var left = Math.max(0, c.endsAt - Date.now());
            var bar = overlay.querySelector('[data-cbar="' + i + '"] > i');
            if (bar) bar.style.width = Math.min(100, ((def.cook - left) / def.cook) * 100).toFixed(1) + "%";
          });
        }
      }

      /* ======================================================================
       *  PANNING (pointer) + CLICK DELEGATION
       * ==================================================================== */
      var panId = null, panStartX = 0, panStartY = 0, panTx0 = 0, panTy0 = 0, dragging = false, suppressClick = false;

      // A "paint" gesture: holding on a field tile or an animal and sweeping
      // across more of them performs the action on each one entered — no
      // per-tile clicking. Pressing on open land pans the map as before.
      var paintMode = null, paintId = null, paintVisited = null, paintAgg = null;

      function startPaint(mode, e) {
        paintMode = mode;
        paintId = e.pointerId;
        paintVisited = {};
        paintAgg = freshAgg();
        try { worldView.setPointerCapture(paintId); } catch (err) {}
        hidePanHint();
      }
      // Act on whatever interactive cell sits under the pointer, once per cell.
      function paintAt(cx, cy) {
        var el = document.elementFromPoint(cx, cy);
        if (!el || !el.closest) return;
        if (paintMode === "field") {
          var cell = el.closest("[data-plotcell]");
          if (!cell || cell.getAttribute("data-act") !== "plot") return;
          var i = +cell.getAttribute("data-plotcell");
          if (paintVisited["f" + i]) return;
          paintVisited["f" + i] = true;
          if (actPlot(i, paintAgg)) { patch(); syncStats(); }
        } else if (paintMode === "pen") {
          var ac = el.closest("[data-animcell]");
          if (!ac) return;
          var j = +ac.getAttribute("data-animcell");
          if (paintVisited["a" + j]) return;
          paintVisited["a" + j] = true;
          if (actAnimal(j, paintAgg)) { updateAnimCell(ac, j); syncStats(); }
        }
      }
      function endPaint() {
        if (paintMode === null) return;
        var agg = paintAgg;
        paintMode = null; paintId = null; paintVisited = null; paintAgg = null;
        suppressClick = true; setTimeout(function () { suppressClick = false; }, 0);
        flushAgg(agg);
        save(); render();
      }

      worldView.addEventListener("pointerdown", function (e) {
        if (e.target.closest && e.target.closest("#toolbar")) return; // let the toolbar scroll/tap
        var plotCell = e.target.closest && e.target.closest("[data-plotcell]");
        var animCell = e.target.closest && e.target.closest("[data-animcell]");
        if (plotCell && plotCell.getAttribute("data-act") === "plot") {
          startPaint("field", e); paintAt(e.clientX, e.clientY); return;
        }
        if (animCell) {
          startPaint("pen", e); paintAt(e.clientX, e.clientY); return;
        }
        panId = e.pointerId;
        panStartX = e.clientX; panStartY = e.clientY;
        panTx0 = tx; panTy0 = ty; dragging = false;
      });
      worldView.addEventListener("pointermove", function (e) {
        if (paintMode !== null && e.pointerId === paintId) { paintAt(e.clientX, e.clientY); return; }
        if (panId === null || e.pointerId !== panId) return;
        var dx = e.clientX - panStartX, dy = e.clientY - panStartY;
        if (!dragging && Math.abs(dx) + Math.abs(dy) > 6) {
          dragging = true;
          worldView.classList.add("drag");
          try { worldView.setPointerCapture(panId); } catch (err) {}
          hidePanHint();
        }
        if (dragging) {
          tx = panTx0 + dx; ty = panTy0 + dy;
          clampPan();
          world.style.transform = "translate(" + Math.round(tx) + "px," + Math.round(ty) + "px)";
        }
      });
      function endPan() {
        if (panId === null) return;
        if (dragging) { suppressClick = true; setTimeout(function () { suppressClick = false; }, 0); }
        worldView.classList.remove("drag");
        panId = null; dragging = false;
      }
      worldView.addEventListener("pointerup", function () { endPaint(); endPan(); });
      worldView.addEventListener("pointercancel", function () { endPaint(); endPan(); });

      worldView.addEventListener("click", function (e) {
        if (suppressClick) return;
        var t = e.target;
        while (t && t !== worldView && !t.dataset.act) t = t.parentNode;
        if (!t || t === worldView) return;
        handle(t.dataset.act, t.dataset.arg);
      });
      overlay.addEventListener("click", function (e) {
        if (e.target === overlay) { handle("close"); return; }
        var t = e.target;
        while (t && t !== overlay && !t.dataset.act) t = t.parentNode;
        if (!t || t === overlay) return;
        handle(t.dataset.act, t.dataset.arg);
      });

      /* ======================================================================
       *  ACTIONS
       * ==================================================================== */
      function handle(act, arg) {
        if (act === "open") { state.tab = arg; markDirty(); render(); return; }
        if (act === "close") { state.tab = "village"; markDirty(); render(); return; }
        if (act === "noop") return;

        if (act === "seed") {
          if (CROP_BY_ID[arg] && !isUnlocked(CROP_BY_ID[arg].lvl)) { toast(tf("needLevel", { n: CROP_BY_ID[arg].lvl })); return; }
          state.sel = arg; markDirty(); render(); return;
        }

        if (act === "plot") {
          var ag = freshAgg();
          if (actPlot(+arg, ag)) { flushAgg(ag); save(); render(); }
          else flushAgg(ag);
          return;
        }

        if (act === "penlocked") {
          var ad = ANIMAL_BY_ID[arg];
          if (ad) toast(tf("needLevel", { n: ad.lvl }));
          return;
        }

        if (act === "buyplot") {
          if (state.unlocked >= GRID) return;
          var pc = plotCost();
          if (state.coins < pc) { toast(MG.i18n.t("needCoins")); return; }
          state.coins -= pc; state.unlocked++; save(); render(); return;
        }

        if (act === "feed") { feed(+arg); return; }
        if (act === "collect") { collect(+arg); return; }
        if (act === "buyanimal") { buyAnimal(arg); return; }

        if (act === "cook") { startCook(arg); return; }
        if (act === "collectcook") { collectCook(+arg); return; }

        if (act === "sell") { sell(arg, 1); return; }
        if (act === "sellall") { sell(arg, state.inv[arg] || 0); return; }
        if (act === "upgrade") { upgrade(arg); return; }

        if (act === "quest") { deliver(+arg); return; }
      }

      // ---- Hold-and-sweep actions -------------------------------------------
      // Each act* mutates state for a single tile/animal and records what it did
      // into `agg`, without touching the DOM. A whole sweep aggregates into one
      // `agg`, then flushAgg() shows a single summary toast and we render once.
      function freshAgg() {
        return { harvest: {}, collect: {}, plant: 0, water: 0, clear: 0, fed: 0,
                 full: false, needCoins: false, needLevel: 0 };
      }

      // Apply the selected tool to one field tile. Harvests ripe crops first
      // (whatever the tool), otherwise plants / waters / clears. Returns true
      // when something actually changed.
      function actPlot(i, agg) {
        var p = state.plots[i];
        if (!p) return false;
        if (p.crop && p.grown >= CROP_BY_ID[p.crop].grow) {
          if (spaceLeft() < 1) { agg.full = true; return false; }
          var c = CROP_BY_ID[p.crop];
          addItem(c.id, 1);
          addXp(c.xp);
          p.crop = null; p.grown = 0; p.water = 0;
          agg.harvest[c.id] = (agg.harvest[c.id] || 0) + 1;
          markDirty(); return true;
        }
        if (state.sel === "clear") {
          if (p.crop) { p.crop = null; p.grown = 0; p.water = 0; agg.clear++; markDirty(); return true; }
          return false;
        }
        if (state.sel === "water") {
          if (p.crop && p.water <= 0) { p.water = WATER_MS; agg.water++; markDirty(); return true; }
          return false;
        }
        if (!p.crop) {
          var crop = CROP_BY_ID[state.sel];
          if (!crop) return false;
          if (!isUnlocked(crop.lvl)) { agg.needLevel = crop.lvl; return false; }
          if (state.coins < crop.seed) { agg.needCoins = true; return false; }
          state.coins -= crop.seed;
          p.crop = crop.id; p.grown = 0; p.water = 0;
          agg.plant++; markDirty(); return true;
        }
        return false;
      }

      // Tend one animal: collect its product if ready, else feed it if it's
      // hungry and we have the feed crop. Returns true when something changed.
      function actAnimal(i, agg) {
        var a = state.animals[i]; if (!a) return false;
        var def = ANIMAL_BY_ID[a.type];
        if (a.grown >= def.interval) {
          if (spaceLeft() < 1) { agg.full = true; return false; }
          addItem(def.prod, 1);
          addXp((PROD_BY_ID[def.prod] || {}).xp || 0);
          a.grown = 0;
          agg.collect[def.prod] = (agg.collect[def.prod] || 0) + 1;
          markDirty(); return true;
        }
        if (Date.now() >= a.feedUntil && (state.inv[def.feed] || 0) >= 1) {
          takeItem(def.feed, 1);
          a.feedUntil = Date.now() + FEED_MS;
          agg.fed++;
          markDirty(); return true;
        }
        return false;
      }

      // Boil a finished sweep down to a single, language-light summary toast.
      function flushAgg(agg) {
        if (!agg) return;
        var parts = [], id;
        for (id in agg.harvest) parts.push("+" + agg.harvest[id] + " " + ITEM[id].ico);
        for (id in agg.collect) parts.push("+" + agg.collect[id] + " " + ITEM[id].ico);
        if (agg.plant) parts.push("🌱×" + agg.plant);
        if (agg.water) parts.push("💧×" + agg.water);
        if (agg.clear) parts.push("🧺×" + agg.clear);
        if (agg.fed) parts.push("🍽️×" + agg.fed);
        if (parts.length) { toast(parts.join("  ")); return; }
        if (agg.full) { toast(MG.i18n.t("full")); return; }
        if (agg.needCoins) { toast(MG.i18n.t("needCoins")); return; }
        if (agg.needLevel) { toast(tf("needLevel", { n: agg.needLevel })); return; }
      }

      // Refresh one animal cell's look in place during a pen sweep.
      function updateAnimCell(el, i) {
        var a = state.animals[i]; if (!a) return;
        var def = ANIMAL_BY_ID[a.type];
        var rdy = a.grown >= def.interval;
        var fed = Date.now() < a.feedUntil;
        el.className = "an" + (rdy ? " rdy" : (fed ? " fed" : " hungry"));
        if (!rdy) { var prod = el.querySelector(".prod"); if (prod) prod.parentNode.removeChild(prod); }
      }

      function feed(i) {
        var a = state.animals[i]; if (!a) return;
        var def = ANIMAL_BY_ID[a.type];
        if ((state.inv[def.feed] || 0) < 1) { toast(MG.i18n.t("needIngredients")); return; }
        takeItem(def.feed, 1);
        a.feedUntil = Math.max(Date.now(), a.feedUntil) + FEED_MS;
        save(); render();
      }
      function collect(i) {
        var a = state.animals[i]; if (!a) return;
        var def = ANIMAL_BY_ID[a.type];
        if (a.grown < def.interval) return;
        if (spaceLeft() < 1) { toast(MG.i18n.t("full")); return; }
        addItem(def.prod, 1);
        addXp(PRODUCTS.filter(function (p) { return p.id === def.prod; })[0].xp);
        a.grown = 0;
        toast(tf("collected", { n: 1, item: ITEM[def.prod].ico + " " + name(def.prod) }));
        save(); render();
      }
      function buyAnimal(id) {
        var def = ANIMAL_BY_ID[id]; if (!def) return;
        if (!isUnlocked(def.lvl)) { toast(tf("needLevel", { n: def.lvl })); return; }
        if (state.animals.length >= state.barnCap) { toast("🏚️ " + state.barnCap); return; }
        if (state.coins < def.cost) { toast(MG.i18n.t("needCoins")); return; }
        state.coins -= def.cost;
        state.animals.push({ type: id, grown: 0, feedUntil: Date.now() + FEED_MS });
        toast(MG.i18n.t("bought"));
        save(); render();
      }

      function startCook(id) {
        var def = DISH_BY_ID[id]; if (!def) return;
        if (!isUnlocked(def.lvl)) { toast(tf("needLevel", { n: def.lvl })); return; }
        var slot = -1;
        for (var i = 0; i < state.cooks.length; i++) if (!state.cooks[i]) { slot = i; break; }
        if (slot < 0) { toast(MG.i18n.t("freeStove")); return; }
        if (!hasRecipe(def.recipe)) { toast(MG.i18n.t("needIngredients")); return; }
        for (var k in def.recipe) takeItem(k, def.recipe[k]);
        state.cooks[slot] = { dish: id, endsAt: Date.now() + def.cook };
        toast(tf("cookStarted", { item: def.ico + " " + name(id) }));
        save(); render();
      }
      function collectCook(i) {
        var c = state.cooks[i]; if (!c) return;
        if (Date.now() < c.endsAt) return;
        if (spaceLeft() < 1) { toast(MG.i18n.t("full")); return; }
        var def = DISH_BY_ID[c.dish];
        addItem(c.dish, 1);
        addXp(def.xp);
        state.cooks[i] = null;
        toast(tf("collected", { n: 1, item: def.ico + " " + name(c.dish) }));
        save(); render();
      }

      function sell(id, n) {
        n = Math.min(n, state.inv[id] || 0);
        if (n <= 0) return;
        var gain = price(id) * n;
        takeItem(id, n);
        state.coins += gain;
        toast(tf("gotCoins", { n: gain }));
        save(); render();
      }
      function upgrade(id) {
        if (id === "cap") {
          var cc = capCost(); if (state.coins < cc) { toast(MG.i18n.t("needCoins")); return; }
          state.coins -= cc; state.cap += 20;
        } else if (id === "barn") {
          var bc = barnCost(); if (state.coins < bc) { toast(MG.i18n.t("needCoins")); return; }
          state.coins -= bc; state.barnCap += 1;
        } else if (id === "stove") {
          var sc = stoveCost(); if (state.coins < sc) { toast(MG.i18n.t("needCoins")); return; }
          state.coins -= sc; state.stoves += 1; state.cooks.push(null);
        }
        save(); render();
      }

      function deliver(i) {
        var q = state.quests[i]; if (!q) return;
        if ((state.inv[q.item] || 0) < q.need) return;
        takeItem(q.item, q.need);
        state.coins += q.coins;
        addXp(q.xp);
        toast(tf("questDone", { c: q.coins, x: q.xp }));
        state.quests[i] = makeQuest(state);
        save(); render();
      }

      /* ======================================================================
       *  TICK — advance growth / production / cooking in real time
       * ==================================================================== */
      var last = performance.now();
      var patchAccum = 0, saveAccum = 0, viewAccum = 0;

      function tick(now) {
        var dt = now - last; last = now;
        if (dt > 2000) dt = 2000;

        for (var i = 0; i < state.unlocked; i++) {
          var p = state.plots[i];
          if (!p.crop) continue;
          var c = CROP_BY_ID[p.crop];
          if (p.grown >= c.grow) continue;
          var speed = 1;
          if (p.water > 0) { speed = WATER_BOOST; p.water = Math.max(0, p.water - dt); if (p.water === 0) markDirty(); }
          var before = p.grown;
          p.grown = Math.min(c.grow, p.grown + dt * speed);
          if (before < c.grow && p.grown >= c.grow) markDirty();
        }
        var nowMs = Date.now();
        state.animals.forEach(function (a) {
          var def = ANIMAL_BY_ID[a.type];
          if (a.grown >= def.interval) return;
          if (nowMs < a.feedUntil) {
            var before = a.grown;
            a.grown = Math.min(def.interval, a.grown + dt);
            if (before < def.interval && a.grown >= def.interval) markDirty();
          }
        });
        if (nowMs >= state.marketUntil) rollMarket(state, false);

        patchAccum += dt;
        if (patchAccum > 200) { patch(); patchAccum = 0; }

        // A full (pan-preserving) re-render once a second keeps building status
        // lines, badges, countdowns and re-rolled prices honest. Skip it while
        // the player is actively dragging so the pan stays buttery.
        viewAccum += dt;
        if (viewAccum > 1000) { viewAccum = 0; if (!dragging && paintMode === null) render(); }

        saveAccum += dt;
        if (dirty && saveAccum > 1500) { save(); dirty = false; saveAccum = 0; }

        requestAnimationFrame(tick);
      }

      /* ---- One-time "drag to look around" hint. ---- */
      var hintTimer = null;
      function hidePanHint() { panHint.classList.remove("show"); if (hintTimer) { clearTimeout(hintTimer); hintTimer = null; } }
      function showPanHint() {
        panHint.textContent = MG.i18n.t("dragHint");
        panHint.classList.add("show");
        hintTimer = setTimeout(hidePanHint, 4000);
      }

      // Persist on leave.
      window.addEventListener("pagehide", save);
      document.addEventListener("visibilitychange", function () {
        if (document.visibilityState === "hidden") save();
      });

      // Keep the world covering the viewport as it resizes / rotates.
      window.addEventListener("resize", function () { ensureScale(); applyWorld(); });

      // Re-localize live.
      MG.i18n.onChange(function () { render(); });

      /* ============================ Boot ============================ */
      load();
      render();
      syncStats();
      showPanHint();
      requestAnimationFrame(tick);
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>🚜 Farm — Minigames</title>
  <meta name="description" content="Run a little farm — grow crops, raise animals, cook dishes, fill orders and trade at the market. Play in your browser, no installs." />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚜</text></svg>" />

  <!-- Shared chrome: header bar + language control. -->
  <link rel="stylesheet" href="../../shared/mg.css" />
  <script src="../../shared/mg.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body { height: 100%; }

    body {
      background: #8ec96b;
      color: #2e3b22;
      font-family: "Trebuchet MS", system-ui, -apple-system, sans-serif;
      user-select: none;
      -webkit-user-select: none;
      overflow: hidden;
    }

    /* The game area is a vertical stack: status strip + scrollable view. */
    .mg-game-area {
      display: flex;
      flex-direction: column;
      background:
        radial-gradient(circle at 18% 0%, #a6dd82 0%, transparent 45%),
        radial-gradient(circle at 92% 8%, #a6dd82 0%, transparent 40%),
        linear-gradient(180deg, #8ec96b 0%, #79b557 100%);
    }

    /* ---- Status strip (level / xp / storage) ---- */
    .status {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: rgba(46, 59, 34, 0.14);
    }
    .status .lvl {
      font-weight: 800;
      font-size: 0.9rem;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .status .xpwrap {
      flex: 1 1 auto;
      height: 12px;
      border-radius: 7px;
      background: rgba(0, 0, 0, 0.22);
      overflow: hidden;
      box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.3);
    }
    .status .xpwrap > i {
      display: block;
      height: 100%;
      width: 0%;
      border-radius: 7px;
      background: linear-gradient(90deg, #ffe066, #ffb43d);
      transition: width 0.3s ease;
    }
    .status .store {
      font-weight: 700;
      font-size: 0.82rem;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .status .store.full { color: #b22; }

    /* ---- The scrollable view ---- */
    .view {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 12px 12px 16px;
    }
    .wrap { width: 100%; max-width: 480px; margin: 0 auto; }

    .tip {
      text-align: center;
      font-size: 0.82rem;
      font-weight: 600;
      color: #2e3b22;
      opacity: 0.82;
      margin: 0 auto 12px;
      max-width: 480px;
      min-height: 1.05em;
    }

    .section-h {
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #44502f;
      margin: 14px 2px 8px;
      opacity: 0.9;
    }
    .section-h:first-child { margin-top: 0; }

    /* ---- Field grid ---- */
    .field {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 12px;
      border-radius: 18px;
      background: linear-gradient(180deg, #7a4a26 0%, #683d1f 100%);
      box-shadow: inset 0 0 0 4px #5a3318, 0 10px 26px rgba(0, 0, 0, 0.3);
    }
    .plot {
      position: relative;
      aspect-ratio: 1 / 1;
      border: none;
      border-radius: 12px;
      background:
        repeating-linear-gradient(45deg, rgba(0,0,0,0.05) 0 6px, transparent 6px 12px),
        linear-gradient(180deg, #9c6a3e 0%, #8a5a30 100%);
      box-shadow: inset 0 3px 6px rgba(255,255,255,0.18), inset 0 -4px 8px rgba(0,0,0,0.25);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(1.5rem, 8vw, 2.4rem);
      line-height: 1;
      transition: transform 0.08s ease, box-shadow 0.15s ease;
      color: transparent;
    }
    .plot:active { transform: scale(0.95); }
    .plot.watered {
      background:
        repeating-linear-gradient(45deg, rgba(0,0,0,0.08) 0 6px, transparent 6px 12px),
        linear-gradient(180deg, #6f4427 0%, #5d3a20 100%);
      box-shadow: inset 0 3px 8px rgba(80,140,255,0.25), inset 0 -4px 8px rgba(0,0,0,0.35);
    }
    .plot.locked {
      cursor: pointer;
      background: linear-gradient(180deg, #5d4530 0%, #4a361f 100%);
      box-shadow: inset 0 0 0 2px rgba(0,0,0,0.25);
    }
    .plot.locked .sprite { color: rgba(255,255,255,0.55); font-size: 0.9em; }
    .plot .sprite {
      display: block;
      color: #2e3b22;
      transform-origin: 50% 90%;
      filter: drop-shadow(0 2px 1px rgba(0,0,0,0.3));
    }
    .plot.ready .sprite { animation: ripe 1.3s ease-in-out infinite; }
    .plot.ready { box-shadow: inset 0 0 0 3px #ffd23f, inset 0 -4px 8px rgba(0,0,0,0.25); }
    @keyframes ripe {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-4px) scale(1.06); }
    }
    .plot .bar {
      position: absolute;
      left: 8%; right: 8%; bottom: 6px;
      height: 4px;
      border-radius: 3px;
      background: rgba(0,0,0,0.3);
      overflow: hidden;
    }
    .plot .bar > i {
      display: block;
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #b6f36a, #6fc92b);
      transition: width 0.25s linear;
    }
    .plot.ready .bar, .plot.empty .bar, .plot.locked .bar { display: none; }

    /* ---- Toolbar (seed / tool selector) ---- */
    .toolbar {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 12px 2px 4px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .toolbar::-webkit-scrollbar { display: none; }
    .tool {
      flex: 0 0 auto;
      min-width: 72px;
      border: 2px solid transparent;
      border-radius: 14px;
      background: rgba(255,255,255,0.92);
      color: #2e3b22;
      padding: 8px 10px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      box-shadow: 0 4px 0 rgba(0,0,0,0.18);
      transition: transform 0.08s ease, border-color 0.12s ease;
    }
    .tool:active { transform: translateY(2px); }
    .tool.selected {
      border-color: #ffd23f;
      box-shadow: 0 4px 0 #c79a00, 0 0 0 3px rgba(255,210,63,0.4);
    }
    .tool.locked { opacity: 0.5; cursor: not-allowed; }
    .tool .ico { font-size: 1.6rem; line-height: 1; }
    .tool .name { font-size: 0.7rem; font-weight: 700; }
    .tool .cost { font-size: 0.7rem; font-weight: 800; color: #7a5a00; }
    .tool .cost.lock { color: #8a3030; }

    /* ---- Generic cards ---- */
    .card {
      background: rgba(255,255,255,0.94);
      border-radius: 16px;
      padding: 12px 14px;
      margin-bottom: 10px;
      box-shadow: 0 5px 0 rgba(0,0,0,0.12);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .card.locked { opacity: 0.55; }
    .card .big { font-size: 2.1rem; line-height: 1; flex: 0 0 auto; }
    .card .body { flex: 1 1 auto; min-width: 0; }
    .card .ttl { font-weight: 800; font-size: 0.98rem; }
    .card .sub {
      font-size: 0.78rem;
      color: #5a6648;
      margin-top: 2px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .card .right { flex: 0 0 auto; display: flex; flex-direction: column; gap: 6px; align-items: stretch; }

    .ingredients { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
    .ing {
      font-size: 0.78rem;
      font-weight: 700;
      background: rgba(0,0,0,0.05);
      border-radius: 8px;
      padding: 2px 7px;
    }
    .ing.miss { background: rgba(200,40,40,0.14); color: #9a2020; }

    .pbar {
      height: 8px;
      border-radius: 5px;
      background: rgba(0,0,0,0.16);
      overflow: hidden;
      margin-top: 8px;
    }
    .pbar > i {
      display: block; height: 100%; width: 0%;
      background: linear-gradient(90deg, #6fc92b, #b6f36a);
      transition: width 0.25s linear;
    }
    .pbar.warm > i { background: linear-gradient(90deg, #ff9d3d, #ffd23f); }

    /* ---- Buttons inside cards ---- */
    .btn {
      font-family: inherit;
      font-weight: 800;
      font-size: 0.82rem;
      border: none;
      border-radius: 11px;
      padding: 9px 14px;
      cursor: pointer;
      color: #2e3b22;
      background: #ffd23f;
      box-shadow: 0 3px 0 #c79a00;
      transition: transform 0.07s ease, opacity 0.12s;
      white-space: nowrap;
    }
    .btn:active { transform: translateY(2px); }
    .btn.alt { background: #cfe8b0; box-shadow: 0 3px 0 #93b56e; }
    .btn.go { background: #7fd06a; box-shadow: 0 3px 0 #4f9b3e; color: #14310c; }
    .btn[disabled] { opacity: 0.4; cursor: not-allowed; box-shadow: 0 3px 0 rgba(0,0,0,0.2); }
    .btn.sm { padding: 7px 10px; font-size: 0.78rem; }

    .badge {
      font-size: 0.72rem;
      font-weight: 800;
      border-radius: 999px;
      padding: 2px 9px;
      background: #ffd23f;
      color: #4a3800;
    }
    .badge.ready { background: #7fd06a; color: #14310c; animation: pulse 1.2s ease-in-out infinite; }
    .badge.lock { background: rgba(0,0,0,0.1); color: #5a6648; }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }

    .price { display: inline-flex; align-items: center; gap: 2px; font-weight: 800; }
    .price .up { color: #2f9e2f; }
    .price .down { color: #c23b3b; }

    .empty-note {
      text-align: center;
      color: #44502f;
      font-size: 0.85rem;
      opacity: 0.8;
      padding: 16px 8px;
    }

    .qty {
      font-weight: 800;
      font-size: 0.92rem;
      background: rgba(0,0,0,0.06);
      border-radius: 9px;
      padding: 3px 9px;
      min-width: 34px;
      text-align: center;
    }

    /* ---- Sliding panel (market / kitchen / barn / orders) ----
     * The village is the only screen; tapping a building slides one of
     * these sheets up over it. The overlay element itself is the dimmed
     * backdrop — tapping it (above the sheet) closes the panel. */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      background: rgba(20, 30, 14, 0);
      pointer-events: none;
      transition: background 0.2s ease;
    }
    .overlay.show { pointer-events: auto; background: rgba(20, 30, 14, 0.5); }
    .sheet {
      background: linear-gradient(180deg, #bfe79a 0%, #a7d579 100%);
      border-radius: 20px 20px 0 0;
      max-height: 88%;
      display: flex;
      flex-direction: column;
      box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.35);
      transform: translateY(100%);
      transition: transform 0.24s cubic-bezier(0.2, 0.8, 0.3, 1);
    }
    .overlay.show .sheet { transform: translateY(0); }
    .sheet-head {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: linear-gradient(180deg, #3c5a28, #2f4a1f);
      color: #fff;
      border-radius: 20px 20px 0 0;
    }
    .sheet-head .sh-ico { font-size: 1.4rem; line-height: 1; }
    .sheet-head .sh-ttl { font-weight: 800; font-size: 1.02rem; flex: 1 1 auto; }
    .sheet-head .sh-close {
      flex: 0 0 auto;
      width: 34px; height: 34px;
      border: none;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.16);
      color: #fff;
      font-size: 1.05rem;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .sheet-head .sh-close:active { transform: scale(0.92); }
    .sheet-body {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 12px 14px calc(18px + env(safe-area-inset-bottom, 0));
    }
    .sheet-body .wrap { width: 100%; max-width: 480px; margin: 0 auto; }

    /* ---- Toast ---- */
    .toast {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%) translateY(12px);
      background: rgba(20, 30, 14, 0.94);
      color: #fff;
      font-weight: 700;
      font-size: 0.86rem;
      padding: 9px 16px;
      border-radius: 999px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.35);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 50;
      max-width: 90vw;
      text-align: center;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ====================================================================
     *  VILLAGE — the single, cinematic home screen. A top-down, fake-3D
     *  hamlet diorama (drawn as one inline SVG: land, path, fields, pond,
     *  fences, trees and little gabled cottages) sits on top; the playable
     *  field is worked right below it. Each interactive building is a
     *  transparent hotspot laid precisely over its drawing — tapping it
     *  slides up that building's panel. The whole scene is sized in
     *  container units (cqw) so it scales crisply from phones up.
     * ================================================================== */
    .village { position: relative; }

    .diorama {
      position: relative;
      margin: 0 0 14px;
      border-radius: 20px;
      overflow: hidden;
      aspect-ratio: 200 / 250;     /* matches the SVG viewBox */
      container-type: size;        /* enables cqw/cqh for children */
      background: #9fd06f;
      box-shadow: inset 0 0 0 3px rgba(255,255,255,0.45), 0 14px 30px rgba(0,0,0,0.22);
    }
    .diorama > svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: none;        /* taps fall through to the hotspots */
    }

    /* ---- Hotspots: invisible tap targets laid over each drawn building. ---- */
    .hotspot {
      position: absolute;
      border: none;
      background: transparent;
      padding: 0;
      margin: 0;
      cursor: pointer;
      font-family: inherit;
      color: #3a2b1a;
    }
    .hotspot::after {              /* a soft press highlight over the building */
      content: "";
      position: absolute;
      inset: 8% 8% 16%;
      border-radius: 16%;
      background: rgba(255, 255, 255, 0);
      transition: background 0.12s ease;
      pointer-events: none;
    }
    .hotspot:active::after { background: rgba(255, 255, 255, 0.22); }

    /* A little shop sign / placard hanging on the front of each building. */
    .sign {
      position: absolute;
      left: 50%;
      bottom: 3%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      background: linear-gradient(180deg, #fffdf5, #f1e3c4);
      border-radius: 2.4cqw;
      padding: 0.6cqw 2.2cqw 1cqw;
      box-shadow: 0 1.2cqw 0 rgba(120, 85, 40, 0.4), 0 0.4cqw 1cqw rgba(0, 0, 0, 0.22);
      white-space: nowrap;
      transition: transform 0.08s ease, box-shadow 0.08s ease;
    }
    .hotspot:active .sign {
      transform: translateX(-50%) translateY(0.8cqw);
      box-shadow: 0 0.4cqw 0 rgba(120, 85, 40, 0.4);
    }
    .sign .si { font-size: 6cqw; line-height: 1; filter: drop-shadow(0 1px 1px rgba(0,0,0,0.2)); }
    .sign .st { font-size: 3.2cqw; font-weight: 800; line-height: 1.1; color: #3a2b1a; }
    .sign .ss { font-size: 2.8cqw; font-weight: 700; line-height: 1.1; color: #7a5a30; margin-top: 0.2cqw; }

    .b-badge {
      position: absolute;
      top: 2%;
      right: 4%;
      z-index: 3;
      background: #7fd06a;
      color: #14310c;
      font-weight: 800;
      font-size: 3cqw;
      line-height: 1;
      border-radius: 999px;
      padding: 0.8cqw 1.7cqw;
      box-shadow: 0 0.6cqw 0 #4f9b3e;
      animation: pulse 1.2s ease-in-out infinite;
    }

    /* ---- Pasture: the fenced pen drawn into the scene (opens the barn). ---- */
    .pasture-hot {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 1cqw;
      padding: 0 3cqw;
    }
    .pasture-hot::after { inset: 4%; border-radius: 8%; }
    .pasture-hot .an { font-size: 5.4cqw; line-height: 1; filter: drop-shadow(0 1px 1px rgba(0,0,0,0.25)); }
    .pasture-hot .an.rdy { animation: ripe 1.3s ease-in-out infinite; }
    .pasture-hot .pempty {
      font-size: 2.8cqw;
      font-weight: 700;
      color: #3f5226;
      text-align: center;
      background: rgba(255, 255, 255, 0.66);
      padding: 0.8cqw 2cqw;
      border-radius: 2cqw;
    }

    /* ---- Field section header (inline field lives below it) ---- */
    .field-h {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 4px 2px 8px;
      font-weight: 800;
      font-size: 0.95rem;
      color: #2e3b22;
    }

    @media (max-width: 380px) {
      .card { padding: 10px 11px; gap: 9px; }
      .card .big { font-size: 1.8rem; }
    }
  </style>
</head>
<body class="mg-app">
  <!-- Header is mounted by the shared runtime (see MG.mountHeader below). -->
  <div class="mg-game-area">
    <div class="status">
      <span class="lvl" id="lvl">⭐ 1</span>
      <span class="xpwrap"><i id="xpfill"></i></span>
      <span class="store" id="store">📦 0/40</span>
    </div>
    <div class="view" id="view"></div>
  </div>
  <div class="overlay" id="overlay" aria-hidden="true"></div>
  <div class="toast" id="toast"></div>

  <script>
    (function () {
      "use strict";

      var $ = function (id) { return document.getElementById(id); };
      function esc(s) { return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

      /* ======================================================================
       *  CONTENT TABLES
       *  Growth / production / cooking are all time-based (timestamps or
       *  accumulated game-ms) so progress advances across sessions.
       * ==================================================================== */

      // Crops: seed cost (coins), grow time (ms), base sell price, xp on harvest.
      var CROPS = [
        { id: "wheat",      ico: "🌾", seed: 3,  grow: 16000,  sell: 5,  xp: 1, lvl: 1 },
        { id: "carrot",     ico: "🥕", seed: 6,  grow: 28000,  sell: 11, xp: 2, lvl: 1 },
        { id: "potato",     ico: "🥔", seed: 9,  grow: 44000,  sell: 17, xp: 3, lvl: 2 },
        { id: "tomato",     ico: "🍅", seed: 12, grow: 52000,  sell: 22, xp: 4, lvl: 3 },
        { id: "corn",       ico: "🌽", seed: 15, grow: 64000,  sell: 27, xp: 4, lvl: 4 },
        { id: "strawberry", ico: "🍓", seed: 20, grow: 80000,  sell: 36, xp: 5, lvl: 5 },
        { id: "pumpkin",    ico: "🎃", seed: 28, grow: 120000, sell: 56, xp: 7, lvl: 7 }
      ];

      // Products come from animals.
      var PRODUCTS = [
        { id: "egg",     ico: "🥚", sell: 14, xp: 2 },
        { id: "milk",    ico: "🥛", sell: 26, xp: 3 },
        { id: "wool",    ico: "🧶", sell: 34, xp: 4 },
        { id: "truffle", ico: "🍄", sell: 52, xp: 6 }
      ];

      // Animals: bought into the barn, fed a crop, produce a product on a timer.
      var ANIMALS = [
        { id: "chicken", ico: "🐔", cost: 45,  prod: "egg",     feed: "wheat",  interval: 30000,  lvl: 2 },
        { id: "cow",     ico: "🐄", cost: 130, prod: "milk",    feed: "corn",   interval: 70000,  lvl: 4 },
        { id: "sheep",   ico: "🐑", cost: 175, prod: "wool",    feed: "carrot", interval: 95000,  lvl: 6 },
        { id: "pig",     ico: "🐖", cost: 240, prod: "truffle", feed: "potato", interval: 120000, lvl: 8 }
      ];

      // Dishes: cooked from a recipe in the kitchen, worth far more than raw goods.
      var DISHES = [
        { id: "bread",    ico: "🍞", cook: 22000, sell: 20,  xp: 3,  lvl: 2, recipe: { wheat: 2 } },
        { id: "salad",    ico: "🥗", cook: 28000, sell: 44,  xp: 5,  lvl: 3, recipe: { carrot: 1, tomato: 1 } },
        { id: "omelette", ico: "🍳", cook: 34000, sell: 66,  xp: 7,  lvl: 4, recipe: { egg: 2, tomato: 1 } },
        { id: "soup",     ico: "🍲", cook: 42000, sell: 90,  xp: 9,  lvl: 5, recipe: { potato: 1, carrot: 1, corn: 1 } },
        { id: "pizza",    ico: "🍕", cook: 50000, sell: 124, xp: 12, lvl: 6, recipe: { wheat: 1, tomato: 1, milk: 1 } },
        { id: "cake",     ico: "🍰", cook: 56000, sell: 150, xp: 14, lvl: 6, recipe: { wheat: 1, egg: 1, milk: 1 } },
        { id: "pie",      ico: "🥧", cook: 64000, sell: 190, xp: 17, lvl: 7, recipe: { pumpkin: 1, egg: 1, wheat: 1 } }
      ];

      // Master item table (everything that can sit in storage).
      var ITEM = {};
      CROPS.forEach(function (c) { ITEM[c.id] = { id: c.id, ico: c.ico, sell: c.sell, kind: "crop" }; });

      function name(id) { var n = MG.i18n.t("names"); return (n && n[id]) || id; }
      function tf(key, vars) {
        var s = MG.i18n.t(key);
        if (typeof s !== "string") return s;
        for (var k in vars) if (vars.hasOwnProperty(k)) s = s.replace("{" + k + "}", vars[k]);
        return s;
      }

      /* ======================================================================
       *  SAVE / STATE
       * ==================================================================== */
      var store = MG.storage("farm", {
        version: 2,
        // v1 (the old field-only farm) only carried coins worth keeping.
        migrations: { 2: function (d) { return { coins: (d && d.coins) || 25 }; } }
      });

      var state;

      function need(level) { return 60 + (level - 1) * 50; } // XP to reach next level

      function freshState() {
        var plots = [];
        for (var i = 0; i < GRID; i++) plots.push({ crop: null, grown: 0, water: 0 });
        var s = {
          coins: 25, xp: 0, level: 1, sel: "wheat",
          unlocked: START_PLOTS,
          plots: plots,
          inv: {},
          cap: 40,
          animals: [],
          barnCap: 2,
          stoves: 1,
          cooks: [null],
          quests: [],
          prices: {}, marketUntil: 0,
          tab: "village",
          lastSeen: Date.now()
        };
        rollMarket(s, true);
        for (var q = 0; q < 3; q++) s.quests.push(makeQuest(s));
        return s;
      }

      function load() {
        state = freshState();
        var d = store.load();
        if (d && typeof d === "object") {
          if (typeof d.coins === "number" && d.coins >= 0) state.coins = d.coins;
          if (typeof d.xp === "number" && d.xp >= 0) state.xp = d.xp;
          if (typeof d.level === "number" && d.level >= 1) state.level = d.level;
          if (typeof d.unlocked === "number") state.unlocked = Math.max(START_PLOTS, Math.min(GRID, d.unlocked));
          if (typeof d.cap === "number" && d.cap > 0) state.cap = d.cap;
          if (typeof d.barnCap === "number" && d.barnCap > 0) state.barnCap = d.barnCap;
          if (typeof d.stoves === "number" && d.stoves >= 1) state.stoves = d.stoves;
          if (CROP_BY_ID[d.sel] || d.sel === "water" || d.sel === "clear") state.sel = d.sel;

          if (d.inv && typeof d.inv === "object") {
            state.inv = {};
            for (var k in d.inv) if (ITEM[k] && d.inv[k] > 0) state.inv[k] = Math.floor(d.inv[k]);
          }
          if (Array.isArray(d.plots)) {
            for (var i = 0; i < GRID; i++) {
              var p = d.plots[i] || {};
              var crop = CROP_BY_ID[p.crop] ? p.crop : null;
              state.plots[i] = {
                crop: crop,
                grown: crop ? Math.max(0, +p.grown || 0) : 0,
                water: crop ? Math.max(0, +p.water || 0) : 0
              };
            }
          }
          if (Array.isArray(d.animals)) {
            state.animals = [];
            d.animals.forEach(function (a) {
              if (a && ANIMAL_BY_ID[a.type] && state.animals.length < state.barnCap) {
                state.animals.push({
                  type: a.type,
                  grown: Math.max(0, +a.grown || 0),
                  feedUntil: Math.max(0, +a.feedUntil || 0)
                });
              }
            });
          }
          if (Array.isArray(d.cooks)) {
            state.cooks = [];
            for (var c = 0; c < state.stoves; c++) {
              var ck = d.cooks[c];
              if (ck && DISH_BY_ID[ck.dish]) state.cooks.push({ dish: ck.dish, endsAt: +ck.endsAt || 0 });
              else state.cooks.push(null);
            }
          } else {
            state.cooks = []; for (var c2 = 0; c2 < state.stoves; c2++) state.cooks.push(null);
          }
          if (Array.isArray(d.quests) && d.quests.length) {
            state.quests = [];
            d.quests.forEach(function (q) {
              if (q && ITEM[q.item] && q.need > 0) state.quests.push(q);
            });
            while (state.quests.length < 3) state.quests.push(makeQuest(state));
          }
          // The village is the home screen; building panels are transient,
          // so we always open onto the village rather than a saved panel.
          state.tab = "village";
        }

        // Offline progress.
        var now = Date.now();
        var away = now - (+ (d && d.lastSeen) || now);
        if (away > 0) {
          state.plots.forEach(function (pl) {
            if (pl.crop) {
              var g = CROP_BY_ID[pl.crop].grow;
              pl.grown = Math.min(g, pl.grown + away); // no water bonus offline
              pl.water = 0;
            }
          });
          var seen = +(d && d.lastSeen) || now;
          state.animals.forEach(function (a) {
            var iv = ANIMAL_BY_ID[a.type].interval;
            // only the time the animal was actually fed counts toward production
            var fedTime = Math.max(0, Math.min(now, a.feedUntil) - seen);
            a.grown = Math.min(iv, a.grown + fedTime);
          });
        }
        rollMarket(state, false);
      }

      function save() {
        store.save({
          coins: state.coins, xp: state.xp, level: state.level, sel: state.sel,
          unlocked: state.unlocked, cap: state.cap, barnCap: state.barnCap, stoves: state.stoves,
          inv: state.inv,
          plots: state.plots.map(function (p) {
            return { crop: p.crop, grown: Math.round(p.grown), water: Math.round(p.water) };
          }),
          animals: state.animals.map(function (a) {
            return { type: a.type, grown: Math.round(a.grown), feedUntil: a.feedUntil };
          }),
          cooks: state.cooks.map(function (c) { return c ? { dish: c.dish, endsAt: c.endsAt } : null; }),
          quests: state.quests,
          prices: state.prices, marketUntil: state.marketUntil,
          tab: state.tab,
          lastSeen: Date.now()
        });
      }
      var dirty = false;
      function markDirty() { dirty = true; }

      /* ======================================================================
       *  ECONOMY HELPERS
       * ==================================================================== */
      function invCount() { var n = 0; for (var k in state.inv) n += state.inv[k]; return n; }
      function spaceLeft() { return state.cap - invCount(); }
      function addItem(id, n) { state.inv[id] = (state.inv[id] || 0) + n; }
      function takeItem(id, n) {
        var have = state.inv[id] || 0;
        if (have <= n) delete state.inv[id]; else state.inv[id] = have - n;
      }
      function hasRecipe(rec) { for (var k in rec) if ((state.inv[k] || 0) < rec[k]) return false; return true; }

      function isUnlocked(lvl, st) { return (st || state).level >= lvl; }
      // A sellable/deliverable item is "unlocked" once its source content is.
      function itemUnlocked(id, st) {
        if (CROP_BY_ID[id]) return isUnlocked(CROP_BY_ID[id].lvl, st);
        if (DISH_BY_ID[id]) return isUnlocked(DISH_BY_ID[id].lvl, st);
        if (ANIMAL_FOR_PROD[id]) return isUnlocked(ANIMAL_FOR_PROD[id].lvl, st);
        return true;
      }

      function price(id) {
        var base = ITEM[id] ? ITEM[id].sell : 0;
        var m = state.prices[id] || 1;
        return Math.max(1, Math.round(base * m));
      }

      function rollMarket(s, force) {
        if (!force && s.marketUntil && Date.now() < s.marketUntil) return;
        s.prices = {};
        for (var id in ITEM) s.prices[id] = 0.75 + Math.random() * 0.6; // 0.75 – 1.35
        s.marketUntil = Date.now() + MARKET_MS;
      }

      function addXp(n) {
        state.xp += n;
        var leveled = false, last;
        while (state.xp >= need(state.level)) {
          state.xp -= need(state.level);
          state.level++;
          leveled = true;
          last = state.level;
          var bonus = state.level * 12;
          state.coins += bonus;
          toast(tf("levelUp", { n: state.level, c: bonus }));
        }
        if (leveled) {
          var un = unlocksAt(last);
          if (un) setTimeout(function () { toast(MG.i18n.t("unlocked") + " " + un); }, 900);
          ui.setStat("level", state.level);
          ui.stat("level").classList.add("mg-flash");
          setTimeout(function () { ui.stat("level").classList.remove("mg-flash"); }, 400);
        }
      }

      // What becomes available when reaching `level` (for the level-up toast).
      function unlocksAt(level) {
        var out = [];
        CROPS.forEach(function (c) { if (c.lvl === level) out.push(c.ico); });
        ANIMALS.forEach(function (a) { if (a.lvl === level) out.push(a.ico); });
        DISHES.forEach(function (d) { if (d.lvl === level) out.push(d.ico); });
        return out.join(" ");
      }

      /* ======================================================================
       *  QUESTS
       * ==================================================================== */
      function deliverablePool(st) {
        var ids = [];
        for (var id in ITEM) if (itemUnlocked(id, st)) ids.push(id);
        return ids;
      }
      function makeQuest(s) {
        var pool = deliverablePool(s);
        // Prefer items not already requested.
        var taken = {};
        (s.quests || []).forEach(function (q) { if (q) taken[q.item] = true; });
        var fresh = pool.filter(function (id) { return !taken[id]; });
        if (fresh.length) pool = fresh;
        var item = pool[Math.floor(Math.random() * pool.length)] || "wheat";
        var base = ITEM[item].sell;
        var maxN = base > 60 ? 2 : 3;
        var n = 1 + Math.floor(Math.random() * maxN);
        var coins = Math.round(base * n * 1.7) + s.level * 4;
        var xp = Math.max(3, Math.round(base / 4)) * n;
        return { item: item, need: n, coins: coins, xp: xp };
      }

      /* ======================================================================
       *  HEADER + DOM REFS
       * ==================================================================== */
      var ui = MG.mountHeader({
        icon: "🚜",
        titleKey: "title",
        stats: [
          { key: "coins", labelKey: "coins", value: 0 },
          { key: "level", labelKey: "level", value: 1 }
        ],
        actions: [
          {
            key: "new", labelKey: "newFarm", onClick: function () {
              if (window.confirm(MG.i18n.t("confirmReset"))) {
                state = freshState(); save(); render(); syncStats();
              }
            }
          }
        ]
      });

      var view = $("view");
      var overlay = $("overlay");
      var toastEl = $("toast");

      // Buildings you can step into. The village ("home") is the only base
      // screen; each of these opens as a sliding panel over it.
      var PANELS = {
        market: { ico: "🛒", title: "tabMarket" },
        barn:   { ico: "🐄", title: "tabBarn" },
        cook:   { ico: "🍳", title: "tabCook" },
        quests: { ico: "📋", title: "tabQuests" }
      };
      var overlayTab = null; // which panel's shell is currently mounted
      var closeTimer = null; // delays clearing a sheet until its slide-out ends

      var toastTimer = null;
      function toast(msg) {
        toastEl.textContent = msg;
        toastEl.classList.add("show");
        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(function () { toastEl.classList.remove("show"); }, 1500);
      }

      function syncStats() {
        ui.setStat("coins", state.coins);
        ui.setStat("level", state.level);
        $("lvl").textContent = "⭐ " + state.level;
        $("xpfill").style.width = Math.min(100, (state.xp / need(state.level)) * 100) + "%";
        var n = invCount();
        var st = $("store");
        st.textContent = "📦 " + n + "/" + state.cap;
        st.classList.toggle("full", n >= state.cap);
      }

      /* ======================================================================
       *  RENDER — the village is always the base screen; a building panel
       *  (if open) slides over it.
       * ==================================================================== */
      function render() {
        var scroll = view.scrollTop;
        // Preserve the seed toolbar's horizontal scroll across re-renders.
        var tb = view.querySelector(".toolbar");
        var tbScroll = tb ? tb.scrollLeft : 0;
        view.innerHTML = '<div class="wrap">' + renderVillage() + "</div>";
        view.scrollTop = scroll;
        var tb2 = view.querySelector(".toolbar");
        if (tb2) tb2.scrollLeft = tbScroll;
        renderOverlay();
        syncStats();
      }

      // Mount / refresh the sliding building panel. Building the shell only
      // when the open panel changes keeps the slide-up animation from
      // re-triggering on every periodic refresh; otherwise only the body's
      // inner content is swapped (which preserves its scroll position).
      function renderOverlay() {
        var tab = state.tab;
        if (!PANELS[tab]) {
          if (overlayTab !== null) {
            overlay.className = "overlay"; // slide the sheet down + fade backdrop
            overlay.setAttribute("aria-hidden", "true");
            overlayTab = null;
            if (closeTimer) clearTimeout(closeTimer);
            closeTimer = setTimeout(function () {
              closeTimer = null;
              if (!PANELS[state.tab]) overlay.innerHTML = "";
            }, 260);
          }
          return;
        }
        if (closeTimer) { clearTimeout(closeTimer); closeTimer = null; }
        var body = tab === "market" ? renderMarket()
                 : tab === "barn"   ? renderBarn()
                 : tab === "cook"   ? renderCook()
                 : renderQuests();
        if (overlayTab !== tab) {
          var p = PANELS[tab];
          overlay.innerHTML =
            '<div class="sheet">' +
              '<div class="sheet-head">' +
                '<span class="sh-ico">' + p.ico + "</span>" +
                '<span class="sh-ttl">' + esc(MG.i18n.t(p.title)) + "</span>" +
                '<button class="sh-close" data-act="close" aria-label="close">✕</button>' +
              "</div>" +
              '<div class="sheet-body"><div class="wrap" id="sheetwrap">' + body + "</div></div>" +
            "</div>";
          overlay.removeAttribute("aria-hidden");
          // Force a reflow so the slide-up transition runs from translateY(100%).
          void overlay.offsetWidth;
          overlay.className = "overlay show";
          overlayTab = tab;
        } else {
          var w = $("sheetwrap");
          if (w) w.innerHTML = body;
        }
      }

      function tipLine(key) { return '<div class="tip">' + esc(MG.i18n.t(key)) + "</div>"; }

      /* ------------------------------- VILLAGE ----------------------------- */
      // The one and only screen: a top-down, fake-3D hamlet rendered as a
      // single inline SVG (land, winding path, plowed fields, a pond, fences,
      // trees and gabled cottages). The four playable buildings are drawn into
      // the scene, then a transparent HTML hotspot (carrying a shop sign +
      // status badge) is laid precisely over each one so it can be tapped.
      // Everything is described in the SVG viewBox below and the scene scales
      // crisply on phones via the container's aspect-ratio.
      var VB_W = 200, VB_H = 250;

      // The interactive buildings. (cx, by) is the front-bottom-center point
      // where the cottage meets the ground; w is its footprint width.
      var BLD = {
        market: { act: "market", ico: "🏪", cx: 52,  by: 140, w: 48, roof: "#d8503f", roof2: "#b53c2d", wall: "#fbe6c9", wall2: "#e3cd9f" },
        cook:   { act: "cook",   ico: "🍞", cx: 150, by: 150, w: 44, roof: "#e0962f", roof2: "#bf7c20", wall: "#fdeccb", wall2: "#ecd6a4" },
        barn:   { act: "barn",   ico: "🐄", cx: 52,  by: 208, w: 56, roof: "#9a3b2a", roof2: "#7e2e20", wall: "#c4543a", wall2: "#a3422d" },
        quests: { act: "quests", ico: "🪧", cx: 150, by: 214, w: 46, roof: "#5f8a37", roof2: "#4c7029", wall: "#f3e7c6", wall2: "#dccaa0" }
      };
      // Decorative cottages dotted around the back — just for village flavour.
      var DECO = [
        { cx: 104, by: 84, w: 30, roof: "#c77b3a", roof2: "#a8632b", wall: "#f3e3c0", wall2: "#ddc89c" },
        { cx: 170, by: 96, w: 24, roof: "#7d96c0", roof2: "#6076a0", wall: "#eef0f4", wall2: "#d3d8e2" },
        { cx: 30,  by: 92, w: 26, roof: "#6f9b46", roof2: "#577a35", wall: "#f3e3c0", wall2: "#ddc89c" }
      ];
      // The fenced pasture pen (front of the scene; tapping it opens the barn).
      var PEN = { L: 50, R: 150, T: 216, B: 246 };

      function nf(n) { return Math.round(n * 10) / 10; }   // tidy SVG numbers
      function pf(n) { return Math.round(n * 100) / 100; }  // tidy percentages

      // Geometry for one cottage, shared by the drawing and its tap hotspot so
      // they always line up.
      function geom(b) {
        var w = b.w, cx = b.cx, by = b.by;
        var wh = w * 0.5, rh = w * 0.42, d = w * 0.3, e = w * 0.1, dx = d, dy = -d * 0.5;
        var L = cx - w / 2, R = cx + w / 2, top = by - wh, ridge = top - rh;
        return {
          w: w, cx: cx, by: by, wh: wh, rh: rh, d: d, e: e, dx: dx, dy: dy,
          L: L, R: R, top: top, ridge: ridge,
          minX: L - e, maxX: R + e + dx, minY: ridge + dy, maxY: by
        };
      }

      function svgWindow(x, y, s) {
        return '<rect x="' + nf(x) + '" y="' + nf(y) + '" width="' + nf(s) + '" height="' + nf(s * 0.9) +
          '" rx="' + nf(s * 0.12) + '" fill="rgba(150,210,255,0.85)" stroke="rgba(255,255,255,0.6)" stroke-width="' + nf(s * 0.12) + '"/>';
      }

      // A fake-3D gabled cottage: ground shadow, a shaded right face for depth,
      // a front wall (door + windows) and a pitched roof with a lit ridge.
      function svgHouse(b) {
        var g = geom(b), s = "";
        s += '<ellipse cx="' + nf(b.cx + g.dx * 0.4) + '" cy="' + nf(b.by + g.w * 0.02) +
          '" rx="' + nf(g.w * 0.66) + '" ry="' + nf(g.w * 0.15) + '" fill="rgba(0,0,0,0.16)"/>';
        s += '<path d="M' + nf(g.R) + ' ' + nf(g.top) + ' L' + nf(g.R + g.dx) + ' ' + nf(g.top + g.dy) +
          ' L' + nf(g.R + g.dx) + ' ' + nf(g.by + g.dy) + ' L' + nf(g.R) + ' ' + nf(g.by) + 'Z" fill="' + b.wall2 + '"/>';
        s += '<rect x="' + nf(g.L) + '" y="' + nf(g.top) + '" width="' + nf(g.w) + '" height="' + nf(g.wh) + '" fill="' + b.wall + '"/>';
        s += '<rect x="' + nf(g.L) + '" y="' + nf(g.by - g.wh * 0.13) + '" width="' + nf(g.w) + '" height="' + nf(g.wh * 0.13) + '" fill="rgba(0,0,0,0.1)"/>';
        var ww = g.w * 0.16, wy = g.top + g.wh * 0.22;
        s += svgWindow(g.L + g.w * 0.13, wy, ww) + svgWindow(g.R - g.w * 0.13 - ww, wy, ww);
        var dw = g.w * 0.2, dh = g.wh * 0.5;
        s += '<rect x="' + nf(b.cx - dw / 2) + '" y="' + nf(g.by - dh) + '" width="' + nf(dw) + '" height="' + nf(dh) +
          '" rx="' + nf(dw * 0.28) + '" fill="rgba(86,52,24,0.6)"/>';
        s += '<path d="M' + nf(b.cx) + ' ' + nf(g.ridge) + ' L' + nf(b.cx + g.dx) + ' ' + nf(g.ridge + g.dy) +
          ' L' + nf(g.R + g.e + g.dx) + ' ' + nf(g.top + g.dy) + ' L' + nf(g.R + g.e) + ' ' + nf(g.top) + 'Z" fill="' + b.roof2 + '"/>';
        s += '<path d="M' + nf(g.L - g.e) + ' ' + nf(g.top) + ' L' + nf(b.cx) + ' ' + nf(g.ridge) +
          ' L' + nf(g.R + g.e) + ' ' + nf(g.top) + 'Z" fill="' + b.roof + '"/>';
        s += '<path d="M' + nf(b.cx) + ' ' + nf(g.ridge) + ' L' + nf(b.cx + g.dx) + ' ' + nf(g.ridge + g.dy) +
          '" stroke="rgba(255,255,255,0.4)" stroke-width="' + nf(g.w * 0.03) + '" stroke-linecap="round"/>';
        return s;
      }

      function svgTree(x, y, r) {
        return '<ellipse cx="' + nf(x) + '" cy="' + nf(y + r * 0.1) + '" rx="' + nf(r * 1.05) + '" ry="' + nf(r * 0.32) + '" fill="rgba(0,0,0,0.15)"/>' +
          '<rect x="' + nf(x - r * 0.16) + '" y="' + nf(y - r * 0.7) + '" width="' + nf(r * 0.32) + '" height="' + nf(r * 0.9) + '" rx="' + nf(r * 0.12) + '" fill="#8a5a32"/>' +
          '<circle cx="' + nf(x) + '" cy="' + nf(y - r * 1.05) + '" r="' + nf(r * 0.95) + '" fill="#4e9b3f"/>' +
          '<circle cx="' + nf(x - r * 0.45) + '" cy="' + nf(y - r * 0.75) + '" r="' + nf(r * 0.62) + '" fill="#57a948"/>' +
          '<circle cx="' + nf(x + r * 0.45) + '" cy="' + nf(y - r * 0.8) + '" r="' + nf(r * 0.6) + '" fill="#458a39"/>' +
          '<circle cx="' + nf(x - r * 0.3) + '" cy="' + nf(y - r * 1.35) + '" r="' + nf(r * 0.4) + '" fill="#67bd55"/>';
      }

      function svgCloud(x, y, sc) {
        var r = 8 * sc;
        return '<g fill="rgba(255,255,255,0.92)">' +
          '<ellipse cx="' + nf(x) + '" cy="' + nf(y) + '" rx="' + nf(r * 1.6) + '" ry="' + nf(r * 0.7) + '"/>' +
          '<circle cx="' + nf(x - r) + '" cy="' + nf(y) + '" r="' + nf(r * 0.8) + '"/>' +
          '<circle cx="' + nf(x + r) + '" cy="' + nf(y - r * 0.2) + '" r="' + nf(r * 0.9) + '"/>' +
          '<circle cx="' + nf(x) + '" cy="' + nf(y - r * 0.5) + '" r="' + nf(r) + '"/></g>';
      }

      function svgPond(cx, cy, rx, ry) {
        return '<ellipse cx="' + nf(cx) + '" cy="' + nf(cy + ry * 0.18) + '" rx="' + nf(rx * 1.05) + '" ry="' + nf(ry * 1.05) + '" fill="rgba(0,0,0,0.12)"/>' +
          '<ellipse cx="' + nf(cx) + '" cy="' + nf(cy) + '" rx="' + nf(rx) + '" ry="' + nf(ry) + '" fill="url(#pond)"/>' +
          '<ellipse cx="' + nf(cx - rx * 0.25) + '" cy="' + nf(cy - ry * 0.3) + '" rx="' + nf(rx * 0.4) + '" ry="' + nf(ry * 0.3) + '" fill="rgba(255,255,255,0.4)"/>';
      }

      // A plowed farm plot: a grassy border around a furrowed patch, tilted a
      // little for the top-down look.
      function svgField(cx, cy, w, h, rot) {
        var x = cx - w / 2, y = cy - h / 2;
        return '<g transform="rotate(' + rot + ' ' + nf(cx) + ' ' + nf(cy) + ')">' +
          '<rect x="' + nf(x - 1.5) + '" y="' + nf(y - 1.5) + '" width="' + nf(w + 3) + '" height="' + nf(h + 3) + '" rx="3" fill="#6f9c45"/>' +
          '<rect x="' + nf(x) + '" y="' + nf(y) + '" width="' + nf(w) + '" height="' + nf(h) + '" rx="2" fill="url(#furrow)"/>' +
          '</g>';
      }

      function svgFence(x1, x2, y) {
        var s = '<line x1="' + nf(x1) + '" y1="' + nf(y) + '" x2="' + nf(x2) + '" y2="' + nf(y) + '" stroke="#c9a26a" stroke-width="1.6"/>' +
          '<line x1="' + nf(x1) + '" y1="' + nf(y - 3) + '" x2="' + nf(x2) + '" y2="' + nf(y - 3) + '" stroke="#dab57e" stroke-width="1.3"/>';
        for (var x = x1; x <= x2 + 0.1; x += 8) s += '<rect x="' + nf(x - 0.9) + '" y="' + nf(y - 5) + '" width="1.8" height="7.5" rx="0.8" fill="#b98e58"/>';
        return s;
      }

      function svgPen() {
        var s = '<rect x="' + nf(PEN.L) + '" y="' + nf(PEN.T) + '" width="' + nf(PEN.R - PEN.L) + '" height="' + nf(PEN.B - PEN.T) + '" rx="8" fill="#a9d57e"/>' +
          '<rect x="' + nf(PEN.L) + '" y="' + nf(PEN.T) + '" width="' + nf(PEN.R - PEN.L) + '" height="' + nf(PEN.B - PEN.T) + '" rx="8" fill="url(#pengrass)"/>';
        s += svgFence(PEN.L, PEN.R, PEN.T + 2) + svgFence(PEN.L, PEN.R, PEN.B - 1);
        s += '<rect x="' + nf(PEN.L - 0.9) + '" y="' + nf(PEN.T - 3) + '" width="1.8" height="' + nf(PEN.B - PEN.T + 4) + '" rx="0.8" fill="#b98e58"/>';
        s += '<rect x="' + nf(PEN.R - 0.9) + '" y="' + nf(PEN.T - 3) + '" width="1.8" height="' + nf(PEN.B - PEN.T + 4) + '" rx="0.8" fill="#b98e58"/>';
        return s;
      }

      var DEFS = '<defs>' +
        '<linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#9fd9ff"/><stop offset="1" stop-color="#d8f1ff"/></linearGradient>' +
        '<linearGradient id="grass" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#a7d977"/><stop offset="1" stop-color="#7cbf57"/></linearGradient>' +
        '<radialGradient id="pond" cx="0.5" cy="0.35" r="0.75"><stop offset="0" stop-color="#bdeaf6"/><stop offset="1" stop-color="#5fb6d6"/></radialGradient>' +
        '<pattern id="furrow" width="200" height="5" patternUnits="userSpaceOnUse"><rect width="200" height="5" fill="#8a5630"/><rect width="200" height="2" fill="#6a3f1d"/></pattern>' +
        '<pattern id="pengrass" width="6" height="6" patternUnits="userSpaceOnUse"><rect width="2" height="6" fill="rgba(255,255,255,0.14)"/></pattern>' +
        '</defs>';

      var PATH_D = "M104 252 C 96 214 124 198 108 170 S 84 120 104 86";

      // Compose the whole scene back-to-front (painter's order = depth).
      function buildScene() {
        var s = DEFS;
        // Sky, sun, clouds.
        s += '<rect x="0" y="0" width="200" height="72" fill="url(#sky)"/>';
        s += '<circle cx="30" cy="26" r="13" fill="#ffe27a"/><circle cx="30" cy="26" r="9" fill="#ffd23f"/>';
        s += svgCloud(124, 22, 1) + svgCloud(172, 40, 0.8) + svgCloud(72, 46, 0.7);
        // Rolling hills on the horizon, then the grass.
        s += '<ellipse cx="40" cy="74" rx="80" ry="26" fill="#8fc265"/><ellipse cx="170" cy="78" rx="70" ry="24" fill="#84b95b"/>';
        s += '<rect x="0" y="66" width="200" height="184" fill="url(#grass)"/>';
        // A field tucked behind the village, decorative cottages, back trees.
        s += svgField(150, 90, 42, 22, -12);
        s += svgHouse(DECO[0]) + svgHouse(DECO[1]) + svgHouse(DECO[2]);
        s += svgTree(13, 138, 12) + svgTree(189, 150, 11) + svgTree(96, 120, 8);
        // Winding dirt path.
        s += '<path d="' + PATH_D + '" fill="none" stroke="#d8bd86" stroke-width="15" stroke-linecap="round"/>';
        s += '<path d="' + PATH_D + '" fill="none" stroke="#e7d2a4" stroke-width="8" stroke-linecap="round"/>';
        // Pond nestled among the houses.
        s += svgPond(110, 182, 16, 9);
        // Interactive buildings — back row then front row.
        s += svgHouse(BLD.market) + svgHouse(BLD.cook);
        s += svgHouse(BLD.barn) + svgHouse(BLD.quests);
        s += svgTree(190, 196, 9);
        // The pasture pen and the two front farm plots.
        s += svgPen();
        s += svgField(22, 230, 30, 20, -8) + svgField(176, 232, 28, 18, 8);
        return s;
      }

      // A transparent tap target laid over a drawn building, carrying its shop
      // sign (icon + name + a live status line) and an optional ready badge.
      function hotspot(b, title, sub, badge) {
        var g = geom(b);
        var left = g.minX / VB_W * 100, top = g.minY / VB_H * 100;
        var w = (g.maxX - g.minX) / VB_W * 100, h = (g.maxY - g.minY) / VB_H * 100;
        return '<button class="hotspot" data-act="open" data-arg="' + b.act + '" ' +
          'style="left:' + pf(left) + '%;top:' + pf(top) + '%;width:' + pf(w) + '%;height:' + pf(h) + '%">' +
          (badge ? '<span class="b-badge">' + badge + "</span>" : "") +
          '<span class="sign"><span class="si">' + b.ico + "</span>" +
            '<span class="st">' + esc(title) + "</span>" +
            (sub ? '<span class="ss">' + esc(sub) + "</span>" : "") +
          "</span></button>";
      }

      function pastureHotspot() {
        var left = PEN.L / VB_W * 100, top = PEN.T / VB_H * 100;
        var w = (PEN.R - PEN.L) / VB_W * 100, h = (PEN.B - PEN.T) / VB_H * 100;
        var inner = "";
        if (!state.animals.length) {
          inner = '<span class="pempty">' + esc(MG.i18n.t("vPastureEmpty")) + "</span>";
        } else {
          state.animals.forEach(function (a) {
            var def = ANIMAL_BY_ID[a.type];
            var rdy = a.grown >= def.interval;
            inner += '<span class="an' + (rdy ? " rdy" : "") + '">' + def.ico + "</span>";
          });
        }
        return '<button class="hotspot pasture-hot" data-act="open" data-arg="barn" ' +
          'style="left:' + pf(left) + '%;top:' + pf(top) + '%;width:' + pf(w) + '%;height:' + pf(h) + '%">' +
          inner + "</button>";
      }

      function renderVillage() {
        // Tally what's ready, for the little badges on each building.
        var cookReady = 0, cooking = 0;
        state.cooks.forEach(function (c) { if (c) { if (Date.now() >= c.endsAt) cookReady++; else cooking++; } });
        var penReady = 0;
        state.animals.forEach(function (a) { if (a.grown >= ANIMAL_BY_ID[a.type].interval) penReady++; });
        var fillable = 0, orders = 0;
        state.quests.forEach(function (q) { if (q) { orders++; if ((state.inv[q.item] || 0) >= q.need) fillable++; } });

        var h = '<div class="village"><div class="diorama">';
        h += '<svg viewBox="0 0 ' + VB_W + " " + VB_H + '" preserveAspectRatio="xMidYMid meet" aria-hidden="true">' +
          buildScene() + "</svg>";

        // Hotspots over each building (drawing + tap target stay in sync).
        h += hotspot(BLD.market, MG.i18n.t("tabMarket"), "🪙 " + state.coins, "");
        h += hotspot(BLD.cook, MG.i18n.t("tabCook"), "🍳 " + state.stoves + (cooking ? " · ⏲️ " + cooking : ""), cookReady || "");
        h += hotspot(BLD.barn, MG.i18n.t("tabBarn"), "🐄 " + state.animals.length + "/" + state.barnCap, penReady || "");
        h += hotspot(BLD.quests, MG.i18n.t("tabQuests"), "🎁 " + fillable + "/" + orders, fillable || "");
        h += pastureHotspot();

        h += "</div>"; // .diorama

        // ---- The playable field, worked right here in the village. ----
        h += '<div class="field-section">' + renderFieldSection() + "</div>";

        h += "</div>"; // .village
        return h;
      }

      /* -------------------------------- FIELD ------------------------------ */
      function plotSprite(p) {
        var c = CROP_BY_ID[p.crop];
        var f = p.grown / c.grow;
        if (f >= 1) return c.ico;
        if (f < 0.33) return SEED_SPRITE;
        if (f < 0.66) return SPROUT_SPRITE;
        return LEAF_SPRITE;
      }
      function renderFieldSection() {
        var tipKey = state.sel === "water" ? "tipWater" : state.sel === "clear" ? "tipClear" : "tipPlant";
        var ready = state.plots.some(function (p, i) { return i < state.unlocked && p.crop && p.grown >= CROP_BY_ID[p.crop].grow; });
        if (ready) tipKey = "tipReady";
        var h = '<div class="field-h">🌾 ' + esc(MG.i18n.t("plantedField")) + "</div>";
        h += tipLine(tipKey);

        // toolbar (seeds + tools)
        h += '<div class="toolbar">';
        CROPS.forEach(function (c) {
          var lock = !isUnlocked(c.lvl);
          var sel = state.sel === c.id ? " selected" : "";
          h += '<button class="tool' + sel + (lock ? " locked" : "") + '" data-act="seed" data-arg="' + c.id + '">' +
            '<span class="ico">' + c.ico + '</span>' +
            '<span class="name">' + esc(name(c.id)) + '</span>' +
            (lock ? '<span class="cost lock">🔒 ' + tf("lvl", { n: c.lvl }) + '</span>'
                  : '<span class="cost">🪙 ' + c.seed + '</span>') +
            "</button>";
        });
        h += '<button class="tool' + (state.sel === "water" ? " selected" : "") + '" data-act="seed" data-arg="water">' +
          '<span class="ico">💧</span><span class="name">' + esc(MG.i18n.t("water")) + '</span><span class="cost">·</span></button>';
        h += '<button class="tool' + (state.sel === "clear" ? " selected" : "") + '" data-act="seed" data-arg="clear">' +
          '<span class="ico">🧺</span><span class="name">' + esc(MG.i18n.t("clear")) + '</span><span class="cost">·</span></button>';
        h += "</div>";

        // field grid
        h += '<div class="field" id="field">';
        for (var i = 0; i < GRID; i++) {
          if (i >= state.unlocked) {
            var canBuy = i === state.unlocked; // only the next plot is buyable
            h += '<button class="plot locked" data-act="' + (canBuy ? "buyplot" : "noop") + '" aria-label="locked">' +
              '<span class="sprite">' + (canBuy ? "🔓" : "🔒") + "</span></button>";
            continue;
          }
          var p = state.plots[i];
          var cls = "plot", spr = "", w = "0";
          if (p.crop) {
            var c = CROP_BY_ID[p.crop];
            var rdy = p.grown >= c.grow;
            cls += rdy ? " ready" : (p.water > 0 ? " watered" : "");
            spr = plotSprite(p);
            w = Math.min(100, (p.grown / c.grow) * 100).toFixed(1);
          } else { cls += " empty"; }
          h += '<button class="' + cls + '" data-act="plot" data-arg="' + i + '">' +
            '<span class="sprite">' + spr + '</span>' +
            '<span class="bar"><i style="width:' + w + '%"></i></span></button>';
        }
        h += "</div>";

        // expand field row
        if (state.unlocked < GRID) {
          h += '<div class="section-h">' + esc(MG.i18n.t("expandField")) + "</div>";
          var pc = plotCost();
          h += '<div class="card"><span class="big">🟫</span><div class="body">' +
            '<div class="ttl">' + esc(MG.i18n.t("unlockPlot")) + '</div>' +
            '<div class="sub">' + (state.unlocked) + " / " + GRID + "</div></div>" +
            '<div class="right"><button class="btn" data-act="buyplot"' +
            (state.coins < pc ? " disabled" : "") + ">🪙 " + pc + "</button></div></div>";
        }
        return h;
      }
      function plotCost() { return 40 + (state.unlocked - START_PLOTS) * 40; }

      /* -------------------------------- BARN ------------------------------- */
      function renderBarn() {
        var h = tipLine("tipBarn");
        if (!state.animals.length) {
          h += '<div class="empty-note">🐔🐄🐑<br>' + esc(MG.i18n.t("barnEmpty")) + "</div>";
          return h;
        }
        state.animals.forEach(function (a, i) {
          var def = ANIMAL_BY_ID[a.type];
          var ready = a.grown >= def.interval;
          var fed = Date.now() < a.feedUntil;
          var pct = Math.min(100, (a.grown / def.interval) * 100).toFixed(1);
          var feedHave = state.inv[def.feed] || 0;
          h += '<div class="card" data-anim="' + i + '">' +
            '<span class="big">' + def.ico + '</span>' +
            '<div class="body">' +
              '<div class="ttl">' + esc(name(a.type)) +
                (ready ? ' <span class="badge ready">' + ITEM[def.prod].ico + "</span>"
                       : ' <span class="badge ' + (fed ? "" : "lock") + '">' + esc(MG.i18n.t(fed ? "fed" : "hungry")) + "</span>") +
              "</div>" +
              '<div class="sub">🍽️ ' + ITEM[def.feed].ico + " " + esc(name(def.feed)) +
                " · " + ITEM[def.prod].ico + " " + esc(name(def.prod)) + "</div>" +
              '<div class="pbar' + (fed ? "" : " warm") + '" data-pbar="' + i + '"><i style="width:' + pct + '%"></i></div>' +
            "</div>" +
            '<div class="right">' +
              '<button class="btn go sm" data-act="collect" data-arg="' + i + '"' + (ready ? "" : " disabled") + '>' + esc(MG.i18n.t("collect")) + "</button>" +
              '<button class="btn alt sm" data-act="feed" data-arg="' + i + '"' + (feedHave <= 0 ? " disabled" : "") + '>' +
                esc(MG.i18n.t("feed")) + " " + ITEM[def.feed].ico + " " + feedHave + "</button>" +
            "</div></div>";
        });
        return h;
      }

      /* ------------------------------- KITCHEN ----------------------------- */
      function renderCook() {
        var h = tipLine("tipCook");

        // Active stoves.
        h += '<div class="section-h">' + esc(MG.i18n.t("stoves")) + " (" + state.stoves + ")</div>";
        state.cooks.forEach(function (c, i) {
          if (!c) {
            h += '<div class="card" style="opacity:.7"><span class="big">🍳</span>' +
              '<div class="body"><div class="sub">·····</div></div></div>';
            return;
          }
          var def = DISH_BY_ID[c.dish];
          var total = def.cook;
          var left = Math.max(0, c.endsAt - Date.now());
          var ready = left <= 0;
          var pct = Math.min(100, ((total - left) / total) * 100).toFixed(1);
          h += '<div class="card" data-cook="' + i + '"><span class="big">' + def.ico + '</span><div class="body">' +
            '<div class="ttl">' + esc(name(c.dish)) +
              (ready ? ' <span class="badge ready">✓</span>' : ' <span class="badge">' + fmtTime(left) + "</span>") + "</div>" +
            '<div class="pbar' + (ready ? "" : " warm") + '" data-cbar="' + i + '"><i style="width:' + pct + '%"></i></div></div>' +
            '<div class="right"><button class="btn go sm" data-act="collectcook" data-arg="' + i + '"' + (ready ? "" : " disabled") + '>' +
              esc(MG.i18n.t("collect")) + "</button></div></div>";
        });

        // Recipes.
        h += '<div class="section-h">' + esc(MG.i18n.t("recipes")) + "</div>";
        var freeStove = state.cooks.some(function (c) { return !c; });
        DISHES.forEach(function (d) {
          var lock = !isUnlocked(d.lvl);
          var can = hasRecipe(d.recipe);
          var ings = "";
          for (var k in d.recipe) {
            var miss = (state.inv[k] || 0) < d.recipe[k];
            ings += '<span class="ing' + (miss ? " miss" : "") + '">' + ITEM[k].ico + " " +
              (state.inv[k] || 0) + "/" + d.recipe[k] + "</span>";
          }
          h += '<div class="card' + (lock ? " locked" : "") + '"><span class="big">' + d.ico + '</span><div class="body">' +
            '<div class="ttl">' + esc(name(d.id)) + ' <span class="badge lock">+' + d.xp + " XP</span></div>" +
            (lock ? '<div class="sub">🔒 ' + esc(tf("needLevel", { n: d.lvl })) + "</div>"
                  : '<div class="ingredients">' + ings + "</div>") +
            "</div><div class='right'>" +
            (lock ? "" : '<button class="btn sm" data-act="cook" data-arg="' + d.id + '"' +
              (can && freeStove ? "" : " disabled") + '>' + esc(MG.i18n.t("cook")) + "</button>") +
            "</div></div>";
        });
        return h;
      }
      function fmtTime(ms) {
        var s = Math.ceil(ms / 1000);
        if (s < 60) return s + "s";
        return Math.floor(s / 60) + ":" + ("0" + (s % 60)).slice(-2);
      }

      /* ------------------------------- MARKET ------------------------------ */
      function priceHtml(id) {
        var m = state.prices[id] || 1;
        var arrow = m > 1.08 ? '<span class="up">▲</span>' : m < 0.92 ? '<span class="down">▼</span>' : "";
        return '<span class="price">🪙 ' + price(id) + " " + arrow + "</span>";
      }
      function renderMarket() {
        var h = tipLine("tipMarket");

        // Sell goods.
        h += '<div class="section-h">' + esc(MG.i18n.t("mSell")) + "</div>";
        var ids = [];
        for (var id in ITEM) if (state.inv[id]) ids.push(id);
        // sort by kind then value
        ids.sort(function (a, b) { return price(b) - price(a); });
        if (!ids.length) {
          h += '<div class="empty-note">' + esc(MG.i18n.t("emptyStore")) + "</div>";
        } else {
          ids.forEach(function (id) {
            h += '<div class="card"><span class="big">' + ITEM[id].ico + '</span><div class="body">' +
              '<div class="ttl">' + esc(name(id)) + '</div>' +
              '<div class="sub">' + priceHtml(id) + ' · ×' + state.inv[id] + "</div></div>" +
              '<div class="right" style="flex-direction:row">' +
              '<button class="btn alt sm" data-act="sell" data-arg="' + id + '">' + esc(MG.i18n.t("sell")) + "</button>" +
              '<button class="btn sm" data-act="sellall" data-arg="' + id + '">' + esc(MG.i18n.t("sellAll")) + "</button>" +
              "</div></div>";
          });
        }

        // Animals.
        h += '<div class="section-h">' + esc(MG.i18n.t("mAnimals")) + "</div>";
        ANIMALS.forEach(function (a) {
          var lock = !isUnlocked(a.lvl);
          var owned = state.animals.filter(function (x) { return x.type === a.type; }).length;
          var roomy = state.animals.length < state.barnCap;
          var can = !lock && roomy && state.coins >= a.cost;
          h += '<div class="card' + (lock ? " locked" : "") + '"><span class="big">' + a.ico + '</span><div class="body">' +
            '<div class="ttl">' + esc(name(a.id)) + (owned ? ' <span class="badge lock">×' + owned + "</span>" : "") + "</div>" +
            (lock ? '<div class="sub">🔒 ' + esc(tf("needLevel", { n: a.lvl })) + "</div>"
                  : '<div class="sub">' + ITEM[a.prod].ico + " " + esc(name(a.prod)) +
                    " · 🍽️ " + ITEM[a.feed].ico + " " + esc(name(a.feed)) + "</div>") +
            "</div><div class='right'>" +
            (lock ? "" : '<button class="btn sm" data-act="buyanimal" data-arg="' + a.id + '"' +
              (can ? "" : " disabled") + '>🪙 ' + a.cost + (roomy ? "" : " 🏚️") + "</button>") +
            "</div></div>";
        });

        // Upgrades.
        h += '<div class="section-h">' + esc(MG.i18n.t("mUpgrades")) + "</div>";
        h += upgradeCard("cap", "📦", MG.i18n.t("upCap"), state.cap + " → " + (state.cap + 20), capCost());
        h += upgradeCard("barn", "🏚️", MG.i18n.t("upBarn"), state.animals.length + "/" + state.barnCap + " → " + (state.barnCap + 1), barnCost());
        h += upgradeCard("stove", "🍳", MG.i18n.t("upStove"), state.stoves + " → " + (state.stoves + 1), stoveCost());
        return h;
      }
      function upgradeCard(id, ico, ttl, sub, cost) {
        return '<div class="card"><span class="big">' + ico + '</span><div class="body">' +
          '<div class="ttl">' + esc(ttl) + '</div><div class="sub">' + esc(sub) + "</div></div>" +
          '<div class="right"><button class="btn sm" data-act="upgrade" data-arg="' + id + '"' +
          (state.coins < cost ? " disabled" : "") + ">🪙 " + cost + "</button></div></div>";
      }
      function capCost() { return Math.round(state.cap * 0.9); }
      function barnCost() { return 60 + state.barnCap * 70; }
      function stoveCost() { return 90 + (state.stoves - 1) * 110; }

      /* ------------------------------- QUESTS ------------------------------ */
      function renderQuests() {
        var h = tipLine("tipQuests");
        state.quests.forEach(function (q, i) {
          if (!q) { h += '<div class="card"><div class="body"><div class="sub">' + esc(MG.i18n.t("newOrder")) + "</div></div></div>"; return; }
          var have = state.inv[q.item] || 0;
          var can = have >= q.need;
          h += '<div class="card"><span class="big">' + ITEM[q.item].ico + '</span><div class="body">' +
            '<div class="ttl">' + esc(MG.i18n.t("wants")) + " " + q.need + "× " + esc(name(q.item)) +
              ' <span class="badge ' + (can ? "ready" : "lock") + '">' + have + "/" + q.need + "</span></div>" +
            '<div class="sub">🎁 🪙 ' + q.coins + " · +" + q.xp + " XP</div></div>" +
            '<div class="right"><button class="btn go sm" data-act="quest" data-arg="' + i + '"' +
            (can ? "" : " disabled") + ">" + esc(MG.i18n.t("deliver")) + "</button></div></div>";
        });
        return h;
      }

      /* ======================================================================
       *  LIVE PATCH — cheap per-frame update of volatile bits (no rebuild,
       *  so scroll position and taps are preserved).
       * ==================================================================== */
      function patch() {
        // The field always lives on the village screen — keep its progress
        // bars and sprites smooth between full re-renders.
        var field = $("field");
        if (field) {
          var cells = field.children;
          for (var i = 0; i < GRID && i < cells.length; i++) {
            if (i >= state.unlocked) continue;
            var p = state.plots[i], cell = cells[i];
            if (cell.classList.contains("locked")) continue;
            var spr = cell.querySelector(".sprite");
            var bar = cell.querySelector(".bar > i");
            if (!p.crop) { if (spr.textContent) spr.textContent = ""; cell.className = "plot empty"; if (bar) bar.style.width = "0%"; continue; }
            var c = CROP_BY_ID[p.crop];
            var rdy = p.grown >= c.grow;
            var cls = "plot" + (rdy ? " ready" : (p.water > 0 ? " watered" : ""));
            if (cell.className !== cls) cell.className = cls;
            var s = plotSprite(p); if (spr.textContent !== s) spr.textContent = s;
            if (bar) bar.style.width = Math.min(100, (p.grown / c.grow) * 100).toFixed(1) + "%";
          }
        }
        // Building panels (barn / kitchen) have ticking bars inside the sheet.
        if (state.tab === "barn") {
          state.animals.forEach(function (a, i) {
            var def = ANIMAL_BY_ID[a.type];
            var bar = overlay.querySelector('[data-pbar="' + i + '"] > i');
            if (bar) bar.style.width = Math.min(100, (a.grown / def.interval) * 100).toFixed(1) + "%";
          });
        } else if (state.tab === "cook") {
          state.cooks.forEach(function (c, i) {
            if (!c) return;
            var def = DISH_BY_ID[c.dish];
            var left = Math.max(0, c.endsAt - Date.now());
            var bar = overlay.querySelector('[data-cbar="' + i + '"] > i');
            if (bar) bar.style.width = Math.min(100, ((def.cook - left) / def.cook) * 100).toFixed(1) + "%";
          });
        }
      }

      /* ======================================================================
       *  ACTIONS (delegated)
       * ==================================================================== */
      view.addEventListener("click", function (e) {
        var t = e.target;
        while (t && t !== view && !t.dataset.act) t = t.parentNode;
        if (!t || t === view) return;
        handle(t.dataset.act, t.dataset.arg);
      });
      overlay.addEventListener("click", function (e) {
        // Tapping the dimmed backdrop (the overlay itself, above the sheet)
        // closes the panel.
        if (e.target === overlay) { handle("close"); return; }
        var t = e.target;
        while (t && t !== overlay && !t.dataset.act) t = t.parentNode;
        if (!t || t === overlay) return;
        handle(t.dataset.act, t.dataset.arg);
      });

      function handle(act, arg) {
        if (act === "open") { state.tab = arg; markDirty(); render(); return; }
        if (act === "close") { state.tab = "village"; markDirty(); render(); return; }
        if (act === "noop") return;

        if (act === "seed") {
          if (CROP_BY_ID[arg] && !isUnlocked(CROP_BY_ID[arg].lvl)) { toast(tf("needLevel", { n: CROP_BY_ID[arg].lvl })); return; }
          state.sel = arg; markDirty(); render(); return;
        }

        if (act === "plot") { onPlot(+arg); return; }

        if (act === "buyplot") {
          if (state.unlocked >= GRID) return;
          var pc = plotCost();
          if (state.coins < pc) { toast(MG.i18n.t("needCoins")); return; }
          state.coins -= pc; state.unlocked++; save(); render(); return;
        }

        if (act === "feed") { feed(+arg); return; }
        if (act === "collect") { collect(+arg); return; }
        if (act === "buyanimal") { buyAnimal(arg); return; }

        if (act === "cook") { startCook(arg); return; }
        if (act === "collectcook") { collectCook(+arg); return; }

        if (act === "sell") { sell(arg, 1); return; }
        if (act === "sellall") { sell(arg, state.inv[arg] || 0); return; }
        if (act === "upgrade") { upgrade(arg); return; }

        if (act === "quest") { deliver(+arg); return; }
      }

      function onPlot(i) {
        var p = state.plots[i];
        if (!p) return;
        // Ripe crop always harvests on tap.
        if (p.crop && p.grown >= CROP_BY_ID[p.crop].grow) {
          if (spaceLeft() < 1) { toast(MG.i18n.t("full")); return; }
          var c = CROP_BY_ID[p.crop];
          addItem(c.id, 1);
          addXp(c.xp);
          p.crop = null; p.grown = 0; p.water = 0;
          toast(tf("harvested", { n: 1, item: c.ico + " " + name(c.id) }));
          save(); render(); return;
        }
        if (state.sel === "clear") {
          if (p.crop) { p.crop = null; p.grown = 0; p.water = 0; save(); render(); }
          return;
        }
        if (state.sel === "water") {
          if (p.crop) { p.water = WATER_MS; save(); patch(); }
          return;
        }
        // plant
        if (!p.crop) {
          var crop = CROP_BY_ID[state.sel];
          if (!crop) return;
          if (!isUnlocked(crop.lvl)) { toast(tf("needLevel", { n: crop.lvl })); return; }
          if (state.coins < crop.seed) { toast(MG.i18n.t("needCoins")); return; }
          state.coins -= crop.seed;
          p.crop = crop.id; p.grown = 0; p.water = 0;
          save(); render();
        }
      }

      function feed(i) {
        var a = state.animals[i]; if (!a) return;
        var def = ANIMAL_BY_ID[a.type];
        if ((state.inv[def.feed] || 0) < 1) { toast(MG.i18n.t("needIngredients")); return; }
        takeItem(def.feed, 1);
        a.feedUntil = Math.max(Date.now(), a.feedUntil) + FEED_MS;
        save(); render();
      }
      function collect(i) {
        var a = state.animals[i]; if (!a) return;
        var def = ANIMAL_BY_ID[a.type];
        if (a.grown < def.interval) return;
        if (spaceLeft() < 1) { toast(MG.i18n.t("full")); return; }
        addItem(def.prod, 1);
        addXp(PRODUCTS.filter(function (p) { return p.id === def.prod; })[0].xp);
        a.grown = 0;
        toast(tf("collected", { n: 1, item: ITEM[def.prod].ico + " " + name(def.prod) }));
        save(); render();
      }
      function buyAnimal(id) {
        var def = ANIMAL_BY_ID[id]; if (!def) return;
        if (!isUnlocked(def.lvl)) { toast(tf("needLevel", { n: def.lvl })); return; }
        if (state.animals.length >= state.barnCap) { toast("🏚️ " + state.barnCap); return; }
        if (state.coins < def.cost) { toast(MG.i18n.t("needCoins")); return; }
        state.coins -= def.cost;
        state.animals.push({ type: id, grown: 0, feedUntil: Date.now() + FEED_MS });
        toast(MG.i18n.t("bought"));
        save(); render();
      }

      function startCook(id) {
        var def = DISH_BY_ID[id]; if (!def) return;
        if (!isUnlocked(def.lvl)) { toast(tf("needLevel", { n: def.lvl })); return; }
        var slot = -1;
        for (var i = 0; i < state.cooks.length; i++) if (!state.cooks[i]) { slot = i; break; }
        if (slot < 0) { toast(MG.i18n.t("freeStove")); return; }
        if (!hasRecipe(def.recipe)) { toast(MG.i18n.t("needIngredients")); return; }
        for (var k in def.recipe) takeItem(k, def.recipe[k]);
        state.cooks[slot] = { dish: id, endsAt: Date.now() + def.cook };
        toast(tf("cookStarted", { item: def.ico + " " + name(id) }));
        save(); render();
      }
      function collectCook(i) {
        var c = state.cooks[i]; if (!c) return;
        if (Date.now() < c.endsAt) return;
        if (spaceLeft() < 1) { toast(MG.i18n.t("full")); return; }
        var def = DISH_BY_ID[c.dish];
        addItem(c.dish, 1);
        addXp(def.xp);
        state.cooks[i] = null;
        toast(tf("collected", { n: 1, item: def.ico + " " + name(c.dish) }));
        save(); render();
      }

      function sell(id, n) {
        n = Math.min(n, state.inv[id] || 0);
        if (n <= 0) return;
        var gain = price(id) * n;
        takeItem(id, n);
        state.coins += gain;
        toast(tf("gotCoins", { n: gain }));
        save(); render();
      }
      function upgrade(id) {
        if (id === "cap") {
          var cc = capCost(); if (state.coins < cc) { toast(MG.i18n.t("needCoins")); return; }
          state.coins -= cc; state.cap += 20;
        } else if (id === "barn") {
          var bc = barnCost(); if (state.coins < bc) { toast(MG.i18n.t("needCoins")); return; }
          state.coins -= bc; state.barnCap += 1;
        } else if (id === "stove") {
          var sc = stoveCost(); if (state.coins < sc) { toast(MG.i18n.t("needCoins")); return; }
          state.coins -= sc; state.stoves += 1; state.cooks.push(null);
        }
        save(); render();
      }

      function deliver(i) {
        var q = state.quests[i]; if (!q) return;
        if ((state.inv[q.item] || 0) < q.need) return;
        takeItem(q.item, q.need);
        state.coins += q.coins;
        addXp(q.xp);
        toast(tf("questDone", { c: q.coins, x: q.xp }));
        state.quests[i] = makeQuest(state);
        save(); render();
      }

      /* ======================================================================
       *  TICK — advance growth / production / cooking in real time
       * ==================================================================== */
      var last = performance.now();
      var patchAccum = 0, saveAccum = 0, viewAccum = 0;

      function tick(now) {
        var dt = now - last; last = now;
        if (dt > 2000) dt = 2000;

        // crops
        for (var i = 0; i < state.unlocked; i++) {
          var p = state.plots[i];
          if (!p.crop) continue;
          var c = CROP_BY_ID[p.crop];
          if (p.grown >= c.grow) continue;
          var speed = 1;
          if (p.water > 0) { speed = WATER_BOOST; p.water = Math.max(0, p.water - dt); if (p.water === 0) markDirty(); }
          var before = p.grown;
          p.grown = Math.min(c.grow, p.grown + dt * speed);
          if (before < c.grow && p.grown >= c.grow) markDirty();
        }
        // animals
        var nowMs = Date.now();
        state.animals.forEach(function (a) {
          var def = ANIMAL_BY_ID[a.type];
          if (a.grown >= def.interval) return;
          if (nowMs < a.feedUntil) {
            var before = a.grown;
            a.grown = Math.min(def.interval, a.grown + dt);
            if (before < def.interval && a.grown >= def.interval) markDirty();
          }
        });
        // market re-roll (re-rendered on the next periodic refresh)
        if (nowMs >= state.marketUntil) rollMarket(state, false);

        // light patch a few times a second (smooth progress bars)
        patchAccum += dt;
        if (patchAccum > 200) { patch(); patchAccum = 0; }

        // A full (scroll-preserving) re-render once a second keeps the village
        // badges, building status lines and any open panel honest — countdowns,
        // readiness and re-rolled market prices all flip without thrashing the
        // DOM the rest of the time.
        viewAccum += dt;
        if (viewAccum > 1000) { viewAccum = 0; render(); }

        // throttled save
        saveAccum += dt;
        if (dirty && saveAccum > 1500) { save(); dirty = false; saveAccum = 0; }

        requestAnimationFrame(tick);
      }

      // Persist on leave.
      window.addEventListener("pagehide", save);
      document.addEventListener("visibilitychange", function () {
        if (document.visibilityState === "hidden") save();
      });

      // Re-localize live.
      MG.i18n.onChange(function () { render(); });

      /* ============================ Boot ============================ */
      load();
      render();
      syncStats();
      requestAnimationFrame(tick);
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>🐤 Flappy Bird — Minigames</title>
  <meta name="description" content="Flappy Bird — tap, click or press space to flap through the pipes. Play in your browser, no installs." />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐤</text></svg>" />

  <!-- Shared chrome: header bar + language control. -->
  <link rel="stylesheet" href="../../shared/mg.css" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #2b2b3a;
      color: #fff;
      font-family: "Trebuchet MS", system-ui, -apple-system, sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    /* The game area hosts the centered stage below the shared header. */
    .mg-game-area {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #2b2b3a;
    }

    .stage {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 480px;
      box-shadow: 0 0 60px rgba(0, 0, 0, 0.5);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    /* Overlay screens */
    .overlay {
      position: absolute;
      inset: 0;
      z-index: 4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      text-align: center;
      padding: 24px;
      pointer-events: none;
    }
    .overlay.hidden { display: none; }

    .panel {
      background: rgba(0, 0, 0, 0.45);
      border-radius: 18px;
      padding: 26px 30px;
      backdrop-filter: blur(3px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
    }

    .title {
      font-size: clamp(1.8rem, 7vw, 2.6rem);
      font-weight: 800;
      letter-spacing: 0.02em;
      text-shadow: 0 3px 0 rgba(0, 0, 0, 0.35);
      margin-bottom: 6px;
    }

    .hint {
      font-size: 1rem;
      opacity: 0.9;
      margin-top: 4px;
    }

    .score-line {
      font-size: 1.1rem;
      margin-top: 8px;
    }
    .score-line b { font-size: 1.6rem; }

    .play-pill {
      display: inline-block;
      margin-top: 14px;
      padding: 10px 22px;
      font-weight: 800;
      font-size: 1.05rem;
      color: #2b6e1a;
      background: #ffe34d;
      border-radius: 999px;
      box-shadow: 0 4px 0 #c9a900;
      animation: bob 1.1s ease-in-out infinite;
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
  </style>
</head>
<body class="mg-app">
  <!-- Header is mounted by the shared runtime (see MG.mountHeader below). -->
  <div class="mg-game-area">
    <div class="stage">
      <canvas id="game"></canvas>

      <div class="overlay" id="overlay">
        <div class="panel">
          <div class="title" id="overlay-title">🐤 Flappy Bird</div>
          <div class="hint" id="overlay-hint"></div>
          <div class="score-line" id="overlay-score" hidden></div>
          <div class="play-pill" id="overlay-action"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>

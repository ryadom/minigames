<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>∞ Minesweeper — Minigames</title>
  <meta name="description" content="Infinite Minesweeper — an endless, pannable, zoomable board. Play in your browser, no installs." />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💣</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Shared chrome: header bar + language control. -->
  <link rel="stylesheet" href="../../shared/mg.css" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--mg-bg);
      color: var(--mg-txt);
      font-family: "IBM Plex Mono", ui-monospace, monospace;
      user-select: none;
      -webkit-user-select: none;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
      touch-action: none;
    }

    footer {
      flex: 0 0 auto;
      border-top: 1px solid var(--mg-line);
      background: #0c1015;
      padding: 7px 14px;
      font-size: 11px;
      color: var(--mg-dim);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    footer b { color: var(--mg-warn); }
    footer .sep { color: var(--mg-line); }

    @media (max-width: 560px) {
      footer .hide { display: none; }
    }
  </style>
</head>
<body class="mg-app">
  <!-- Header is mounted by the shared runtime (see MG.mountHeader below). -->
  <div id="wrap" class="mg-game-area"><canvas id="game"></canvas></div>
  <footer id="hints"></footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>

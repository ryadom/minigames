<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>🦠 Agar — Minigames</title>
  <meta name="description" content="Agar — glide your blob around, swallow pellets and smaller cells to grow, and dodge anything bigger. Mouse or touch. Play in your browser, no installs." />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦠</text></svg>" />

  <!-- Shared chrome: header bar + language control. -->
  <link rel="stylesheet" href="../../shared/mg.css" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #0d1117;
      color: #fff;
      font-family: "Trebuchet MS", system-ui, -apple-system, sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    /* The game area hosts the full-bleed playfield below the shared header. */
    .mg-game-area {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d1117;
    }

    .stage {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    canvas#game {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      background: #11151f;
    }

    /* Tiny leaderboard pinned to the top-right of the playfield. */
    .board {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 3;
      min-width: 150px;
      padding: 10px 12px;
      background: rgba(0, 0, 0, 0.42);
      border-radius: 12px;
      backdrop-filter: blur(3px);
      font-size: 0.85rem;
      pointer-events: none;
    }
    .board h4 {
      font-size: 0.8rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      opacity: 0.7;
      margin-bottom: 6px;
    }
    .board ol {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .board li {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      white-space: nowrap;
    }
    .board li.me {
      font-weight: 800;
      color: #7ee0ff;
    }
    .board li .rank { opacity: 0.55; margin-right: 6px; }
    .board li .nm { overflow: hidden; text-overflow: ellipsis; }
    .board li .ms { opacity: 0.85; font-variant-numeric: tabular-nums; }

    @media (max-width: 480px) {
      .board { min-width: 120px; padding: 8px 9px; font-size: 0.78rem; }
    }

    /* Overlay screens (start / game over) */
    .overlay {
      position: absolute;
      inset: 0;
      z-index: 4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      text-align: center;
      padding: 24px;
      pointer-events: none;
    }
    .overlay.hidden { display: none; }

    .panel {
      background: rgba(0, 0, 0, 0.55);
      border-radius: 18px;
      padding: 26px 30px;
      backdrop-filter: blur(3px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      pointer-events: auto;
      cursor: pointer;
    }

    .title {
      font-size: clamp(1.8rem, 7vw, 2.6rem);
      font-weight: 800;
      letter-spacing: 0.02em;
      text-shadow: 0 3px 0 rgba(0, 0, 0, 0.35);
      margin-bottom: 6px;
    }

    .hint {
      font-size: 1rem;
      opacity: 0.9;
      margin-top: 4px;
    }

    .score-line {
      font-size: 1.1rem;
      margin-top: 8px;
    }
    .score-line b { font-size: 1.6rem; }

    .play-pill {
      display: inline-block;
      margin-top: 14px;
      padding: 10px 22px;
      font-weight: 800;
      font-size: 1.05rem;
      color: #06303a;
      background: #5ad0e0;
      border-radius: 999px;
      box-shadow: 0 4px 0 #2691a0;
      animation: bob 1.1s ease-in-out infinite;
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
  </style>
</head>
<body class="mg-app">
  <!-- Header is mounted by the shared runtime (see MG.mountHeader below). -->
  <div class="mg-game-area">
    <div class="stage">
      <canvas id="game"></canvas>

      <div class="board" id="board" hidden>
        <h4 id="board-title">Leaderboard</h4>
        <ol id="board-list"></ol>
      </div>

      <div class="overlay" id="overlay">
        <div class="panel">
          <div class="title" id="overlay-title">🦠 Agar</div>
          <div class="hint" id="overlay-hint"></div>
          <div class="score-line" id="overlay-score" hidden></div>
          <div class="play-pill" id="overlay-action"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>💎 Match Three — Minigames</title>
  <meta name="description" content="Match Three — swap gems to line up three or more. Build rockets, bombs and color blasts to clear the board. Play in your browser, no installs." />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💎</text></svg>" />

  <!-- Shared chrome: header bar + language control. -->
  <link rel="stylesheet" href="../../shared/mg.css" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #15131f;
      color: #fff;
      font-family: "Trebuchet MS", system-ui, -apple-system, sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    .mg-game-area {
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 50% 0%, #2a2440, #15131f 70%);
    }

    .stage {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 560px;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    /* Overlay screens */
    .overlay {
      position: absolute;
      inset: 0;
      z-index: 4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      text-align: center;
      padding: 24px;
      pointer-events: none;
    }
    .overlay.hidden { display: none; }

    .panel {
      background: rgba(20, 16, 34, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      padding: 26px 30px;
      backdrop-filter: blur(4px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      max-width: 380px;
    }

    .title {
      font-size: clamp(1.8rem, 7vw, 2.6rem);
      font-weight: 800;
      letter-spacing: 0.02em;
      text-shadow: 0 3px 0 rgba(0, 0, 0, 0.35);
      margin-bottom: 6px;
    }

    .hint {
      font-size: 1rem;
      opacity: 0.9;
      margin-top: 4px;
      line-height: 1.5;
    }

    .legend {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 6px 12px;
      margin-top: 14px;
      font-size: 0.82rem;
      text-align: left;
      opacity: 0.95;
    }
    .legend .gi { font-size: 1.2rem; text-align: center; }

    .score-line {
      font-size: 1.1rem;
      margin-top: 10px;
    }
    .score-line b { font-size: 1.6rem; color: #ffd83d; }

    .play-pill {
      display: inline-block;
      margin-top: 16px;
      padding: 11px 24px;
      font-weight: 800;
      font-size: 1.05rem;
      color: #2a1a45;
      background: linear-gradient(180deg, #ffe98c, #ffce3d);
      border-radius: 999px;
      box-shadow: 0 4px 0 #c79100;
      pointer-events: auto;
      cursor: pointer;
      animation: bob 1.1s ease-in-out infinite;
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    /* Floating toast (level up / combos) */
    .toast {
      position: absolute;
      left: 50%;
      top: 14%;
      transform: translateX(-50%);
      z-index: 5;
      padding: 10px 20px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 1.15rem;
      color: #2a1a45;
      background: linear-gradient(180deg, #b6f7ff, #6fe0ff);
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.45);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-6px);
    }
  </style>
</head>
<body class="mg-app">
  <!-- Header is mounted by the shared runtime (see MG.mountHeader below). -->
  <div class="mg-game-area">
    <div class="stage">
      <canvas id="game"></canvas>
      <div class="toast" id="toast"></div>

      <div class="overlay" id="overlay">
        <div class="panel">
          <div class="title" id="overlay-title">💎 Match Three</div>
          <div class="hint" id="overlay-hint"></div>
          <div class="legend" id="overlay-legend"></div>
          <div class="score-line" id="overlay-score" hidden></div>
          <div class="play-pill" id="overlay-action"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>

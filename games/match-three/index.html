<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>💎 Match Three — Minigames</title>
  <meta name="description" content="Match Three — swap gems to line up three or more. Build rockets, bombs and color blasts to clear the board. Play in your browser, no installs." />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💎</text></svg>" />

  <!-- Shared chrome: header bar + language control. -->
  <link rel="stylesheet" href="../../shared/mg.css" />
  <script src="../../shared/mg.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #15131f;
      color: #fff;
      font-family: "Trebuchet MS", system-ui, -apple-system, sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    .mg-game-area {
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 50% 0%, #2a2440, #15131f 70%);
    }

    .stage {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 560px;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    /* Overlay screens */
    .overlay {
      position: absolute;
      inset: 0;
      z-index: 4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      text-align: center;
      padding: 24px;
      pointer-events: none;
    }
    .overlay.hidden { display: none; }

    .panel {
      background: rgba(20, 16, 34, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      padding: 26px 30px;
      backdrop-filter: blur(4px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      max-width: 380px;
    }

    .title {
      font-size: clamp(1.8rem, 7vw, 2.6rem);
      font-weight: 800;
      letter-spacing: 0.02em;
      text-shadow: 0 3px 0 rgba(0, 0, 0, 0.35);
      margin-bottom: 6px;
    }

    .hint {
      font-size: 1rem;
      opacity: 0.9;
      margin-top: 4px;
      line-height: 1.5;
    }

    .legend {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 6px 12px;
      margin-top: 14px;
      font-size: 0.82rem;
      text-align: left;
      opacity: 0.95;
    }
    .legend .gi { font-size: 1.2rem; text-align: center; }

    .score-line {
      font-size: 1.1rem;
      margin-top: 10px;
    }
    .score-line b { font-size: 1.6rem; color: #ffd83d; }

    .play-pill {
      display: inline-block;
      margin-top: 16px;
      padding: 11px 24px;
      font-weight: 800;
      font-size: 1.05rem;
      color: #2a1a45;
      background: linear-gradient(180deg, #ffe98c, #ffce3d);
      border-radius: 999px;
      box-shadow: 0 4px 0 #c79100;
      pointer-events: auto;
      cursor: pointer;
      animation: bob 1.1s ease-in-out infinite;
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    /* Floating toast (level up / combos) */
    .toast {
      position: absolute;
      left: 50%;
      top: 14%;
      transform: translateX(-50%);
      z-index: 5;
      padding: 10px 20px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 1.15rem;
      color: #2a1a45;
      background: linear-gradient(180deg, #b6f7ff, #6fe0ff);
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.45);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-6px);
    }
  </style>
</head>
<body class="mg-app">
  <!-- Header is mounted by the shared runtime (see MG.mountHeader below). -->
  <div class="mg-game-area">
    <div class="stage">
      <canvas id="game"></canvas>
      <div class="toast" id="toast"></div>

      <div class="overlay" id="overlay">
        <div class="panel">
          <div class="title" id="overlay-title">💎 Match Three</div>
          <div class="hint" id="overlay-hint"></div>
          <div class="legend" id="overlay-legend"></div>
          <div class="score-line" id="overlay-score" hidden></div>
          <div class="play-pill" id="overlay-action"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      "use strict";

      var $ = function (id) { return document.getElementById(id); };

      /* ============================ i18n ============================ */
      MG.i18n.register({
        en: {
          title: "Match Three",
          score: "Score", best: "Best", level: "Level", goal: "Goal",
          hint: "Swap two neighbouring gems to line up 3 or more of a colour. Match bigger to forge power-ups!",
          play: "▶ Play",
          levelUp: "Level {n}!",
          legRocket: "Match 4 → Rocket: clears a whole line",
          legBomb: "Match in an L / T → Bomb: blasts 3×3",
          legRainbow: "Match 5 → Rainbow: clears one colour",
          legCombo: "Swap two power-ups for a huge combo!",
          shuffle: "No moves — shuffling…"
        },
        ru: {
          title: "Три в ряд",
          score: "Очки", best: "Рекорд", level: "Уровень", goal: "Цель",
          hint: "Меняй местами соседние камни, чтобы собрать 3+ одного цвета. Большие комбо дают бонусы!",
          play: "▶ Играть",
          levelUp: "Уровень {n}!",
          legRocket: "Ряд из 4 → Ракета: чистит линию",
          legBomb: "Сбор в форме Г / Т → Бомба: взрыв 3×3",
          legRainbow: "Ряд из 5 → Радуга: убирает один цвет",
          legCombo: "Поменяй два бонуса местами — мощное комбо!",
          shuffle: "Нет ходов — перемешиваем…"
        },
        es: {
          title: "Tres en línea",
          score: "Puntos", best: "Mejor", level: "Nivel", goal: "Meta",
          hint: "Intercambia gemas vecinas para alinear 3 o más del mismo color. ¡Combos grandes dan poderes!",
          play: "▶ Jugar",
          levelUp: "¡Nivel {n}!",
          legRocket: "4 en línea → Cohete: limpia una línea",
          legBomb: "Forma de L / T → Bomba: estalla 3×3",
          legRainbow: "5 en línea → Arcoíris: limpia un color",
          legCombo: "¡Junta dos poderes para un súper combo!",
          shuffle: "Sin jugadas — barajando…"
        }
      });

      var t = MG.i18n.t;

      var canvas = $("game");
      var ctx = canvas.getContext("2d");
      var overlay = $("overlay");
      var overlayTitle = $("overlay-title");
      var overlayHint = $("overlay-hint");
      var overlayLegend = $("overlay-legend");
      var overlayScore = $("overlay-score");
      var overlayAction = $("overlay-action");
      var toastEl = $("toast");

      var ui = MG.mountHeader({
        icon: "💎",
        titleKey: "title",
        stats: [
          { key: "score", labelKey: "score", value: "0" },
          { key: "goal", labelKey: "goal", variant: "sm", value: "0" },
          { key: "level", labelKey: "level", value: "1" },
          { key: "best", labelKey: "best", value: "0" }
        ]
      });

      /* ============================ Constants ============================ */
      var N = 8;                       // board is N x N
      var NCOLORS = 6;
      var LERP = 0.30;                 // tween factor toward target
      var SETTLE = 0.6;                // px threshold for "settled"
      var CLEAR_FRAMES = 13;           // duration of a clear animation

      // Gem palette: { base, light, dark, shape }
      var GEMS = [
        { base: "#ff4d6d", light: "#ff9bb0", dark: "#b81f3e", shape: "circle"   },
        { base: "#4d9bff", light: "#a5cbff", dark: "#1f5bb8", shape: "square"   },
        { base: "#4ddd7a", light: "#a8f0c0", dark: "#1f9e49", shape: "diamond"  },
        { base: "#ffd23d", light: "#ffe98c", dark: "#c79100", shape: "triangle" },
        { base: "#c46dff", light: "#e0b3ff", dark: "#8a2fd1", shape: "pentagon" },
        { base: "#ff9a3d", light: "#ffc78c", dark: "#c76600", shape: "hex"      }
      ];

      /* ============================ State ============================ */
      var board;                       // board[r][c] = tile | null
      var geom = { x: 0, y: 0, size: 40 };
      var W = 0, H = 0, dpr = 1;

      var STATE_READY = 0, STATE_PLAY = 1;
      var state = STATE_READY;

      // The board accepts a new swap while idle and also mid-fall, so a clear's
      // drop animation never blocks the next move.
      function canInteract() {
        return state === STATE_PLAY && (phase === "idle" || phase === "falling");
      }

      // animation phases while a move resolves
      var phase = "idle";              // idle | swap | swapback | clearing | falling | resolving
      var phaseT = 0;
      var clearList = [];              // cells currently shrinking
      var cascade = 0;                 // multiplier for chained clears
      var lastSwap = null;             // { a:{r,c}, b:{r,c} } — for special placement

      var score, level, goal, best;
      var floaters = [];               // floating score popups
      var selected = null;             // currently selected cell
      var press = null;                // pointer-down cell for drag detection

      var store = MG.storage("match-three", { version: 1 });
      best = (store.load() || { best: 0 }).best;
      ui.setStat("best", best);

      /* ============================ Tiles ============================ */
      function makeTile(color, type) {
        return {
          color: color,
          type: type || "normal",
          x: 0, y: 0, tx: 0, ty: 0,
          scale: 1,
          clearing: false
        };
      }

      function cellX(c) { return geom.x + c * geom.size + geom.size / 2; }
      function cellY(r) { return geom.y + r * geom.size + geom.size / 2; }

      /* ============================ Geometry ============================ */
      function resize() {
        var rect = canvas.getBoundingClientRect();
        dpr = window.devicePixelRatio || 1;
        W = rect.width; H = rect.height;
        canvas.width = Math.round(W * dpr);
        canvas.height = Math.round(H * dpr);

        var pad = 14;
        var boardPx = Math.min(W, H) - pad * 2;
        boardPx = Math.max(boardPx, N * 8);
        geom.size = boardPx / N;
        geom.x = (W - boardPx) / 2;
        geom.y = (H - boardPx) / 2;

        // Snap every tile to its logical home.
        if (board) {
          for (var r = 0; r < N; r++) {
            for (var c = 0; c < N; c++) {
              var tile = board[r][c];
              if (!tile) continue;
              tile.tx = cellX(c); tile.ty = cellY(r);
              tile.x = tile.tx; tile.y = tile.ty;
            }
          }
        }
      }

      /* ============================ Board setup ============================ */
      function newGame() {
        score = 0;
        level = 1;
        goal = goalFor(level);
        cascade = 0;
        phase = "idle";
        selected = null;
        floaters = [];
        buildBoard();
        if (!anyMove()) shuffleBoard(true);
        syncStats();
      }

      function goalFor(lv) { return 800 + (lv - 1) * 700 + (lv - 1) * (lv - 1) * 120; }

      function buildBoard() {
        board = [];
        for (var r = 0; r < N; r++) {
          board[r] = [];
          for (var c = 0; c < N; c++) {
            var color;
            var guard = 0;
            do {
              color = (Math.random() * NCOLORS) | 0;
              guard++;
            } while (guard < 30 && (
              (c >= 2 && board[r][c - 1] && board[r][c - 2] &&
               board[r][c - 1].color === color && board[r][c - 2].color === color) ||
              (r >= 2 && board[r - 1][c] && board[r - 2][c] &&
               board[r - 1][c].color === color && board[r - 2][c].color === color)
            ));
            var tile = makeTile(color, "normal");
            tile.tx = tile.x = cellX(c);
            tile.ty = tile.y = cellY(r);
            board[r][c] = tile;
          }
        }
      }

      function eachCell(fn) {
        for (var r = 0; r < N; r++) for (var c = 0; c < N; c++) fn(r, c, board[r][c]);
      }

      function inBounds(r, c) { return r >= 0 && r < N && c >= 0 && c < N; }

      /* ============================ Match finding ============================ */
      // Returns horizontal & vertical runs of >=3 same-colour normal tiles.
      function findRuns() {
        var Hr = [], Vr = [];
        var r, c;
        for (r = 0; r < N; r++) {
          c = 0;
          while (c < N) {
            var th = board[r][c];
            if (th && th.type === "normal") {
              var c2 = c + 1;
              while (c2 < N) {
                var u = board[r][c2];
                if (u && u.type === "normal" && u.color === th.color) c2++; else break;
              }
              if (c2 - c >= 3) Hr.push({ r: r, c0: c, c1: c2 - 1, len: c2 - c, color: th.color });
              c = c2;
            } else c++;
          }
        }
        for (c = 0; c < N; c++) {
          r = 0;
          while (r < N) {
            var tv = board[r][c];
            if (tv && tv.type === "normal") {
              var r2 = r + 1;
              while (r2 < N) {
                var v = board[r2][c];
                if (v && v.type === "normal" && v.color === tv.color) r2++; else break;
              }
              if (r2 - r >= 3) Vr.push({ c: c, r0: r, r1: r2 - 1, len: r2 - r, color: tv.color });
              r = r2;
            } else r++;
          }
        }
        return { H: Hr, V: Vr };
      }

      // Compute the result of resolving all current matches:
      //   { cells: {key:{r,c}}, specials: [{r,c,type,color}] }
      function computeMatches() {
        var runs = findRuns();
        var cells = {}, specials = [];
        if (!runs.H.length && !runs.V.length) return { cells: cells, specials: specials };

        var inH = grid(false), inV = grid(false);
        var i, c, r, key;

        runs.H.forEach(function (run) {
          for (c = run.c0; c <= run.c1; c++) { inH[run.r][c] = true; mark(cells, run.r, c); }
        });
        runs.V.forEach(function (run) {
          for (r = run.r0; r <= run.r1; r++) { inV[r][run.c] = true; mark(cells, r, run.c); }
        });

        var specialMap = {};

        // Intersections (L / T / +) become a bomb.
        for (key in cells) {
          if (!cells.hasOwnProperty(key)) continue;
          var p = cells[key];
          if (inH[p.r][p.c] && inV[p.r][p.c]) {
            specialMap[key] = { r: p.r, c: p.c, type: "bomb", color: board[p.r][p.c].color };
          }
        }

        // Long straight runs become rockets (4) or rainbows (5+).
        function placeFromRun(run, isH) {
          var type = run.len >= 5 ? "rainbow" : (run.len === 4 ? (isH ? "rocketH" : "rocketV") : null);
          if (!type) return;
          var cell = chooseRunCell(run, isH);
          var k = cell.r + "," + cell.c;
          if (!specialMap[k]) specialMap[k] = { r: cell.r, c: cell.c, type: type, color: run.color };
        }
        runs.H.forEach(function (run) { placeFromRun(run, true); });
        runs.V.forEach(function (run) { placeFromRun(run, false); });

        for (key in specialMap) {
          if (!specialMap.hasOwnProperty(key)) continue;
          specials.push(specialMap[key]);
          delete cells[key];   // the special survives the clear, transformed
        }
        return { cells: cells, specials: specials };
      }

      function chooseRunCell(run, isH) {
        // Prefer a swapped tile inside the run so the power-up lands where the
        // player acted; otherwise use the middle of the run.
        if (lastSwap) {
          var cands = [lastSwap.a, lastSwap.b];
          for (var i = 0; i < cands.length; i++) {
            var p = cands[i];
            if (isH && p.r === run.r && p.c >= run.c0 && p.c <= run.c1) return p;
            if (!isH && p.c === run.c && p.r >= run.r0 && p.r <= run.r1) return p;
          }
        }
        return isH
          ? { r: run.r, c: ((run.c0 + run.c1) / 2) | 0 }
          : { r: ((run.r0 + run.r1) / 2) | 0, c: run.c };
      }

      function grid(val) {
        var g = [];
        for (var r = 0; r < N; r++) { g[r] = []; for (var c = 0; c < N; c++) g[r][c] = val; }
        return g;
      }
      function mark(set, r, c) { set[r + "," + c] = { r: r, c: c }; }

      /* ============================ Power-up activation ============================ */
      function activationCells(type, r, c, color) {
        var arr = [], i, dr, dc;
        if (type === "rocketH") {
          for (i = 0; i < N; i++) arr.push({ r: r, c: i });
        } else if (type === "rocketV") {
          for (i = 0; i < N; i++) arr.push({ r: i, c: c });
        } else if (type === "bomb") {
          for (dr = -1; dr <= 1; dr++) for (dc = -1; dc <= 1; dc++) arr.push({ r: r + dr, c: c + dc });
        } else if (type === "rainbow") {
          var tc = (color != null && color >= 0) ? color : randExistingColor();
          arr = cellsOfColor(tc);
          arr.push({ r: r, c: c });
        }
        return arr;
      }

      function cellsOfColor(color) {
        var arr = [];
        eachCell(function (r, c, tile) {
          if (tile && tile.type === "normal" && tile.color === color) arr.push({ r: r, c: c });
        });
        return arr;
      }

      function randExistingColor() {
        var present = {};
        eachCell(function (r, c, tile) { if (tile && tile.type === "normal") present[tile.color] = 1; });
        var keys = Object.keys(present);
        if (!keys.length) return (Math.random() * NCOLORS) | 0;
        return +keys[(Math.random() * keys.length) | 0];
      }

      // Flood the activation of any power-ups touched, chaining explosions.
      function gatherClear(seeds) {
        var out = {};
        var q = seeds.slice();
        while (q.length) {
          var p = q.pop();
          if (!inBounds(p.r, p.c)) continue;
          var key = p.r + "," + p.c;
          if (out[key]) continue;
          var tile = board[p.r][p.c];
          if (!tile) continue;
          out[key] = { r: p.r, c: p.c };
          if (tile.type !== "normal") {
            activationCells(tile.type, p.r, p.c, tile.color).forEach(function (cc) { q.push(cc); });
          }
        }
        return out;
      }

      /* ============================ Player move ============================ */
      function adjacent(a, b) {
        return (a.r === b.r && Math.abs(a.c - b.c) === 1) ||
               (a.c === b.c && Math.abs(a.r - b.r) === 1);
      }

      function requestSwap(a, b) {
        if (!canInteract()) return;
        if (!a || !b || !adjacent(a, b) || !board[a.r][a.c] || !board[b.r][b.c]) return;
        lastSwap = { a: { r: a.r, c: a.c }, b: { r: b.r, c: b.c } };
        swapCells(a, b);
        retargetSwap(a, b);
        cascade = 0;
        phase = "swap";
      }

      function swapCells(a, b) {
        var tmp = board[a.r][a.c];
        board[a.r][a.c] = board[b.r][b.c];
        board[b.r][b.c] = tmp;
      }

      function retargetSwap(a, b) {
        var ta = board[a.r][a.c], tb = board[b.r][b.c];
        if (ta) { ta.tx = cellX(a.c); ta.ty = cellY(a.r); }
        if (tb) { tb.tx = cellX(b.c); tb.ty = cellY(b.r); }
      }

      function afterSwap() {
        var a = lastSwap.a, b = lastSwap.b;
        var ta = board[a.r][a.c], tb = board[b.r][b.c];
        var specialA = ta && ta.type !== "normal";
        var specialB = tb && tb.type !== "normal";

        if (specialA || specialB) {
          var seeds = comboSeeds(ta, a, tb, b, specialA, specialB);
          var clearSet = gatherClear(seeds);
          if (Object.keys(clearSet).length) {
            cascade = 1;
            beginClear(clearSet);
            return;
          }
        } else {
          var res = computeMatches();
          if (Object.keys(res.cells).length || res.specials.length) {
            cascade = 1;
            applySpecials(res.specials);
            beginClear(res.cells);
            return;
          }
        }
        // No effect — revert.
        swapCells(a, b);
        retargetSwap(a, b);
        phase = "swapback";
      }

      function comboSeeds(ta, a, tb, b, specialA, specialB) {
        // Power-up + power-up: enhanced combos.
        if (specialA && specialB) {
          var seeds = [];
          if (ta.type === "rainbow" && tb.type === "rainbow") {
            eachCell(function (r, c) { seeds.push({ r: r, c: c }); });
            return seeds;
          }
          if (ta.type === "rainbow" || tb.type === "rainbow") {
            var other = ta.type === "rainbow" ? tb : ta;
            seeds = cellsOfColor(other.color);
            seeds.push({ r: a.r, c: a.c }, { r: b.r, c: b.c });
            return seeds;
          }
          var isBombA = ta.type === "bomb", isBombB = tb.type === "bomb";
          seeds.push({ r: a.r, c: a.c }, { r: b.r, c: b.c });
          var i, j;
          if (isBombA && isBombB) {            // bomb + bomb → 5×5
            for (i = -2; i <= 2; i++) for (j = -2; j <= 2; j++) seeds.push({ r: a.r + i, c: a.c + j });
          } else if (isBombA || isBombB) {     // rocket + bomb → 3 rows + 3 cols
            for (i = -1; i <= 1; i++) for (j = 0; j < N; j++) {
              seeds.push({ r: a.r + i, c: j });
              seeds.push({ r: j, c: a.c + i });
            }
          } else {                              // rocket + rocket → full cross
            for (i = 0; i < N; i++) { seeds.push({ r: a.r, c: i }); seeds.push({ r: i, c: a.c }); }
          }
          return seeds;
        }

        // Power-up + normal gem.
        var sp = specialA ? ta : tb, spP = specialA ? a : b;
        var nm = specialA ? tb : ta, nmP = specialA ? b : a;
        if (sp.type === "rainbow") {
          var s = cellsOfColor(nm ? nm.color : sp.color);
          s.push({ r: spP.r, c: spP.c }, { r: nmP.r, c: nmP.c });
          return s;
        }
        return [{ r: spP.r, c: spP.c }, { r: nmP.r, c: nmP.c }];
      }

      function applySpecials(specials) {
        specials.forEach(function (sp) {
          var tile = board[sp.r][sp.c];
          if (!tile) tile = board[sp.r][sp.c] = makeTile(sp.color, sp.type);
          tile.type = sp.type;
          tile.color = sp.color;
          tile.clearing = false;
          tile.scale = 1;
          tile.tx = cellX(sp.c); tile.ty = cellY(sp.r);
        });
      }

      /* ============================ Clear / fall / resolve ============================ */
      function beginClear(cellMap) {
        clearList = [];
        var n = 0;
        for (var key in cellMap) {
          if (!cellMap.hasOwnProperty(key)) continue;
          var p = cellMap[key];
          var tile = board[p.r][p.c];
          if (tile && !tile.clearing) {
            tile.clearing = true;
            clearList.push(p);
            n++;
          }
        }
        if (!n) { phase = "resolving"; return; }

        var gain = n * 12 * cascade;
        score += gain;
        spawnFloater(clearList, "+" + gain);
        syncStats();

        phaseT = 0;
        phase = "clearing";
      }

      function finishClear() {
        for (var i = 0; i < clearList.length; i++) {
          var p = clearList[i];
          board[p.r][p.c] = null;
        }
        clearList = [];
        applyGravity();
        phase = "falling";
      }

      function applyGravity() {
        for (var c = 0; c < N; c++) {
          var writeRow = N - 1;
          var r;
          for (r = N - 1; r >= 0; r--) {
            if (board[r][c]) {
              if (r !== writeRow) {
                var tile = board[r][c];
                board[writeRow][c] = tile;
                board[r][c] = null;
                tile.tx = cellX(c); tile.ty = cellY(writeRow);
              }
              writeRow--;
            }
          }
          // Fill the gap at the top with fresh gems dropping from above.
          var spawn = 0;
          for (r = writeRow; r >= 0; r--) {
            var nt = makeTile((Math.random() * NCOLORS) | 0, "normal");
            nt.tx = cellX(c); nt.ty = cellY(r);
            nt.x = cellX(c);
            nt.y = cellY(-1 - spawn);   // start above the board
            board[r][c] = nt;
            spawn++;
          }
        }
      }

      function resolveStep() {
        cascade++;
        var res = computeMatches();
        if (!Object.keys(res.cells).length && !res.specials.length) {
          phase = "idle";
          cascade = 0;
          lastSwap = null;
          onIdle();
          return;
        }
        applySpecials(res.specials);
        beginClear(res.cells);
      }

      function onIdle() {
        syncStats();
        if (score > best) { best = score; store.save({ best: best }); ui.setStat("best", best); }

        if (score >= goal) levelUp();

        // Endless play: when the board has no possible match, reshuffle in place
        // rather than ending the game.
        if (!anyMove()) {
          showToast(t("shuffle"));
          shuffleBoard(false);
        }
      }

      function levelUp() {
        level++;
        goal = goalFor(level);
        syncStats();
        showToast(t("levelUp").replace("{n}", level));
      }

      function syncStats() {
        ui.setStat("score", score);
        ui.setStat("goal", goal);
        ui.setStat("level", level);
      }

      /* ============================ No-move detection / shuffle ============================ */
      function anyMove() {
        var has = false;
        eachCell(function (r, c, tile) { if (tile && tile.type !== "normal") has = true; });
        if (has) return true;
        for (var r = 0; r < N; r++) {
          for (var c = 0; c < N; c++) {
            if (c + 1 < N && swapMakesMatch(r, c, r, c + 1)) return true;
            if (r + 1 < N && swapMakesMatch(r, c, r + 1, c)) return true;
          }
        }
        return false;
      }

      function swapMakesMatch(r1, c1, r2, c2) {
        var a = board[r1][c1], b = board[r2][c2];
        if (!a || !b) return false;
        board[r1][c1] = b; board[r2][c2] = a;
        var runs = findRuns();
        board[r1][c1] = a; board[r2][c2] = b;
        return runs.H.length > 0 || runs.V.length > 0;
      }

      function shuffleBoard(snap) {
        var guard = 0;
        do {
          var colors = [];
          eachCell(function (r, c, tile) { if (tile && tile.type === "normal") colors.push(tile.color); });
          // Fisher–Yates over the collected colours.
          for (var i = colors.length - 1; i > 0; i--) {
            var j = (Math.random() * (i + 1)) | 0;
            var tmp = colors[i]; colors[i] = colors[j]; colors[j] = tmp;
          }
          var k = 0;
          eachCell(function (r, c, tile) { if (tile && tile.type === "normal") tile.color = colors[k++]; });
          guard++;
        } while (guard < 40 && (hasImmediateMatch() || !anyMove()));

        if (!snap) {
          // Little hop so the reshuffle is visible.
          eachCell(function (r, c, tile) {
            if (!tile) return;
            tile.y = cellY(r) - 6;
            tile.tx = cellX(c); tile.ty = cellY(r);
          });
        }
      }

      function hasImmediateMatch() {
        var runs = findRuns();
        return runs.H.length > 0 || runs.V.length > 0;
      }

      /* ============================ Floaters / toast ============================ */
      function spawnFloater(cells, text) {
        if (!cells.length) return;
        var sx = 0, sy = 0;
        for (var i = 0; i < cells.length; i++) { sx += cellX(cells[i].c); sy += cellY(cells[i].r); }
        floaters.push({ x: sx / cells.length, y: sy / cells.length, text: text, life: 1 });
      }

      var toastTimer = null;
      function showToast(msg) {
        toastEl.textContent = msg;
        toastEl.classList.add("show");
        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(function () { toastEl.classList.remove("show"); }, 1400);
      }

      /* ============================ Update loop ============================ */
      function update() {
        animateTiles();
        updateFloaters();

        switch (phase) {
          case "swap":     if (settled()) afterSwap(); break;
          // A revert can settle on top of matches left by an interrupted fall, so
          // run the resolver instead of dropping straight to idle.
          case "swapback": if (settled()) { cascade = 0; phase = "resolving"; } break;
          case "clearing":
            phaseT++;
            if (phaseT >= CLEAR_FRAMES) finishClear();
            break;
          case "falling":  if (settled()) phase = "resolving"; break;
          case "resolving": resolveStep(); break;
        }
      }

      function animateTiles() {
        for (var r = 0; r < N; r++) {
          for (var c = 0; c < N; c++) {
            var tile = board && board[r] && board[r][c];
            if (!tile) continue;
            tile.x += (tile.tx - tile.x) * LERP;
            tile.y += (tile.ty - tile.y) * LERP;
            var target = tile.clearing ? 0 : 1;
            tile.scale += (target - tile.scale) * 0.35;
          }
        }
      }

      function settled() {
        for (var r = 0; r < N; r++) {
          for (var c = 0; c < N; c++) {
            var tile = board[r][c];
            if (!tile) continue;
            if (Math.abs(tile.x - tile.tx) > SETTLE || Math.abs(tile.y - tile.ty) > SETTLE) return false;
          }
        }
        return true;
      }

      function updateFloaters() {
        for (var i = floaters.length - 1; i >= 0; i--) {
          var f = floaters[i];
          f.y -= 0.7;
          f.life -= 0.02;
          if (f.life <= 0) floaters.splice(i, 1);
        }
      }

      /* ============================ Drawing ============================ */
      function draw() {
        ctx.save();
        ctx.scale(dpr, dpr);
        ctx.clearRect(0, 0, W, H);

        drawBoardBg();

        if (board) {
          // Draw non-clearing tiles first, clearing ones on top.
          for (var r = 0; r < N; r++) {
            for (var c = 0; c < N; c++) {
              var tile = board[r][c];
              if (tile && !tile.clearing) drawTile(tile);
            }
          }
          for (r = 0; r < N; r++) {
            for (c = 0; c < N; c++) {
              var ct = board[r][c];
              if (ct && ct.clearing) drawTile(ct);
            }
          }
        }

        drawSelection();
        drawFloaters();

        ctx.restore();
      }

      function drawBoardBg() {
        var s = geom.size, x0 = geom.x, y0 = geom.y;
        for (var r = 0; r < N; r++) {
          for (var c = 0; c < N; c++) {
            ctx.fillStyle = ((r + c) & 1) ? "rgba(255,255,255,0.045)" : "rgba(255,255,255,0.02)";
            roundRect(x0 + c * s + 2, y0 + r * s + 2, s - 4, s - 4, 8);
            ctx.fill();
          }
        }
      }

      function drawTile(tile) {
        var s = geom.size * 0.82 * tile.scale;
        if (s < 0.5) return;
        var x = tile.x, y = tile.y;

        if (tile.type === "normal") {
          drawGem(x, y, s, tile.color);
        } else if (tile.type === "rocketH" || tile.type === "rocketV") {
          drawRocket(x, y, s, tile.color, tile.type === "rocketH");
        } else if (tile.type === "bomb") {
          drawBomb(x, y, s);
        } else if (tile.type === "rainbow") {
          drawRainbow(x, y, s);
        }
      }

      function drawGem(x, y, s, color) {
        var g = GEMS[color];
        var grad = ctx.createLinearGradient(x, y - s / 2, x, y + s / 2);
        grad.addColorStop(0, g.light);
        grad.addColorStop(0.5, g.base);
        grad.addColorStop(1, g.dark);
        ctx.fillStyle = grad;
        ctx.strokeStyle = "rgba(0,0,0,0.25)";
        ctx.lineWidth = 2;

        gemPath(x, y, s, g.shape);
        ctx.fill();
        ctx.stroke();

        // Glossy highlight.
        ctx.fillStyle = "rgba(255,255,255,0.35)";
        ctx.beginPath();
        ctx.ellipse(x - s * 0.16, y - s * 0.18, s * 0.18, s * 0.10, -0.5, 0, Math.PI * 2);
        ctx.fill();
      }

      function gemPath(x, y, s, shape) {
        var h = s / 2;
        ctx.beginPath();
        if (shape === "circle") {
          ctx.arc(x, y, h, 0, Math.PI * 2);
        } else if (shape === "square") {
          roundRectPath(x - h, y - h, s, s, s * 0.22);
        } else if (shape === "diamond") {
          ctx.moveTo(x, y - h); ctx.lineTo(x + h, y); ctx.lineTo(x, y + h); ctx.lineTo(x - h, y); ctx.closePath();
        } else if (shape === "triangle") {
          ctx.moveTo(x, y - h); ctx.lineTo(x + h, y + h * 0.8); ctx.lineTo(x - h, y + h * 0.8); ctx.closePath();
        } else if (shape === "pentagon") {
          polyPath(x, y, h, 5, -Math.PI / 2);
        } else {
          polyPath(x, y, h, 6, 0);
        }
      }

      function polyPath(x, y, rad, sides, rot) {
        for (var i = 0; i < sides; i++) {
          var a = rot + i * 2 * Math.PI / sides;
          var px = x + Math.cos(a) * rad, py = y + Math.sin(a) * rad;
          if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.closePath();
      }

      function drawRocket(x, y, s, color, horiz) {
        var h = s / 2;
        var g = GEMS[color];
        // Base gem disc tinted by colour so it reads as "this colour, charged".
        var grad = ctx.createRadialGradient(x - s * 0.15, y - s * 0.15, s * 0.1, x, y, h);
        grad.addColorStop(0, g.light);
        grad.addColorStop(1, g.dark);
        ctx.fillStyle = grad;
        roundRect(x - h, y - h, s, s, s * 0.24);
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.85)";
        ctx.lineWidth = Math.max(2, s * 0.06);
        ctx.lineCap = "round";

        // Double arrow showing the clear direction.
        ctx.save();
        ctx.translate(x, y);
        if (!horiz) ctx.rotate(Math.PI / 2);
        var a = h * 0.62;
        ctx.beginPath();
        ctx.moveTo(-a, 0); ctx.lineTo(a, 0);
        ctx.moveTo(a - h * 0.34, -h * 0.30); ctx.lineTo(a, 0); ctx.lineTo(a - h * 0.34, h * 0.30);
        ctx.moveTo(-a + h * 0.34, -h * 0.30); ctx.lineTo(-a, 0); ctx.lineTo(-a + h * 0.34, h * 0.30);
        ctx.stroke();
        ctx.restore();
      }

      function drawBomb(x, y, s) {
        var h = s / 2;
        var grad = ctx.createRadialGradient(x - s * 0.18, y - s * 0.18, s * 0.08, x, y, h);
        grad.addColorStop(0, "#5a5a66");
        grad.addColorStop(0.6, "#22232b");
        grad.addColorStop(1, "#000");
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(x, y, h * 0.86, 0, Math.PI * 2);
        ctx.fill();
        // Shine.
        ctx.fillStyle = "rgba(255,255,255,0.5)";
        ctx.beginPath();
        ctx.arc(x - h * 0.3, y - h * 0.32, h * 0.16, 0, Math.PI * 2);
        ctx.fill();
        // Fuse + spark.
        ctx.strokeStyle = "#caa15a";
        ctx.lineWidth = Math.max(2, s * 0.05);
        ctx.beginPath();
        ctx.moveTo(x + h * 0.3, y - h * 0.7);
        ctx.quadraticCurveTo(x + h * 0.7, y - h * 0.9, x + h * 0.55, y - h * 1.05);
        ctx.stroke();
        var spark = 0.6 + 0.4 * Math.sin(Date.now() / 80);
        ctx.fillStyle = "rgba(255,180,60," + spark + ")";
        ctx.beginPath();
        ctx.arc(x + h * 0.55, y - h * 1.08, h * 0.14, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawRainbow(x, y, s) {
        var h = s / 2;
        var cols = ["#ff4d6d", "#ff9a3d", "#ffd23d", "#4ddd7a", "#4d9bff", "#c46dff"];
        var spin = Date.now() / 600;
        for (var i = 0; i < cols.length; i++) {
          ctx.fillStyle = cols[i];
          ctx.beginPath();
          ctx.moveTo(x, y);
          ctx.arc(x, y, h * 0.9, spin + i * Math.PI / 3, spin + (i + 1) * Math.PI / 3);
          ctx.closePath();
          ctx.fill();
        }
        ctx.fillStyle = "rgba(255,255,255,0.9)";
        ctx.beginPath();
        ctx.arc(x, y, h * 0.28, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawSelection() {
        if (!selected || !canInteract()) return;
        var s = geom.size;
        ctx.strokeStyle = "#ffd83d";
        ctx.lineWidth = 3;
        var pulse = 1 + Math.sin(Date.now() / 150) * 0.04;
        var sz = s * pulse;
        var cx = cellX(selected.c), cy = cellY(selected.r);
        roundRect(cx - sz / 2 + 2, cy - sz / 2 + 2, sz - 4, sz - 4, 10);
        ctx.stroke();
      }

      function drawFloaters() {
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        for (var i = 0; i < floaters.length; i++) {
          var f = floaters[i];
          ctx.globalAlpha = Math.max(0, Math.min(1, f.life));
          ctx.font = "800 22px 'Trebuchet MS', sans-serif";
          ctx.fillStyle = "#fff";
          ctx.strokeStyle = "rgba(0,0,0,0.5)";
          ctx.lineWidth = 4;
          ctx.strokeText(f.text, f.x, f.y);
          ctx.fillText(f.text, f.x, f.y);
        }
        ctx.globalAlpha = 1;
      }

      function roundRect(x, y, w, h, r) { ctx.beginPath(); roundRectPath(x, y, w, h, r); }
      function roundRectPath(x, y, w, h, r) {
        r = Math.min(r, w / 2, h / 2);
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + w, y, x + w, y + h, r);
        ctx.arcTo(x + w, y + h, x, y + h, r);
        ctx.arcTo(x, y + h, x, y, r);
        ctx.arcTo(x, y, x + w, y, r);
        ctx.closePath();
      }

      /* ============================ Input ============================ */
      function cellAt(clientX, clientY) {
        var rect = canvas.getBoundingClientRect();
        var px = clientX - rect.left, py = clientY - rect.top;
        var c = Math.floor((px - geom.x) / geom.size);
        var r = Math.floor((py - geom.y) / geom.size);
        if (!inBounds(r, c)) return null;
        return { r: r, c: c };
      }

      function onDown(e) {
        if (!canInteract()) return;
        var pt = pointer(e);
        var cell = cellAt(pt.x, pt.y);
        if (!cell) return;
        press = { cell: cell, x: pt.x, y: pt.y };
        if (selected && adjacent(selected, cell)) {
          requestSwap(selected, cell);
          selected = null;
          press = null;
        } else {
          selected = cell;
        }
      }

      function onMove(e) {
        if (!press || !canInteract()) return;
        var pt = pointer(e);
        var dx = pt.x - press.x, dy = pt.y - press.y;
        var thresh = geom.size * 0.45;
        if (Math.abs(dx) < thresh && Math.abs(dy) < thresh) return;
        var dir = Math.abs(dx) > Math.abs(dy)
          ? { r: 0, c: dx > 0 ? 1 : -1 }
          : { r: dy > 0 ? 1 : -1, c: 0 };
        var to = { r: press.cell.r + dir.r, c: press.cell.c + dir.c };
        if (inBounds(to.r, to.c)) {
          requestSwap(press.cell, to);
          selected = null;
        }
        press = null;
      }

      function onUp() { press = null; }

      function pointer(e) {
        if (e.touches && e.touches.length) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
        if (e.changedTouches && e.changedTouches.length) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
        return { x: e.clientX, y: e.clientY };
      }

      canvas.addEventListener("mousedown", function (e) { e.preventDefault(); onDown(e); });
      canvas.addEventListener("mousemove", onMove);
      window.addEventListener("mouseup", onUp);
      canvas.addEventListener("touchstart", function (e) { e.preventDefault(); onDown(e); }, { passive: false });
      canvas.addEventListener("touchmove", function (e) { e.preventDefault(); onMove(e); }, { passive: false });
      window.addEventListener("touchend", onUp);
      window.addEventListener("resize", resize);

      /* ============================ Overlay / flow ============================ */
      function startGame() {
        newGame();
        state = STATE_PLAY;
        overlay.classList.add("hidden");
      }

      // The board reshuffles itself when it runs dry, so play is endless: the
      // overlay only ever shows the intro screen.
      function renderOverlay() {
        overlayTitle.textContent = "💎 " + t("title");
        overlayHint.textContent = t("hint");
        overlayLegend.innerHTML =
          row("🚀", t("legRocket")) +
          row("💣", t("legBomb")) +
          row("🌈", t("legRainbow")) +
          row("✨", t("legCombo"));
        overlayScore.hidden = true;
        overlayAction.textContent = t("play");
      }
      function row(icon, text) {
        return '<div class="gi">' + icon + '</div><div>' + text + '</div>';
      }

      function onAction() {
        if (state === STATE_READY) startGame();
      }
      overlayAction.addEventListener("click", onAction);
      overlayAction.addEventListener("touchstart", function (e) { e.preventDefault(); onAction(); }, { passive: false });

      MG.i18n.onChange(function () {
        if (!overlay.classList.contains("hidden")) renderOverlay();
      });

      /* ============================ Boot ============================ */
      function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
      }

      resize();
      newGame();
      state = STATE_READY;
      renderOverlay();
      loop();
    })();
  </script>
</body>
</html>

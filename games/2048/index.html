<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>🔢 2048 — Minigames</title>
  <meta name="description" content="2048 — slide the tiles, merge matching numbers and reach 2048. Play in your browser, no installs." />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔢</text></svg>" />

  <!-- Shared chrome: header bar + language control. -->
  <link rel="stylesheet" href="../../shared/mg.css" />
  <script src="../../shared/mg.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #faf8ef;
      color: #776e65;
      font-family: "Trebuchet MS", system-ui, -apple-system, sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    .mg-game-area {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .stage {
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .intro {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .intro p {
      font-size: 0.95rem;
      line-height: 1.35;
      opacity: 0.85;
    }
    .intro p b { color: #776e65; }

    .restart {
      flex: none;
      padding: 10px 16px;
      font-weight: 800;
      font-size: 0.95rem;
      color: #f9f6f2;
      background: #8f7a66;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      white-space: nowrap;
    }
    .restart:active { transform: translateY(1px); }

    /* Board: a square, position-relative host. Tiles are absolutely
       positioned over a static grid of background cells. */
    .board {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #bbada0;
      border-radius: 10px;
      padding: var(--gap);
      touch-action: none;
      --gap: 3.2%;
    }

    .grid {
      position: absolute;
      inset: var(--gap);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: var(--gap);
    }
    .cell {
      background: rgba(238, 228, 218, 0.35);
      border-radius: 6px;
    }

    .tiles {
      position: absolute;
      inset: var(--gap);
    }

    .tile {
      position: absolute;
      width: var(--ts);
      height: var(--ts);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      font-weight: 800;
      line-height: 1;
      background: #eee4da;
      color: #776e65;
      transition: transform 110ms ease-in-out;
      will-change: transform;
    }

    .tile-inner {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
    }

    .tile.new .tile-inner { animation: pop 160ms ease; }
    .tile.merged .tile-inner { animation: bump 160ms ease; }

    @keyframes pop {
      0% { transform: scale(0); }
      100% { transform: scale(1); }
    }
    @keyframes bump {
      0% { transform: scale(1); }
      50% { transform: scale(1.18); }
      100% { transform: scale(1); }
    }

    /* Tile color ramp. */
    .v2    { background: #eee4da; }
    .v4    { background: #ede0c8; }
    .v8    { background: #f2b179; color: #f9f6f2; }
    .v16   { background: #f59563; color: #f9f6f2; }
    .v32   { background: #f67c5f; color: #f9f6f2; }
    .v64   { background: #f65e3b; color: #f9f6f2; }
    .v128  { background: #edcf72; color: #f9f6f2; }
    .v256  { background: #edcc61; color: #f9f6f2; }
    .v512  { background: #edc850; color: #f9f6f2; }
    .v1024 { background: #edc53f; color: #f9f6f2; }
    .v2048 { background: #edc22e; color: #f9f6f2; }
    .vbig  { background: #3c3a32; color: #f9f6f2; }

    /* Font sizes relative to tile size (set on board as --ts). */
    .d1 { font-size: calc(var(--ts) * 0.5); }
    .d2 { font-size: calc(var(--ts) * 0.5); }
    .d3 { font-size: calc(var(--ts) * 0.42); }
    .d4 { font-size: calc(var(--ts) * 0.33); }
    .d5 { font-size: calc(var(--ts) * 0.27); }

    /* Win / lose overlay sitting over the board. */
    .overlay {
      position: absolute;
      inset: 0;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-align: center;
      border-radius: 10px;
      background: rgba(238, 228, 218, 0.73);
      backdrop-filter: blur(1px);
      animation: fade 320ms ease both;
    }
    .overlay.hidden { display: none; }
    @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

    .overlay .msg {
      font-size: clamp(1.8rem, 9vw, 2.8rem);
      font-weight: 800;
    }
    .overlay.win .msg { color: #6f5f1f; }

    .overlay .btns { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .ov-btn {
      padding: 10px 18px;
      font-weight: 800;
      font-size: 1rem;
      color: #f9f6f2;
      background: #8f7a66;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .ov-btn.alt { background: #bbada0; }
    .ov-btn:active { transform: translateY(1px); }
  </style>
</head>
<body class="mg-app">
  <!-- Header is mounted by the shared runtime (see MG.mountHeader below). -->
  <div class="mg-game-area">
    <div class="stage">
      <div class="intro">
        <p id="intro-text"></p>
        <button class="restart" id="restart"></button>
      </div>

      <div class="board" id="board">
        <div class="grid" id="grid"></div>
        <div class="tiles" id="tiles"></div>

        <div class="overlay hidden" id="overlay">
          <div class="msg" id="ov-msg"></div>
          <div class="btns" id="ov-btns"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      "use strict";

      var $ = function (id) { return document.getElementById(id); };

      /* ============================ i18n ============================ */
      MG.i18n.register({
        en: {
          title: "2048", score: "Score", best: "Best",
          intro: "Join the tiles, get to <b>2048!</b> Use arrow keys or swipe.",
          restart: "New Game",
          win: "You win!", over: "Game over!",
          keepGoing: "Keep going", tryAgain: "Try again", newGame: "New game"
        },
        ru: {
          title: "2048", score: "Счёт", best: "Рекорд",
          intro: "Объединяй плитки и собери <b>2048!</b> Стрелки или свайп.",
          restart: "Новая игра",
          win: "Победа!", over: "Игра окончена!",
          keepGoing: "Продолжить", tryAgain: "Ещё раз", newGame: "Новая игра"
        },
        es: {
          title: "2048", score: "Puntos", best: "Mejor",
          intro: "Une las fichas y llega a <b>2048!</b> Flechas o desliza.",
          restart: "Nuevo juego",
          win: "¡Ganaste!", over: "¡Fin del juego!",
          keepGoing: "Seguir", tryAgain: "Reintentar", newGame: "Nuevo juego"
        }
      });

      // Shared header: brand + language selector + Score / Best chips.
      var ui = MG.mountHeader({
        icon: "🔢",
        titleKey: "title",
        stats: [
          { key: "score", labelKey: "score" },
          { key: "best", labelKey: "best" }
        ]
      });

      var SIZE = 4;
      var board = $("board");
      var tilesHost = $("tiles");
      var gridHost = $("grid");
      var overlay = $("overlay");
      var ovMsg = $("ov-msg");
      var ovBtns = $("ov-btns");
      var introText = $("intro-text");
      var restartBtn = $("restart");

      // Build the static background grid.
      for (var c = 0; c < SIZE * SIZE; c++) {
        gridHost.appendChild(MG.el("div", "cell"));
      }

      // Versioned save: best score, plus an in-progress board so a refresh
      // doesn't lose the game.
      var store = MG.storage("2048", { version: 1 });

      // --- State ---
      var grid;          // SIZE×SIZE of tile objects or null
      var score = 0;
      var best = 0;
      var won = false;   // reached 2048 and chose to keep going
      var dead = false;
      var uid = 1;       // unique id per tile element
      var els = {};      // id -> DOM element
      var busy = false;  // input lock during a slide

      var saved = store.load();
      best = (saved && saved.best) || 0;
      ui.setStat("best", best);

      /* ---------------------------- helpers ---------------------------- */
      function emptyGrid() {
        var g = [];
        for (var r = 0; r < SIZE; r++) {
          g[r] = [];
          for (var c2 = 0; c2 < SIZE; c2++) g[r][c2] = null;
        }
        return g;
      }

      function emptyCells() {
        var out = [];
        for (var r = 0; r < SIZE; r++)
          for (var c2 = 0; c2 < SIZE; c2++)
            if (!grid[r][c2]) out.push({ r: r, c: c2 });
        return out;
      }

      function addRandom(isNew) {
        var cells = emptyCells();
        if (!cells.length) return null;
        var spot = cells[Math.floor(Math.random() * cells.length)];
        var tile = {
          id: uid++,
          value: Math.random() < 0.9 ? 2 : 4,
          r: spot.r, c: spot.c,
          isNew: isNew !== false
        };
        grid[spot.r][spot.c] = tile;
        return tile;
      }

      function persist() {
        store.save({
          best: best,
          score: score,
          won: won,
          grid: serialize()
        });
      }

      function serialize() {
        var flat = [];
        for (var r = 0; r < SIZE; r++)
          for (var c2 = 0; c2 < SIZE; c2++)
            flat.push(grid[r][c2] ? grid[r][c2].value : 0);
        return flat;
      }

      function loadFrom(flat) {
        grid = emptyGrid();
        var i = 0;
        for (var r = 0; r < SIZE; r++) {
          for (var c2 = 0; c2 < SIZE; c2++) {
            var v = flat[i++];
            if (v) grid[r][c2] = { id: uid++, value: v, r: r, c: c2, isNew: false };
          }
        }
      }

      /* ----------------------------- render ---------------------------- */
      // Tile size as a fraction of the board's inner area: 4 tiles + 3 gaps,
      // gap is 3.2% of board width. Positions are computed in percentages so
      // the layout is fully responsive.
      var GAP = 3.2;                       // percent of board width
      var TS = (100 - GAP * (SIZE - 1)) / SIZE;  // tile size percent of inner

      function setBoardVars() {
        // --ts drives tile pixel size for font scaling.
        var inner = board.clientWidth - 2 * (board.clientWidth * GAP / 100);
        board.style.setProperty("--ts", (inner * TS / 100) + "px");
      }

      function pos(idx) { return idx * (TS + GAP); }

      function digitClass(v) {
        var len = String(v).length;
        return "d" + Math.min(len, 5);
      }

      function valueClass(v) {
        return v <= 2048 ? "v" + v : "vbig";
      }

      function makeTileEl(tile) {
        var el = MG.el("div", "tile " + valueClass(tile.value));
        var inner = MG.el("div", "tile-inner " + digitClass(tile.value), String(tile.value));
        el.appendChild(inner);
        el.style.left = pos(tile.c) + "%";
        el.style.top = pos(tile.r) + "%";
        if (tile.isNew) el.classList.add("new");
        tilesHost.appendChild(el);
        els[tile.id] = el;
        return el;
      }

      // Full re-sync of DOM tiles to the grid (used on load / restart).
      function renderAll() {
        tilesHost.innerHTML = "";
        els = {};
        for (var r = 0; r < SIZE; r++)
          for (var c2 = 0; c2 < SIZE; c2++)
            if (grid[r][c2]) { grid[r][c2].isNew = false; makeTileEl(grid[r][c2]); }
        ui.setStat("score", score);
      }

      function flashStat() {
        var v = ui.stat("score");
        if (!v) return;
        v.style.transition = "none";
        v.style.transform = "scale(1.25)";
        requestAnimationFrame(function () {
          v.style.transition = "transform 160ms ease";
          v.style.transform = "scale(1)";
        });
      }

      /* ------------------------------ moves ---------------------------- */
      // Build the ordered list of line coordinates to traverse for a move.
      // dir: 0 up, 1 right, 2 down, 3 left.
      function lineFor(dir, k) {
        var line = [];
        var i;
        if (dir === 3) {            // left: row k, cols 0..3
          for (i = 0; i < SIZE; i++) line.push({ r: k, c: i });
        } else if (dir === 1) {     // right: row k, cols 3..0
          for (i = SIZE - 1; i >= 0; i--) line.push({ r: k, c: i });
        } else if (dir === 0) {     // up: col k, rows 0..3
          for (i = 0; i < SIZE; i++) line.push({ r: i, c: k });
        } else {                    // down: col k, rows 3..0
          for (i = SIZE - 1; i >= 0; i--) line.push({ r: i, c: k });
        }
        return line;
      }

      // Slide + merge in the given direction. Returns true if anything moved.
      // Mutates grid; tiles keep their identity (and id) so the DOM can animate
      // them to their new positions. Merged-away tiles are returned for removal.
      function move(dir) {
        var moved = false;
        var gained = 0;
        var removed = [];
        var mergedTiles = [];

        for (var k = 0; k < SIZE; k++) {
          var line = lineFor(dir, k);
          // Collect tiles along the line, in travel order.
          var seq = [];
          for (var i = 0; i < line.length; i++) {
            var t = grid[line[i].r][line[i].c];
            if (t) seq.push(t);
          }
          // Clear the line in the grid; we'll re-place compacted tiles.
          for (i = 0; i < line.length; i++) grid[line[i].r][line[i].c] = null;

          var target = 0;   // next slot index along the line
          var j = 0;
          while (j < seq.length) {
            var cur = seq[j];
            var dest = line[target];
            if (j + 1 < seq.length && seq[j + 1].value === cur.value) {
              // Merge cur + next into the destination cell.
              var next = seq[j + 1];
              var newVal = cur.value * 2;
              cur.r = dest.r; cur.c = dest.c;       // cur slides to dest
              next.r = dest.r; next.c = dest.c;     // next slides onto dest, then dies
              var keep = { id: cur.id, value: newVal, r: dest.r, c: dest.c, isNew: false, merged: true };
              grid[dest.r][dest.c] = keep;
              removed.push(next);                    // remove the absorbed tile el
              mergedTiles.push(keep);
              gained += newVal;
              if (newVal === 2048 && !won) won = true;
              // Slide animation for both, but only one survives in grid.
              animateTo(cur, dest.r, dest.c);
              animateTo(next, dest.r, dest.c);
              moved = true;
              j += 2;
            } else {
              grid[dest.r][dest.c] = cur;
              if (cur.r !== dest.r || cur.c !== dest.c) moved = true;
              cur.r = dest.r; cur.c = dest.c;
              animateTo(cur, dest.r, dest.c);
              j += 1;
            }
            target++;
          }
        }

        return { moved: moved, gained: gained, removed: removed, merged: mergedTiles };
      }

      function animateTo(tile, r, c) {
        var el = els[tile.id];
        if (!el) return;
        el.style.left = pos(c) + "%";
        el.style.top = pos(r) + "%";
      }

      function applyMove(dir) {
        if (busy || dead) return;
        var res = move(dir);
        if (!res.moved) return;

        busy = true;

        // After the slide transition, settle: remove absorbed tiles, bump the
        // merged ones, update their value class, spawn a new tile, re-check.
        window.setTimeout(function () {
          var i;
          for (i = 0; i < res.removed.length; i++) {
            var rel = els[res.removed[i].id];
            if (rel && rel.parentNode) rel.parentNode.removeChild(rel);
            delete els[res.removed[i].id];
          }
          for (i = 0; i < res.merged.length; i++) {
            var m = res.merged[i];
            var mel = els[m.id];
            if (mel) {
              mel.className = "tile " + valueClass(m.value);
              var inner = mel.firstChild;
              inner.className = "tile-inner " + digitClass(m.value);
              inner.textContent = String(m.value);
              mel.classList.add("merged");
              (function (e) {
                window.setTimeout(function () { e.classList.remove("merged"); }, 170);
              })(mel);
            }
          }

          if (res.gained) {
            score += res.gained;
            ui.setStat("score", score);
            flashStat();
            if (score > best) { best = score; ui.setStat("best", best); }
          }

          var spawned = addRandom(true);
          if (spawned) makeTileEl(spawned);

          persist();
          busy = false;

          if (won && !overlay.classList.contains("seen-win")) {
            showOverlay(true);
          } else if (!hasMoves()) {
            dead = true;
            showOverlay(false);
          }
        }, 120);
      }

      function hasMoves() {
        if (emptyCells().length) return true;
        for (var r = 0; r < SIZE; r++) {
          for (var c2 = 0; c2 < SIZE; c2++) {
            var v = grid[r][c2].value;
            if (c2 + 1 < SIZE && grid[r][c2 + 1].value === v) return true;
            if (r + 1 < SIZE && grid[r + 1][c2].value === v) return true;
          }
        }
        return false;
      }

      /* ----------------------------- overlay --------------------------- */
      function showOverlay(isWin) {
        var t = MG.i18n.t;
        overlay.className = "overlay" + (isWin ? " win win-continue seen-win" : "");
        ovMsg.textContent = isWin ? t("win") : t("over");
        ovBtns.innerHTML = "";
        if (isWin) {
          var keep = MG.el("button", "ov-btn", t("keepGoing"));
          keep.addEventListener("click", function () { overlay.classList.add("hidden"); });
          var ng = MG.el("button", "ov-btn alt", t("newGame"));
          ng.addEventListener("click", restart);
          ovBtns.appendChild(keep);
          ovBtns.appendChild(ng);
        } else {
          var again = MG.el("button", "ov-btn", t("tryAgain"));
          again.addEventListener("click", restart);
          ovBtns.appendChild(again);
        }
        overlay.classList.remove("hidden");
      }

      /* ------------------------------ setup ---------------------------- */
      function restart() {
        grid = emptyGrid();
        score = 0;
        won = false;
        dead = false;
        ui.setStat("score", 0);
        addRandom(true);
        addRandom(true);
        overlay.className = "overlay hidden";
        renderAll();
        persist();
      }

      function bootFromSave(s) {
        loadFrom(s.grid);
        score = s.score || 0;
        won = !!s.won;
        dead = false;
        // If the saved board has no moves left, it's already over.
        renderAll();
        if (won) overlay.classList.add("seen-win", "win-continue");
        if (!hasMoves()) { dead = true; showOverlay(false); }
      }

      /* ------------------------------ input ---------------------------- */
      var KEYS = {
        ArrowUp: 0, ArrowRight: 1, ArrowDown: 2, ArrowLeft: 3,
        KeyW: 0, KeyD: 1, KeyS: 2, KeyA: 3,
        k: 0, l: 1, j: 2, h: 3
      };
      window.addEventListener("keydown", function (e) {
        var dir = KEYS[e.code];
        if (dir == null) dir = KEYS[e.key];
        if (dir == null) return;
        e.preventDefault();
        applyMove(dir);
      });

      // Touch swipe.
      var sx = 0, sy = 0, tracking = false;
      board.addEventListener("touchstart", function (e) {
        if (e.touches.length !== 1) return;
        tracking = true;
        sx = e.touches[0].clientX;
        sy = e.touches[0].clientY;
      }, { passive: true });
      board.addEventListener("touchmove", function (e) {
        if (tracking) e.preventDefault();
      }, { passive: false });
      board.addEventListener("touchend", function (e) {
        if (!tracking) return;
        tracking = false;
        var dx = e.changedTouches[0].clientX - sx;
        var dy = e.changedTouches[0].clientY - sy;
        var ax = Math.abs(dx), ay = Math.abs(dy);
        if (Math.max(ax, ay) < 24) return;   // ignore taps
        if (ax > ay) applyMove(dx > 0 ? 1 : 3);
        else applyMove(dy > 0 ? 2 : 0);
      }, { passive: true });

      restartBtn.addEventListener("click", restart);

      // Re-localize live strings on language change.
      function refreshText() {
        introText.innerHTML = MG.i18n.t("intro");
        restartBtn.textContent = MG.i18n.t("restart");
        if (!overlay.classList.contains("hidden")) {
          showOverlay(overlay.classList.contains("win"));
        }
      }
      MG.i18n.onChange(refreshText);

      window.addEventListener("resize", setBoardVars);

      /* ------------------------------ boot ----------------------------- */
      refreshText();
      setBoardVars();
      if (saved && saved.grid && saved.grid.some(function (v) { return v; })) {
        bootFromSave(saved);
      } else {
        restart();
      }
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>🔢 2048 — Minigames</title>
  <meta name="description" content="2048 — slide the tiles, merge matching numbers and reach 2048. Play in your browser, no installs." />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔢</text></svg>" />

  <!-- Shared chrome: header bar + language control. -->
  <link rel="stylesheet" href="../../shared/mg.css" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #faf8ef;
      color: #776e65;
      font-family: "Trebuchet MS", system-ui, -apple-system, sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    .mg-game-area {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .stage {
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .intro {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .intro p {
      font-size: 0.95rem;
      line-height: 1.35;
      opacity: 0.85;
    }
    .intro p b { color: #776e65; }

    .restart {
      flex: none;
      padding: 10px 16px;
      font-weight: 800;
      font-size: 0.95rem;
      color: #f9f6f2;
      background: #8f7a66;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      white-space: nowrap;
    }
    .restart:active { transform: translateY(1px); }

    /* Board: a square, position-relative host. Tiles are absolutely
       positioned over a static grid of background cells. */
    .board {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #bbada0;
      border-radius: 10px;
      padding: var(--gap);
      touch-action: none;
      --gap: 3.2%;
    }

    .grid {
      position: absolute;
      inset: var(--gap);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: var(--gap);
    }
    .cell {
      background: rgba(238, 228, 218, 0.35);
      border-radius: 6px;
    }

    .tiles {
      position: absolute;
      inset: var(--gap);
    }

    .tile {
      position: absolute;
      width: var(--ts);
      height: var(--ts);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      font-weight: 800;
      line-height: 1;
      background: #eee4da;
      color: #776e65;
      transition: transform 110ms ease-in-out;
      will-change: transform;
    }

    .tile-inner {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
    }

    .tile.new .tile-inner { animation: pop 160ms ease; }
    .tile.merged .tile-inner { animation: bump 160ms ease; }

    @keyframes pop {
      0% { transform: scale(0); }
      100% { transform: scale(1); }
    }
    @keyframes bump {
      0% { transform: scale(1); }
      50% { transform: scale(1.18); }
      100% { transform: scale(1); }
    }

    /* Tile color ramp. */
    .v2    { background: #eee4da; }
    .v4    { background: #ede0c8; }
    .v8    { background: #f2b179; color: #f9f6f2; }
    .v16   { background: #f59563; color: #f9f6f2; }
    .v32   { background: #f67c5f; color: #f9f6f2; }
    .v64   { background: #f65e3b; color: #f9f6f2; }
    .v128  { background: #edcf72; color: #f9f6f2; }
    .v256  { background: #edcc61; color: #f9f6f2; }
    .v512  { background: #edc850; color: #f9f6f2; }
    .v1024 { background: #edc53f; color: #f9f6f2; }
    .v2048 { background: #edc22e; color: #f9f6f2; }
    .vbig  { background: #3c3a32; color: #f9f6f2; }

    /* Font sizes relative to tile size (set on board as --ts). */
    .d1 { font-size: calc(var(--ts) * 0.5); }
    .d2 { font-size: calc(var(--ts) * 0.5); }
    .d3 { font-size: calc(var(--ts) * 0.42); }
    .d4 { font-size: calc(var(--ts) * 0.33); }
    .d5 { font-size: calc(var(--ts) * 0.27); }

    /* Win / lose overlay sitting over the board. */
    .overlay {
      position: absolute;
      inset: 0;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-align: center;
      border-radius: 10px;
      background: rgba(238, 228, 218, 0.73);
      backdrop-filter: blur(1px);
      animation: fade 320ms ease both;
    }
    .overlay.hidden { display: none; }
    @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

    .overlay .msg {
      font-size: clamp(1.8rem, 9vw, 2.8rem);
      font-weight: 800;
    }
    .overlay.win .msg { color: #6f5f1f; }

    .overlay .btns { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .ov-btn {
      padding: 10px 18px;
      font-weight: 800;
      font-size: 1rem;
      color: #f9f6f2;
      background: #8f7a66;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .ov-btn.alt { background: #bbada0; }
    .ov-btn:active { transform: translateY(1px); }
  </style>
</head>
<body class="mg-app">
  <!-- Header is mounted by the shared runtime (see MG.mountHeader below). -->
  <div class="mg-game-area">
    <div class="stage">
      <div class="intro">
        <p id="intro-text"></p>
        <button class="restart" id="restart"></button>
      </div>

      <div class="board" id="board">
        <div class="grid" id="grid"></div>
        <div class="tiles" id="tiles"></div>

        <div class="overlay hidden" id="overlay">
          <div class="msg" id="ov-msg"></div>
          <div class="btns" id="ov-btns"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>

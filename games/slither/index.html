<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>🪱 Slither — Minigames</title>
  <meta name="description" content="Slither — glide around a huge arena, eat glowing orbs to grow, and trap rival snakes into your body. Mouse, touch or keys. Play in your browser, no installs." />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪱</text></svg>" />

  <!-- Shared chrome: header bar + language control. -->
  <link rel="stylesheet" href="../../shared/mg.css" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #0b1020;
      color: #fff;
      font-family: "Trebuchet MS", system-ui, -apple-system, sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    /* The game area is a full-bleed viewport into the (much larger) world. */
    .mg-game-area {
      position: relative;
      background: #0b1020;
      padding: 0;
      overflow: hidden;
    }

    canvas#game {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    /* Minimap — a small radar in the bottom-left corner. */
    canvas#minimap {
      position: absolute;
      left: 12px;
      bottom: 12px;
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.35);
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.5);
      z-index: 3;
      pointer-events: none;
    }

    /* Boost button — a thumb pad (mainly for touch, harmless on desktop). */
    .boost-btn {
      position: absolute;
      right: 16px;
      bottom: 16px;
      width: 86px;
      height: 86px;
      border: none;
      border-radius: 50%;
      z-index: 3;
      color: #06210b;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: radial-gradient(circle at 35% 30%, #b6ff7a, #54c23a 70%);
      box-shadow: 0 6px 0 #2f7d22, 0 8px 20px rgba(0, 0, 0, 0.45);
      cursor: pointer;
      touch-action: none;
      transition: transform 0.05s ease, box-shadow 0.05s ease;
    }
    .boost-btn:active,
    .boost-btn.active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #2f7d22, 0 4px 12px rgba(0, 0, 0, 0.45);
    }

    /* Overlay screens */
    .overlay {
      position: absolute;
      inset: 0;
      z-index: 4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      text-align: center;
      padding: 24px;
      pointer-events: none;
      background: radial-gradient(circle at center, rgba(11, 16, 32, 0.35), rgba(11, 16, 32, 0.78));
    }
    .overlay.hidden { display: none; }

    .panel {
      background: rgba(0, 0, 0, 0.5);
      border-radius: 18px;
      padding: 26px 30px;
      backdrop-filter: blur(3px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
      /* Click-through overlay; the panel re-enables pointers for the button. */
      pointer-events: auto;
      cursor: pointer;
      max-width: 420px;
    }

    .title {
      font-size: clamp(1.8rem, 7vw, 2.6rem);
      font-weight: 800;
      letter-spacing: 0.02em;
      text-shadow: 0 3px 0 rgba(0, 0, 0, 0.35);
      margin-bottom: 6px;
    }

    .hint {
      font-size: 1rem;
      opacity: 0.9;
      margin-top: 4px;
      line-height: 1.5;
    }

    .score-line {
      font-size: 1.1rem;
      margin-top: 8px;
    }
    .score-line b { font-size: 1.6rem; }

    .play-pill {
      display: inline-block;
      margin-top: 14px;
      padding: 10px 22px;
      font-weight: 800;
      font-size: 1.05rem;
      color: #06210b;
      background: #7ee05a;
      border-radius: 999px;
      box-shadow: 0 4px 0 #3f9e26;
      animation: bob 1.1s ease-in-out infinite;
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
  </style>
</head>
<body class="mg-app">
  <!-- Header is mounted by the shared runtime (see MG.mountHeader below). -->
  <div class="mg-game-area">
    <canvas id="game"></canvas>
    <canvas id="minimap"></canvas>
    <button class="boost-btn" id="boost" type="button">Boost</button>

    <div class="overlay" id="overlay">
      <div class="panel">
        <div class="title" id="overlay-title">🪱 Slither</div>
        <div class="hint" id="overlay-hint"></div>
        <div class="score-line" id="overlay-score" hidden></div>
        <div class="play-pill" id="overlay-action"></div>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>

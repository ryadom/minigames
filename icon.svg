<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Full-bleed background so the icon works as a maskable icon (the safe
       zone is the centred ~80%; the emoji sits well within it). -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="28%" r="85%">
      <stop offset="0%" stop-color="#2a2e52"/>
      <stop offset="55%" stop-color="#16182e"/>
      <stop offset="100%" stop-color="#0f1020"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <text x="256" y="256" font-size="280" text-anchor="middle" dominant-baseline="central">🎮</text>
</svg>
